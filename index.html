        return (a.produit||'').localeCompare(b.produit||'');
      });

      const Chip = ({ id, label, n, color }) => (
        <button onClick={() => setFilter(id)}
          style={{
            border:'none', cursor:'pointer', fontSize:12, fontWeight:600,
            padding:'5px 10px', borderRadius:999,
            background: filter===id ? (color||'var(--accent)') : 'var(--bg-muted)',
            color: filter===id ? '#fff' : 'var(--ink-soft)',
          }}>
          {label} {n}
        </button>
      );

      return (
        <div className="stack" style={{gap:10}}>
          {/* Synthèse cliquable = filtres */}
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            <Chip id="all" label="Tous" n={counts.all} color="var(--ink-soft)" />
            <Chip id="noreason" label="⚠️ Sans raison" n={counts.noreason} color="var(--warn)" />
            <Chip id="reason" label="✓ Avec raison" n={counts.reason} color="var(--accent)" />
            <Chip id="dispatched" label="🚚 Dispatchés" n={counts.dispatched} color="var(--info)" />
          </div>

          {counts.all > 6 && (
            <input type="text" placeholder="🔎 Filtrer un produit…" value={q} onChange={e => setQ(e.target.value)} style={{fontSize:13}} />
          )}

          {/* Tableau compact */}
          <div style={{border:'1px solid var(--line)',borderRadius:'var(--radius-sm)',overflow:'hidden'}}>
            {rows.length === 0 ? (
              <div style={{padding:16,textAlign:'center',color:'var(--ink-mute)',fontSize:13}}>Aucun produit dans ce filtre.</div>
            ) : rows.map((m, i) => {
              const rd = reasonOf(m.reason);
              return (
              <div key={m.id} style={{
                borderTop: i ? '1px solid var(--line)' : 'none',
                background: m.isLM ? 'var(--info-soft)' : (!m.hasReason ? 'var(--warn-soft)' : (openReason===m.id ? 'var(--cream,#faf8f0)' : 'transparent')),
              }}>
                <div style={{display:'flex', alignItems:'center', gap:8, padding:'8px 10px'}}>
                  {/* Produit + manque */}
                  <div style={{flex:'2 1 140px',minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:13,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                      {m.isLM ? '🚚 ' : ''}{m.produit}
                      {m.local ? <span className="badge" style={{marginLeft:6,fontSize:10,background:'var(--info-soft)',color:'var(--info,#1565c0)',padding:'1px 6px',borderRadius:4}}>📍 {m.local}</span> : null}
                    </div>
                    <div style={{fontSize:11,color:'var(--ink-mute)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                      {m.producteur} · <strong>−{m.manque}</strong>/{m.total}
                    </div>
                  </div>
                  {/* Raison : bouton tappable qui ouvre les chips */}
                  <div style={{flex:'1 1 120px',minWidth:0}}>
                    {m.isLM ? (
                      <span className="badge badge-info" style={{fontSize:11}}>dispatché ↓</span>
                    ) : (
                      <button onClick={() => setOpenReason(openReason===m.id ? null : m.id)}
                        style={{width:'100%',fontSize:12,padding:'8px',borderRadius:8,cursor:'pointer',textAlign:'left',
                          border: m.hasReason ? '1px solid var(--line)' : '1px solid var(--warn)',
                          background: m.hasReason ? 'var(--bg-card,#fff)' : 'var(--warn-soft)',
                          color: m.hasReason ? 'var(--ink)' : 'var(--warn)', fontWeight: m.hasReason ? 500 : 700,
                          whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                        {rd ? `${rd.emoji} ${rd.label}` : '⚠️ Raison ?'}
                      </button>
                    )}
                  </div>
                  {/* Actions */}
                  <div style={{flex:'0 0 auto',display:'flex',gap:4}}>
                    {!m.isLM && (
                      <button className="btn-secondary" onClick={() => onDispatch(m)} title="Produit arrivé → dispatcher"
                        style={{fontSize:12,padding:'5px 8px',whiteSpace:'nowrap'}}>🚚</button>
                    )}
                    <button className="btn-ghost" onClick={() => onDelete(m)} style={{fontSize:13,padding:'5px 6px'}}>🗑️</button>
                  </div>
                </div>
                {/* Chips de raison (ouverts au tap) — gros, une main */}
                {openReason===m.id && !m.isLM && (
                  <div style={{padding:'2px 10px 12px',display:'flex',flexWrap:'wrap',gap:6}}>
                    {PREP_REASONS.map(r => (
                      <button key={r.id} onClick={() => { onReason(m, r.id); if (r.id !== 'autre') setOpenReason(null); }}
                        style={{fontSize:13,padding:'9px 12px',borderRadius:10,cursor:'pointer',
                          border: m.reason===r.id ? '2px solid var(--accent)' : '1px solid var(--border)',
                          background: m.reason===r.id ? 'var(--accent)' : 'var(--bg-card,#fff)',
                          color: m.reason===r.id ? '#fff' : 'var(--ink)', fontWeight:600}}>
                        {r.emoji} {r.label}
                      </button>
                    ))}
                  </div>
                )}
              </div>
              );
            })}
          </div>

          {/* Champ "préciser" pour les raisons = Autre */}
          {rows.some(m => m.reason === 'autre' && !m.isLM) && (
            <div className="stack" style={{gap:4}}>
              {rows.filter(m => m.reason === 'autre' && !m.isLM).map(m => (
                <div key={m.id} style={{display:'flex',alignItems:'center',gap:6,fontSize:12}}>
                  <span style={{color:'var(--ink-mute)',whiteSpace:'nowrap',maxWidth:120,overflow:'hidden',textOverflow:'ellipsis'}}>{m.produit} :</span>
                  <input type="text" placeholder="préciser la raison…" defaultValue={m.reasonNote||''}
                    onBlur={e => onReason(m, 'autre', e.target.value)} style={{flex:1,fontSize:12}} />
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ============================================================
    // PAGE PRÉPA — DISPATCH (uploads PDF + manquants + dispatch dernière minute)
    // ============================================================
    function PrepDispatchPage({ session, setSession }) {
      const showToast = React.useContext(ToastContext);

      // --- Date de distribution choisie (obligatoire) ---
      const [day, setDay] = React.useState(null); // dayKey choisie, null = pas encore choisi
      const today = todayKey();
      const nextDay = nextDistribDate(today);
      const dayAfter = nextDay ? nextDistribDate(addDays(nextDay, 1)) : null;

      // Locaux disponibles pour la date choisie
      const sitesForDay = day ? sitesForDate(day) : [];

      // --- Données du jour choisi (chargées localement à cette page) ---
      const [dispatchData, setDispatchData] = React.useState({});
      const [manquants, setManquants] = React.useState([]);
      const [lastmin, setLastmin] = React.useState([]);
      const [remises, setRemises] = React.useState([]);
      const [dayOrders, setDayOrders] = React.useState([]);

      React.useEffect(() => {
        if (!day) { setDispatchData({}); setManquants([]); setLastmin([]); setRemises([]); setDayOrders([]); return; }
        const u0 = storage.subscribe(`day_${day}_dispatch`, (arr) => {
          const map = {};
          for (const d of arr) {
            map[d.id] = {
              master: d.master ? safeJSON(d.master) : null,
              frais: d.frais ? safeJSON(d.frais) : null,
              sec: d.sec ? safeJSON(d.sec) : null,
              nd: d.nd ? safeJSON(d.nd) : null,
              meta: { uploadedBy: d.uploadedBy, uploadedAt: d.uploadedAt, parts: d.parts || [] },
            };
          }
          setDispatchData(map);
        });
        const u1 = storage.subscribe(`day_${day}_manquants`, setManquants);
        const u2 = storage.subscribe(`day_${day}_lastminute`, setLastmin);
        const u3 = storage.subscribe(`day_${day}_remises`, setRemises);
        const u4 = storage.subscribe(`day_${day}_orders`, (arr) => {
          const doc = (arr || []).find(x => x.id === 'data') || (arr || [])[0];
          setDayOrders(doc && doc.orders ? doc.orders : []);
        });
        return () => { u0(); u1(); u2(); u3(); u4(); };
      }, [day]);

      const setRemiseReason = async (r, reason) => {
        await storage.setDoc(`day_${day}_remises`, r.id, { ...r, reason });
      };

      // --- Uploads dispatch par site ---
      const [dispSite, setDispSite] = React.useState('');
      const [ndView, setNdView] = React.useState('casier'); // 'casier' | 'global' — vue ND du jour
      const [masterFile, setMasterFile] = React.useState(null);
      const [fraisFile, setFraisFile] = React.useState(null);
      const [secFile, setSecFile] = React.useState(null);
      const [ndFile, setNdFile] = React.useState(null);
      const [busy, setBusy] = React.useState(false);

      // Quand on choisit la date, pré-sélectionne un local valide
      React.useEffect(() => {
        if (day && sitesForDay.length && !sitesForDay.includes(dispSite)) {
          setDispSite(sitesForDay.includes(session.site) ? session.site : sitesForDay[0]);
        }
      }, [day]);

      // --- Manquants (global) ---
      const [manqFiles, setManqFiles] = React.useState([]); // plusieurs PDF d'un coup
      const [lmModal, setLmModal] = React.useState(null);    // manquant en cours de transformation
      const [showManual, setShowManual] = React.useState(false);
      const [manProduit, setManProduit] = React.useState('');
      const [manProducteur, setManProducteur] = React.useState('');
      const [manQty, setManQty] = React.useState('');
      const [manLocal, setManLocal] = React.useState(''); // '' = tous locaux, sinon ciblé

      const lmByManquant = React.useMemo(() => {
        return new Set(lastmin.map(l => l.manquantId));
      }, [lastmin]);

      const sitesLoaded = Object.keys(dispatchData || {});

      // ÉCRAN 1 : choix de la date (bloquant tant que pas choisi)
      if (!day) {
        return (
          <div className="stack">
            <h1>Manquants &amp; ND</h1>
            <div className="card">
              <h3 style={{marginBottom:6}}>Pour quelle distribution travailles-tu ?</h3>
              <p style={{fontSize:13,color:'var(--ink-soft)',marginBottom:14}}>
                Choisis le jour de distribution pour lequel tu charges les documents. Tu pourras en changer ensuite.
              </p>
              <div className="stack" style={{gap:8}}>
                {isDistribDay(today) && (
                  <button className="btn-primary btn-block" onClick={() => setDay(today)}>
                    Aujourd'hui — {dayLabelShort(today)}
                  </button>
                )}
                {nextDay && nextDay !== today && (
                  <button className={isDistribDay(today) ? 'btn-secondary btn-block' : 'btn-primary btn-block'} onClick={() => setDay(nextDay)}>
                    Prochaine distrib — {dayLabelShort(nextDay)}
                  </button>
                )}
                {dayAfter && dayAfter !== nextDay && (
                  <button className="btn-secondary btn-block" onClick={() => setDay(dayAfter)}>
                    Suivante — {dayLabelShort(dayAfter)}
                  </button>
                )}
                <div style={{marginTop:6}}>
                  <label style={{fontSize:12,fontWeight:600,display:'block',marginBottom:4}}>Ou une autre date</label>
                  <input type="date" value={today} min={today}
                    onChange={(e) => {
                      const v = e.target.value;
                      if (!v) return;
                      if (!isDistribDay(v)) { showToast('Pas de distribution ce jour-là'); return; }
                      setDay(v);
                    }} style={{fontSize:14}} />
                </div>
              </div>
            </div>
          </div>
        );
      }

      const handleUploadDispatch = async () => {
        if (!dispSite) { showToast('Choisis un local'); return; }
        if (!masterFile && !fraisFile && !secFile && !ndFile) { showToast('Ajoute au moins un PDF'); return; }
        if (!window.pdfjsLib) { showToast('PDF.js non chargé, recharge la page'); return; }
        setBusy(true);
        try {
          const buf = (f) => f.arrayBuffer();
          const payload = { uploadedBy: session.name, uploadedAt: new Date().toISOString() };
          const parts = [];
          if (masterFile) { const m = await parseMasterPDF(await buf(masterFile)); payload.master = JSON.stringify(m); parts.push(`Master (${Object.keys(m).length})`); }
          if (fraisFile) { const d = await parseDispatchPDF(await buf(fraisFile)); payload.frais = JSON.stringify(d); parts.push(`Frais (${d.products.length})`); }
          if (secFile) { const d = await parseDispatchPDF(await buf(secFile)); payload.sec = JSON.stringify(d); parts.push(`Sec (${d.products.length})`); }
          if (ndFile) { const n = await parseNDPDF(await buf(ndFile)); payload.nd = JSON.stringify(n); parts.push(`ND (${n.length})`); }
          payload.parts = parts;
          await storage.setDoc(`day_${day}_dispatch`, dispSite, payload);
          showToast(`✓ Dispatch ${dispSite} : ${parts.join(' · ')}`);
          setMasterFile(null); setFraisFile(null); setSecFile(null); setNdFile(null);
        } catch (e) { showToast('Erreur PDF : ' + e.message); }
        finally { setBusy(false); }
      };

      const handleUploadManquants = async () => {
        if (!manqFiles.length) { showToast('Choisis le(s) PDF des manquants'); return; }
        if (!window.pdfjsLib) { showToast('PDF.js non chargé'); return; }
        setBusy(true);
        try {
          // Plusieurs PDF (plusieurs pages du site) chargés d'un coup, cumulés.
          let count = 0;
          for (const f of manqFiles) {
            const items = await parseManquantsPDF(await f.arrayBuffer());
            for (const it of items) {
              const id = dispatchNorm(it.producteur + '|' + it.produit) || `m_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
              await storage.setDoc(`day_${day}_manquants`, id, {
                produit: it.produit, producteur: it.producteur, cond: it.cond,
                fini: it.fini, total: it.total, manque: it.manque,
                reason: '', reasonNote: '',
                status: 'rupture', // rupture par défaut
                uploadedBy: session.name, uploadedAt: new Date().toISOString(),
              });
              count++;
            }
          }
          showToast(`✓ ${count} manquants → ruptures (${manqFiles.length} PDF)`);
          setManqFiles([]);
        } catch (e) { showToast('Erreur PDF : ' + e.message); }
        finally { setBusy(false); }
      };

      // Ajout d'un manquant à la main (produit non présent dans le JSON), éventuellement ciblé sur un local
      const handleAddManual = async () => {
        if (!manProduit.trim()) { showToast('Indique le produit'); return; }
        const qty = parseInt(manQty, 10) || 0;
        setBusy(true);
        try {
          const idBase = dispatchNorm(manProducteur + '|' + manProduit) || `m_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
          const id = manLocal ? `${idBase}__${manLocal}` : idBase;
          await storage.setDoc(`day_${day}_manquants`, id, {
            produit: manProduit.trim(), producteur: manProducteur.trim(), cond: '',
            fini: 0, total: qty, manque: qty,
            reason: '', reasonNote: '',
            status: 'rupture', manuel: true,
            local: manLocal || null,
            uploadedBy: session.name, uploadedAt: new Date().toISOString(),
          });
          showToast(manLocal ? `✓ Manquant ajouté pour ${manLocal}` : '✓ Manquant ajouté');
          setManProduit(''); setManProducteur(''); setManQty(''); setManLocal(''); setShowManual(false);
        } catch (e) { showToast('Erreur : ' + e.message); }
        finally { setBusy(false); }
      };

      // Supprime le dispatch (Master/frais/sec/ND) d'un local
      const handleResetSite = async (site) => {
        if (!confirm(`Supprimer le dispatch chargé pour ${site} ?\n\nCela retire le Master, le dispatch frais, le sec et le ND de ce local. Les manquants et le dispatch dernière minute du jour ne sont PAS touchés.`)) return;
        setBusy(true);
        try {
          await storage.deleteDoc(`day_${day}_dispatch`, site);
          showToast(`✓ Dispatch ${site} supprimé`);
        } catch (e) { showToast('Erreur : ' + e.message); }
        finally { setBusy(false); }
      };

      // Reset complet du dispatch du jour (tous locaux + manquants + lastminute)
      const handleResetAll = async () => {
        if (!confirm(`⚠️ Tout réinitialiser pour la distribution du ${dayLabelShort(day)} ?\n\nCela supprime :\n• les dispatch de TOUS les locaux\n• la liste des manquants\n• les dispatch dernière minute\n\nLes commandes, statuts clients, anomalies qualité ne sont PAS touchés.`)) return;
        if (!confirm('Vraiment sûr ? Action irréversible.')) return;
        setBusy(true);
        try {
          await storage.deleteAll(`day_${day}_dispatch`);
          await storage.deleteAll(`day_${day}_manquants`);
          await storage.deleteAll(`day_${day}_lastminute`);
          showToast('✓ Dispatch du jour réinitialisé');
        } catch (e) { showToast('Erreur : ' + e.message); }
        finally { setBusy(false); }
      };

      const setReason = async (m, reason, note) => {
        await storage.setDoc(`day_${day}_manquants`, m.id, { ...m, reason, reasonNote: note ?? m.reasonNote ?? '' });
      };
      const deleteManquant = async (m) => {
        // V9 : un manquant peut avoir un dispatch dernière minute associé (day_X_lastminute) ;
        // sans le supprimer aussi, il continuait à apparaître en bac ND côté distrib.
        const linkedLm = (lastmin || []).filter(l => l.manquantId === m.id || l.id === m.id);
        const msg = linkedLm.length > 0
          ? 'Retirer ce manquant ET annuler son dispatch dernière minute ?'
          : 'Retirer ce manquant ?';
        if (!confirm(msg)) return;
        await storage.deleteDoc(`day_${day}_manquants`, m.id);
        for (const l of linkedLm) {
          try { await storage.deleteDoc(`day_${day}_lastminute`, l.id); } catch (e) {}
        }
      };

      const withReason = manquants.filter(m => m.reason).length;

      return (
        <div className="stack">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:12}}>
            <div>
              <h1 style={{margin:0}}>Manquants &amp; ND</h1>
              <div style={{fontSize:12,color:'var(--ink-soft)',marginTop:4}}>
                Préparateur : 
                <select value={session.name} onChange={e => setSession({...session, name: e.target.value})} style={{marginLeft:6,padding:'4px 6px',fontSize:12}}>
                  {PREPARATEURS.map(p => <option key={p} value={p}>{p}</option>)}
                  <option value="">Autre…</option>
                </select>
              </div>
            </div>
          </div>

          <div className="card-flat" style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,padding:'10px 14px',background:'var(--accent-soft)'}}>
            <div>
              <div style={{fontSize:12,color:'var(--ink-soft)'}}>Distribution du</div>
              <strong style={{fontSize:16,textTransform:'capitalize'}}>📅 {dayLabelShort(day)}</strong>
              <div style={{fontSize:11,color:'var(--ink-mute)',marginTop:2}}>Locaux ce jour : {sitesForDay.join(', ')}</div>
            </div>
            <button className="btn-secondary" onClick={() => { setDay(null); setMasterFile(null); setFraisFile(null); setSecFile(null); setNdFile(null); setManqFiles([]); }} style={{fontSize:13,whiteSpace:'nowrap'}}>
              Changer
            </button>
          </div>

          {/* ============ RÉCAP — CE QUI RESTE À TRAITER ============ */}
          {(() => {
            const mNoReason = manquants.filter(m => !m.reason && !lmByManquant.has(m.id)).length;
            const rNoReason = remises.filter(r => !r.reason).length;
            const allDone = mNoReason === 0 && rNoReason === 0;
            return (
              <div className="card" style={{borderLeft:`3px solid ${allDone ? 'var(--ok,#2e7d32)' : 'var(--warn,#e0a800)'}`}}>
                <h3 style={{margin:0,marginBottom:6}}>{allDone ? '✓ Tout est traité' : '📋 À traiter'}</h3>
                <div style={{display:'flex',flexWrap:'wrap',gap:14,fontSize:13}}>
                  <span>📦 <strong>{manquants.length}</strong> manquants{mNoReason>0 && <span style={{color:'var(--warn,#b8860b)'}}> · {mNoReason} sans raison</span>}</span>
                  <span>🏷️ <strong>{remises.length}</strong> remisés{rNoReason>0 && <span style={{color:'var(--warn,#b8860b)'}}> · {rNoReason} sans raison</span>}</span>
                  <span>🚚 <strong>{lastmin.length}</strong> ND dernière minute</span>
                </div>
                {manquants.length === 0 && remises.length === 0 && (
                  <p style={{fontSize:12,color:'var(--ink-mute)',marginTop:8,marginBottom:0}}>
                    Aucun manquant ni remisé chargé. Ils apparaissent automatiquement au chargement du JSON commandes (onglet Admin). Tu peux aussi en ajouter un à la main ci-dessous.
                  </p>
                )}
              </div>
            );
          })()}

          {/* ============ MANQUANTS ============ */}
          <div className="card">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
              <h3 style={{margin:0}}>📦 Produits manquants</h3>
              <button className="btn-ghost" onClick={() => setShowManual(s=>!s)} style={{fontSize:13}}>
                {showManual ? 'Annuler' : '+ Ajouter'}
              </button>
            </div>
            <p style={{fontSize:12,color:'var(--ink-soft)',marginBottom:10}}>
              Indique la <strong>raison</strong> de chaque manque. Si le produit <strong>arrive le matin</strong>, clique 🚚 pour le répartir entre les locaux (ND dernière minute).
            </p>

            {/* Ajout manuel — ciblage local possible */}
            {showManual && (
              <div className="card-flat" style={{marginBottom:12,padding:'12px',background:'var(--accent-soft)'}}>
                <div style={{fontWeight:600,fontSize:13,marginBottom:8}}>Nouveau manquant</div>
                <input type="text" placeholder="Produit *" value={manProduit} onChange={e=>setManProduit(e.target.value)} style={{marginBottom:6,fontSize:13}} />
                <input type="text" placeholder="Producteur" value={manProducteur} onChange={e=>setManProducteur(e.target.value)} style={{marginBottom:6,fontSize:13}} />
                <input type="number" min="0" placeholder="Quantité manquante" value={manQty} onChange={e=>setManQty(e.target.value)} style={{marginBottom:6,fontSize:13}} />
                <label style={{fontSize:12,fontWeight:600,display:'block',marginBottom:4}}>Cibler un local (optionnel)</label>
                <select value={manLocal} onChange={e=>setManLocal(e.target.value)} style={{marginBottom:8,fontSize:13}}>
                  <option value="">Tous les locaux</option>
                  {sitesForDay.map(s => <option key={s} value={s}>{s}</option>)}
                </select>
                <div style={{display:'flex',gap:6}}>
                  <button className="btn-primary" disabled={busy || !manProduit.trim()} onClick={handleAddManual} style={{flex:1,fontSize:13}}>Ajouter</button>
                  <button className="btn-secondary" onClick={()=>{setShowManual(false);setManProduit('');setManProducteur('');setManQty('');setManLocal('');}} style={{fontSize:13}}>Annuler</button>
                </div>
              </div>
            )}

            {manquants.length > 0 ? (
              <ManquantsTable
                manquants={manquants}
                lmByManquant={lmByManquant}
                onReason={setReason}
                onDispatch={(m) => setLmModal(m)}
                onDelete={deleteManquant}
              />
            ) : (
              <p style={{fontSize:13,color:'var(--ink-mute)',textAlign:'center',padding:'8px 0'}}>Aucun manquant pour cette distribution.</p>
            )}
          </div>

          {/* ============ PRODUITS REMISÉS ============ */}
          {remises.length > 0 && (
            <div className="card">
              <h3 style={{marginBottom:4}}>🏷️ Produits remisés</h3>
              <p style={{fontSize:12,color:'var(--ink-soft)',marginBottom:10}}>
                Produits dont la quantité ou le prix a été réduit. Renseigne la raison de chacun.
              </p>
              <div className="stack" style={{gap:0}}>
                {remises.slice().sort((a,b)=>{
                  const ar = a.reason?1:0, br = b.reason?1:0;
                  if (ar!==br) return ar-br;
                  return (a.produit||'').localeCompare(b.produit||'','fr');
                }).map((r,i) => (
                  <div key={r.id} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 0',
                    borderTop: i ? '1px solid var(--line)' : 'none',
                    background: r.reason ? 'transparent' : 'var(--warn-soft)'}}>
                    <div style={{flex:'2 1 140px',minWidth:0}}>
                      <div style={{fontWeight:600,fontSize:13,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r.produit}</div>
                      <div style={{fontSize:11,color:'var(--ink-mute)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                        {r.producteur} · {r.clients} client(s){r.percentage ? ` · −${r.percentage}%` : ''}
                      </div>
                    </div>
                    <div style={{flex:'1 1 130px',minWidth:0}}>
                      <select value={r.reason || ''} onChange={e => setRemiseReason(r, e.target.value)}
                        style={{fontSize:12,padding:'4px 6px',width:'100%',
                          borderColor: r.reason ? 'var(--line)' : 'var(--warn)'}}>
                        <option value="">— raison —</option>
                        {PREP_REASONS.map(pr => <option key={pr.id} value={pr.id}>{pr.label}</option>)}
                      </select>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
          {lastmin.length > 0 && (
            <div className="card">
              <h3 style={{marginBottom:8}}>🚚 Dispatch dernière minute du jour</h3>
              <div className="list">
                {lastmin.map(l => {
                  const totalAlloc = Object.values(l.allocBySite || {}).reduce((s, arr) => s + arr.reduce((x,c)=>x+c.qty,0), 0);
                  return (
                    <div key={l.id} className="list-item" style={{flexDirection:'column',alignItems:'stretch',gap:6}}>
                      <div style={{display:'flex',justifyContent:'space-between',gap:8}}>
                        <div className="list-item-name">{l.produit}</div>
                        <button className="btn-ghost" onClick={async()=>{ if(confirm('Annuler ce dispatch ?')) await storage.deleteDoc(`day_${day}_lastminute`, l.id); }} style={{fontSize:13}}>🗑️</button>
                      </div>
                      <div className="list-item-sub">{l.qtyReceived} reçus · {totalAlloc} attribués</div>
                      <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                        {Object.entries(l.allocBySite || {}).map(([site, arr]) => (
                          <span key={site} className="badge badge-site">{site} : {arr.reduce((x,c)=>x+c.qty,0)}</span>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {(lastmin.length > 0
            || (dayOrders || []).some(o => (o.nds || []).length > 0)
            || Object.values(dispatchData || {}).some(d => Array.isArray(d && d.nd) && d.nd.length > 0)) && (() => {
            // ND DU JOUR : recap par local. Deux sources réunies :
            //  • ND NORMAL (noir) = le ND de base. En V4 il vient des commandes (o.nds) ;
            //    repli sur l'ancien PDF ND (dispatchData[site].nd) si pas de commandes.
            //  • ND DERNIÈRE MINUTE (rouge) = les dispatch LM, par casier (allocBySite)
            const localsOfDay = (typeof sitesForDate === 'function' ? sitesForDate(day) : SITES) || SITES;
            // Dernière minute : site -> casier -> [{produit, qty}]
            const lmBySiteCasier = {};
            for (const l of lastmin) {
              for (const [site, arr] of Object.entries(l.allocBySite || {})) {
                for (const c of (arr || [])) {
                  if (!c || !(c.qty > 0)) continue;
                  const cas = c.casier || 'ND';
                  if (!lmBySiteCasier[site]) lmBySiteCasier[site] = {};
                  if (!lmBySiteCasier[site][cas]) lmBySiteCasier[site][cas] = [];
                  lmBySiteCasier[site][cas].push({ produit: l.produit, producteur: l.producteur, qty: c.qty });
                }
              }
            }
            // ND normal de base : site -> casier -> [{produit, qty}]
            const normalBySite = {};
            // 1) V4 : chaque client a un casier (frais, sinon sec, sinon bac ND) → on y range ses ND
            const aggNd = {}; // site -> casier -> { produit -> qty }
            for (const o of (dayOrders || [])) {
              const site = (o.site || '').toUpperCase();
              if (!site) continue;
              const nds = o.nds || [];
              if (!nds.length) continue;
              const casier = (o.casiersFrais && o.casiersFrais[0]) || (o.casiersSec && o.casiersSec[0]) || 'ND';
              for (const nd of nds) {
                if (!nd || !nd.produit) continue;
                if (!aggNd[site]) aggNd[site] = {};
                if (!aggNd[site][casier]) aggNd[site][casier] = {};
                aggNd[site][casier][nd.produit] = (aggNd[site][casier][nd.produit] || 0) + (nd.qty || 1);
              }
            }
            for (const [site, casMap] of Object.entries(aggNd)) {
              normalBySite[site] = {};
              for (const [cas, m] of Object.entries(casMap)) {
                normalBySite[site][cas] = Object.entries(m)
                  .map(([produit, qty]) => ({ produit, qty }))
                  .sort((a, b) => a.produit.localeCompare(b.produit));
              }
            }
            // 2) Repli ancien système : PDF ND chargé (sans casier → bac ND), pour les locaux sans commande V4
            for (const [site, d] of Object.entries(dispatchData || {})) {
              if (normalBySite[site]) continue;
              const nd = d && d.nd;
              if (Array.isArray(nd) && nd.length) {
                normalBySite[site] = { ND: nd.map(p => ({ produit: p.produit, qty: p.total || 0 })) };
              }
            }
            const sitesWithND = new Set([...Object.keys(normalBySite), ...Object.keys(lmBySiteCasier)]);
            if (sitesWithND.size === 0) return null;
            const ordered = [...localsOfDay.filter(s => sitesWithND.has(s)), ...[...sitesWithND].filter(s => !localsOfDay.includes(s))];
            const casierSort = (a, b) => {
              if (a === 'ND' && b !== 'ND') return 1;   // bac ND toujours en dernier
              if (b === 'ND' && a !== 'ND') return -1;
              const na = parseInt(a, 10), nb = parseInt(b, 10);
              if (!isNaN(na) && !isNaN(nb)) return na - nb;
              return String(a).localeCompare(String(b));
            };
            // Vue GLOBALE : totaux par produit (tous locaux/casiers confondus) → combien mettre en unité.
            const globalNormal = {}, globalLm = {};
            for (const s of Object.keys(normalBySite)) for (const c of Object.keys(normalBySite[s])) for (const p of normalBySite[s][c]) globalNormal[p.produit] = (globalNormal[p.produit]||0) + (p.qty||0);
            for (const s of Object.keys(lmBySiteCasier)) for (const c of Object.keys(lmBySiteCasier[s])) for (const p of lmBySiteCasier[s][c]) globalLm[p.produit] = (globalLm[p.produit]||0) + (p.qty||0);
            const globalNormalRows = Object.entries(globalNormal).map(([produit,qty])=>({produit,qty})).sort((a,b)=> b.qty-a.qty || a.produit.localeCompare(b.produit));
            const globalLmRows = Object.entries(globalLm).map(([produit,qty])=>({produit,qty})).sort((a,b)=> b.qty-a.qty || a.produit.localeCompare(b.produit));
            return (
              <div className="card">
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:6}}>
                  <h3 style={{margin:0}}>📦 ND du jour</h3>
                  <div className="filter-row" style={{margin:0}}>
                    <div className={`chip ${ndView==='casier'?'selected':''}`} onClick={()=>setNdView('casier')}>🧺 Par casier</div>
                    <div className={`chip ${ndView==='global'?'selected':''}`} onClick={()=>setNdView('global')}>🌍 Global</div>
                  </div>
                </div>
                {ndView==='global' ? (
                  <div>
                    <p style={{fontSize:12,color:'var(--ink-mute)',marginTop:0,marginBottom:8}}>Totaux à mettre en unité, tous locaux confondus. <strong style={{color:'var(--danger)'}}>Rouge = dernière minute.</strong></p>
                    {globalNormalRows.length===0 && globalLmRows.length===0 ? (
                      <p style={{fontSize:13,color:'var(--ink-mute)',margin:0}}>Aucun ND aujourd'hui.</p>
                    ) : (
                      <>
                        {globalNormalRows.length>0 && (
                          <div style={{display:'flex',flexDirection:'column'}}>
                            {globalNormalRows.map(p => (
                              <div key={p.produit} style={{display:'flex',justifyContent:'space-between',gap:8,fontSize:15,padding:'5px 0',borderBottom:'1px solid var(--line)'}}>
                                <span>{p.produit}</span><strong style={{whiteSpace:'nowrap'}}>×{p.qty}</strong>
                              </div>
                            ))}
                          </div>
                        )}
                        {globalLmRows.length>0 && (
                          <div style={{marginTop:8,borderLeft:'3px solid var(--danger)',background:'var(--danger-soft)',borderRadius:6,padding:'6px 8px'}}>
                            <div style={{fontSize:11,fontWeight:700,color:'var(--danger)',marginBottom:3}}>🔴 Dernière minute (à rajouter dans l'autre appli, sinon non facturé)</div>
                            {globalLmRows.map(p => (
                              <div key={p.produit} style={{display:'flex',justifyContent:'space-between',gap:8,fontSize:15,padding:'3px 0',color:'var(--danger)',fontWeight:600}}>
                                <span>{p.produit}</span><strong style={{whiteSpace:'nowrap'}}>×{p.qty}</strong>
                              </div>
                            ))}
                          </div>
                        )}
                      </>
                    )}
                  </div>
                ) : (
                <>
                <p style={{fontSize:12,color:'var(--ink-mute)',marginTop:0,marginBottom:8}}>
                  Par local et par casier. ND normal en noir. <strong style={{color:'var(--danger)'}}>En rouge = dernière minute → à rajouter dans l'autre appli, sinon non facturé.</strong>
                </p>
                <div style={{display:'flex',flexDirection:'column',gap:10}}>
                  {ordered.map(site => {
                    const lbl = (typeof siteLabel === 'function') ? siteLabel(site) : site;
                    const normal = normalBySite[site] || null;
                    const lm = lmBySiteCasier[site] || null;
                    const normalCasiers = normal ? Object.keys(normal).sort(casierSort) : [];
                    const casiers = lm ? Object.keys(lm).sort(casierSort) : [];
                    return (
                      <div key={site} className="card-flat" style={{padding:'8px 10px'}}>
                        <div style={{fontWeight:700,fontSize:14,marginBottom:6}}>
                          {site}{lbl && lbl !== site && <span style={{fontWeight:400,color:'var(--ink-mute)',fontSize:12}}> · {lbl}</span>}
                        </div>

                        {normal && normalCasiers.length > 0 && (
                          <div style={{marginBottom: lm ? 8 : 0}}>
                            <div style={{fontSize:11,fontWeight:700,color:'var(--ink-soft)',marginBottom:3}}>ND normal — par casier</div>
                            <div style={{display:'flex',flexDirection:'column',gap:4}}>
                              {normalCasiers.map(cas => (
                                <div key={cas} style={{display:'flex',gap:8,fontSize:13,alignItems:'baseline'}}>
                                  <span className="badge badge-site" style={{whiteSpace:'nowrap'}}>{cas === 'ND' ? '🧺 Bac ND' : `Casier ${cas}`}</span>
                                  <span style={{flex:1}}>{normal[cas].map(p => p.produit + (p.qty > 1 ? ` ×${p.qty}` : '')).join(', ')}</span>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}

                        {lm && (
                          <div style={{borderLeft:'3px solid var(--danger)',background:'var(--danger-soft)',borderRadius:6,padding:'6px 8px'}}>
                            <div style={{fontSize:11,fontWeight:700,color:'var(--danger)',marginBottom:3}}>🔴 Dernière minute (à rajouter sinon non facturé)</div>
                            <div style={{display:'flex',flexDirection:'column',gap:4}}>
                              {casiers.map(cas => (
                                <div key={cas} style={{display:'flex',gap:8,fontSize:13,alignItems:'baseline'}}>
                                  <span className="badge" style={{whiteSpace:'nowrap',background:'var(--danger)',color:'#fff'}}>{cas === 'ND' ? '🧺 Bac ND' : `Casier ${cas}`}</span>
                                  <span style={{flex:1,color:'var(--danger)',fontWeight:600}}>{lm[cas].map(p => p.produit + (p.qty > 1 ? ` ×${p.qty}` : '')).join(', ')}</span>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
                </>
                )}
              </div>
            );
          })()}

          {(sitesLoaded.length > 0 || manquants.length > 0 || lastmin.length > 0) && (
            <div className="card card-flat" style={{borderColor:'var(--danger-soft)'}}>
              <h3 style={{marginBottom:6,fontSize:14,color:'var(--danger)'}}>⚠️ Réinitialiser</h3>
              <p style={{fontSize:12,color:'var(--ink-soft)',marginBottom:10}}>
                Repartir à zéro pour aujourd'hui : supprime <strong>tous</strong> les dispatch chargés, les manquants et les dispatch dernière minute. Les commandes, statuts clients et anomalies ne sont pas touchés.
              </p>
              <button className="btn-danger btn-block" disabled={busy} onClick={handleResetAll}>
                Tout réinitialiser ({sitesLoaded.length} locaux · {manquants.length} manquants · {lastmin.length} dispatch LM)
              </button>
            </div>
          )}

          {lmModal && (
            <LastMinuteModal
              manquant={lmModal}
              dispatchData={dispatchData}
              dayOrders={dayOrders}
              session={session}
              day={day}
              onClose={() => setLmModal(null)}
              onSaved={() => { setLmModal(null); showToast('✓ Dispatch dernière minute enregistré'); }}
            />
          )}
        </div>
      );
    }

    // ============================================================
    // MODAL — transformer un manquant en dispatch dernière minute
    // ============================================================
    function LastMinuteModal({ manquant, dispatchData, dayOrders, session, day, onClose, onSaved }) {
      const showToast = React.useContext(ToastContext);
      const [qty, setQty] = React.useState(manquant.manque || 0);
      const [excludeLivdom, setExcludeLivdom] = React.useState(true);
      const [allocMode, setAllocMode] = React.useState('auto'); // 'auto' (prorata) | 'manuel'
      const [alloc, setAlloc] = React.useState({});  // {site: nombre}
      const [busy, setBusy] = React.useState(false);
      // Mode SANS PDF : l'utilisateur choisit les locaux et les quantités à la main.
      const [noPdfAlloc, setNoPdfAlloc] = React.useState({}); // {site: nombre}

      // Besoin par local : on privilégie le calcul depuis les commandes (besoin réel + casiers
      // des clients concernés → attribution auto), puis repli sur bySite (sans casiers → bac ND),
      // puis repli sur les dispatch PDF.
      const needBySite = React.useMemo(() => {
        const exclude = excludeLivdom ? ['DOM'] : [];
        // 1) depuis les commandes : besoin + casiers (attribution client automatique)
        const fromOrders = computeNeedFromOrders(manquant, dayOrders, { excludeSites: exclude });
        if (Object.keys(fromOrders).length) return fromOrders;
        // 2) bySite stocké sur le manquant (la demande réelle par local, sans casiers)
        if (manquant.bySite && Object.keys(manquant.bySite).length) {
          const out = {};
          for (const [site, n] of Object.entries(manquant.bySite)) {
            if (exclude.includes(site)) continue;
            if (n > 0) out[site] = { total: n, casiers: [] };
          }
          if (Object.keys(out).length) return out;
        }
        // 3) repli : dispatch PDF
        return computeNeedBySite(manquant, dispatchData, { excludeSites: exclude });
      }, [manquant, dispatchData, dayOrders, excludeLivdom]);

      // Proposition au prorata quand qty / besoin change — uniquement en mode auto
      React.useEffect(() => {
        if (allocMode === 'auto') setAlloc(allocateProrata(needBySite, parseInt(qty, 10) || 0));
      }, [needBySite, qty, allocMode]);

      const sites = Object.keys(needBySite);
      const totalNeed = sites.reduce((s, k) => s + needBySite[k].total, 0);
      const totalAlloc = Object.values(alloc).reduce((s, n) => s + (parseInt(n,10)||0), 0);

      const setSiteAlloc = (site, val) => {
        if (allocMode !== 'manuel') setAllocMode('manuel'); // toute saisie passe en manuel
        const n = Math.max(0, Math.min(parseInt(val,10)||0, needBySite[site].total));
        setAlloc(a => ({ ...a, [site]: n }));
      };

      // Met tout le reçu sur un seul local (plafonné à son besoin), 0 ailleurs
      const putAllOn = (target) => {
        setAllocMode('manuel');
        const recu = parseInt(qty,10) || 0;
        const next = {};
        for (const s of sites) next[s] = (s === target) ? Math.min(recu, needBySite[s].total) : 0;
        setAlloc(next);
      };

      // Repasse en prorata auto
      const resetAuto = () => {
        setAllocMode('auto');
        setAlloc(allocateProrata(needBySite, parseInt(qty,10) || 0));
      };

      // Locaux proposés en mode sans-PDF : ceux qui distribuent ce jour (hors DOM si exclu)
      const manualSiteOptions = React.useMemo(() => {
        const list = (typeof sitesForDate === 'function' ? sitesForDate(day) : SITES) || SITES;
        return excludeLivdom ? list.filter(s => s !== 'DOM') : list;
      }, [day, excludeLivdom]);
      const noPdfTotal = Object.values(noPdfAlloc).reduce((s, n) => s + (parseInt(n,10)||0), 0);

      // Sauvegarde en mode SANS PDF : pas de casiers, juste une quantité par local (bac ND)
      const handleSaveNoPdf = async () => {
        if (noPdfTotal <= 0) { showToast('Rien à dispatcher'); return; }
        setBusy(true);
        try {
          const allocBySite = {};
          for (const [site, n] of Object.entries(noPdfAlloc)) {
            const q = parseInt(n,10) || 0;
            if (q > 0) allocBySite[site] = [{ casier: 'ND', qty: q }];
          }
          const id = manquant.id || `lm_${Date.now()}`;
          await storage.setDoc(`day_${day}_lastminute`, id, {
            manquantId: manquant.id,
            produit: manquant.produit, producteur: manquant.producteur, cond: manquant.cond || '',
            qtyReceived: parseInt(qty,10) || 0,
            excludeLivdom,
            allocMode: 'manuel-sans-pdf',
            allocBySite,
            createdBy: session.name, createdAt: new Date().toISOString(),
          });
          if (manquant.id && !manquant.fromSignalement) {
            await storage.setDoc(`day_${day}_manquants`, manquant.id, { ...manquant, status: 'dispatched' });
          }
          onSaved();
        } catch (e) { showToast('Erreur : ' + e.message); }
        finally { setBusy(false); }
      };

      const handleSave = async () => {
        if (totalAlloc <= 0) { showToast('Rien à dispatcher'); return; }
        setBusy(true);
        try {
          // Pour chaque site : attribuer aux casiers si dispo, sinon quantité simple (bac ND)
          const allocBySite = {};
          for (const site of sites) {
            const n = parseInt(alloc[site],10) || 0;
            if (n <= 0) continue;
            const casiers = needBySite[site].casiers || [];
            allocBySite[site] = casiers.length ? attributeToCasiers(casiers, n) : [{ casier: 'ND', qty: n }];
          }
          const id = manquant.id || `lm_${Date.now()}`;
          await storage.setDoc(`day_${day}_lastminute`, id, {
            manquantId: manquant.id,
            produit: manquant.produit, producteur: manquant.producteur, cond: manquant.cond,
            qtyReceived: parseInt(qty,10) || 0,
            excludeLivdom,
            allocMode,
            allocBySite,
            createdBy: session.name, createdAt: new Date().toISOString(),
          });
          // marque le manquant comme dispatché (sauf si l'item vient d'un signalement bac ND)
          if (manquant.id && !manquant.fromSignalement) {
            await storage.setDoc(`day_${day}_manquants`, manquant.id, { ...manquant, status: 'dispatched' });
          }
          onSaved();
        } catch (e) { showToast('Erreur : ' + e.message); }
        finally { setBusy(false); }
      };

      return (
        <div className="modal-backdrop" onClick={(e) => { if (e.target.className === 'modal-backdrop') onClose(); }}>
          <div className="modal" style={{maxWidth:560}}>
            <div className="modal-header">
              <div>
                <strong style={{fontSize:16}}>🚚 Dispatch dernière minute</strong>
                <div style={{fontSize:13,color:'var(--ink-mute)'}}>{manquant.produit} · {manquant.producteur}</div>
              </div>
              <button className="modal-close" onClick={onClose}>×</button>
            </div>
            <div className="stack" style={{gap:14}}>
              {sites.length === 0 ? (
                <div className="stack" style={{gap:12}}>
                  <div className="alert-warning">
                    <strong>Pas de dispatch chargé pour ce produit.</strong><br/>
                    Tu peux quand même répartir à la main : indique la quantité dispo et combien va dans chaque local.
                  </div>
                  <div>
                    <label style={{display:'block',fontSize:13,fontWeight:600,marginBottom:4}}>Quantité disponible</label>
                    <input type="number" min="0" value={qty} onChange={e => setQty(e.target.value)} style={{fontSize:15}} />
                  </div>
                  <div>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6}}>
                      <h3 style={{margin:0,fontSize:14}}>Répartition par local</h3>
                      <span className={noPdfTotal > parseInt(qty,10) ? 'badge badge-danger' : 'badge badge-info'}>
                        {noPdfTotal} / {qty} attribués
                      </span>
                    </div>
                    <div className="stack" style={{gap:6}}>
                      {manualSiteOptions.map(site => (
                        <div key={site} className="card-flat" style={{padding:'8px 12px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:10}}>
                          <strong>{site}</strong>
                          <input type="number" min="0" value={noPdfAlloc[site] ?? 0}
                            onChange={e => setNoPdfAlloc(a => ({ ...a, [site]: Math.max(0, parseInt(e.target.value,10)||0) }))}
                            style={{width:70,fontSize:14,textAlign:'center'}} />
                        </div>
                      ))}
                    </div>
                    <p style={{fontSize:11,color:'var(--ink-mute)',marginTop:8}}>
                      Sans dispatch chargé, l'app ne connaît pas les clients : ces quantités vont dans le <strong>bac ND</strong> de chaque local, à répartir sur place. Charge les dispatch frais/sec si tu veux l'attribution automatique par client.
                    </p>
                  </div>
                  <button className="btn-primary btn-block" disabled={busy || noPdfTotal<=0} onClick={handleSaveNoPdf}>
                    {busy ? 'Enregistrement…' : `Dispatcher ${noPdfTotal} article${noPdfTotal>1?'s':''}`}
                  </button>
                </div>
              ) : (
                <>
                  <div style={{fontSize:12,color:'var(--ink-mute)'}}>
                    Trouvé dans {sites.length} local{sites.length>1?'aux':''} : {sites.join(', ')}
                  </div>
                  <div>
                    <label style={{display:'block',fontSize:13,fontWeight:600,marginBottom:4}}>Quantité reçue</label>
                    <input type="number" min="0" value={qty} onChange={e => setQty(e.target.value)} style={{fontSize:15}} />
                    <div style={{fontSize:12,color:'var(--ink-mute)',marginTop:4}}>Besoin total (tous locaux) : {totalNeed}</div>
                  </div>

                  <label style={{display:'flex',alignItems:'center',gap:8,fontSize:13,cursor:'pointer'}}>
                    <input type="checkbox" checked={excludeLivdom} onChange={e => setExcludeLivdom(e.target.checked)} style={{width:'auto'}} />
                    Exclure la livraison à domicile (DOM)
                  </label>

                  <div>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6}}>
                      <h3 style={{margin:0,fontSize:14}}>Répartition par local</h3>
                      <span className={totalAlloc > parseInt(qty,10) ? 'badge badge-danger' : 'badge badge-info'}>
                        {totalAlloc} / {qty} attribués
                      </span>
                    </div>

                    {/* Sélecteur de mode */}
                    <div style={{display:'flex',gap:6,marginBottom:8}}>
                      <button
                        className={allocMode==='auto' ? 'btn-primary' : 'btn-secondary'}
                        onClick={resetAuto}
                        style={{flex:1,fontSize:13,padding:'6px 10px'}}>
                        ⚖️ Prorata auto
                      </button>
                      <button
                        className={allocMode==='manuel' ? 'btn-primary' : 'btn-secondary'}
                        onClick={() => setAllocMode('manuel')}
                        style={{flex:1,fontSize:13,padding:'6px 10px'}}>
                        ✋ Manuel
                      </button>
                    </div>

                    {/* Raccourcis : tout sur un local */}
                    {sites.length > 1 && (
                      <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:8}}>
                        <span style={{fontSize:12,color:'var(--ink-mute)',alignSelf:'center'}}>Tout sur :</span>
                        {sites.map(site => (
                          <button key={site} className="btn-ghost"
                            onClick={() => putAllOn(site)}
                            style={{fontSize:12,padding:'3px 10px',border:'1px solid var(--border)',borderRadius:6}}>
                            {site}
                          </button>
                        ))}
                      </div>
                    )}

                    <div className="stack" style={{gap:6}}>
                      {sites.map(site => (
                        <div key={site} className="card-flat" style={{padding:'8px 12px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:10}}>
                          <div>
                            <strong>{site}</strong>
                            <span style={{fontSize:12,color:'var(--ink-mute)',marginLeft:6}}>besoin {needBySite[site].total} · {needBySite[site].casiers.length} casiers</span>
                          </div>
                          <input type="number" min="0" max={needBySite[site].total} value={alloc[site] ?? 0}
                            onChange={e => setSiteAlloc(site, e.target.value)} style={{width:70,fontSize:14,textAlign:'center'}} />
                        </div>
                      ))}
                    </div>
                    <p style={{fontSize:11,color:'var(--ink-mute)',marginTop:8}}>
                      {allocMode==='auto'
                        ? 'Mode prorata : réparti automatiquement au besoin de chaque local. Touche un champ ou « Tout sur » pour passer en manuel.'
                        : 'Mode manuel : tu fixes toi-même les quantités par local. « Prorata auto » recalcule automatiquement.'}
                      {' '}Dans chaque local, l\'app sert les <strong>plus grosses commandes en premier</strong>.
                    </p>
                  </div>

                  <button className="btn-primary btn-block" disabled={busy || totalAlloc<=0} onClick={handleSave}>
                    {busy ? 'Enregistrement…' : `Dispatcher ${totalAlloc} article${totalAlloc>1?'s':''}`}
                  </button>
                </>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // PAGE PRÉPA - saisie produits manquants (matin uniquement)
    // ============================================================
    function PrepPage({ session, setSession, products, dispatchData }) {
      const showToast = React.useContext(ToastContext);
      const [prepInfos, setPrepInfos] = React.useState([]);
      const [showForm, setShowForm] = React.useState(false);
      const [editing, setEditing] = React.useState(null);
      const [lmModal, setLmModal] = React.useState(null); // signalement bac ND en cours de dispatch
      // Date cible : aujourd'hui par défaut, mais la prépa peut préparer demain
      const [targetDate, setTargetDate] = React.useState(todayKey());
      // Produits de la date cible (chargés dynamiquement)
      const [targetProducts, setTargetProducts] = React.useState([]);

      // Charger les signalements de la date cible
      React.useEffect(() => {
        const unsub = storage.subscribe(`day_${targetDate}_prep`, setPrepInfos);
        return unsub;
      }, [targetDate]);

      // Charger les produits de la date cible
      React.useEffect(() => {
        if (targetDate === todayKey()) {
          // Pour aujourd'hui, on utilise les produits déjà chargés par le parent
          setTargetProducts(products || []);
          return;
        }
        // Pour une autre date, on charge le catalogue de cette date
        let cancelled = false;
        storage.getAll(`day_${targetDate}_products`).then(arr => {
          if (cancelled) return;
          if (arr.length && arr[0].products) setTargetProducts(arr[0].products);
          else setTargetProducts([]);
        }).catch(() => { if (!cancelled) setTargetProducts([]); });
        return () => { cancelled = true; };
      }, [targetDate, products]);

      const dateLabel = (d) => {
        if (d === todayKey()) return 'Aujourd\'hui';
        if (d === addDays(todayKey(), 1)) return 'Demain';
        return formatDateShort(d);
      };

      const handleDelete = async (id) => {
        if (!confirm('Supprimer ?')) return;
        await storage.deleteDoc(`day_${targetDate}_prep`, id);
        showToast('Supprimé');
      };

      return (
        <div className="stack">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:12}}>
            <div>
              <h1 style={{margin:0}}>Préparation</h1>
              <div style={{fontSize:12,color:'var(--ink-soft)',marginTop:4}}>
                Préparateur : 
                <select value={session.name} onChange={e => setSession({...session, name: e.target.value})} style={{marginLeft:6,padding:'4px 6px',fontSize:12}}>
                  {PREPARATEURS.map(p => <option key={p} value={p}>{p}</option>)}
                  <option value="">Autre…</option>
                </select>
              </div>
            </div>
            <button className="btn-primary" onClick={() => { setEditing(null); setShowForm(true); }}>
              + Signaler
            </button>
          </div>

          {/* Sélecteur de date */}
          <div className="card" style={{background:'var(--accent-soft)',border:'1px solid var(--accent)',padding:12}}>
            <div style={{fontSize:13,fontWeight:600,marginBottom:6}}>📅 Préparation pour :</div>
            <div className="chip-group">
              <div className={`chip ${targetDate === todayKey() ? 'selected' : ''}`} onClick={() => setTargetDate(todayKey())}>
                Aujourd'hui ({formatDateShort(todayKey())})
              </div>
              <div className={`chip ${targetDate === addDays(todayKey(), 1) ? 'selected' : ''}`} onClick={() => setTargetDate(addDays(todayKey(), 1))}>
                Demain ({formatDateShort(addDays(todayKey(), 1))})
              </div>
              <div className={`chip ${targetDate === addDays(todayKey(), 2) ? 'selected' : ''}`} onClick={() => setTargetDate(addDays(todayKey(), 2))}>
                +2j ({formatDateShort(addDays(todayKey(), 2))})
              </div>
            </div>
            {targetDate !== todayKey() && (
              <div style={{marginTop:6,fontSize:12,color:'var(--ink-soft)'}}>
                Tu prépares les signalements pour <strong>{dateLabel(targetDate)}</strong>. Ils n'apparaîtront chez les distributeurs que ce jour-là.
              </div>
            )}
          </div>

          <p style={{color:'var(--ink-soft)',fontSize:13}}>
            Signale ici les produits avec un problème (manquant, remplacé, etc.). Les distributeurs verront ces infos.
          </p>

          <div className="stat-grid">
            <div className="stat"><div className="stat-value">{prepInfos.length}</div><div className="stat-label">Signalements</div></div>
            <div className="stat"><div className="stat-value">{targetProducts?.length || 0}</div><div className="stat-label">Produits</div></div>
            <div className="stat"><div className="stat-value">{prepInfos.filter(p => p.reason === 'remplace').length}</div><div className="stat-label">Remplacés</div></div>
          </div>

          {prepInfos.length === 0 ? (
            <div className="empty-state"><div className="icon">📦</div><p>Aucun signalement pour {dateLabel(targetDate).toLowerCase()}.</p></div>
          ) : (
            <div className="list">
              {prepInfos.sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||'')).map(p => {
                const reason = PREP_REASONS.find(r => r.id === p.reason);
                return (
                  <div key={p.id} className="list-item" style={{flexDirection:'column',alignItems:'stretch'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div className="list-item-name">📦 {p.productLabel}</div>
                        <div className="list-item-sub">
                          {formatTimeFR(p.createdAt)} · {p.createdBy}
                        </div>
                      </div>
                      <div style={{display:'flex',gap:4}}>
                        <button className="btn-ghost" onClick={() => { setEditing(p); setShowForm(true); }} style={{fontSize:13}}>✏️</button>
                        <button className="btn-ghost" onClick={() => handleDelete(p.id)} style={{fontSize:13}}>🗑️</button>
                      </div>
                    </div>
                    <div style={{marginTop:8}}>
                      <span className="badge badge-anom">{reason?.label || p.reason}</span>
                      {p.discount && <span className="badge badge-info" style={{marginLeft:4}}>Remise {p.discount}%</span>}
                      {p.replacementLabel && <span className="badge badge-info" style={{marginLeft:4}}>→ {p.replacementLabel}</span>}
                    </div>
                    {MANQUANT_REASONS.includes(p.reason) && (
                      <button className="btn-secondary btn-block" style={{marginTop:8,fontSize:13}}
                        onClick={() => {
                          // Construit un "manquant" à la volée à partir du signalement pour le dispatcher
                          const label = p.productLabel || '';
                          const m = label.match(/^(.*?)\s*\(([^)]+)\)\s*$/);
                          setLmModal({
                            id: p.id,
                            produit: m ? m[1].trim() : label.trim(),
                            producteur: m ? m[2].trim() : '',
                            cond: '',
                            manque: 0,
                            fromSignalement: true,
                          });
                        }}>
                        🚚 Reçu en dernière minute → dispatcher
                      </button>
                    )}
                    {p.note && <div style={{marginTop:6,fontSize:13,fontStyle:'italic',color:'var(--ink-soft)'}}>« {p.note} »</div>}
                  </div>
                );
              })}
            </div>
          )}

          {showForm && (
            <PrepForm products={targetProducts} targetDate={targetDate} session={session} editing={editing} onClose={() => { setShowForm(false); setEditing(null); }} />
          )}

          {lmModal && (
            <LastMinuteModal
              manquant={lmModal}
              dispatchData={dispatchData || {}}
              session={session}
              day={targetDate}
              onClose={() => setLmModal(null)}
              onSaved={() => { setLmModal(null); showToast('✓ Dispatch dernière minute enregistré'); }}
            />
          )}
        </div>
      );
    }

    // === FORM PREP ===
    function PrepForm({ products, targetDate, session, editing, onClose }) {
      const showToast = React.useContext(ToastContext);
      const day = targetDate || todayKey();
      // En édition : un seul produit. En création : tableau de productKeys
      const [isEdit] = React.useState(!!editing);
      const [productKey, setProductKey] = React.useState(editing?.productKey || ''); // mode édition
      const [productKeys, setProductKeys] = React.useState([]); // mode création multi
      const [reason, setReason] = React.useState(editing?.reason || '');
      const [replacementKey, setReplacementKey] = React.useState(editing?.replacementKey || '');
      const [discount, setDiscount] = React.useState(editing?.discount || '');
      const [note, setNote] = React.useState(editing?.note || '');
      const [busy, setBusy] = React.useState(false);
      const [collision, setCollision] = React.useState(null);      // collision en cours à résoudre
      const [pendingCollisions, setPendingCollisions] = React.useState([]); // file des collisions suivantes

      // Helper pour calculer le label d'un product key
      const computeLabel = (key) => {
        if (!key) return '';
        if (key.startsWith('FREE:')) return key.substring(5);
        const [prod, name] = key.split('|');
        return `${name} (${prod})`;
      };

      const togglePK = (key) => {
        if (!key) return;
        setProductKeys(curr => curr.includes(key) ? curr.filter(k => k !== key) : [...curr, key]);
      };

      // Décompose un productKey en {produit, producteur} pour calculer l'id manquant.
      // productKey = "producteur|produit"  OU  "FREE:libellé" (texte libre, pas de producteur)
      const decomposePK = (key) => {
        if (!key) return { produit: '', producteur: '' };
        if (key.startsWith('FREE:')) return { produit: key.substring(5).trim(), producteur: '' };
        const [prod, name] = key.split('|');
        return { produit: (name || '').trim(), producteur: (prod || '').trim() };
      };

      // Crée / met à jour l'entrée manquant correspondant à un signalement "manquant".
      // Renvoie true si écrit, ou un objet {collision} si un manquant existe déjà avec d'autres données.
      const syncToManquants = async (pk, sigData, { force = false } = {}) => {
        const { produit, producteur } = decomposePK(pk);
        if (!produit) return false;
        const id = dispatchNorm(producteur + '|' + produit) || `m_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
        let existing = null;
        try { existing = await storage.getDoc(`day_${day}_manquants`, id); } catch (e) { existing = null; }
        // Collision : un manquant existe déjà (chargé PDF ou autre saisie) avec des quantités → demander
        if (existing && !force && (existing.total > 0 || existing.fini > 0 || existing.uploadedBy)) {
          return { collision: { id, existing, produit, producteur, sigData, pk } };
        }
        await storage.setDoc(`day_${day}_manquants`, id, {
          produit, producteur, cond: existing?.cond || '',
          fini: existing?.fini ?? 0,
          total: existing?.total ?? 0,
          manque: existing?.manque ?? 0,
          reason: sigData.reason, reasonNote: sigData.note || existing?.reasonNote || '',
          status: existing?.status || 'rupture',
          fromSignalement: true,
          uploadedBy: existing?.uploadedBy || sigData.createdBy,
          uploadedAt: existing?.uploadedAt || new Date().toISOString(),
        });
        return true;
      };

      const handleSubmit = async () => {
        if (isEdit) {
          if (!productKey) { showToast('Choisis un produit'); return; }
        } else {
          if (productKeys.length === 0) { showToast('Choisis au moins un produit'); return; }
        }
        if (!reason) { showToast('Choisis une raison'); return; }
        setBusy(true);
        try {
          const replacementLabel = computeLabel(replacementKey);
          const baseData = {
            reason,
            replacementKey, replacementLabel,
            discount: parseFloat(discount) || 0,
            note,
            day,
            createdBy: session.name,
            updatedAt: new Date().toISOString(),
          };
          const isManquant = MANQUANT_REASONS.includes(reason);
          if (isEdit) {
            // Édition : on met à jour un seul signalement
            const productLabel = computeLabel(productKey);
            const data = {
              ...baseData,
              productKey, productLabel,
              createdAt: editing.createdAt,
            };
            await storage.setDoc(`day_${day}_prep`, editing.id, data);
            if (isManquant) {
              const r = await syncToManquants(productKey, data);
              if (r && r.collision) { setCollision(r.collision); setBusy(false); return; }
            }
            showToast('✓ Mise à jour');
          } else {
            // Création : on crée un signalement par produit sélectionné
            let count = 0;
            const collisions = [];
            for (const pk of productKeys) {
              const productLabel = computeLabel(pk);
              const id = `prep_${Date.now()}_${Math.random().toString(36).slice(2,7)}_${count}`;
              const data = {
                ...baseData,
                productKey: pk, productLabel,
                createdAt: new Date().toISOString(),
              };
              await storage.setDoc(`day_${day}_prep`, id, data);
              if (isManquant) {
                const r = await syncToManquants(pk, data);
                if (r && r.collision) collisions.push(r.collision);
              }
              count++;
            }
            if (collisions.length) { setCollision(collisions[0]); setPendingCollisions(collisions.slice(1)); setBusy(false); return; }
            showToast(`✓ ${count} signalement${count>1?'s':''} enregistré${count>1?'s':''}`);
          }
          onClose();
        } catch (err) { showToast('Erreur : ' + err.message); }
        finally { setBusy(false); }
      };

      // Résolution d'une collision : choix = 'pdf' (garde l'existant) | 'signalement' (force la raison du signalement)
      const resolveCollision = async (choice) => {
        if (!collision) return;
        setBusy(true);
        try {
          if (choice === 'signalement') {
            // On force : la raison du signalement remplace celle du manquant, on garde les quantités existantes
            await storage.setDoc(`day_${day}_manquants`, collision.id, {
              reason: collision.sigData.reason,
              reasonNote: collision.sigData.note || collision.existing.reasonNote || '',
              fromSignalement: true,
            });
          }
          // 'pdf' : on laisse le manquant existant intact (le signalement prep reste créé de son côté)
          if (pendingCollisions.length) {
            setCollision(pendingCollisions[0]);
            setPendingCollisions(pendingCollisions.slice(1));
          } else {
            setCollision(null);
            showToast('✓ Enregistré');
            onClose();
          }
        } catch (e) { showToast('Erreur : ' + e.message); }
        finally { setBusy(false); }
      };

      return (
        <div className="modal-backdrop" onClick={(e) => { if (e.target.className === 'modal-backdrop' && !collision) onClose(); }}>
          {collision && (
            <div className="modal" style={{maxWidth:480}} onClick={e => e.stopPropagation()}>
              <div className="modal-header">
                <h2>⚠️ Produit déjà présent</h2>
              </div>
              <div className="stack" style={{gap:12}}>
                <div style={{fontSize:14}}>
                  <strong>{collision.produit}</strong>{collision.producteur ? ` · ${collision.producteur}` : ''}
                </div>
                <div className="alert-warning" style={{fontSize:13}}>
                  Ce produit existe déjà dans les manquants
                  {collision.existing.uploadedBy ? ` (chargé/saisi par ${collision.existing.uploadedBy})` : ''}.
                  <div style={{marginTop:6}}>
                    Existant : raison « {(PREP_REASONS.find(r=>r.id===collision.existing.reason)||{}).label || collision.existing.reason || '—'} »
                    {(collision.existing.total>0 || collision.existing.manque>0) ? ` · quantités : ${collision.existing.manque||collision.existing.total} manquant(s)` : ''}
                  </div>
                  <div style={{marginTop:4}}>
                    Nouveau signalement : raison « {(PREP_REASONS.find(r=>r.id===collision.sigData.reason)||{}).label || collision.sigData.reason} »
                  </div>
                </div>
                <div style={{fontSize:13,color:'var(--ink-soft)'}}>Que veux-tu garder pour ce manquant ?</div>
                <button className="btn-secondary btn-block" disabled={busy} onClick={() => resolveCollision('pdf')}>
                  Garder l'existant (ne rien changer)
                </button>
                <button className="btn-primary btn-block" disabled={busy} onClick={() => resolveCollision('signalement')}>
                  Remplacer par la raison du signalement
                </button>
                <p style={{fontSize:11,color:'var(--ink-mute)',margin:0}}>
                  Dans les deux cas, les quantités déjà chargées sont conservées. Seule la raison peut changer.
                </p>
              </div>
            </div>
          )}
          {!collision && (
          <div className="modal">
            <div className="modal-header">
              <h2>{isEdit ? 'Modifier signalement' : 'Signaler produits'}</h2>
              <button className="modal-close" onClick={onClose}>×</button>
            </div>

            {isEdit ? (
              <div className="field">
                <label>Produit concerné</label>
                <ProductPicker products={products} value={productKey} onChange={setProductKey} allowFreetext={true} />
              </div>
            ) : (
              <div className="field">
                <label>Produits concernés ({productKeys.length} sélectionné{productKeys.length>1?'s':''})</label>
                {productKeys.length > 0 && (
                  <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:8}}>
                    {productKeys.map(k => (
                      <div key={k} className="chip selected" style={{cursor:'pointer',display:'inline-flex',alignItems:'center',gap:6}} onClick={() => togglePK(k)}>
                        <span style={{fontSize:12}}>{computeLabel(k)}</span>
                        <span style={{fontSize:14,fontWeight:'bold'}}>×</span>
                      </div>
                    ))}
                  </div>
                )}
                <MultiProductPicker products={products} selectedKeys={productKeys} onToggle={togglePK} />
              </div>
            )}

            <div className="field">
              <label>Raison {!isEdit && productKeys.length > 1 && '(commune aux produits)'}</label>
              <div className="chip-group">
                {PREP_REASONS.map(r => (
                  <div key={r.id} className={`chip ${reason === r.id ? 'selected' : ''}`} onClick={() => setReason(r.id)}>{r.label}</div>
                ))}

    // ============================================================
    // PAGE PERTES (préparateur)
    // ============================================================
    // === TABLEAU DE BORD CA (bilan multi-dates, lit la collection ca_history) ===
    const DOW_LABELS = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
    const DOW_ORDER = [1,2,3,4,5,6,0]; // Lun → Dim
    const CAT_LABELS = { frais:'Frais', pain:'Pain/Sec', nd:'Non-dispatch' };
    function isoWeekKey(dateKey) {
      const d = new Date(dateKey + 'T12:00:00');
      const t = new Date(d);
      t.setDate(d.getDate() + 4 - (d.getDay() || 7));
      const yStart = new Date(t.getFullYear(), 0, 1);
      const wk = Math.ceil((((t - yStart) / 86400000) + 1) / 7);
      return `${t.getFullYear()}-S${String(wk).padStart(2,'0')}`;
    }
    const eurCents = (c) => (c / 100).toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
    const eurRound = (c) => Math.round(c / 100).toLocaleString('fr-FR') + ' €';

    // Petit graphe courbe SVG (aire + ligne), responsive via viewBox.
    // pointsB (optionnel) : 2ᵉ série tracée en pointillés gris (comparaison), alignée par index.
    function MiniLineChart({ points, color = '#4a7c3b', valueFmt, pointsB = null, colorB = '#9aa0a6' }) {
      if (!points || !points.length) return null;
      const W = 360, H = 168, padL = 6, padR = 6, padT = 16, padB = 24;
      const innerW = W - padL - padR, innerH = H - padT - padB;
      const n = Math.max(points.length, pointsB ? pointsB.length : 0);
      const max = Math.max(...points.map(p => p.value), ...((pointsB || []).map(p => p.value)), 1);
      const xOf = i => padL + (n === 1 ? innerW / 2 : (i / (n - 1)) * innerW);
      const yOf = v => padT + innerH - (v / max) * innerH;
      const pathOf = pts => pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${xOf(i).toFixed(1)},${yOf(p.value).toFixed(1)}`).join(' ');
      const linePath = pathOf(points);
      const areaPath = `M${xOf(0).toFixed(1)},${(padT + innerH).toFixed(1)} ` +
        points.map((p, i) => `L${xOf(i).toFixed(1)},${yOf(p.value).toFixed(1)}`).join(' ') +
        ` L${xOf(points.length - 1).toFixed(1)},${(padT + innerH).toFixed(1)} Z`;
      const labelStep = Math.max(1, Math.ceil(points.length / 5));
      const fmt = valueFmt || (v => v);
      return (
        <div className="chart-wrap">
          <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet">
            {[0, 0.5, 1].map((f, i) => (
              <g key={i}>
                <line x1={padL} y1={yOf(max * f)} x2={W - padR} y2={yOf(max * f)} stroke="var(--line)" strokeWidth="1" strokeDasharray={f === 0 ? '' : '3 3'} />
                <text x={padL} y={yOf(max * f) - 3} fontSize="9" fill="var(--ink-mute)">{fmt(max * f)}</text>
              </g>
            ))}
            {pointsB && pointsB.length > 0 && (
              <path d={pathOf(pointsB)} fill="none" stroke={colorB} strokeWidth="2" strokeDasharray="4 3" strokeLinejoin="round" strokeLinecap="round" opacity="0.85" />
            )}
            <path d={areaPath} fill={color} opacity="0.12" />
            <path d={linePath} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
            {points.map((p, i) => (points.length <= 40 ? <circle key={i} cx={xOf(i)} cy={yOf(p.value)} r="2.4" fill={color} /> : null))}
            {points.map((p, i) => (i % labelStep === 0 || i === points.length - 1) ? (
              <text key={'l' + i} x={xOf(i)} y={H - 8} fontSize="9" fill="var(--ink-mute)" textAnchor={i === 0 ? 'start' : (i === points.length - 1 ? 'end' : 'middle')}>{p.label}</text>
            ) : null)}
          </svg>
        </div>
      );
    }

    // Agrégat CA réutilisable (période A ou B) à partir d'une liste de docs ca_history.
    function computeCaAgg(docs) {
      let reel = 0, manquant = 0, remise = 0, orders = 0;
      const bySite = {}, byDow = {}, byWeek = {}, byCat = { frais: 0, pain: 0, nd: 0 };
      const products = {};
      for (const d of docs) {
        const t = d.totals || totalsFromCaBySite(d.caBySite);
        reel += t.reel || 0; manquant += t.manquant || 0; remise += t.remise || 0;
        orders += d.ordersCount || 0;
        for (const [s, v] of Object.entries(d.caBySite || {})) bySite[s] = (bySite[s] || 0) + (v.reel_cents || 0);
        byDow[d.dow] = (byDow[d.dow] || 0) + (t.reel || 0);
        const wk = isoWeekKey(d.date); byWeek[wk] = (byWeek[wk] || 0) + (t.reel || 0);
        for (const p of (d.salesByProduct || [])) {
          byCat[p.cat] = (byCat[p.cat] || 0) + (p.ca_cents || 0);
          if (!products[p.id]) products[p.id] = { id: p.id, produit: p.produit, producteur: p.producteur, cat: p.cat, qty: 0, ca_cents: 0 };
          products[p.id].qty += p.qty || 0;
          products[p.id].ca_cents += p.ca_cents || 0;
        }
      }
      const nb = docs.length;
      return {
        reel, manquant, remise, orders, nb,
