    // Vérifie en arrière-plan si une version plus récente est en ligne (re-fetch du
    // fichier sans cache, comparaison de APP_VERSION) et propose un bandeau « mettre à jour ».
    function UpdateChecker() {
      const [newVersion, setNewVersion] = React.useState(null);
      React.useEffect(() => {
        let stopped = false;
        const check = async () => {
          try {
            const res = await fetch(location.pathname + '?vcheck=' + Date.now(), { cache: 'no-store' });
            if (!res.ok) return;
            const text = await res.text();
            const m = text.match(/const APP_VERSION = '([^']+)'/);
            if (m && m[1] && m[1] !== APP_VERSION && !stopped) setNewVersion(m[1]);
          } catch (e) {}
        };
        check();
        const iv = setInterval(check, 3 * 60 * 1000);
        const onVis = () => { if (document.visibilityState === 'visible') check(); };
        document.addEventListener('visibilitychange', onVis);
        return () => { stopped = true; clearInterval(iv); document.removeEventListener('visibilitychange', onVis); };
      }, []);
      if (!newVersion) return null;
      const update = () => { location.replace(location.pathname + '?v=' + encodeURIComponent(newVersion)); };
      return (
        <div onClick={update} role="button"
          style={{position:'fixed',left:0,right:0,top:0,zIndex:99999,background:'var(--master)',color:'#fff',
            padding:'10px 16px',textAlign:'center',fontWeight:700,fontSize:14,cursor:'pointer',
            boxShadow:'0 2px 10px rgba(0,0,0,0.25)'}}>
          🔄 Nouvelle version {newVersion} disponible — toucher pour mettre à jour
        </div>
      );
    }

    function App() {
      const [session, setSession] = React.useState(() => {
        // V9.6 : session persistée dans localStorage (reste connecté entre fermetures
        // de l'app). On garde sessionStorage en repli pour les anciennes sessions.
        let saved = null;
        try { saved = localStorage.getItem('kb_session_v3') || sessionStorage.getItem('kb_session_v2'); } catch(e){}
        if (!saved) return null;
        try {
          const s = JSON.parse(saved);
          // Expiration douce : si la dernière activité date de plus de 10 jours,
          // on oublie la session (évite qu'un téléphone perdu reste connecté indéfiniment).
          if (s.lastSeen && (Date.now() - new Date(s.lastSeen).getTime()) > 10 * 864e5) return null;
          return s;
        } catch(e) { return null; }
      });
      // Popup de confirmation d'identité (de temps en temps, pas à chaque ouverture)
      const [confirmName, setConfirmName] = React.useState(false);
      const [tab, setTab] = React.useState('clients');
      // Vue empruntée par le master (sans se reconnecter) : null | 'prep' | 'distrib'
      const [viewAs, setViewAs] = React.useState(null);
      const [currentSite, setCurrentSite] = React.useState(null);

      const [rawOrders, setRawOrders] = React.useState([]);
      const [ordersMeta, setOrdersMeta] = React.useState(null);
      const [products, setProducts] = React.useState([]);
      const [productsMeta, setProductsMeta] = React.useState(null);
      const [consumersByEmail, setConsumersByEmail] = React.useState({});
      const [consumersMeta, setConsumersMeta] = React.useState(null);
      const [catalogue, setCatalogue] = React.useState([]);
      const [catalogueMeta, setCatalogueMeta] = React.useState(null);
      const [dispatchData, setDispatchData] = React.useState({}); // { [site]: {master, frais, sec, nd, meta} }
      const [lastminute, setLastminute] = React.useState([]); // dispatch dernière minute du jour
      const [closures, setClosures] = React.useState([]);
      const [arrivalsLog, setArrivalsLog] = React.useState([]);
      const [pushMessages, setPushMessages] = React.useState([]); // infos push master → boutiques
      const [followUpsAll, setFollowUpsAll] = React.useState([]); // pour le blocage 3j

      const orders = React.useMemo(() => enrichOrders(rawOrders, consumersByEmail), [rawOrders, consumersByEmail]);

      // Sites présents dans les commandes du jour (sinon liste complète historique)
      const sitesOfDay = React.useMemo(() => {
        const set = new Set(rawOrders.map(o => o.site).filter(Boolean));
        return [...set].sort();
      }, [rawOrders]);
      const availableSites = sitesOfDay.length > 0 ? sitesOfDay : SITES;

      // Cette journée pour ce site est-elle clôturée ?
      const isClosed = !!closures.find(c => c.id === currentSite && c.closedAt && c.closedAt.startsWith(activeDay()));

      // Distributeur a-t-il déjà signalé son arrivée ?
      const myArrival = arrivalsLog.find(a =>
        a.site === currentSite && a.day === todayKey() && a.name === session?.name
      );

      React.useEffect(() => {
        if (session && !currentSite) setCurrentSite(session.site);
      }, [session, currentSite]);

      // Si distrib se connecte à un site SANS commandes du jour (ex : récup de retards
      // sur un point sans distrib aujourd'hui), on ouvre directement l'onglet Suivi.
      const [didInitTab, setDidInitTab] = React.useState(false);
      React.useEffect(() => {
        if (!session || session.role !== 'distrib') return;
        if (didInitTab || !currentSite) return;
        // Attendre que les commandes soient chargées (ou confirmées vides)
        const siteHasOrdersToday = rawOrders.some(o => o.site === currentSite);
        if (!siteHasOrdersToday && rawOrders.length >= 0) {
          // Pas de commandes pour ce site aujourd'hui → ouvrir le Suivi
          setTab('followup');
        }
        setDidInitTab(true);
      }, [session, currentSite, rawOrders, didInitTab]);

      // Note : on ne force PAS le master à basculer sur un site avec commandes du jour.
      // Le master peut consulter / clôturer / gérer le suivi de n'importe quel site
      // (utile pour les distributions non clôturées des jours précédents).

      // Si distrib (uniquement) après clôture, rediriger les onglets cachés vers Clients
      // Important : NE PAS affecter les prépas ni le master
      React.useEffect(() => {
        if (!session) return;
        if (session.role !== 'distrib') return;
        if (!isClosed) return;
        if (['quality', 'consignes', 'infos', 'admin', 'stats'].includes(tab)) {
          setTab('clients');
        }
      }, [session, isClosed, tab]);

      // Si distrib (uniquement) sur admin/stats à l'ouverture, rediriger
      // Important : NE PAS affecter les prépas ni le master
      React.useEffect(() => {
        if (!session) return;
        if (session.role !== 'distrib') return;
        if (['admin', 'stats'].includes(tab)) setTab('clients');
      }, [session, tab]);

      React.useEffect(() => {
        if (!session) return;
        // Un vrai distributeur travaille TOUJOURS sur la distribution du jour : on ignore
        // tout override de jour (préparation du lendemain) pour ne pas lui montrer demain.
        const dayScope = (session.role === 'distrib') ? todayKey() : activeDay();
        const u1 = storage.subscribe(`day_${dayScope}_orders`, (arr) => {
          if (arr.length && arr[0].orders) {
            setRawOrders(arr[0].orders);
            setOrdersMeta({ count: arr[0].count, uploadedBy: arr[0].uploadedBy, uploadedAt: arr[0].uploadedAt });
          } else {
            setRawOrders([]); setOrdersMeta(null);
          }
        });
        const u2 = storage.subscribe(`day_${dayScope}_products`, (arr) => {
          if (arr.length && arr[0].products) {
            setProducts(arr[0].products);
            setProductsMeta({ count: arr[0].count, uploadedBy: arr[0].uploadedBy, uploadedAt: arr[0].uploadedAt });
          } else {
            // Pas de catalogue par jour (système V4) → on lit le cache produits partagé
            readCache('products').then(data => {
              if (data && Object.keys(data).length) {
                const arr2 = Object.entries(data).map(([id, p]) => ({
                  id, produit: p.name, producteur: p.producer, unite: p.unite || '',
                }));
                setProducts(arr2);
                setProductsMeta({ count: arr2.length });
              } else {
                setProducts([]); setProductsMeta(null);
              }
            }).catch(() => { setProducts([]); setProductsMeta(null); });
          }
        });
        const u3 = storage.subscribe('consumers_cache', (arr) => {
          if (arr.length) {
            const merged = {};
            const sorted = arr.sort((a, b) => (a.chunkIndex || 0) - (b.chunkIndex || 0));
            for (const c of sorted) Object.assign(merged, parseChunk(c));
            setConsumersByEmail(merged);
          }
        });
        const u4 = storage.subscribe('consumers_meta', (arr) => {
          if (arr.length) setConsumersMeta(arr[0]);
        });
        const u5 = storage.subscribe(`day_${activeDay()}_closure`, setClosures);
        const u6 = storage.subscribe(`day_${activeDay()}_arrivals`, setArrivalsLog);
        const u7 = storage.subscribe('catalogue', (arr) => {
          if (arr.length) {
            const item = arr[0];
            // Le catalogue est aussi stocké en JSON string pour éviter limite d'index
            let cat = item.catalogue || [];
            if (item.data && typeof item.data === 'string') {
              try { cat = JSON.parse(item.data); } catch {}
            }
            setCatalogue(cat);
            setCatalogueMeta({ count: item.count, uploadedBy: item.uploadedBy, uploadedAt: item.uploadedAt });
          } else {
            setCatalogue([]); setCatalogueMeta(null);
          }
        });
        // Dispatch du jour (un doc par site : id = code site)
        const u8 = storage.subscribe(`day_${activeDay()}_dispatch`, (arr) => {
          const map = {};
          for (const d of arr) {
            map[d.id] = {
              master: d.master ? safeJSON(d.master) : null,
              frais: d.frais ? safeJSON(d.frais) : null,
              sec: d.sec ? safeJSON(d.sec) : null,
              nd: d.nd ? safeJSON(d.nd) : null,
              meta: { uploadedBy: d.uploadedBy, uploadedAt: d.uploadedAt, parts: d.parts || [] },
            };
          }
          setDispatchData(map);
        });
        const u9 = storage.subscribe(`day_${activeDay()}_lastminute`, setLastminute);
        const u10 = storage.subscribe('push_messages', setPushMessages);
        const u11 = storage.subscribe('followups', setFollowUpsAll);
        return () => { u1(); u2(); u3(); u4(); u5(); u6(); u7(); u8(); u9(); u10(); u11(); };
      }, [session]);

      const handleLogin = (s) => {
        const sess = { ...s, lastSeen: new Date().toISOString(), confirmedAt: new Date().toISOString() };
        try { localStorage.setItem('kb_session_v3', JSON.stringify(sess)); } catch(e){}
        try { sessionStorage.removeItem('kb_session_v2'); } catch(e){}
        setSession(sess);
        setCurrentSite(s.site);
        // Tab par défaut selon le rôle
        if (s.role === 'prep') setTab('prepdispatch');
        else setTab('clients');
      };
      const handleLogout = () => {
        try { localStorage.removeItem('kb_session_v3'); } catch(e){}
        try { sessionStorage.removeItem('kb_session_v2'); } catch(e){}
        setSession(null);
        setCurrentSite(null);
        setConfirmName(false);
        setViewAs(null);
      };

      // Rafraîchit lastSeen et décide quand redemander « tu es bien X ? ».
      // On redemande au plus une fois toutes les ~18h d'usage, et seulement
      // au démarrage d'une session déjà active (pas juste après le login).
      React.useEffect(() => {
        if (!session) return;
        // marquer l'activité
        const touch = () => {
          setSession(prev => {
            if (!prev) return prev;
            const upd = { ...prev, lastSeen: new Date().toISOString() };
            try { localStorage.setItem('kb_session_v3', JSON.stringify(upd)); } catch(e){}
            return upd;
          });
        };
        // Faut-il reconfirmer le prénom ?
        const last = session.confirmedAt ? new Date(session.confirmedAt).getTime() : 0;
        const elapsedH = (Date.now() - last) / 36e5;
        if (elapsedH >= 18) setConfirmName(true);
        const t = setInterval(touch, 5 * 60 * 1000); // toutes les 5 min
        return () => clearInterval(t);
        // eslint-disable-next-line
      }, [session?.name]);

      const confirmIdentityYes = () => {
        setSession(prev => {
          if (!prev) return prev;
          const upd = { ...prev, confirmedAt: new Date().toISOString(), lastSeen: new Date().toISOString() };
          try { localStorage.setItem('kb_session_v3', JSON.stringify(upd)); } catch(e){}
          return upd;
        });
        setConfirmName(false);
      };
      const confirmIdentityNo = () => {
        // Ce n'est pas la bonne personne → on déconnecte pour saisir le bon prénom
        handleLogout();
      };

      const handleArrived = async () => {
        await storage.setDoc(`day_${activeDay()}_arrivals`, `${currentSite}_${session.name}_${Date.now()}`, {
          site: currentSite,
          name: session.name,
          day: activeDay(),
          arrivedAt: new Date().toISOString(),
        });
      };

      // ── Messages push à valider pour CE site (master → boutiques) ──────────
      // Un message s'affiche en plein écran tant que ce site (ou ce distributeur)
      // ne l'a pas marqué « vu ». Master ne reçoit pas ses propres push.
      const pendingPush = React.useMemo(() => {
        if (!session || session.isMaster) return [];
        const site = currentSite;
        return (pushMessages || [])
          .filter(m => !m.cancelled)
          .filter(m => {
            // cible : 'all' ou liste de sites contenant le site courant
            if (m.target && m.target !== 'all') {
              const sites = Array.isArray(m.sites) ? m.sites : [];
              if (!sites.includes(site)) return false;
            }
            // expiration éventuelle
            if (m.expiresAt && Date.now() > new Date(m.expiresAt).getTime()) return false;
            // déjà vu par ce site ?
            const acks = m.acks || {};
            return !acks[site];
          })
          .sort((a,b) => (a.createdAt||'').localeCompare(b.createdAt||''));
      }, [pushMessages, session, currentSite]);

      const ackPush = async (m, initials) => {
        const acks = { ...(m.acks || {}) };
        acks[currentSite] = { by: initials || session.name, initials: initials || '', name: session.name, at: new Date().toISOString() };
        await storage.setDoc('push_messages', m.id, { ...m, acks });
      };

      // ── Relance récurrente : non-récupéré non résolu, ré-affiché tous les 3 jours ──
      // Sur le site courant, tant qu'un client n'est pas résolu, un push « à relancer »
      // réapparaît tous les 3 jours (depuis la dernière relance, sinon depuis la distrib).
      // « Plus tard » repousse à demain seulement ; « J'ai relancé » remet le compteur à zéro.
      const BLOCK_DAYS_RELANCE = 3;
      const overdueFollowups = React.useMemo(() => {
        if (!session || session.isMaster || session.role !== 'distrib') return [];
        const TERMINAL = ['resolved', 'picked_up', 'credited', 'returned'];
        const today = todayKey();
        return (followUpsAll || []).filter(f => {
          if (f.site !== currentSite) return false;
          if (TERMINAL.includes(f.status)) return false;
          if (f.snoozeUntil && f.snoozeUntil > today) return false; // repoussé à plus tard
          // Horloge : dernière relance si elle existe, sinon la date de distribution.
          const ref = f.relanceAt || f.distribDate || f.day;
          if (!ref) return false;
          const refDay = (ref.length > 10) ? ref.slice(0, 10) : ref;
          return daysSince(refDay) >= BLOCK_DAYS_RELANCE;
        }).sort((a, b) => {
          const ra = (a.relanceAt || a.distribDate || a.day || '').slice(0, 10);
          const rb = (b.relanceAt || b.distribDate || b.day || '').slice(0, 10);
          return ra.localeCompare(rb); // le plus ancien d'abord
        });
      }, [followUpsAll, session, currentSite]);

      // J'ai relancé → enregistre la relance et remet le compteur à zéro (revient dans 3j si toujours pas résolu).
      const relanceOverdue = async (f) => {
        await storage.setDoc('followups', f.id || f.orderId, {
          ...f, status: 'relance', relanceAt: new Date().toISOString(),
          snoozeUntil: '', relanceBy: session.name,
          updatedBy: session.name, updatedAt: new Date().toISOString(),
        });
      };
      // Client venu / dossier clos → sort définitivement du suivi.
      const resolveOverdue = async (f) => {
        await storage.setDoc('followups', f.id || f.orderId, {
          ...f, status: 'resolved', resolvedBy: session.name, resolvedAt: new Date().toISOString(),
          updatedBy: session.name, updatedAt: new Date().toISOString(),
        });
      };
      // Plus tard → repoussé à demain seulement (réapparaît demain).
      const snoozeOverdue = async (f) => {
        const t = new Date(); t.setDate(t.getDate() + 1);
        const tomorrow = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
        await storage.setDoc('followups', f.id || f.orderId, {
          ...f, snoozeUntil: tomorrow, updatedBy: session.name, updatedAt: new Date().toISOString(),
        });
      };

      if (!session) return <LoginScreen onLogin={handleLogin} />;

      // Overlays plein écran, priorité : confirmation prénom → push → relance bloquante
      const overlay = (() => {
        if (confirmName) {
          return <ConfirmNameOverlay session={session} onYes={confirmIdentityYes} onNo={confirmIdentityNo} />;
        }
        if (pendingPush.length > 0) {
          const m = pendingPush[0];
          return <PushOverlay message={m} count={pendingPush.length} onAck={(initials) => ackPush(m, initials)} />;
        }
        if (overdueFollowups.length > 0) {
          const f = overdueFollowups[0];
          return <OverdueBlockOverlay followup={f} count={overdueFollowups.length}
            onRelance={() => relanceOverdue(f)} onResolve={() => resolveOverdue(f)} onSnooze={() => snoozeOverdue(f)} />;
        }
        return null;
      })();

      // ── Vue empruntée par le master (sans se reconnecter) ───────────────────
      // Le master peut basculer en vue prépa ou distrib. On garde la session master
      // réelle (privilèges, identité), seul le RENDU change via effSession.
      const effSession = (session.isMaster && viewAs === 'prep')
        ? { ...session, role:'prep', isPrep:true, isMaster:false, site:'ENTREPOT', _masterView:true }
        : (session.isMaster && viewAs === 'distrib')
          ? { ...session, role:'distrib', isMaster:false, _masterView:true }
          : session;
      const switchView = (v) => { setViewAs(v); setTab(v === 'prep' ? 'prepdispatch' : 'clients'); };
      // Sélecteur de vue, affiché uniquement pour un vrai master.
      const MasterViewSwitcher = () => (
        session.isMaster ? (
          <select value={viewAs || 'master'}
            onChange={e => switchView(e.target.value === 'master' ? null : e.target.value)}
            style={{width:'auto',fontSize:12,padding:'5px 8px',borderColor: viewAs ? 'var(--warn)' : undefined}}
            title="Changer de vue (master)">
            <option value="master">⚙️ Vue master</option>
            <option value="distrib">🚚 Vue distrib</option>
            <option value="prep">📦 Vue prépa</option>
          </select>
        ) : null
      );

      // PRÉPARATEUR : interface dédiée
      if (effSession.role === 'prep') {
        return (
          <div className="app-shell">
            {overlay}
            <UpdateChecker />
            <div className="topbar">
              <div className="topbar-title">
                <strong>📦 Préparation <span className="badge badge-prep">PRÉPA</span>{effSession._masterView && <span className="badge badge-master" style={{marginLeft:4}}>master</span>}<span className="ver-badge">{APP_VERSION}</span></strong>
                <small>{effSession.name} · {formatDateFR()}</small>
              </div>
              <div className="topbar-actions" style={{display:'flex',gap:6,alignItems:'center'}}>
                <MasterViewSwitcher />
                <button className="btn-ghost" onClick={handleLogout} style={{fontSize:13}}>Sortir</button>
              </div>
            </div>
            <ActiveDayBanner />
            {tab === 'prep' && <PrepPage session={effSession} setSession={setSession} products={products} dispatchData={dispatchData} />}
            {tab === 'prepdispatch' && <><ManquantsMailPanel orders={orders} session={effSession} /><PrepDispatchPage session={effSession} setSession={setSession} /></>}
            {tab === 'pdpreturns' && <PdpReturnsPage session={effSession} catalogue={catalogue} />}
            {tab === 'dlcwatch' && <DlcWatchPage session={effSession} products={products} orders={orders} catalogue={catalogue} />}
            {tab === 'losses' && <LossesPage session={effSession} catalogue={catalogue} catalogueMeta={catalogueMeta} />}
            {tab === 'inventory' && <InventoryPage session={effSession} />}
            {tab === 'admin' && <AdminPage session={effSession} ordersMeta={ordersMeta} productsMeta={productsMeta} consumersMeta={consumersMeta} catalogueMeta={catalogueMeta} />}
            <div className="tab-bar">
              <button className={tab==='prepdispatch'?'active':''} onClick={()=>setTab('prepdispatch')}>
                <span className="tab-icon">🚚</span>Manquants & ND
              </button>
              <button className={tab==='pdpreturns'?'active':''} onClick={()=>setTab('pdpreturns')}>
                <span className="tab-icon">↩️</span>Retours PDP
              </button>
              <button className={tab==='dlcwatch'?'active':''} onClick={()=>setTab('dlcwatch')}>
                <span className="tab-icon">🟠</span>DLC
              </button>
              <button className={tab==='losses'?'active':''} onClick={()=>setTab('losses')}>
                <span className="tab-icon">🗑️</span>Pertes
              </button>
              <button className={tab==='inventory'?'active':''} onClick={()=>setTab('inventory')}>
                <span className="tab-icon">📋</span>Inventaire
              </button>
              <button className={tab==='admin'?'active':''} onClick={()=>setTab('admin')}>
                <span className="tab-icon">⚙️</span>Admin
              </button>
            </div>
          </div>
        );
      }

      // DISTRIB ou MASTER : interface complète
      return (
        <div className="app-shell">
          {overlay}
            <UpdateChecker />
          <div className="topbar">
            <div className="topbar-title">
              <strong>
                {effSession.isMaster
                  ? <>Master <span className="badge badge-master">{currentSite}</span></>
                  : <>Distrib <span className="badge badge-site">{currentSite}</span></>}
                {isClosed && <span className="badge badge-info">🔒 Clos</span>}
                <span className="ver-badge">{APP_VERSION}</span>
              </strong>
              <small>
                {effSession.name} · {activeDay() !== todayKey()
                  ? <span style={{color:'var(--warn)',fontWeight:600}}>📅 Distribution du {formatDateShort(activeDay())} (≠ aujourd'hui)</span>
                  : formatDateFR()}
                {SITE_HOURS[currentSite] && <span style={{color:'var(--ink-mute)'}}> · 🕑 {SITE_HOURS[currentSite]}</span>}
              </small>
            </div>
            <div className="topbar-actions">
              {activeDay() !== todayKey() && (
                <button className="btn-ghost" style={{fontSize:11,padding:'4px 8px'}}
                  onClick={() => { setActiveDay(null); window.location.reload(); }}>
                  ↩ Aujourd'hui
                </button>
              )}
              <MasterViewSwitcher />
              {session.isMaster && (
                <select value={currentSite || ''} onChange={e => setCurrentSite(e.target.value)} style={{width:'auto',fontSize:13,padding:'6px 10px'}}>
                  {sitesOfDay.length > 0 && (
                    <optgroup label="● Avec commandes aujourd'hui">
                      {sitesOfDay.map(s => <option key={s} value={s}>{s}</option>)}
                    </optgroup>
                  )}
                  <optgroup label="○ Autres sites">
                    {SITES.filter(s => !sitesOfDay.includes(s)).map(s => <option key={s} value={s}>{s}</option>)}
                  </optgroup>
                </select>
              )}
              <button className="btn-ghost" onClick={handleLogout} style={{fontSize:13}}>Sortir</button>
            </div>
          </div>

          {/* Banner "Je suis arrivé" si pas encore cliqué et distrib */}
          {effSession.role === 'distrib' && !session.isMaster && !myArrival && !isClosed && (
            <ArrivedBanner session={effSession} onArrived={handleArrived} />
          )}

          {tab === 'clients' && <ClientsPage session={effSession} currentSite={currentSite} orders={orders} isClosed={isClosed} dispatch={dispatchData[currentSite] || null} lastminute={lastminute} />}
          {tab === "quality" && <QualityPage session={effSession} currentSite={currentSite} orders={orders} products={products} isClosed={isClosed} consumersByEmail={consumersByEmail} />}
          {tab === 'consignes' && <ConsignesPage session={effSession} currentSite={currentSite} orders={orders} isClosed={isClosed} consumersByEmail={consumersByEmail} />}
          {tab === 'followup' && <FollowUpPage session={effSession} currentSite={currentSite} consumersByEmail={consumersByEmail} />}
          {tab === 'infos' && <InfosPage session={effSession} />}
          {tab === 'closure' && <ClosurePage session={effSession} currentSite={currentSite} orders={orders} consumersByEmail={consumersByEmail} isClosed={isClosed} onReopen={() => {}} />}
          {tab === 'masterrecap' && effSession.isMaster && <MasterRecapPage session={effSession} consumersByEmail={consumersByEmail} />}
          {tab === 'push' && effSession.isMaster && <PushComposerPage session={effSession} availableSites={availableSites} pushMessages={pushMessages} orders={orders} />}
          {tab === 'casuivi' && effSession.isMaster && <CaSuiviPage session={effSession} />}
          {tab === 'manqhist' && effSession.isMaster && <ManquantsHistoryPage session={effSession} />}
          {tab === 'histo' && effSession.isMaster && <HistoryPage session={effSession} />}
          {tab === 'stats' && effSession.isMaster && <StatsPage session={effSession} />}
          {tab === 'admin' && effSession.isMaster && <AdminPage session={effSession} ordersMeta={ordersMeta} productsMeta={productsMeta} consumersMeta={consumersMeta} catalogueMeta={catalogueMeta} />}

          <div className="tab-bar">
            <button className={tab==='clients'?'active':''} onClick={()=>setTab('clients')}>
              <span className="tab-icon">👥</span>Clients
            </button>
            {!effSession.isMaster && !isClosed && (
              <button className={tab==='quality'?'active':''} onClick={()=>setTab('quality')}>
                <span className="tab-icon">⚠️</span>Qualité
              </button>
            )}
            {!effSession.isMaster && !isClosed && (
              <button className={tab==='consignes'?'active':''} onClick={()=>setTab('consignes')}>
                <span className="tab-icon">🍯</span>Consigne
              </button>
            )}
            {!effSession.isMaster && !isClosed && (
              <button className={tab==='infos'?'active':''} onClick={()=>setTab('infos')}>
                <span className="tab-icon">📋</span>Infos
              </button>
            )}
            {!effSession.isMaster && (
              <button className={tab==='followup'?'active':''} onClick={()=>setTab('followup')}>
                <span className="tab-icon">📞</span>Suivi
              </button>
            )}
            <button className={tab==='closure'?'active':''} onClick={()=>setTab('closure')}>
              <span className="tab-icon">🔒</span>Clôt.
            </button>
            {effSession.isMaster && (
              <button className={tab==='push'?'active':''} onClick={()=>setTab('push')}>
                <span className="tab-icon">📣</span>Push
              </button>
            )}
            {effSession.isMaster && (
              <button className={tab==='masterrecap'?'active':''} onClick={()=>setTab('masterrecap')}>
                <span className="tab-icon">📋</span>Récap
              </button>
            )}
            {effSession.isMaster && (
              <button className={tab==='casuivi'?'active':''} onClick={()=>setTab('casuivi')}>
                <span className="tab-icon">💶</span>Suivi CA
              </button>
            )}
            {effSession.isMaster && (
              <button className={tab==='stats'?'active':''} onClick={()=>setTab('stats')}>
                <span className="tab-icon">📊</span>Stats
              </button>
            )}
            {effSession.isMaster && (
              <button className={tab==='manqhist'?'active':''} onClick={()=>setTab('manqhist')}>
                <span className="tab-icon">💸</span>Manq.&Rem.
              </button>
            )}
            {effSession.isMaster && (
              <button className={tab==='histo'?'active':''} onClick={()=>setTab('histo')}>
                <span className="tab-icon">📜</span>Histo.
              </button>
            )}
            {effSession.isMaster && (
              <button className={tab==='admin'?'active':''} onClick={()=>setTab('admin')}>
                <span className="tab-icon">⚙️</span>Admin
              </button>
            )}
          </div>
        </div>
      );
    }

    // ============================================================
    // BOOT
    // ============================================================
    let __booted = false;
    async function boot() {
      if (__booted) return;            // garde anti double-démarrage
      __booted = true;
      try {
        firebaseConfigured = await initFirebase();
      } catch (e) {
        console.error('initFirebase a échoué', e);
        firebaseConfigured = false;    // on continue en mode local
      }
      try {
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ToastProvider><App /></ToastProvider>);
      } catch (e) {
        console.error('Rendu impossible', e);
        if (window.showBootError) window.showBootError("Erreur au démarrage de l'application.");
      }
    }
    if (window.__firebase) boot();
    else window.addEventListener('firebase-ready', boot, { once: true });
    // Filet de sécurité : si Firebase ne se charge jamais (réseau coupé, bloqueur,
    // gstatic inaccessible…), l'événement 'firebase-ready' n'arrive pas et l'appli
    // restait bloquée sur page blanche. On démarre alors quand même en mode local.
    setTimeout(function(){ if (!__booted) boot(); }, 3500);
  </script>
</body>
</html>
