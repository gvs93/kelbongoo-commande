<script>
  // Repli automatique : si jsDelivr est bloqué/indisponible, on tente unpkg,
  // et si tout échoue on affiche un message clair au lieu d'une page blanche.
  (function() {
    function loadScript(src) {
      return new Promise(function(res, rej) {
        var s = document.createElement('script');
        s.src = src; s.onload = res; s.onerror = function(){ rej(src); };
        document.head.appendChild(s);
      });
    }
    function ensure(globalName, sources) {
      if (window[globalName]) return Promise.resolve();
      return sources.reduce(function(chain, src) {
        return chain.catch(function() {
          if (window[globalName]) return Promise.resolve();
          return loadScript(src);
        });
      }, Promise.reject());
    }
    window.addEventListener('DOMContentLoaded', function() {
      // Laisse une chance aux <script> ci-dessus, puis vérifie et complète si besoin
      setTimeout(function() {
        Promise.resolve()
          .then(function(){ return ensure('React', ['https://unpkg.com/react@18.3.1/umd/react.production.min.js']); })
          .then(function(){ return ensure('ReactDOM', ['https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js']); })
          .then(function(){ return ensure('Babel', ['https://unpkg.com/@babel/standalone@7.25.6/babel.min.js']); })
          .then(function(){ return ensure('XLSX', ['https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js']); })
          .then(function() {
            if (!window.React || !window.ReactDOM || !window.Babel) throw 'libs';
            var root = document.getElementById('root');
            // Si l'app n'a pas encore rendu (Babel chargé en repli, donc pas auto-exécuté)
            // on déclenche manuellement la transformation des scripts babel
            if (root && !root.hasChildNodes() && window.Babel.transformScriptTags) {
              window.Babel.transformScriptTags();
            }
          })
          .catch(function() {
            var root = document.getElementById('root');
            if (root && !root.hasChildNodes()) {
              root.innerHTML = '<div style="max-width:600px;margin:40px auto;padding:20px;'
                + 'border:1px solid #fed7d7;background:#fff5f5;border-radius:8px;'
                + 'font-family:sans-serif;color:#742a2a">'
                + '<h2 style="margin-bottom:8px">⚠️ Librairies non chargées</h2>'
                + '<p>Les CDN (jsDelivr et unpkg) n\'ont pas pu être contactés. '
                + 'C\'est souvent le <b>VPN</b> ou le réseau de l\'entreprise qui les bloque.</p>'
                + '<p style="margin-top:8px">Essaie : désactiver le VPN, ou ouvrir la page sur le réseau mobile, puis recharger (Ctrl+Shift+R).</p>'
                + '</div>';
            }
          });
      }, 300);
    });
  })();
</script>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

const DEFAULT_APPS_SCRIPT_URL = localStorage.getItem('kbg_apps_script_url') || '';

const fmtDate = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const fmtFR = (d) => d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
const todayStr = () => fmtDate(new Date());
const normalizeName = (s) => (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');
const fuzzyMatch = (a,b) => { const na=normalizeName(a), nb=normalizeName(b); if(!na||!nb) return false; return na===nb||na.includes(nb)||nb.includes(na); };

const callApi = async (url, action, params = {}) => {
  if (!url) throw new Error("URL Apps Script non configurée");
  if (action === 'init' || action === 'ping' || action === 'get_learnings') {
    const r = await fetch(`${url}?action=${action}`, { method: 'GET', redirect: 'follow' });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  }
  const r = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action, ...params }),
    redirect: 'follow',
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
};

// ============================================================
//                    MOTEUR DE PRÉDICTION
// ============================================================
const computeStats = (sales, today, periodDays) => {
  if (!sales || !sales.length) return { current: 0, prev: 0, avg4: 0, ref: 0, refSource: 'none', daysCur: 0, periodDays: periodDays };
  const N = periodDays || 7;
  const ms = 24 * 3600 * 1000;
  const toDate = (s) => new Date(s + 'T00:00:00');
  const startCur = new Date(today.getTime() - N * ms);
  const startPrev = new Date(today.getTime() - 2 * N * ms);
  const start4P = new Date(today.getTime() - 4 * N * ms);
  const inRange = (s, from, to) => { const d = toDate(s.d); return d > from && d <= to; };
  const cur = sales.filter(s => inRange(s, startCur, today));
  const prev = sales.filter(s => inRange(s, startPrev, startCur));
  const last4P = sales.filter(s => inRange(s, start4P, today));
  const sum = a => a.reduce((s, b) => s + b.q, 0);
  const sCurrent = sum(cur);
  const sPrev = sum(prev);
  const sAvg4 = last4P.length ? sum(last4P) / 4 : 0;
  // RÉFÉRENCE de prévision : on n'utilise PAS la période courante (semaine en cours
  // incomplète → ventes ~0). On prend la période précédente (-1). Si elle est vide,
  // repli sur la moyenne des 4 dernières périodes.
  let ref = sPrev;
  let refSource = 'prev';
  if (sPrev === 0 && sAvg4 > 0) { ref = sAvg4; refSource = 'avg4'; }
  return {
    current: sCurrent,
    prev: sPrev,
    avg4: sAvg4,
    ref: ref,
    refSource: refSource,
    daysCur: cur.length,
    periodDays: N,
  };
};

const computeAdjustment = (productId, learnings) => {
  if (!learnings) return 1.0;
  const entries = (learnings.entries || []).filter(e => e.productId === productId);
  if (!entries.length) return 1.0;
  const recent = entries.slice(-5);
  const ratios = recent.map(e => {
    const p = Number(e.proposedMedian) || 0;
    const v = Number(e.validated) || 0;
    return p > 0 ? v / p : 1;
  });
  return ratios.reduce((a, b) => a + b, 0) / ratios.length;
};

const buildScenarios = (stats, stock, daysToCover, pcb, adjCoef) => {
  // stats.current = ventes sur la période courante (N jours)
  // stats.periodDays = durée de la période
  // daysToCover = combien de jours il faut couvrir (généralement = periodDays + délai jusqu'à prochaine livraison)
  const N = stats.periodDays || 7;
  // RÉFÉRENCE = période -1 (repli moy 4 périodes), PAS la période courante incomplète
  const refVentes = (typeof stats.ref === 'number') ? stats.ref : (stats.prev || 0);
  const ratePerDay = N > 0 ? refVentes / N : 0;
  const trend = stats.prev > 0 ? stats.current / stats.prev : 1;
  const vsAvg = stats.avg4 > 0 ? stats.current / stats.avg4 : 1;
  
  // Besoin de base = vitesse × jours à couvrir
  const baseNeed = ratePerDay * daysToCover;
  
  const prudent = baseNeed * 0.9;
  const median  = baseNeed * 1.05 * adjCoef;
  const large   = baseNeed * 1.25 * adjCoef;
  
  const need = q => Math.max(0, q - stock);
  const roundPcb = q => pcb > 0 ? Math.ceil(q / pcb) * pcb : Math.ceil(q);
  
  return {
    ratePerDay, trend, vsAvg, baseNeed,
    scenarios: {
      prudent: { target: Math.ceil(prudent), need: roundPcb(need(prudent)), label: 'Prudent' },
      median:  { target: Math.ceil(median),  need: roundPcb(need(median)),  label: 'Médian' },
      large:   { target: Math.ceil(large),   need: roundPcb(need(large)),   label: 'Large' },
    }
  };
};

const estimateDaysToCover = (cadEntry) => {
  if (!cadEntry) return 7;
  const jl = (cadEntry.jourLivraison || '').toLowerCase();
  if (jl.includes('/') || jl.split(/livraison|pour/).length > 2) return 5;
  return 7;
};

// ============================================================
//                    COMPOSANTS
// ============================================================
function ConfigPanel({ apiUrl, setApiUrl, onReload, expanded, setExpanded }) {
  const [val, setVal] = useState(apiUrl);
  if (!expanded) {
    // Affichage discret quand déjà configuré
    return (
      <div style={{textAlign:'right',marginBottom:8}}>
        <button className="btn btn-sm btn-secondary" onClick={() => setExpanded(true)}>
          ⚙️ Config
        </button>
      </div>
    );
  }
  return (
    <div className="config-panel">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
        <label style={{margin:0}}>🔗 URL Apps Script Web App</label>
        {apiUrl && <button className="btn btn-sm btn-secondary" onClick={() => setExpanded(false)}>Fermer ✕</button>}
      </div>
      <div style={{display:'flex',gap:8,marginTop:6}}>
        <input value={val} onChange={e => setVal(e.target.value)} placeholder="https://script.google.com/macros/s/.../exec"/>
        <button className="btn btn-sm" onClick={() => {
          setApiUrl(val);
          localStorage.setItem('kbg_apps_script_url', val);
          if (val) {
            setExpanded(false);
            onReload && onReload();
          }
        }}>Enregistrer</button>
      </div>
      <div className="small" style={{marginTop:6}}>
        Première utilisation : déploie le code <code>apps-script.gs</code> sur script.google.com (instructions dans README).
      </div>
    </div>
  );
}

function Header({ step, dataStatus, stockDate }) {
  const steps = ['Tableau de bord', 'Fournisseur', 'Prédiction', 'Validation', 'Export'];
  return (
    <div className="card">
      <h1>🥦 Kelbongoo – Prédiction Commandes</h1>
      <div className="subtitle">{fmtFR(new Date())}{stockDate && stockDate !== todayStr() && <span style={{color:'#dd6b20'}}> · ⚠️ Stock du {stockDate}</span>}</div>
      <div className="data-status">
        {Object.entries(dataStatus).map(([k, v]) => (
          <div key={k}>
            <span className={`dot ${v === 'ok' ? 'dot-ok' : v === 'err' ? 'dot-err' : 'dot-load'}`}></span>
            <span>{k}</span>
          </div>
        ))}
      </div>
      <div className="tab-row" style={{marginTop:12,marginBottom:0}}>
        {steps.map((s, i) => (
          <div key={s} className={`tab ${i === step ? 'active' : ''}`}>{i + 1}. {s}</div>
        ))}
      </div>
    </div>
  );
}

function MarkAsPassedModal({ apiUrl, supplierEntry, data, onClose, onSaved }) {
  const [whenChoice, setWhenChoice] = useState('today');
  const [customDate, setCustomDate] = useState(todayStr());
  const [quantities, setQuantities] = useState({});
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState('');

  // Produits du fournisseur depuis le stock
  const products = useMemo(() => {
    const stockRows = (data.stock && data.stock.rows) || [];
    const matchKey = supplierEntry.stockMatchKey || supplierEntry.supplier;
    const productInfos = (data.products && data.products.products) || [];
    return stockRows
      .filter(r => r.producteur === matchKey)
      .map(s => {
        const info = productInfos.find(p => p.id === s.id) || {};
        return { ...s, paht: info.paht || 0, pcb: info.pcb || 1 };
      })
      .sort((a, b) => a.produit.localeCompare(b.produit));
  }, [data, supplierEntry]);

  const getDate = () => {
    if (whenChoice === 'today') return todayStr();
    if (whenChoice === 'yesterday') {
      const d = new Date();
      d.setDate(d.getDate() - 1);
      return fmtDate(d);
    }
    return customDate;
  };

  const save = async (withDetail) => {
    setSaving(true); setError('');
    try {
      const dateStr = getDate();
      const orderId = 'ext_' + Date.now();
      let lines;
      if (withDetail) {
        lines = products
          .map(p => ({
            productId: p.id, produit: p.produit, stock: p.stockEff,
            ventes7j: 0, proposedMedian: 0,
            validated: parseFloat(quantities[p.id]) || 0,
          }))
          .filter(l => l.validated > 0);
      } else {
        // Au moins 1 ligne factice pour que le sheet enregistre quelque chose
        lines = [{
          productId: '__no_detail__', 
          produit: '(commande sans détail)',
          stock: 0, ventes7j: 0, proposedMedian: 0, validated: 0,
        }];
      }
      
      if (withDetail && lines.length === 0) {
        setError('Saisis au moins une quantité, ou clique "Sans détail"');
        setSaving(false); return;
      }
      
      const r = await callApi(apiUrl, 'save_validation', {
        supplier: supplierEntry.supplier,
        context: `Commande passée hors app (${whenChoice})`,
        userName: 'Henry',
        orderId,
        status: 'passed_externally',
        dateOverride: dateStr,
        lines,
      });
      if (r.error) throw new Error(r.error);
      // Marquer immédiatement comme "passed_externally"
      await callApi(apiUrl, 'mark_as_sent', { orderId, status: 'passed_externally', dateOverride: dateStr });
      onSaved && onSaved();
      onClose();
    } catch (e) {
      setError(e.message);
    }
    setSaving(false);
  };

  const filledCount = Object.values(quantities).filter(v => parseFloat(v) > 0).length;

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title">✓ Commande passée hors app — {supplierEntry.supplier}</div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>

        <div style={{marginBottom:16}}>
          <label>Quand a-t-elle été passée ?</label>
          <div className="radio-group">
            <label><input type="radio" checked={whenChoice === 'today'} onChange={() => setWhenChoice('today')}/> Aujourd'hui</label>
            <label><input type="radio" checked={whenChoice === 'yesterday'} onChange={() => setWhenChoice('yesterday')}/> Hier</label>
            <label><input type="radio" checked={whenChoice === 'custom'} onChange={() => setWhenChoice('custom')}/> Autre :</label>
            <input type="date" value={customDate} onChange={e => setCustomDate(e.target.value)} disabled={whenChoice !== 'custom'} style={{width:'auto'}}/>
          </div>
        </div>

        <div style={{marginBottom:8}}>
          <label>Détail des produits commandés (optionnel, pour l'apprentissage)</label>
          <div className="small">Laisse vide les produits non commandés. Saisis les quantités pour ceux qui le sont.</div>
        </div>

        {error && <div className="alert alert-error">{error}</div>}

        <div style={{maxHeight:'40vh',overflowY:'auto',border:'1px solid #e2e8f0',borderRadius:6}}>
          <table>
            <thead>
              <tr>
                <th>Produit</th>
                <th className="num">Stock</th>
                <th>PCB</th>
                <th>Qté commandée</th>
              </tr>
            </thead>
            <tbody>
              {products.map(p => (
                <tr key={p.id}>
                  <td><strong>{p.produit}</strong><div className="small">{p.unite}</div></td>
                  <td className="num">{p.stockEff}</td>
                  <td className="small">{p.pcb || 1}</td>
                  <td>
                    <input type="number" className="qty-input" value={quantities[p.id] || ''} placeholder="0"
                      onChange={e => setQuantities({...quantities, [p.id]: e.target.value})}/>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose} disabled={saving}>Annuler</button>
          <button className="btn btn-warn" onClick={() => save(false)} disabled={saving}>
            {saving ? <><span className="loader"/> Enregistrement...</> : '⚡ Sans détail'}
          </button>
          <button className="btn btn-success" onClick={() => save(true)} disabled={saving || filledCount === 0}>
            {saving ? <><span className="loader"/> Enregistrement...</> : `✓ Avec détail (${filledCount} produit${filledCount > 1 ? 's' : ''})`}
          </button>
        </div>
      </div>
    </div>
  );
}

function StepPrediction({ supplier, data, learnings, onValidate, onBack, apiUrl }) {
  const today = useMemo(() => new Date(), []);
  // Période = nb jours entre 2 livraisons consécutives (depuis cadencier)
  const periodDays = supplier.cad?.periodDays || 7;
  const daysUntilDelivery = supplier.cad?.daysUntilNextDelivery || 0;
  // daysToCover par défaut = délai jusqu'à prochaine livraison + 1 période entière
  const defaultDaysToCover = daysUntilDelivery + periodDays;
  
  const [daysToCover, setDaysToCover] = useState(defaultDaysToCover);
  const [context, setContext] = useState('');
  const [selectedScenario, setSelectedScenario] = useState({});
  const [overrides, setOverrides] = useState({});
  const [pcbOverrides, setPcbOverrides] = useState({});
  const [expandedRows, setExpandedRows] = useState({});
  const [infoRows, setInfoRows] = useState({});
  const [infoCover, setInfoCover] = useState(false);
  
  // Chargement BDC du fournisseur
  const [bdc, setBdc] = useState(null);
  const [bdcLoading, setBdcLoading] = useState(true);
  const [bdcError, setBdcError] = useState('');
  
  // Chargement lazy des stats du fournisseur (init_light n'envoie pas les ventes détaillées)
  const [supplierStats, setSupplierStats] = useState(null);
  const [statsLoading, setStatsLoading] = useState(true);
  
  useEffect(() => {
    setBdcLoading(true);
    setBdcError('');
    callApi(apiUrl, 'read_bdc', { supplier: supplier.name })
      .then(r => {
        if (!r.ok) {
          setBdcError(r.error || 'BDC non disponible');
          setBdc(null);
        } else {
          setBdc(r);
        }
      })
      .catch(e => setBdcError(e.message))
      .finally(() => setBdcLoading(false));
  }, [apiUrl, supplier.name]);
  
  // Charger les stats détaillées du fournisseur en parallèle
  useEffect(() => {
    // Si data.statsVentes a déjà salesByProduct (mode init full), pas besoin de re-fetch
    if (data.statsVentes && data.statsVentes.salesByProduct && Object.keys(data.statsVentes.salesByProduct).length > 0) {
      setSupplierStats({ salesByProduct: data.statsVentes.salesByProduct });
      setStatsLoading(false);
      return;
    }
    // Sinon (mode init_light) : charger spécifiquement pour ce fournisseur
    setStatsLoading(true);
    callApi(apiUrl, 'get_supplier_stats', { supplier: supplier.name, stockFile: (data && data.stockFile) || { which:'last', col:'fin' } })
      .then(r => {
        setSupplierStats(r);
      })
      .catch(e => {
        setSupplierStats({ salesByProduct: {}, error: e.message });
      })
      .finally(() => setStatsLoading(false));
  }, [apiUrl, supplier.name, data]);

  const stockRows = (data.stock && data.stock.rows) || [];
  const products = (data.products && data.products.products) || [];
  const salesByProduct = (supplierStats && supplierStats.salesByProduct) || {};

  // Construire des index normalisés pour matching produit ↔ BDC.
  // On indexe par nom normalisé ET par EAN, pour aligner la LECTURE du PCB
  // sur l'ÉCRITURE serveur (actionWriteBdc) : EAN → nom exact → recouvrement de mots.
  const bdcIndex = useMemo(() => {
    const byName = {}, byEan = {};
    if (bdc && bdc.items) {
      bdc.items.forEach(it => {
        const key = normalizeName(it.produit);
        if (key) byName[key] = it;
        const ean = String(it.ean || '').trim();
        if (ean) byEan[ean] = it;
      });
    }
    return { byName: byName, byEan: byEan };
  }, [bdc]);

  // Rapprochement robuste d'un produit (stock + fiche) vers une ligne du BDC :
  //   1) EAN (depuis la fiche-produit)
  //   2) nom normalisé exact
  //   3) recouvrement de mots significatifs (>= 2 mots communs, le meilleur score)
  const matchBdcItem = useCallback((stockItem, info) => {
    const byName = bdcIndex.byName, byEan = bdcIndex.byEan;
    const ean = String((info && info.ean) || '').trim();
    if (ean && byEan[ean]) return byEan[ean];
    const norm = normalizeName(stockItem.produit);
    if (norm && byName[norm]) return byName[norm];
    const words = String(stockItem.produit || '').toLowerCase().normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '').split(/[^a-z0-9]+/)
      .filter(w => w.length >= 3);
    if (!words.length) return null;
    let best = null, bestScore = 0;
    Object.keys(byName).forEach(key => {
      let score = 0;
      words.forEach(w => { if (key.indexOf(w) >= 0) score++; });
      if (score >= 2 && score > bestScore) { bestScore = score; best = byName[key]; }
    });
    return best;
  }, [bdcIndex]);

  const productsForSupplier = useMemo(() => {
    return stockRows
      .filter(r => r.producteur === supplier.name)
      .map(stockItem => {
        const info = products.find(p => p.id === stockItem.id) || {};
        // PCB : priorité au BDC, fallback fiches-produits
        const bdcItem = matchBdcItem(stockItem, info);
        // PCB : priorité au fichier stock (colonne CDT/PCB/Conditionnement), puis BDC, puis fiches
        const pcbFromStock = (stockItem.pcbStock && !isNaN(stockItem.pcbStock)) ? stockItem.pcbStock : null;
        const pcbFromBdc = bdcItem && bdcItem.pcb && !isNaN(bdcItem.pcb) ? bdcItem.pcb : null;
        const pcbFromFiches = info.pcb || null;
        const pcb = pcbFromStock || pcbFromBdc || pcbFromFiches || 1;
        return {
          ...stockItem,
          // stock effectif : champ `stock` du backend (selon colonne choisie), repli stockFin
          stockEff: (typeof stockItem.stock === 'number') ? stockItem.stock : (stockItem.stockFin || 0),
          paht: (bdcItem && bdcItem.paht) || info.paht || 0,
          pcb: pcb,
          pcbSource: pcbFromStock ? 'stock' : (pcbFromBdc ? 'bdc' : (pcbFromFiches ? 'fiches' : 'default')),
          ean: (bdcItem && bdcItem.ean) || info.ean || '',
          code: (bdcItem && bdcItem.code) || info.ref1 || '',
          tva: info.tva || 5.5,
          inBdc: !!bdcItem,
        };
      })
      .sort((a, b) => a.produit.localeCompare(b.produit));
  }, [stockRows, products, supplier, matchBdcItem]);

  const productAnalyses = useMemo(() => {
    return productsForSupplier.map(p => {
      const sales = salesByProduct[p.id] || [];
      const stats = computeStats(sales, today, periodDays);
      const pcb = pcbOverrides[p.id] || p.pcb || 1;
      const adjCoef = computeAdjustment(p.id, learnings);
      const r = buildScenarios(stats, p.stockEff, daysToCover, pcb, adjCoef);
      return { product: p, stats, ...r, pcb, adjCoef };
    });
  }, [productsForSupplier, salesByProduct, today, daysToCover, pcbOverrides, learnings, periodDays]);

  useEffect(() => {
    const def = {};
    let changed = false;
    productAnalyses.forEach(pa => {
      if (!(pa.product.id in selectedScenario)) { def[pa.product.id] = 'median'; changed = true; }
    });
    if (changed) setSelectedScenario(prev => ({ ...prev, ...def }));
  }, [productAnalyses.length]);

  const getQty = (pa) => {
    if (pa.product.id in overrides) return overrides[pa.product.id];
    const scn = selectedScenario[pa.product.id] || 'median';
    return pa.scenarios[scn].need;
  };

  const totalLines = productAnalyses.filter(pa => getQty(pa) > 0).length;
  const totalAmount = productAnalyses.reduce((s, pa) => s + getQty(pa) * (pa.product.paht || 0), 0);
  const franco = supplier.cad?.franco ? parseFloat(String(supplier.cad.franco).replace(/[^\d.,]/g,'').replace(',','.')) || 0 : 0;

  return (
    <div className="card">
      <div className="step">Étape 3 — Prédiction pour {supplier.name}</div>
      {supplier.cad && (
        <div className="alert alert-info">
          <strong>📅 {supplier.cad.jourLivraison || 'NC'}</strong>
          {supplier.cad.deadline && <> · Deadline : <em>{supplier.cad.deadline}</em></>}
          {supplier.cad.franco && <> · Franco : <em>{supplier.cad.franco}</em></>}
          <> · Période : <strong>{periodDays}j</strong> entre 2 livraisons</>
          {supplier.cad.mail && <> · Mail : <code>{supplier.cad.mail}</code></>}
        </div>
      )}
      {bdcLoading && <div className="alert alert-info"><span className="loader"/> Chargement du BDC fournisseur...</div>}
      {statsLoading && <div className="alert alert-info"><span className="loader"/> Chargement des ventes du fournisseur...</div>}
      {bdcError && (
        <div className="alert alert-warn">
          ⚠️ BDC non disponible : {bdcError}
          <div className="small">L'app fonctionnera mais ne pourra pas écrire dans le BDC à la validation. Le PCB utilisera fiches-produits.csv.</div>
        </div>
      )}
      {bdc && bdc.ok && (
        <div className="alert alert-success" style={{fontSize:12}}>
          ✓ BDC trouvé : <strong>{bdc.fileName}</strong> ({bdc.items.length} lignes, {bdc.isGoogleSheet ? 'Sheet natif' : 'XLSX'})
          {!bdc.isGoogleSheet && <span style={{marginLeft:8}} className="pill pill-orange">⚠️ XLSX = écriture impossible</span>}
        </div>
      )}
      <div className="row" style={{marginBottom:12}}>
        <div className="col" style={{maxWidth:240}}>
          <label>
            Jours à couvrir
            <button title="Pourquoi ce nombre ?"
              onClick={() => setInfoCover(!infoCover)}
              style={{marginLeft:6, border:'1px solid #cbd5e0', background:'#fff', borderRadius:10,
                width:18, height:18, lineHeight:'14px', fontSize:11, fontWeight:700,
                color:'#3182ce', cursor:'pointer', padding:0}}>i</button>
          </label>
          <input type="number" value={daysToCover} onChange={e => setDaysToCover(parseInt(e.target.value) || 7)} min="1" max="60"/>
          <div className="small">Défaut = {daysUntilDelivery}j (jusqu'à livraison) + {periodDays}j (période)</div>
          {infoCover && (() => {
            const ms = 86400000;
            const nextDeliv = new Date(today.getTime() + daysUntilDelivery * ms);
            const afterDeliv = new Date(nextDeliv.getTime() + periodDays * ms);
            const fmt = d => d.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'short'});
            return (
              <div style={{marginTop:6, padding:'8px 10px', background:'#ebf8ff', border:'1px solid #bee3f8',
                borderRadius:6, fontSize:12, color:'#2c5282', lineHeight:1.5}}>
                <strong>Période à couvrir, stock actuel compris.</strong><br/>
                On commande aujourd'hui ({fmt(today)}). Prochaine livraison : <strong>{fmt(nextDeliv)}</strong> (dans {daysUntilDelivery}j).
                La livraison d'après : <strong>{fmt(afterDeliv)}</strong>.<br/>
                Le stock doit donc tenir de maintenant jusqu'à cette livraison suivante, soit <strong>{defaultDaysToCover} jours</strong>.
                Le stock que tu as déjà est pris en compte (la commande = besoin total − stock actuel).
                Ajuste ce nombre si tu prévois plus/moins de ventes.
              </div>
            );
          })()}
        </div>
        <div className="col" style={{flex:3}}>
          <label>💡 Contexte (météo, vacances, fériés...)</label>
          <input value={context} onChange={e => setContext(e.target.value)} placeholder="ex: canicule prévue, lundi férié..."/>
        </div>
      </div>
      <div style={{overflowX:'auto'}}>
      <table>
        <thead>
          <tr>
            <th>Produit</th>
            <th className="num">Stock</th>
            <th className="num" style={{color:'#2d6a2d'}}>Période -1 ★réf</th>
            <th className="num">Moy 4 périodes</th>
            <th>PCB</th>

        <tbody>

            const sel = selectedScenario[pa.product.id] || 'median';
            const finalQty = getQty(pa);
            const trendIcon = pa.trend > 1.15 ? '📈' : pa.trend < 0.85 ? '📉' : '→';
            const isExpanded = expandedRows[pa.product.id];
            const productSales = (data.statsVentes?.salesByProduct?.[pa.product.id]) || [];
            // Détail des derniers jours (période courante)
            const ms = 24 * 3600 * 1000;
            const startCur = new Date(today.getTime() - periodDays * ms);
            const recentSales = productSales
              .filter(s => {

                  </button>

                  {pa.stats.refSource === 'avg4' && <div className="small" style={{color:'#b7791f'}}>↳ moy4: {pa.stats.avg4.toFixed(1)}</div>}
                </td>
                <td className="num small">{pa.stats.avg4.toFixed(1)}</td>
                <td>
                  <input type="number" className="qty-input" value={pcbOverrides[pa.product.id] || pa.product.pcb || 1}
                    onChange={e => setPcbOverrides({...pcbOverrides, [pa.product.id]: parseInt(e.target.value) || 1})}/>
                  {!pcbOverrides[pa.product.id] && (
                    <div className="small" style={{color: pa.product.pcbSource==='stock' ? '#2d6a2d' : (pa.product.pcbSource==='default' ? '#9B2C2C' : '#a0aec0')}}>
                      {pa.product.pcbSource==='stock' ? 'CDT' : (pa.product.pcbSource==='bdc' ? 'BDC' : (pa.product.pcbSource==='fiches' ? 'fiche' : '⚠️ déf.'))}
                    </div>
                  )}
                </td>
                {['prudent', 'median', 'large'].map(scn => (
                  <td key={scn} className="qty-cell">
                    <div className={`scenario-box ${sel === scn ? 'selected' : ''}`}
                      onClick={() => {
                        setSelectedScenario({...selectedScenario, [pa.product.id]: scn});
                        setOverrides(prev => { const n = {...prev}; delete n[pa.product.id]; return n; });
                      }}>
                      <span className="badge">{pa.scenarios[scn].label}</span>
                      <div style={{fontSize:16,fontWeight:700,margin:'2px 0'}}>{pa.scenarios[scn].need}</div>
                      <div className="small">cible: {pa.scenarios[scn].target}</div>
                      {scn === 'median' && (
                        <button title="Comment ce chiffre est calculé"
                          onClick={(e) => { e.stopPropagation(); setExpandedRows({...expandedRows, [pa.product.id]: !isExpanded}); }}
                          style={{marginTop:3, border:'1px solid #cbd5e0', background:'#fff', borderRadius:10,
                            width:18, height:18, lineHeight:'14px', fontSize:11, fontWeight:700,
                            color:'#3182ce', cursor:'pointer', padding:0}}>i</button>
                      )}
                    </div>
                  </td>
                ))}
                <td>
                  <input type="number" className="qty-input" value={finalQty}
                    onChange={e => setOverrides({...overrides, [pa.product.id]: parseInt(e.target.value) || 0})}/>
                </td>
                <td className="num small">{(finalQty * (pa.product.paht || 0)).toFixed(2)}</td>
              </tr>,
              isExpanded && (
                <tr key={pa.product.id + '_detail'}>
                  <td colSpan="12" style={{padding:0,background:'#f7fafc'}}>
                    <div className="expand-box">
                      <div className="expand-section">
                        <strong>📊 Ventes des 7 derniers jours (jours de distribution)</strong>
                        {recentSales.length === 0 ? (
                          <div className="expand-row small">Aucune vente enregistrée sur cette période</div>
                        ) : (
                          recentSales.map(s => {
                            const d = new Date(s.d + 'T00:00:00');
                            return (
                              <div key={s.d} className="expand-row">
                                • {d.toLocaleDateString('fr-FR', {weekday:'short', day:'numeric', month:'short'})} : <span className="num">{s.q}</span>
                              </div>
                            );
                          })
                        )}
                        <div className="expand-row" style={{marginTop:4,fontWeight:600}}>
                          Total : <span className="num">{pa.stats.current}</span> sur {pa.stats.daysCur} jour{pa.stats.daysCur > 1 ? 's' : ''} de distrib
                        </div>
                      </div>
                      
                      <div className="expand-section">
                        <strong>📈 Comparaisons</strong>
                        <div className="expand-row">Période précédente ({periodDays}j) : <span className="num">{pa.stats.prev}</span></div>
                        <div className="expand-row">Tendance vs période -1 : <span className="num">{((pa.trend - 1) * 100).toFixed(0)}%</span> {trendIcon}</div>
                        <div className="expand-row">Moyenne 4 dernières périodes : <span className="num">{pa.stats.avg4.toFixed(1)}</span> /période</div>
                        <div className="expand-row">Cette période vs moy 4 : <span className="num">{pa.stats.avg4 > 0 ? ((pa.stats.current/pa.stats.avg4 - 1) * 100).toFixed(0) : 0}%</span></div>
                      </div>
                      
                      <div className="expand-section">
                        <strong>🧮 Comment j'arrive à ces chiffres</strong>
                        <div className="expand-row">
                          1. Référence de vente : <span className="num">{pa.stats.refSource === 'avg4' ? pa.stats.avg4.toFixed(1) : pa.stats.prev}</span>
                          {pa.stats.refSource === 'avg4'
                            ? ' (moyenne des 4 dernières périodes — la période -1 était vide)'
                            : ' (ventes de la période précédente, sur ' + periodDays + 'j)'}
                        </div>
                        <div className="expand-row">2. Vitesse : {pa.stats.refSource === 'avg4' ? pa.stats.avg4.toFixed(1) : pa.stats.prev} ÷ {periodDays}j = <span className="num">{pa.ratePerDay.toFixed(2)}</span> /jour</div>
                        <div className="expand-row">3. Jours à couvrir : <span className="num">{daysToCover}j</span> (délai jusqu'à la prochaine livraison + 1 période)</div>
                        <div className="expand-row">4. Besoin de base : {pa.ratePerDay.toFixed(2)} × {daysToCover} = <span className="num">{pa.baseNeed.toFixed(1)}</span></div>
                        <div className="expand-row">5. Médian = besoin × 1,05 {pa.adjCoef !== 1 ? '× ' + pa.adjCoef.toFixed(2) + ' (coef appris)' : ''} = <span className="num">{(pa.baseNeed * 1.05 * pa.adjCoef).toFixed(1)}</span> → cible {pa.scenarios.median.target}</div>
                        <div className="expand-row">6. À commander = cible − stock ({pa.product.stockEff}) = {Math.max(0, pa.scenarios.median.target - pa.product.stockEff)}, arrondi PCB {pa.pcb} → <strong>{pa.scenarios.median.need}</strong></div>
                        <div className="expand-row" style={{marginTop:4, color:'#718096'}}>
                          ℹ️ Le chiffre dépasse souvent les ventes d'une seule période car il couvre <strong>{daysToCover} jours</strong>, pas {periodDays}.
                        </div>
                      </div>
                      
                      <div className="expand-section">
                        <strong>💡 Propositions détaillées</strong>
                        <div className="expand-row">Prudent : cible {pa.scenarios.prudent.target} → manque {Math.max(0, pa.scenarios.prudent.target - pa.product.stockEff)} → cmd <strong>{pa.scenarios.prudent.need}</strong> (arrondi PCB {pa.pcb})</div>
                        <div className="expand-row">Médian : cible {pa.scenarios.median.target} → manque {Math.max(0, pa.scenarios.median.target - pa.product.stockEff)} → cmd <strong>{pa.scenarios.median.need}</strong> (arrondi PCB {pa.pcb})</div>
                        <div className="expand-row">Large : cible {pa.scenarios.large.target} → manque {Math.max(0, pa.scenarios.large.target - pa.product.stockEff)} → cmd <strong>{pa.scenarios.large.need}</strong> (arrondi PCB {pa.pcb})</div>
                      </div>
                    </div>
                  </td>
                </tr>
              )
            ];
          })}
        </tbody>
      </table>
      </div>
      <div style={{marginTop:12,padding:12,background:'#f7fafc',borderRadius:6,display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
        <div>
          <strong>{totalLines}</strong> lignes · Total : <strong>{totalAmount.toFixed(2)} € HT</strong>
          {franco > 0 && (
            <span style={{marginLeft:10}}>
              {totalAmount >= franco 
                ? <span className="pill pill-green">Franco atteint ({franco}€)</span>
                : <span className="pill pill-orange">Manque {(franco - totalAmount).toFixed(2)}€</span>}
            </span>
          )}
        </div>
        <div>
          <button className="btn btn-secondary" onClick={onBack}>← Retour</button>
          <button className="btn btn-success" style={{marginLeft:8}}
            onClick={() => onValidate(productAnalyses, selectedScenario, overrides, context, daysToCover)}>
            Valider →
          </button>
        </div>
      </div>
    </div>
  );
}

function StepValidate({ supplier, productAnalyses, selectedScenario, overrides, context, onBack, onConfirm }) {
  const getQty = (pa) => {
    if (pa.product.id in overrides) return overrides[pa.product.id];
    const scn = selectedScenario[pa.product.id] || 'median';
    return pa.scenarios[scn].need;
  };
  const lines = productAnalyses
    .map(pa => ({
      productId: pa.product.id,
      produit: pa.product.produit,
      qty: getQty(pa),
      stock: pa.product.stockEff,
      ventes7j: pa.stats.current,
      proposedMedian: pa.scenarios.median.need,
      paht: pa.product.paht,
      ean: pa.product.ean,
      code: pa.product.code,
      pcb: pa.pcb,
      unite: pa.product.unite,
    }))
    .filter(l => l.qty > 0);
  const total = lines.reduce((s, l) => s + l.qty * (l.paht || 0), 0);

  return (
    <div className="card">
      <div className="step">Étape 4 — Validation finale</div>
      <p style={{marginBottom:12}}>
        <strong>{supplier.name}</strong> · {lines.length} lignes · <strong>{total.toFixed(2)} € HT</strong>
        {context && <> · <em>{context}</em></>}
      </p>
      <table>
        <thead>
          <tr>
            <th>Produit</th>
            <th className="num">Stock</th>
            <th className="num">Ventes 7j</th>
            <th className="num">Proposé</th>
            <th className="num">Validé</th>
            <th className="num">Δ</th>
            <th className="num">€ HT</th>
          </tr>
        </thead>
        <tbody>
          {lines.map(l => {
            const delta = l.qty - l.proposedMedian;
            return (
              <tr key={l.productId}>
                <td>{l.produit}</td>
                <td className="num">{l.stock}</td>
                <td className="num">{l.ventes7j}</td>
                <td className="num">{l.proposedMedian}</td>
                <td className="num"><strong>{l.qty}</strong></td>
                <td className="num">
                  {delta === 0 ? '=' : delta > 0 
                    ? <span className="pill pill-orange">+{delta}</span> 
                    : <span className="pill pill-blue">{delta}</span>}
                </td>
                <td className="num small">{(l.qty * l.paht).toFixed(2)}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
      <div className="alert alert-warn" style={{marginTop:14}}>
        ⚠️ J'enregistre tes ajustements dans le sheet d'apprentissage partagé pour améliorer mes prochaines prédictions.
      </div>
      <div style={{marginTop:14,display:'flex',justifyContent:'space-between'}}>
        <button className="btn btn-secondary" onClick={onBack}>← Modifier</button>
        <button className="btn btn-success" onClick={() => onConfirm(lines)}>✓ Valider et générer</button>
      </div>
    </div>
  );
}

function StepExport({ apiUrl, supplier, lines, context, onBack, onReset }) {
  const [sending, setSending] = useState(false);
  const [sent, setSent] = useState(false);
  const [error, setError] = useState('');
  const [saved, setSaved] = useState(false);
  const [saveError, setSaveError] = useState('');
  const [orderId, setOrderId] = useState(null);
  const [marking, setMarking] = useState(false);
  const [marked, setMarked] = useState(false);
  const [bdcResult, setBdcResult] = useState(null);
  const [bdcWriting, setBdcWriting] = useState(false);

  const txtContent = lines.map(l => `${l.ean || l.code || l.productId}\t${l.qty}`).join('\n');
  const totalAmount = lines.reduce((s, l) => s + l.qty * (l.paht || 0), 0);

  useEffect(() => {
    if (saved) return;
    // 1. Enregistrer la validation dans le sheet apprentissage
    callApi(apiUrl, 'save_validation', {
      supplier: supplier.name,
      context: context || '',
      userName: 'Henry',
      lines: lines.map(l => ({
        productId: l.productId, produit: l.produit, stock: l.stock,
        ventes7j: l.ventes7j, proposedMedian: l.proposedMedian, validated: l.qty,
      }))
    }).then(r => {
      if (r.error) setSaveError(r.error); 
      else { setSaved(true); if (r.orderId) setOrderId(r.orderId); }
    }).catch(e => setSaveError(e.message));
    
    // 2. En parallèle, écrire dans le BDC du fournisseur (colonne jaune "Commande en UVC")
    setBdcWriting(true);
    callApi(apiUrl, 'write_bdc', {
      supplier: supplier.name,
      lines: lines.map(l => ({ produit: l.produit, ean: l.ean, qty: l.qty })),
    }).then(r => {
      setBdcResult(r);
    }).catch(e => {
      setBdcResult({ ok: false, error: e.message });
    }).finally(() => setBdcWriting(false));
  }, []);

  const downloadTxt = () => {
    const blob = new Blob([txtContent], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `commande_${normalizeName(supplier.name)}_${todayStr()}.txt`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const downloadXlsx = () => {
    const wb = XLSX.utils.book_new();
    const data = [
      ['GENCODE', 'CODE', 'Produits', 'Unité', 'PCB', 'CDE en UVC', 'Unité fact', 'PA HT', 'Montant HT'],
      ...lines.map(l => [
        l.ean || '', l.code || l.productId, l.produit, l.unite || '', l.pcb || 1,
        l.qty, 'pièce', l.paht ? l.paht.toFixed(2) : '',
        l.paht ? (l.paht * l.qty).toFixed(2) : ''
      ]),
      ['', '', '', '', '', '', '', 'Total HT', totalAmount.toFixed(2)]
    ];
    const ws = XLSX.utils.aoa_to_sheet(data);
    XLSX.utils.book_append_sheet(wb, ws, supplier.name.substring(0, 28));
    XLSX.writeFile(wb, `BdC_${normalizeName(supplier.name)}_${todayStr()}.xlsx`);
  };

  const sendMail = async () => {
    setSending(true); setError('');
    try {
      const body = 
`Commande pour ${supplier.name}
Date : ${todayStr()}
Nombre de lignes : ${lines.length}
Total estimé : ${totalAmount.toFixed(2)} € HT
${context ? '\nContexte : ' + context : ''}

Fichier .txt joint à importer dans G5.
`;
      const r = await callApi(apiUrl, 'send_order_mail', {
        to: 'rr@probon.org',
        subject: `Commande fournisseur ${supplier.name} - ${todayStr()}`,
        body,
        attachmentName: `commande_${normalizeName(supplier.name)}_${todayStr()}.txt`,
        attachmentContent: txtContent,
      });
      if (r.error) throw new Error(r.error);
      setSent(true);
      // Marquer auto comme "sent" (envoyée, pas encore validée comme passée)
      if (orderId) {
        await callApi(apiUrl, 'mark_as_sent', { orderId, status: 'sent' });
      }
    } catch (e) {
      setError(`Erreur envoi : ${e.message}. Tu peux télécharger le .txt et l'envoyer manuellement.`);
    }
    setSending(false);
  };

  const markAsPassed = async () => {
    if (!orderId) { setError('Pas d\'orderId, recharge la page.'); return; }
    setMarking(true);
    try {
      const r = await callApi(apiUrl, 'mark_as_sent', { orderId, status: 'passed' });
      if (r.error) throw new Error(r.error);
      setMarked(true);
    } catch (e) {
      setError(`Erreur : ${e.message}`);
    }
    setMarking(false);
  };

  return (
    <div className="card">
      <div className="step">Étape 5 — Export & envoi</div>
      <div className="alert alert-success">
        ✓ Commande prête pour <strong>{supplier.name}</strong> — {lines.length} lignes — {totalAmount.toFixed(2)} € HT
        {saved && <span style={{marginLeft:10}} className="pill pill-green">Apprentissage enregistré</span>}
        {saveError && <span style={{marginLeft:10}} className="pill pill-red">Apprentissage : {saveError}</span>}
      </div>
      
      {/* Résultat de l'écriture dans le BDC du fournisseur */}
      {bdcWriting && (
        <div className="alert alert-info">
          <span className="loader"/> Écriture dans le BDC du fournisseur...
        </div>
      )}
      {bdcResult && bdcResult.ok && (
        <div className="alert alert-success">
          ✓ BDC rempli : <strong>{bdcResult.fileName}</strong> · 
          {bdcResult.matchedCount} ligne{bdcResult.matchedCount > 1 ? 's' : ''} écrite{bdcResult.matchedCount > 1 ? 's' : ''} dans la colonne jaune
          {bdcResult.notMatchedCount > 0 && (
            <> · <span className="pill pill-orange">⚠️ {bdcResult.notMatchedCount} non matché{bdcResult.notMatchedCount > 1 ? 's' : ''}</span></>
          )}
          {bdcResult.fileUrl && (
            <> · <a href={bdcResult.fileUrl} target="_blank" rel="noopener" style={{marginLeft:6}}>Ouvrir le BDC ↗</a></>
          )}
          {bdcResult.notMatchedCount > 0 && (
            <details style={{marginTop:8}}>
              <summary className="small" style={{cursor:'pointer'}}>Voir les produits non matchés</summary>
              <ul className="small" style={{marginTop:6,paddingLeft:18}}>
                {bdcResult.notMatched.map((nm, i) => (
                  <li key={i}>{nm.produit} (qté {nm.qty})</li>
                ))}
              </ul>
              <div className="small" style={{marginTop:6,fontStyle:'italic'}}>
                Vérifie que ces produits sont bien dans le BDC, avec le même nom que dans le stock.
              </div>
            </details>
          )}
        </div>
      )}
      {bdcResult && !bdcResult.ok && (
        <div className="alert alert-warn">
          ⚠️ BDC non rempli automatiquement : {bdcResult.error}
          <div className="small" style={{marginTop:4}}>
            Utilise le .txt ci-dessous pour reporter manuellement dans le BDC fournisseur.
          </div>
        </div>
      )}
      
      <h3 style={{marginBottom:8,marginTop:14,fontSize:14}}>📄 Fichier .txt (à importer dans G5)</h3>
      <textarea readOnly value={txtContent} style={{fontFamily:'monospace',fontSize:12,minHeight:120}}/>
      <div className="toolbar" style={{marginTop:12}}>
        <button className="btn" onClick={downloadTxt}>⬇ .txt</button>
        <button className="btn btn-secondary" onClick={downloadXlsx}>⬇ BDC .xlsx</button>
        <button className="btn btn-warn" onClick={sendMail} disabled={sending || sent}>
          {sending ? <><span className="loader"/> Envoi...</> : sent ? '✓ Mail envoyé' : '📧 Envoyer à rr@probon.org'}
        </button>
      </div>
      {error && <div className="alert alert-error" style={{marginTop:12}}>{error}</div>}
      
      <div style={{marginTop:18,padding:14,background:'#f0fff4',border:'1px solid #c6f6d5',borderRadius:6}}>
        <strong>Une fois la commande effectivement passée au fournisseur :</strong>
        <div className="small" style={{marginBottom:8}}>Clique sur le bouton ci-dessous pour la marquer comme "passée" dans le tableau de bord.</div>
        <button className="btn btn-success" onClick={markAsPassed} disabled={!orderId || marking || marked}>
          {marking ? <><span className="loader"/> Enregistrement...</> : marked ? '✓ Marquée comme passée' : '✓ Commande passée au fournisseur'}
        </button>
      </div>
      
      <div style={{marginTop:18,display:'flex',justifyContent:'space-between'}}>
        <button className="btn btn-secondary" onClick={onBack}>← Retour</button>
        <button className="btn" onClick={onReset}>↻ Tableau de bord</button>
      </div>
    </div>
  );
}

function BdcAlertBanner({ bdcCheck }) {
  const [expanded, setExpanded] = useState(false);
  if (!bdcCheck) return null;
  const hasDuplicates = bdcCheck.duplicatesCount > 0;
  const hasIgnored = bdcCheck.ignoredCount > 0;
  if (!hasDuplicates && !hasIgnored) return null; // Tout est OK, pas d'alerte
  
  return (
    <div style={{
      background: hasDuplicates ? '#FEB2B2' : '#FAF089',
      color: '#742A2A',
      border: '2px solid ' + (hasDuplicates ? '#C53030' : '#D69E2E'),
      borderRadius: 6,
      padding: '10px 14px',
      marginBottom: 10,
      fontSize: 13,
    }}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}}
        onClick={() => setExpanded(!expanded)}>
        <div>
          <strong>{hasDuplicates ? '🚨 DOUBLON(S) DE BDC DÉTECTÉ(S)' : '⚠️ Anomalies BDC'}</strong>
          {' '}— {bdcCheck.validCount} BDC valides
          {hasDuplicates && <> · <span style={{color:'#9B2C2C',fontWeight:600}}>{bdcCheck.duplicatesCount} doublon{bdcCheck.duplicatesCount > 1 ? 's' : ''}</span></>}
          {hasIgnored && <> · {bdcCheck.ignoredCount} fichier{bdcCheck.ignoredCount > 1 ? 's' : ''} ignoré{bdcCheck.ignoredCount > 1 ? 's' : ''}</>}
        </div>
        <span style={{fontSize:11}}>{expanded ? '▲ Réduire' : '▼ Détails'}</span>
      </div>
      
      {expanded && (
        <div style={{marginTop:10,paddingTop:10,borderTop:'1px solid rgba(116,42,42,.3)'}}>
          {hasDuplicates && (
            <div style={{marginBottom:12}}>
              <strong style={{fontSize:12}}>🚨 Doublons (à résoudre en priorité) :</strong>
              {bdcCheck.duplicates.map((d, i) => (
                <div key={i} style={{marginTop:6,marginLeft:8}}>
                  <div><strong>Fournisseur "{d.supplier}"</strong> matche {d.files.length} BDC :</div>
                  <ul style={{marginTop:3,marginBottom:0,paddingLeft:20}}>
                    {d.files.map((f, j) => (
                      <li key={j} style={{fontSize:12}}>
                        <a href={f.url} target="_blank" rel="noopener" style={{color:'#9B2C2C'}}>{f.name}</a>
                      </li>
                    ))}
                  </ul>
                </div>
              ))}
              <div style={{marginTop:6,fontSize:11,fontStyle:'italic'}}>
                💡 Renommer l'un des BDC pour qu'il ne contienne plus de mot en commun avec ce fournisseur, OU supprimer l'inutile.
              </div>
            </div>
          )}
          
          {hasIgnored && (
            <details>
              <summary style={{cursor:'pointer',fontSize:12,fontWeight:600}}>
                🚫 Fichiers ignorés ({bdcCheck.ignoredCount})
              </summary>
              <ul style={{marginTop:6,marginBottom:0,paddingLeft:20,fontSize:11}}>
                {bdcCheck.ignoredFiles.map((f, i) => (
                  <li key={i}>{f.name} <span style={{color:'#9B2C2C',fontStyle:'italic'}}>→ {f.reason}</span></li>
                ))}
              </ul>
              <div style={{marginTop:6,fontSize:11,fontStyle:'italic'}}>
                Pour qu'un fichier soit utilisé : nom commence par "BDC" + format Google Sheet natif (pas .xlsx ni raccourci).
              </div>
            </details>
          )}
          
          {bdcCheck.missingCount > 0 && (
            <details style={{marginTop:8}}>
              <summary style={{cursor:'pointer',fontSize:12,fontWeight:600}}>
                ❓ Fournisseurs du cadencier sans BDC ({bdcCheck.missingCount})
              </summary>
              <div style={{marginTop:4,fontSize:11}}>
                {bdcCheck.missing.join(', ')}
              </div>
            </details>
          )}
        </div>
      )}
    </div>
  );
}

function StockSourceSelector({ stockFile, setStockFile, stockData }) {
  const which = stockFile.which || 'last';
  const col = stockFile.col || 'fin';
  const avail = (stockData && stockData.availableDates) || [];
  const lastDate = avail[0];
  const prevDate = avail[1];
  const btn = (active) => ({
    flex:1, padding:'7px 6px', fontSize:12, fontWeight:600, cursor:'pointer',
    border:'1px solid ' + (active ? '#2d6a2d' : '#cbd5e0'),
    background: active ? '#e8f5e8' : '#fff',
    color: active ? '#2d6a2d' : '#4a5568', borderRadius:6,
  });
  return (
    <div className="card" style={{padding:'10px 12px', marginBottom:8}}>
      <div style={{fontSize:11, fontWeight:700, color:'#718096', marginBottom:6, textTransform:'uppercase'}}>
        📦 Source du stock
      </div>
      <div style={{display:'flex', gap:6, marginBottom:6}}>
        <button style={btn(which==='last')} onClick={() => setStockFile({ ...stockFile, which:'last' })}>
          Dernier fichier{lastDate ? ' ('+lastDate+')' : ''}
        </button>
        <button style={btn(which==='prev')} onClick={() => setStockFile({ ...stockFile, which:'prev' })}>
          Veille{prevDate ? ' ('+prevDate+')' : ''}
        </button>
      </div>
      <div style={{display:'flex', gap:6}}>
        <button style={btn(col==='fin')} onClick={() => setStockFile({ ...stockFile, col:'fin' })}>
          Stock fin
        </button>
        <button style={btn(col==='debut')} onClick={() => setStockFile({ ...stockFile, col:'debut' })}>
          Stock début
        </button>
      </div>
      {stockData && stockData.filename && (
        <div style={{fontSize:10, color:'#a0aec0', marginTop:6}}>
          Lecture : {stockData.filename} · colonne « {col==='debut' ? 'Stock début' : 'Stock fin'} »
          {col==='debut' && stockData.hasStockDebut === false && <span style={{color:'#9B2C2C'}}> — ⚠️ colonne absente</span>}
          {' · PCB : '}
          {stockData.pcbFound
            ? <span style={{color:'#2d6a2d'}}>colonne « {stockData.pcbColumn} »</span>
            : <span style={{color:'#9B2C2C'}}>⚠️ aucune colonne CDT/PCB/Conditionnement trouvée dans le stock</span>}
        </div>
      )}
    </div>
  );
}

function App() {
  const [apiUrl, setApiUrl] = useState(DEFAULT_APPS_SCRIPT_URL);
  const [configExpanded, setConfigExpanded] = useState(!DEFAULT_APPS_SCRIPT_URL); // ouvert si pas d'URL
  const [data, setData] = useState(null);
  const [learnings, setLearnings] = useState({ entries: [] });
  const [loading, setLoading] = useState(false);
  const [refreshing, setRefreshing] = useState(false);
  const [error, setError] = useState('');
  const [step, setStep] = useState(0);
  const [supplier, setSupplier] = useState(null);
  const [productAnalyses, setProductAnalyses] = useState(null);
  const [selectedScenario, setSelectedScenario] = useState({});
  const [overrides, setOverrides] = useState({});
  const [context, setContext] = useState('');
  const [finalLines, setFinalLines] = useState(null);

  // Choix de la source stock : which = last|prev, col = fin|debut
  const [stockFile, setStockFile] = useState(() => {
    try {
      const s = localStorage.getItem('kbg_stockfile_v1');
      if (s) return JSON.parse(s);
    } catch (_) {}
    return { which: 'last', col: 'fin' };
  });
  useEffect(() => {
    try { localStorage.setItem('kbg_stockfile_v1', JSON.stringify(stockFile)); } catch (_) {}
  }, [stockFile]);

  const dataStatus = useMemo(() => {
    if (!data) return { Cadencier: 'load', Stats: 'load', Produits: 'load', Stock: 'load' };
    return {
      Cadencier: data.cadencier?.length > 0 ? 'ok' : 'err',
      Stats: data.statsVentes?.products?.length > 0 ? 'ok' : 'err',
      Produits: data.products?.products?.length > 0 ? 'ok' : 'err',
      Stock: data.stock?.rows?.length > 0 ? 'ok' : 'err',
    };
  }, [data]);

  const [lastLoadMs, setLastLoadMs] = useState(null);
  const [cacheAge, setCacheAge] = useState(null);

  // Charger depuis localStorage AU DÉMARRAGE pour affichage instantané
  useEffect(() => {
    if (!apiUrl) return;
    try {
      const cached = localStorage.getItem('kbg_cache_data_v1');
      const cachedLearn = localStorage.getItem('kbg_cache_learnings_v1');
      const cachedTime = localStorage.getItem('kbg_cache_time_v1');
      if (cached) setData(JSON.parse(cached));
      if (cachedLearn) setLearnings(JSON.parse(cachedLearn));
      if (cachedTime) {
        const age = Date.now() - parseInt(cachedTime, 10);
        setCacheAge(age);
      }
    } catch (_) {}
  }, []);

  const loadAll = useCallback(async (silent) => {
    if (!apiUrl) return;
    if (silent) setRefreshing(true); else setLoading(true);
    setError('');
    const startTime = Date.now();
    try {
      const [init, learn] = await Promise.all([
        callApi(apiUrl, 'init_light', { stockFile }),
        callApi(apiUrl, 'get_learnings').catch(() => ({ entries: [] })),
      ]);
      if (init.error) throw new Error(init.error);
      const duration = Date.now() - startTime;
      setLastLoadMs(duration);
      setCacheAge(0);
      // Log timing dans la console pour debug
      console.log(`[Kelbongoo] Chargement init_light en ${duration}ms`, 
        init._cached ? '(depuis cache Apps Script)' : '(calcul complet)',
        init._timings ? `· timings serveur: ${JSON.stringify(init._timings)}` : '');
      setData(init);
      setLearnings(learn);
      try {
        localStorage.setItem('kbg_cache_data_v1', JSON.stringify(init));
        localStorage.setItem('kbg_cache_learnings_v1', JSON.stringify(learn));
        localStorage.setItem('kbg_cache_time_v1', String(Date.now()));
      } catch (_) {}
    } catch (e) {
      if (!silent) setError(`Chargement impossible : ${e.message}`);
    }
    setLoading(false);
    setRefreshing(false);
  }, [apiUrl, stockFile]);

  // Au premier render : si on a du cache, ne pas mettre loading=true mais rafraîchir en background
  useEffect(() => { 
    if (!apiUrl) return;
    const hasCache = localStorage.getItem('kbg_cache_data_v1');
    if (hasCache) {
      loadAll(true); // silent refresh
    } else {
      loadAll(false); // full loading
    }
  }, [apiUrl]);

  // Recharger quand la source stock change (sélecteur)
  const firstStockRef = useRef(true);
  useEffect(() => {
    if (firstStockRef.current) { firstStockRef.current = false; return; }
    if (!apiUrl) return;
    loadAll(false);
  }, [stockFile]);

  const reset = () => {
    setStep(0); setSupplier(null); setProductAnalyses(null);
    setSelectedScenario({}); setOverrides({}); setFinalLines(null); setContext('');
  };

  return (
    <div className="container">
      <Header step={step} dataStatus={dataStatus} stockDate={data?.stock?.date}/>
      <ConfigPanel apiUrl={apiUrl} setApiUrl={setApiUrl} onReload={loadAll} 
        expanded={configExpanded} setExpanded={setConfigExpanded}/>
      <BdcAlertBanner bdcCheck={data?.bdcCheck}/>
      <StockSourceSelector stockFile={stockFile} setStockFile={setStockFile} stockData={data?.stock}/>
      {refreshing && (
        <div style={{fontSize:11,color:'#718096',textAlign:'center',marginBottom:8}}>
          <span className="loader" style={{width:10,height:10}}/> Actualisation en arrière-plan...
        </div>
      )}
      {loading && !data && <div className="card"><span className="loader"/> Chargement des données depuis le Drive (peut prendre 15-30s)...</div>}
      {error && <div className="card"><div className="alert alert-error">{error}</div>
        <button className="btn" onClick={() => loadAll(false)}>Réessayer</button>
      </div>}
      {data && (
        <>
          {step === 0 && (
            <StepDashboard 
              apiUrl={apiUrl} data={data}
              onSelectSupplier={(s) => { setSupplier(s); setStep(2); }}
              onSkipToList={() => setStep(1)}
              onRefresh={() => loadAll(false)}
            />
          )}
          {step === 1 && (
            <StepSupplier data={data} 
              onSelect={(s) => { setSupplier(s); setStep(2); }}
              onBack={() => setStep(0)}/>
          )}
          {step === 2 && supplier && (
            <StepPrediction supplier={supplier} data={data} learnings={learnings} apiUrl={apiUrl}
              onValidate={(pa, sel, ovr, ctx) => {
                setProductAnalyses(pa); setSelectedScenario(sel); setOverrides(ovr);
                setContext(ctx); setStep(3);
              }}
              onBack={() => setStep(1)}/>
          )}
          {step === 3 && productAnalyses && (
            <StepValidate supplier={supplier} productAnalyses={productAnalyses}
              selectedScenario={selectedScenario} overrides={overrides} context={context}
              onConfirm={(lines) => { setFinalLines(lines); setStep(4); }}
              onBack={() => setStep(2)}/>
          )}
          {step === 4 && finalLines && (
            <StepExport apiUrl={apiUrl} supplier={supplier} lines={finalLines} context={context}
              onBack={() => setStep(3)} onReset={reset}/>
          )}
        </>
      )}
      <div style={{textAlign:'center',marginTop:20,color:'#a0aec0',fontSize:11}}>
        Kelbongoo Commandes v12 · {data?.stock?.date && `Stock du ${data.stock.date}`} · 
        {learnings?.entries?.length || 0} validations en apprentissage
        {lastLoadMs !== null && (
          <span> · Dernier chargement : <strong>{(lastLoadMs / 1000).toFixed(1)}s</strong>
            {data?._cached && ' (cache serveur)'}
            {data?._timings && data._timings.from_cache && ' (cache serveur)'}
          </span>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
