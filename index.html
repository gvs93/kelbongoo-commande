      // Validation : écrit dans le Sheet (via proxy) + fige un instantané daté
      const validate = async () => {
        if (!items) return;
        const payloadItems = items.map(it => {
          const c = counts[it.key] || {};
          return { producer: it.producer, produit: it.produit, colis: c.colis || 0, mu: c.mu || 0 };
        });
        if (!confirm(`Valider l'inventaire FL du ${invDate} ?\n\nLes quantités seront écrites dans le Sheet (onglet S10) et l'inventaire sera archivé.`)) return;
        setValidating(true);
        try {
          const data = await freshdeskPost({ secret: FRESHDESK_SECRET, action: 'fl_write', items: payloadItems });
          if (!data.ok) { showToast('Erreur écriture Sheet : ' + (data.error || 'inconnue')); setValidating(false); return; }
          // Instantané daté (consultable en master)
          const meta = {
            date: invDate, validatedBy: session.name, validatedAt: new Date().toISOString(),
            written: data.written || 0, notFound: (data.notFound || []).length,
            nbColis, nbMu, nbSaisis, total: items.length,
          };
          await storage.setDoc('fl_inventory_meta', invDate, meta, { replace: true });
          setLastValidated(meta);
          let msg = `✓ Inventaire validé : ${data.written} ligne(s) écrites dans le Sheet`;
          if (data.notFound && data.notFound.length) msg += ` · ${data.notFound.length} non trouvée(s)`;
          showToast(msg);
        } catch (e) {
          showToast('Erreur réseau : ' + e.message);
        } finally {
          setValidating(false);
        }
      };

      if (loading) return <div className="card"><p style={{fontSize:13,color:'var(--ink-mute)'}}>Chargement de la liste FL depuis le Sheet…</p></div>;
      if (err) return (
        <div className="alert-warning">
          Impossible de charger l'onglet « {FL_SHEET_TAB} » : {err}<br/>
          <span style={{fontSize:12}}>Vérifie que le proxy Apps Script est déployé (accès « Tout le monde »), que l'action <code>fl_read</code> y est branchée, et que l'onglet s'appelle bien « {FL_SHEET_TAB} ».</span>
        </div>
      );
      if (!items || items.length === 0) return <div className="alert-warning">Aucune ligne fruits & légumes trouvée dans l'onglet « {FL_SHEET_TAB} » (lignes avec un COL numérique).</div>;

      const q = normalizeText(search);
      const filtered = q ? items.filter(it => normalizeText(it.producer + ' ' + it.produit).includes(q)) : items;
      const byProducer = {};
      for (const it of filtered) { (byProducer[it.producer] = byProducer[it.producer] || []).push(it); }
      const producersSorted = Object.keys(byProducer).sort((a,b)=>a.localeCompare(b,'fr'));

      const nbColis = items.reduce((t,it)=>t + ((counts[it.key]?.colis)||0), 0);
      const nbMu = items.reduce((t,it)=>t + ((counts[it.key]?.mu)||0), 0);
      const nbSaisis = items.filter(it => { const c = counts[it.key]; return c && (c.colis>0 || c.mu>0); }).length;

      return (
        <>
          <div className="stat-grid">
            <div className="stat"><div className="stat-value">{nbSaisis}/{items.length}</div><div className="stat-label">Produits saisis</div></div>
            <div className="stat"><div className="stat-value">{nbColis}</div><div className="stat-label">Colis (cagettes)</div></div>
            <div className="stat"><div className="stat-value">{nbMu}</div><div className="stat-label">Sachets µ</div></div>
          </div>

          <div className="card" style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Filtrer un produit ou producteur…"
              style={{flex:1,minWidth:160,fontSize:15,padding:'8px'}} />
            <button className="btn-secondary" style={{fontSize:13}} onClick={exportCSV}>⬇️ Exporter CSV</button>
            <button className="btn-primary" style={{fontSize:13}} disabled={validating} onClick={validate}>
              {validating ? 'Validation…' : '✅ Valider l\'inventaire'}
            </button>
          </div>

          {lastValidated && (
            <div className="alert-info" style={{borderLeft:'3px solid var(--ok, #2e7d32)',fontSize:13}}>
              ✓ Inventaire validé le {new Date(lastValidated.validatedAt).toLocaleString('fr-FR',{dateStyle:'short',timeStyle:'short'})} par {lastValidated.validatedBy} · {lastValidated.written} ligne(s) écrites dans le Sheet.
              {lastValidated.notFound > 0 && <span> ({lastValidated.notFound} produit(s) non trouvé(s) dans S10)</span>}
              <br/><span style={{fontSize:12,color:'var(--ink-mute)'}}>Tu peux re-saisir et re-valider : ça réécrit le Sheet.</span>
            </div>
          )}

          {producersSorted.map(prod => (
            <div key={prod} className="card">
              <h3 style={{marginBottom:8}}>{prod} · {byProducer[prod].length}</h3>
              <div style={{display:'flex',fontSize:11,color:'var(--ink-mute)',gap:8,padding:'0 4px 4px',justifyContent:'flex-end'}}>
                <span style={{width:70,textAlign:'center'}}>Colis</span>
                <span style={{width:70,textAlign:'center'}}>Sachets µ</span>
              </div>
              <div className="stack" style={{gap:4}}>
                {byProducer[prod].sort((a,b)=>a.produit.localeCompare(b.produit,'fr')).map(it => {
                  const c = counts[it.key] || {};
                  return (
                    <div key={it.key} style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,padding:'6px 4px',borderBottom:'1px solid var(--border)'}}>
                      <div style={{fontSize:13,minWidth:0,flex:1}}>
                        <div style={{fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{it.produit}</div>
                        {it.uv && <div style={{color:'var(--ink-mute)',fontSize:11}}>{it.uv}</div>}
                      </div>
                      <QtyInput value={c.colis ?? 0} onCommit={(v)=>setQty(it,'colis',v)}
                        style={{width:70,textAlign:'center',fontSize:15,padding:'6px'}} />
                      <QtyInput value={c.mu ?? 0} onCommit={(v)=>setQty(it,'mu',v)}
                        style={{width:70,textAlign:'center',fontSize:15,padding:'6px'}} />
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </>
      );
    }

    // PAGE INVENTAIRE (expérimental — saisie manuelle + scan qui apprend les EAN)
    // ============================================================
    function InventoryPage({ session }) {
      const showToast = React.useContext(ToastContext);
      const [products, setProducts] = React.useState([]);
      const [eanMap, setEanMap] = React.useState({});
      const [counts, setCounts] = React.useState({});
      const [search, setSearch] = React.useState('');
      const [scanMode, setScanMode] = React.useState(false);
      const [scanInput, setScanInput] = React.useState('');
      const [pendingEan, setPendingEan] = React.useState(null);
      const [scannedIds, setScannedIds] = React.useState([]); // produits touchés dans la session de scan (plus récent en tête)
      const [invDate, setInvDate] = React.useState(() => todayKey()); // date d'inventaire libre, par défaut aujourd'hui
      const [invType, setInvType] = React.useState('complet'); // 'complet' | 'tournant'
      const [scopeKind, setScopeKind] = React.useState('producer'); // 'producer' | 'type' | 'family'
      const [scopeValue, setScopeValue] = React.useState(''); // producteur / type / famille sélectionné
      const [showLearn, setShowLearn] = React.useState(false); // section apprentissage des codes (temps du test)
      const [learnPendingEan, setLearnPendingEan] = React.useState(null);
      const [learnSearch, setLearnSearch] = React.useState('');
      const [lastLearn, setLastLearn] = React.useState(null); // {ean, name, status:'known'|'new'}
      const [showHistory, setShowHistory] = React.useState(false); // historique réservé master

      React.useEffect(() => {
        (async () => {
          try {
            const data = await readCache('products');
            if (data) {
              const arr = Object.entries(data).map(([id, p]) => ({ id, ...p }));
              setProducts(arr);
            }
          } catch(e) {}
        })();
        const u1 = storage.subscribe('ean_mapping', (arr) => {
          const m = {}; for (const e of arr) { if (e.ean) m[e.ean] = e.productId; } setEanMap(m);
        });
        return () => { u1 && u1(); };
      }, []);

      // Abonnement aux comptages de la date choisie (se réabonne si on change de date)
      React.useEffect(() => {
        setCounts({});
        const u = storage.subscribe(`inventory_${invDate}`, (arr) => {
          const c = {}; for (const e of arr) { c[e.id] = e.qty; } setCounts(c);
        });
        return () => { u && u(); };
      }, [invDate]);

      // Charge le type / périmètre mémorisés pour cette date (partagé entre opérateurs)
      React.useEffect(() => {
        (async () => {
          try {
            const meta = await storage.getDoc('inventory_meta', invDate);
            if (meta) {
              setInvType(meta.type || 'complet');
              setScopeKind(meta.scopeKind || 'producer');
              setScopeValue(meta.scopeValue || '');
            } else {
              setInvType('complet'); setScopeValue('');
            }
          } catch(e){}
        })();
      }, [invDate]);

      const saveMeta = async (patch) => {
        try {
          await storage.setDoc('inventory_meta', invDate, {
            date: invDate, type: invType, scopeKind, scopeValue,
            updatedBy: session.name, updatedAt: new Date().toISOString(),
            ...patch,
          }, { replace: true });
        } catch(e){}
      };

      const producers = React.useMemo(() => {
        const s = new Set(); for (const p of products) if (p.producer) s.add(p.producer);
        return [...s].sort((a,b)=>a.localeCompare(b,'fr'));
      }, [products]);

      const families = React.useMemo(() => {
        const s = new Set(); for (const p of products) if (p.category) s.add(p.category);
        return [...s].sort((a,b)=>a.localeCompare(b,'fr'));
      }, [products]);
      const hasFamilies = families.length > 0;

      const TYPE_LABELS = { frais: '🧊 Frais', pain: '🍞 Pain', nd: '🥬 Non-dispatch' };

      const inScope = React.useCallback((p) => {
        if (invType !== 'tournant' || !scopeValue) return true;
        if (scopeKind === 'producer') return p.producer === scopeValue;
        if (scopeKind === 'type') return DISPATCH_TYPE[p.dispatchType] === scopeValue;
        if (scopeKind === 'family') return p.category === scopeValue;
        return true;
      }, [invType, scopeKind, scopeValue]);

      const scopeProducts = React.useMemo(() => {
        if (invType !== 'tournant' || !scopeValue) return [];
        return products.filter(inScope);
      }, [products, inScope, invType, scopeValue]);

      const prodById = React.useMemo(() => {
        const m = {}; for (const p of products) m[p.id] = p; return m;
      }, [products]);

      const setCount = async (productId, qty) => {
        const q = Math.max(0, parseInt(qty,10) || 0);
        await storage.setDoc(`inventory_${invDate}`, productId, {
          id: productId, qty: q,
          produit: prodById[productId]?.name || '',
          countedBy: session.name, countedAt: new Date().toISOString(),
        });
        // Indexe la date (fusion : ne touche pas au type/périmètre éventuellement déjà posés)
        try {
          await storage.setDoc('inventory_meta', invDate, {
            date: invDate, type: invType, scopeKind, scopeValue,
            lastBy: session.name, lastAt: new Date().toISOString(),
          });
        } catch(e){}
      };

      const matches = React.useMemo(() => {
        const base = (invType === 'tournant') ? scopeProducts : products;
        const q = normalizeText(search);
        if (!q) return (invType === 'tournant') ? base.slice(0, 300) : [];
        return base.filter(p => normalizeText(p.name + ' ' + (p.producer||'')).includes(q)).slice(0, 50);
      }, [search, products, invType, scopeProducts]);

      // Pour associer un code inconnu : on cherche dans TOUT le catalogue (pas seulement le périmètre)
      const assocMatches = React.useMemo(() => {
        const q = normalizeText(search);
        if (!q) return [];
        return products.filter(p => normalizeText(p.name + ' ' + (p.producer||'')).includes(q)).slice(0, 30);
      }, [search, products]);

      const bumpScanned = (pid) => setScannedIds(prev => [pid, ...prev.filter(x => x !== pid)]);

      const handleScan = (ean) => {
        ean = (ean||'').trim();
        if (!ean) return;
        let pid = eanMap[ean];
        if (!pid) {
          const p = products.find(x => String(x.barcode||'').trim() === ean);
          if (p) pid = p.id;
        }
        if (pid) {
          const next = (counts[pid]||0) + 1;
          setCount(pid, next);
          bumpScanned(pid);
          const outScope = (invType === 'tournant' && scopeValue && !inScope(prodById[pid] || {}));
          showToast(`+1 → ${next} · ${prodById[pid]?.name || ''}${outScope ? ' (hors périmètre)' : ''}`);
        } else {
          setPendingEan(ean);
          showToast('Code inconnu — associe-le à un produit');
        }
        setScanInput('');
      };

      const learnEan = async (productId) => {
        if (!pendingEan) return;
        await storage.setDoc('ean_mapping', pendingEan, { ean: pendingEan, productId, learnedBy: session.name, learnedAt: new Date().toISOString() });
        await setCount(productId, (counts[productId]||0) + 1);
        bumpScanned(productId);
        showToast(`✓ ${pendingEan} associé`);
        setPendingEan(null);
        setSearch('');
      };

      // --- Apprentissage seul : associe les codes sans rien compter ---
      const handleLearnScan = (ean) => {
        ean = (ean||'').trim();
        if (!ean) return;
        let pid = eanMap[ean];
        if (!pid) { const p = products.find(x => String(x.barcode||'').trim() === ean); if (p) pid = p.id; }
        if (pid) {
          setLastLearn({ ean, name: prodById[pid]?.name || '', status: 'known' });
          showToast(`Déjà appris → ${prodById[pid]?.name || ''}`);
        } else {
          setLearnPendingEan(ean);
          showToast('Code inconnu — associe-le');
        }
      };

      const learnAssoc = async (productId) => {
        if (!learnPendingEan) return;
        await storage.setDoc('ean_mapping', learnPendingEan, { ean: learnPendingEan, productId, learnedBy: session.name, learnedAt: new Date().toISOString() });
        setLastLearn({ ean: learnPendingEan, name: prodById[productId]?.name || '', status: 'new' });
        showToast(`✓ ${learnPendingEan} associé`);
        setLearnPendingEan(null);
        setLearnSearch('');
      };

      const learnMatches = React.useMemo(() => {
        const q = normalizeText(learnSearch);
        if (!q) return [];
        return products.filter(p => normalizeText(p.name + ' ' + (p.producer||'')).includes(q)).slice(0, 30);
      }, [learnSearch, products]);

      const counted = Object.keys(counts).filter(id => counts[id] > 0);
      const isTuesday = new Date().getDay() === 2;
      const scopeOk = invType !== 'tournant' || !!scopeValue;

      return (
        <div className="stack">
          <h1>📋 Inventaire</h1>
          <div className="alert-info" style={{borderLeft:'3px solid var(--info)'}}>
            🚧 <strong>Module en test (prochainement disponible).</strong> Utilisable pour s'entraîner. Le scan apprend les codes au fur et à mesure.
          </div>

          {products.length > 0 && (
            <div className="card" style={{borderLeft:'3px solid var(--info)'}}>
              <div onClick={()=>setShowLearn(s=>!s)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}}>
                <div style={{fontWeight:600}}>🏷️ Apprentissage des codes-barres <span style={{fontWeight:400,fontSize:12,color:'var(--ink-mute)'}}>({Object.keys(eanMap).length} appris)</span></div>
                <span style={{fontSize:13,color:'var(--info)'}}>{showLearn ? 'Masquer ▲' : 'Ouvrir ▼'}</span>
              </div>
              {showLearn && (
                <div style={{marginTop:10}}>
                  <p style={{fontSize:12,color:'var(--ink-soft)',marginTop:0}}>
                    Scanne tes produits pour leur apprendre les codes — <strong>sans rien compter</strong>. Une fois associé, le code est reconnu partout (et c'est mémorisé pour de bon).
                  </p>
                  <BarcodeScanner onDetected={handleLearnScan} />
                  <div style={{marginTop:10}}>
                    <div style={{fontSize:11,color:'var(--ink-mute)',marginBottom:4}}>ou tape / scanne le code à la main :</div>
                    <input
                      onKeyDown={e=>{ if(e.key==='Enter'){ handleLearnScan(e.target.value); e.target.value=''; } }}
                      placeholder="Code-barre puis Entrée…" style={{fontSize:16,padding:'10px',width:'100%'}} />
                  </div>
                  {lastLearn && (
                    <div style={{marginTop:8,fontSize:13,padding:'6px 8px',borderRadius:6,background: lastLearn.status==='new' ? 'var(--ok-soft, #e7f6ec)' : 'var(--bg2, #f3f3f3)'}}>
                      {lastLearn.status==='new' ? '✓ Associé' : 'ℹ️ Déjà connu'} : <strong>{lastLearn.ean}</strong> → {lastLearn.name}
                    </div>
                  )}
                  {learnPendingEan && (
                    <div style={{marginTop:10,padding:10,background:'var(--warn-soft)',borderRadius:8}}>
                      <div style={{fontSize:13,marginBottom:6}}>Code <strong>{learnPendingEan}</strong> inconnu. À quel produit l'associer ?</div>
                      <input value={learnSearch} onChange={e=>setLearnSearch(e.target.value)} placeholder="Chercher le produit…" style={{width:'100%',marginBottom:6}} />
                      <div className="stack" style={{gap:3,maxHeight:200,overflowY:'auto'}}>
                        {learnMatches.map(p => (
                          <div key={p.id} onClick={()=>learnAssoc(p.id)} style={{padding:'6px 8px',border:'1px solid var(--border)',borderRadius:6,cursor:'pointer',fontSize:13}}>
                            {p.name} <span style={{color:'var(--ink-mute)'}}>· {p.producer}</span>
                          </div>
                        ))}
                        {learnSearch.trim() && learnMatches.length===0 && <p style={{fontSize:13,color:'var(--ink-mute)'}}>Aucun produit trouvé.</p>}
                      </div>
                      <button className="btn-ghost" style={{marginTop:6,fontSize:12}} onClick={()=>setLearnPendingEan(null)}>Annuler</button>
                    </div>
                  )}
                </div>
              )}
            </div>
          )}

          {session.isMaster && (
            <div className="card">
              <div onClick={()=>setShowHistory(s=>!s)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}}>
                <div style={{fontWeight:600}}>📜 Historique <span style={{fontWeight:400,fontSize:12,color:'var(--ink-mute)'}}>(master)</span></div>
                <span style={{fontSize:13,color:'var(--info)'}}>{showHistory ? 'Masquer ▲' : 'Ouvrir ▼'}</span>
              </div>
              {showHistory && <InventoryHistory />}
            </div>
          )}
          {!isTuesday && <p style={{fontSize:12,color:'var(--ink-mute)',marginTop:-4}}>L'inventaire officiel est le mardi matin, mais tu peux en faire à n'importe quelle date.</p>}

          <div className="card" style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
            <label style={{fontSize:13,fontWeight:600}}>📅 Date d'inventaire</label>
            <input type="date" value={invDate} onChange={e=>setInvDate(e.target.value || todayKey())}
              style={{fontSize:15,padding:'6px 8px'}} />
            {invDate !== todayKey() && (
              <button className="btn-ghost" style={{fontSize:12}} onClick={()=>setInvDate(todayKey())}>Aujourd'hui</button>
            )}
            <span style={{fontSize:12,color:'var(--ink-mute)'}}>chaque date a son propre comptage</span>
          </div>

          <div className="card" style={{paddingBottom:10}}>
            <div className="filter-row" style={{marginBottom:scopeOk?8:0}}>
              <div className={`chip ${invType==='complet'?'selected':''}`}
                onClick={()=>{ setInvType('complet'); setScopeValue(''); saveMeta({type:'complet', scopeValue:''}); }}>
                📦 Inventaire complet
              </div>
              <div className={`chip ${invType==='tournant'?'selected':''}`}
                onClick={()=>{ setInvType('tournant'); saveMeta({type:'tournant'}); }}>
                🔄 Inventaire tournant
              </div>
              <div className={`chip ${invType==='fl'?'selected':''}`}
                onClick={()=>{ setInvType('fl'); saveMeta({type:'fl'}); }}>
                🥬 Fruits & Légumes (soir)
              </div>
            </div>
            {invType === 'complet' && (
              <div style={{fontSize:12,color:'var(--ink-mute)'}}>Tout le catalogue. À faire au moins 1×/semaine — sert de référence.</div>
            )}
            {invType === 'tournant' && (
              <div>
                <div className="filter-row" style={{marginBottom:6}}>
                  <div className={`chip ${scopeKind==='producer'?'selected':''}`}
                    onClick={()=>{ setScopeKind('producer'); setScopeValue(''); saveMeta({scopeKind:'producer', scopeValue:''}); }}>Par producteur</div>
                  <div className={`chip ${scopeKind==='type'?'selected':''}`}
                    onClick={()=>{ setScopeKind('type'); setScopeValue(''); saveMeta({scopeKind:'type', scopeValue:''}); }}>Par type</div>
                  {hasFamilies && (
                    <div className={`chip ${scopeKind==='family'?'selected':''}`}
                      onClick={()=>{ setScopeKind('family'); setScopeValue(''); saveMeta({scopeKind:'family', scopeValue:''}); }}>Par famille</div>
                  )}
                </div>
                {scopeKind === 'producer' && (
                  <select value={scopeValue} onChange={e=>{ setScopeValue(e.target.value); saveMeta({scopeValue:e.target.value}); }}
                    style={{width:'100%',fontSize:15,padding:'8px'}}>
                    <option value="">— Choisir un producteur ({producers.length}) —</option>
                    {producers.map(pr => <option key={pr} value={pr}>{pr}</option>)}
                  </select>
                )}
                {scopeKind === 'type' && (
                  <div className="filter-row" style={{marginBottom:0}}>
                    {['frais','pain','nd'].map(t => (
                      <div key={t} className={`chip ${scopeValue===t?'selected':''}`}
                        onClick={()=>{ setScopeValue(t); saveMeta({scopeValue:t}); }}>{TYPE_LABELS[t]}</div>
                    ))}
                  </div>
                )}
                {scopeKind === 'family' && hasFamilies && (
                  <select value={scopeValue} onChange={e=>{ setScopeValue(e.target.value); saveMeta({scopeValue:e.target.value}); }}
                    style={{width:'100%',fontSize:15,padding:'8px'}}>
                    <option value="">— Choisir une famille ({families.length}) —</option>
                    {families.map(f => <option key={f} value={f}>{f}</option>)}
                  </select>
                )}
                {!scopeOk && <div style={{fontSize:12,color:'var(--warn)',marginTop:6}}>Choisis un {scopeKind==='producer'?'producteur':scopeKind==='family'?'famille':'type'} pour démarrer le comptage.</div>}
                {scopeOk && <div style={{fontSize:12,color:'var(--ink-mute)',marginTop:6}}>{scopeProducts.length} produit(s) dans ce périmètre.</div>}
              </div>
            )}
            {invType === 'fl' && (
              <div style={{fontSize:12,color:'var(--ink-mute)'}}>Inventaire du soir des fruits & légumes pour la commande Rungis. Deux quantités par produit : cagettes (colis) et sachets préparés (µ). Liste chargée depuis le Google Sheet (onglet S10).</div>
            )}
          </div>

          {invType === 'fl' ? (
            <FLInventoryPage session={session} invDate={invDate} />
          ) : products.length === 0 ? (
            <div className="alert-warning">Aucun produit en mémoire. Charge d'abord le fichier produits dans Admin.</div>
          ) : (
          <>
          <div className="stat-grid">
            <div className="stat"><div className="stat-value">{counted.length}</div><div className="stat-label">Produits comptés</div></div>
            {invType === 'tournant'
              ? <div className="stat"><div className="stat-value">{scopeProducts.length}</div><div className="stat-label">Dans le périmètre</div></div>
              : <div className="stat"><div className="stat-value">{products.length}</div><div className="stat-label">Au catalogue</div></div>}

    // Bouton Freshdesk générique pour relancer un client non récupéré (récap master)
    function FreshdeskRecupButton({ client, mode }) {
      const showToast = React.useContext(ToastContext);
      const [busy, setBusy] = React.useState(false);
      const [sent, setSent] = React.useState(false);
      const email = client.email || client.clientEmail;
      const isOubli = mode === 'oubli';

      const handleSend = async () => {
        if (!FRESHDESK_PROXY_URL || FRESHDESK_PROXY_URL.includes('TON_')) { showToast('Proxy Freshdesk non configuré'); return; }
        if (!email) { showToast('Pas d\'email pour ce client'); return; }
        const who = client.consumer_name || client.clientName || email;
        if (!confirm(`Envoyer un mail de relance à ${who} ?`)) return;
        setBusy(true);
        try {
          const payload = {
            secret: FRESHDESK_SECRET,
            clients: [{
              email,
              name: client.consumer_name || client.clientName || '',
              subject: isOubli ? 'Article oublié dans votre casier Kelbongoo' : 'Votre commande Kelbongoo à récupérer',
              body: isOubli
                ? `Bonjour ${client.clientName || client.consumer_name || ''},\n\nVous avez oublié un article dans votre casier lors de la distribution sur le point ${client.site} :\n- ${client.productLabel || 'article'}\n\nMerci de venir le récupérer dans les prochains jours. Sans nouvelles de votre part sous 3 jours, l'article sera retourné à l'entrepôt.\n\nÀ bientôt,\nL'équipe Kelbongoo`
                : `Bonjour ${client.consumer_name || client.clientName || ''},\n\nVotre commande Kelbongoo n'a pas encore été récupérée sur le point ${client.site}. Vous pouvez venir la chercher dès la prochaine distribution, ou nous recontacter.\n\nÀ bientôt,\nL'équipe Kelbongoo`,
              tag: isOubli ? 'oubli-casier' : 'non-recupere',
            }],
          };
          const data = await freshdeskPost(payload);
          if (data.ok && (data.success > 0 || data.success === undefined)) {
            setSent(true);
            showToast('✓ Ticket Freshdesk créé + mail envoyé');
          } else {
            showToast('Erreur : ' + (data.error || (data.results && data.results[0]?.error) || 'inconnue'));
          }
        } catch (err) { showToast('Erreur réseau : ' + err.message); }
        finally { setBusy(false); }
      };

      if (!email) return null;
      return (
        <button className="btn-secondary" style={{padding:'6px 10px',fontSize:12}} disabled={busy} onClick={handleSend}>
          {busy ? 'Envoi…' : sent ? '🎫 Mail envoyé ✓' : '🎫 Relancer par mail (Freshdesk)'}
        </button>
      );
    }

    function MasterRecapPage({ session, consumersByEmail }) {
      const showToast = React.useContext(ToastContext);

      const [forgottens, setForgottens] = React.useState([]);

      const [section, setSection] = React.useState('followups'); // followups | consignes | oublis

      React.useEffect(() => {
        const u1 = storage.subscribe('consignes', setConsignes);
        const u2 = storage.subscribe('followups', setFollowups);
        const u3 = storage.subscribe('forgotten_items', setForgottens);
        return () => { u1 && u1(); u2 && u2(); u3 && u3(); };
      }, []);

      const phoneOf = (email, fallback) => {
        if (fallback) return fallback;
        const c = consumersByEmail && email ? consumersByEmail[email.toLowerCase()] : null;
        return c?.telephone || '';
      };

      // --- Suivi clients à contacter (non récupérés), non résolus ---
      const followOpen = followups
        .filter(f => f.status !== 'resolved')
        .map(f => ({ ...f, phone: phoneOf(f.email, f.phone) }))
        // Les clients "demander à Henry" remontent en tête
        .sort((a, b) => (b.escalated ? 1 : 0) - (a.escalated ? 1 : 0));

      // --- Consignes non créditées ---
      const consigneOpen = consignes.filter(c => c.status !== 'credited');

      // --- Oublis casier actifs ---
      const oublisOpen = forgottens
        .filter(f => f.status !== 'done' && f.status !== 'returned' && f.status !== 'picked_up')
        .map(f => ({ ...f, phone: phoneOf(f.clientEmail, f.clientPhone) }));

      const applyFilter = (arr) => siteFilter === 'TOUS' ? arr : arr.filter(x => x.site === siteFilter);
      const fFollow = applyFilter(followOpen);
      const fConsigne = applyFilter(consigneOpen);
      const fOublis = applyFilter(oublisOpen);

      // Locaux présents dans les données
      const sitesPresent = [...new Set([
        ...followOpen.map(x => x.site),
        ...consigneOpen.map(x => x.site),
        ...oublisOpen.map(x => x.site),
      ].filter(Boolean))].sort();

      // Groupage par local
      const groupBySite = (arr) => {
        const g = {};
        for (const x of arr) { const s = x.site || '?'; (g[s] = g[s] || []).push(x); }
        return g;
      };

      const setFollowStatus = async (f, newStatus) => {
        await storage.setDoc('followups', f.id || f.orderId, { ...f, status: newStatus, updatedBy: session.name, updatedAt: new Date().toISOString() });
        showToast(`Statut : ${newStatus}`);
      };
      const setConsigneStatus = async (c, newStatus) => {
        await storage.setDoc('consignes', c.id, { ...c, status: newStatus, updatedBy: session.name, updatedAt: new Date().toISOString() });
        showToast('Mis à jour');
      };
      const setOubliDone = async (f) => {
        await storage.setDoc('forgotten_items', f.id, { ...f, status: 'done', updatedBy: session.name, updatedAt: new Date().toISOString() });
        showToast('✓ Traité');
      };

      const PhoneOrEmail = ({ phone, email }) => (
        phone && phone.replace(/\D/g,'').length >= 9
          ? <a href={`tel:${phone}`} style={{color:'var(--accent-dark)',fontWeight:600}}>📞 {phone}</a>
          : <span style={{color:'var(--warn)'}}>✉️ {email || 'pas de contact'}</span>
      );

      return (
        <div className="stack">
          <h1>📋 Récap master — tous locaux</h1>
          <p style={{color:'var(--ink-soft)',fontSize:13,marginTop:-8}}>
            Vue globale pour traiter sans changer de local : clients à rappeler, consignes en attente, oublis casier.
          </p>

          {/* Filtre local */}
          <div className="row" style={{flexWrap:'wrap',gap:8}}>
            <label style={{fontSize:13,fontWeight:600}}>Local :</label>
            <select value={siteFilter} onChange={e => setSiteFilter(e.target.value)} style={{width:'auto',fontSize:13,padding:'6px 10px'}}>
              <option value="TOUS">Tous les locaux</option>
              {sitesPresent.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
          </div>

          {/* Onglets de section avec compteurs */}
          <div className="filter-row" style={{marginBottom:0}}>
            <div className={`chip ${section==='followups'?'selected':''}`} onClick={()=>setSection('followups')}>
              📞 À contacter <span className="badge badge-anom" style={{marginLeft:6,padding:'1px 6px',fontSize:10}}>{fFollow.length}</span>
            </div>
            <div className={`chip ${section==='consignes'?'selected':''}`} onClick={()=>setSection('consignes')}>
              🍯 Consignes <span className="badge badge-info" style={{marginLeft:6,padding:'1px 6px',fontSize:10}}>{fConsigne.length}</span>
            </div>
            <div className={`chip ${section==='oublis'?'selected':''}`} onClick={()=>setSection('oublis')}>
              📦 Oublis <span className="badge badge-info" style={{marginLeft:6,padding:'1px 6px',fontSize:10}}>{fOublis.length}</span>
            </div>
          </div>

          {/* ----- SECTION : clients à contacter ----- */}
          {section === 'followups' && (
            fFollow.length === 0 ? <div className="empty-state"><div className="icon">✓</div><p>Aucun client à contacter.</p></div> :
            Object.entries(groupBySite(fFollow)).sort((a,b)=>a[0].localeCompare(b[0])).map(([s, items]) => (
              <div key={s} className="card">
                <h3 style={{marginBottom:8}}>{s} · {items.length} client{items.length>1?'s':''}</h3>

                    <div key={f.orderId} className="list-item" style={{flexDirection:'column',alignItems:'stretch',...(f.escalated?{borderLeft:'3px solid var(--warn)'}:{})}}>

                          <div className="list-item-name">{f.escalated && '🙋 '}{f.consumer_name || '(client)'}</div>
                          <div className="list-item-sub"><PhoneOrEmail phone={f.phone} email={f.email} /></div>

                        {f.status && f.status !== 'pending' && <span className="badge badge-info">{f.status}</span>}

                      <div style={{display:'flex',gap:6,marginTop:8,flexWrap:'wrap'}}>
                        <button className="btn-secondary" style={{padding:'6px 10px',fontSize:12}} onClick={()=>setFollowStatus(f,'called')}>Contacté</button>
                        <button className="btn-secondary" style={{padding:'6px 10px',fontSize:12}} onClick={()=>setFollowStatus(f,'no_answer')}>No answer</button>
                        <FreshdeskRecupButton client={f} />
                        <button className="btn-primary" style={{padding:'6px 10px',fontSize:12}} onClick={()=>setFollowStatus(f,'resolved')}>✓ Résolu</button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ))

          {/* ----- SECTION : consignes ----- */}
          {section === 'consignes' && (
            fConsigne.length === 0 ? <div className="empty-state"><div className="icon">🍯</div><p>Aucune consigne en attente.</p></div> :
            Object.entries(groupBySite(fConsigne)).sort((a,b)=>a[0].localeCompare(b[0])).map(([s, items]) => (
              <div key={s} className="card">
                <h3 style={{marginBottom:8}}>{s} · {items.reduce((t,c)=>t+(c.nbPots||0),0)} pot(s)</h3>

                  {items.map(c => (
                    <div key={c.id} className="list-item" style={{flexDirection:'column',alignItems:'stretch'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
                        <div className="list-item-main">
                          <div className="list-item-name">{c.consumerName || c.consumer_name || '(client)'} · {c.nbPots||0} pot(s)</div>
                          <div className="list-item-sub">{c.note ? `« ${c.note} »` : (c.day || '')}</div>
                        </div>
                        {c.status && <span className="badge badge-info">{c.status}</span>}
                      </div>
                      <div style={{display:'flex',gap:6,marginTop:8,flexWrap:'wrap'}}>
                        <button className="btn-primary" style={{padding:'6px 10px',fontSize:12}} onClick={()=>setConsigneStatus(c,'credited')}>✓ Crédité</button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ))
          )}

          {/* ----- SECTION : oublis casier ----- */}
          {section === 'oublis' && (
            fOublis.length === 0 ? <div className="empty-state"><div className="icon">📦</div><p>Aucun oubli en cours.</p></div> :
            Object.entries(groupBySite(fOublis)).sort((a,b)=>a[0].localeCompare(b[0])).map(([s, items]) => (
              <div key={s} className="card">
                <h3 style={{marginBottom:8}}>{s} · {items.length} oubli{items.length>1?'s':''}</h3>

    function ClosurePage({ session, currentSite, orders, consumersByEmail, isClosed, onReopen }) {
      const showToast = React.useContext(ToastContext);
      const [statuses, setStatuses] = React.useState([]);
      const [confirming, setConfirming] = React.useState(false);
      const [closing, setClosing] = React.useState(false);
      const [progress, setProgress] = React.useState({ done: 0, total: 0 });
      const [reopenPwd, setReopenPwd] = React.useState('');
      const [askReopen, setAskReopen] = React.useState(false);
      // Distributions passées non clôturées sur ce site (master seulement)
      const [pastUnclosed, setPastUnclosed] = React.useState([]);

      React.useEffect(() => {
        const unsub = storage.subscribe(`day_${activeDay()}_statuses`, setStatuses);
        return unsub;
      }, []);

      // Master : détecter les jours passés avec commandes mais sans clôture pour ce site
      React.useEffect(() => {
        if (!session.isMaster) return;
        // On regarde les 14 derniers jours
        const checkPast = async () => {
          const out = [];
          for (let i = 1; i <= 14; i++) {
            const day = addDays(activeDay(), -i);
            try {
              const ordersDay = await storage.getAll(`day_${day}_orders`);
              if (ordersDay.length === 0 || !ordersDay[0].orders) continue;
              const siteOrders = ordersDay[0].orders.filter(o => o.site === currentSite);
              if (siteOrders.length === 0) continue;
              // Y a-t-il une clôture pour ce site ce jour-là ?
              const closures = await storage.getAll(`day_${day}_closure`);
              const closed = closures.find(c => (c.site || c.id) === currentSite);
              if (!closed) {
                out.push({ day, orderCount: siteOrders.length });
              }
            } catch (e) { /* ignore */ }
          }
          setPastUnclosed(out);
        };
        checkPast();
      }, [session, currentSite]);

      const handleClosePastDay = async (day, orderCount) => {
        if (!confirm(`Clôturer la distribution du ${formatDateShort(day)} pour ${currentSite} ?\nLes clients non marqués passés iront dans le suivi non-récup.`)) return;
        try {
          const ordersDay = await storage.getAll(`day_${day}_orders`);
          const allOrdersOfDay = ordersDay[0]?.orders || [];
          const siteOrdersOfDay = allOrdersOfDay.filter(o => o.site === currentSite);
          const statusesDay = await storage.getAll(`day_${day}_statuses`);
          const statusMapDay = {};
          for (const s of statusesDay) statusMapDay[s.orderId] = s;
          const passedOfDay = siteOrdersOfDay.filter(o => statusMapDay[o.orderId]?.passed);
          const notPassedOfDay = siteOrdersOfDay.filter(o => !statusMapDay[o.orderId]?.passed);
          for (const o of notPassedOfDay) {
            const cached = consumersByEmail && consumersByEmail[o.email];
            await storage.setDoc('followups', o.orderId, {
              orderId: o.orderId, site: currentSite,
              consumer_name: displayName(o),
              clientName: displayName(o),
              email: o.email,
              phone: cached?.telephone || o.telephone || '',
              hasPhone: !!(cached?.telephone || o.telephone),
              day, distribDate: day,
              status: 'pending',
              createdBy: session.name,
              createdAt: new Date().toISOString(),
            });
          }
          await storage.setDoc(`day_${day}_closure`, currentSite, {
            site: currentSite, closedBy: session.name,
            closedAt: new Date().toISOString(),
            notPassedCount: notPassedOfDay.length, passedCount: passedOfDay.length,
            lateClosure: true,
          });
          setPastUnclosed(curr => curr.filter(p => p.day !== day));
          showToast(`✓ Distribution du ${formatDateShort(day)} clôturée`);
        } catch (e) {
          showToast('Erreur : ' + e.message);
        }
      };

      const statusMap = React.useMemo(() => {
        const m = {}; for (const s of statuses) m[s.orderId] = s; return m;
      }, [statuses]);

      const visible = orders.filter(o => o.site === currentSite);
      const notPassed = visible.filter(o => !statusMap[o.orderId]?.passed);
      const passed = visible.filter(o => statusMap[o.orderId]?.passed);

      const handleCloseDay = async () => {
        setClosing(true);
        setProgress({ done: 0, total: notPassed.length });
        try {
          for (let i = 0; i < notPassed.length; i++) {
            const o = notPassed[i];
            const cached = consumersByEmail && consumersByEmail[o.email];
            await storage.setDoc('followups', o.orderId, {
              orderId: o.orderId, site: currentSite,
              consumer_name: displayName(o),
              clientName: displayName(o),
              email: o.email,
              phone: cached?.telephone || o.telephone || '',
              hasPhone: !!(cached?.telephone || o.telephone),
              day: activeDay(),
              distribDate: activeDay(),
              status: 'pending',
              createdBy: session.name,
              createdAt: new Date().toISOString(),
            });
            setProgress({ done: i + 1, total: notPassed.length });
          }
          await storage.setDoc(`day_${activeDay()}_closure`, currentSite, {
            site: currentSite, closedBy: session.name,
            closedAt: new Date().toISOString(),
            notPassedCount: notPassed.length, passedCount: passed.length,
          });
          setConfirming(false);
          showToast(`✓ Journée clôturée pour ${currentSite}`);
        } catch (e) { showToast('Erreur : ' + e.message); }
        finally { setClosing(false); }
      };

      const handleReopen = async () => {
        if (reopenPwd !== MASTER_PASSWORD) { showToast('Mot de passe incorrect'); return; }
        await storage.deleteDoc(`day_${activeDay()}_closure`, currentSite);
        setAskReopen(false);
        setReopenPwd('');
        showToast('Journée ré-ouverte');
        onReopen && onReopen();
      };

      return (
        <div className="stack">
          <h1>Clôture · {currentSite}</h1>
          <p style={{color:'var(--ink-soft)',fontSize:13,marginTop:-8}}>
            Validation de fin de journée. Les non-passés iront dans le suivi.
          </p>

          {session.isMaster && pastUnclosed.length > 0 && (
            <div className="alert-red">
              <strong>⚠️ Distribution{pastUnclosed.length > 1 ? 's' : ''} précédente{pastUnclosed.length > 1 ? 's' : ''} non clôturée{pastUnclosed.length > 1 ? 's' : ''} sur {currentSite} :</strong>
              <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:6}}>
                {pastUnclosed.map(p => (
                  <div key={p.day} style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,background:'rgba(255,255,255,0.5)',padding:'8px 10px',borderRadius:6}}>
                    <span style={{fontSize:13}}>
                      <strong>{formatDateShort(p.day)}</strong> · {p.orderCount} commande{p.orderCount > 1 ? 's' : ''}
                    </span>
                    <button className="btn-primary" style={{padding:'4px 10px',fontSize:12}} onClick={() => handleClosePastDay(p.day, p.orderCount)}>
                      Clôturer
                    </button>
                  </div>
                ))}
              </div>
            </div>
          )}

          {isClosed ? (
            <>
              <div className="alert-info" style={{padding:14}}>
                🔒 <strong>Cette journée est déjà clôturée pour {currentSite}.</strong>
              </div>
              {session.isMaster && (
                !askReopen ? (
                  <button className="btn-secondary" onClick={() => setAskReopen(true)}>
                    🔓 Ré-ouvrir (master)
                  </button>
                ) : (
                  <div className="card">
                    <h3 style={{marginBottom:10}}>Confirmer ré-ouverture</h3>
                    <input type="password" value={reopenPwd} onChange={e => setReopenPwd(e.target.value)} placeholder="Mot de passe master" autoFocus />
                    <div className="row" style={{marginTop:10}}>
                      <button className="btn-secondary" onClick={() => { setAskReopen(false); setReopenPwd(''); }}>Annuler</button>
                      <button className="btn-warn" onClick={handleReopen}>Confirmer</button>
                    </div>
                  </div>
                )
              )}
            </>
          ) : (
            <>
              <div className="stat-grid">
                <div className="stat"><div className="stat-value">{visible.length}</div><div className="stat-label">Total</div></div>
                <div className="stat"><div className="stat-value" style={{color:'var(--accent)'}}>{passed.length}</div><div className="stat-label">Passés</div></div>
                <div className="stat"><div className="stat-value" style={{color:'var(--warn)'}}>{notPassed.length}</div><div className="stat-label">Non récup.</div></div>
              </div>

              {notPassed.length > 0 && (
                <div className="card">
                  <h3 style={{marginBottom:10}}>Clients non récupérés ({notPassed.length})</h3>
                  <div style={{maxHeight:200,overflowY:'auto'}}>
                    {notPassed.map(o => (
                      <div key={o.orderId} style={{padding:'6px 0',fontSize:13,borderBottom:'1px solid var(--line)'}}>
                        {displayName(o)} {o.hasPhone ? '📞' : '✉️'}
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {!confirming ? (
                <button className="btn-warn btn-lg btn-block" onClick={() => setConfirming(true)} disabled={visible.length === 0}>
                  🔒 Clôturer la journée
                </button>
              ) : (
                <div className="card" style={{background:'var(--warn-soft)',border:'1px solid var(--warn)'}}>
                  <h3 style={{color:'var(--warn)',marginBottom:8}}>⚠️ Confirmation</h3>
                  <p style={{fontSize:13,marginBottom:12,color:'var(--ink-soft)'}}>
                    {notPassed.length} non-passés vont être ajoutés au suivi pour relance.
                    <br/><br/>
                    <em>N'oublie pas de marquer aussi sur distributions.kelbongoo.com.</em>
                  </p>
                  {closing && (
                    <div style={{margin:'12px 0',fontSize:12,color:'var(--ink-soft)'}}>
                      Traitement : {progress.done} / {progress.total}
                    </div>
                  )}
                  <div className="row">
                    <button className="btn-secondary" onClick={() => setConfirming(false)} disabled={closing}>Annuler</button>
                    <button className="btn-warn" onClick={handleCloseDay} disabled={closing}>
                      {closing ? 'Clôture…' : 'Oui, clôturer'}
                    </button>
                  </div>
                </div>
              )}
            </>
          )}
        </div>
      );
    }

    // ============================================================
    // TABLEAU MANQUANTS — vue compacte, filtrable, scannable
    // ============================================================
    function ManquantsTable({ manquants, lmByManquant, onReason, onDispatch, onDelete }) {
      const [filter, setFilter] = React.useState('all'); // all | noreason | reason | dispatched
      const [q, setQ] = React.useState('');

      const reasonLabel = (id) => (PREP_REASONS.find(r => r.id === id) || {}).label || '';

      const enriched = manquants.map(m => ({
        ...m,
        isLM: lmByManquant.has(m.id),
        hasReason: !!m.reason,
      }));

      const counts = {
        all: enriched.length,
        noreason: enriched.filter(m => !m.hasReason && !m.isLM).length,
        reason: enriched.filter(m => m.hasReason && !m.isLM).length,
        dispatched: enriched.filter(m => m.isLM).length,
      };

      let rows = enriched;
      if (filter === 'noreason') rows = rows.filter(m => !m.hasReason && !m.isLM);
      else if (filter === 'reason') rows = rows.filter(m => m.hasReason && !m.isLM);
      else if (filter === 'dispatched') rows = rows.filter(m => m.isLM);
      if (q.trim()) {
        const nq = q.toLowerCase();
        rows = rows.filter(m => (m.produit||'').toLowerCase().includes(nq) || (m.producteur||'').toLowerCase().includes(nq));
      }
      // Tri : sans raison d'abord (à traiter), puis avec raison, puis dispatchés ; alpha à l'intérieur
      rows = [...rows].sort((a, b) => {
        const rank = (m) => m.isLM ? 2 : (m.hasReason ? 1 : 0);
        const d = rank(a) - rank(b);
        if (d !== 0) return d;
        return (a.produit||'').localeCompare(b.produit||'');
      });

      const Chip = ({ id, label, n, color }) => (
        <button onClick={() => setFilter(id)}
          style={{
            border:'none', cursor:'pointer', fontSize:12, fontWeight:600,
            padding:'5px 10px', borderRadius:999,
            background: filter===id ? (color||'var(--accent)') : 'var(--bg-muted)',
            color: filter===id ? '#fff' : 'var(--ink-soft)',
          }}>
          {label} {n}
        </button>
      );

      return (
        <div className="stack" style={{gap:10}}>
          {/* Synthèse cliquable = filtres */}
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            <Chip id="all" label="Tous" n={counts.all} color="var(--ink-soft)" />
            <Chip id="noreason" label="⚠️ Sans raison" n={counts.noreason} color="var(--warn)" />
            <Chip id="reason" label="✓ Avec raison" n={counts.reason} color="var(--accent)" />
            <Chip id="dispatched" label="🚚 Dispatchés" n={counts.dispatched} color="var(--info)" />
          </div>

          {counts.all > 6 && (
            <input type="text" placeholder="🔎 Filtrer un produit…" value={q} onChange={e => setQ(e.target.value)} style={{fontSize:13}} />
          )}

          {/* Tableau compact */}
          <div style={{border:'1px solid var(--line)',borderRadius:'var(--radius-sm)',overflow:'hidden'}}>
            {rows.length === 0 ? (
              <div style={{padding:16,textAlign:'center',color:'var(--ink-mute)',fontSize:13}}>Aucun produit dans ce filtre.</div>
            ) : rows.map((m, i) => (
              <div key={m.id} style={{
                display:'flex', alignItems:'center', gap:8, padding:'8px 10px',
                borderTop: i ? '1px solid var(--line)' : 'none',
                background: m.isLM ? 'var(--info-soft)' : (!m.hasReason ? 'var(--warn-soft)' : 'transparent'),
              }}>
                {/* Produit + manque */}
                <div style={{flex:'2 1 140px',minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:13,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                    {m.isLM ? '🚚 ' : ''}{m.produit}
                    {m.local ? <span className="badge" style={{marginLeft:6,fontSize:10,background:'var(--info-soft)',color:'var(--info,#1565c0)',padding:'1px 6px',borderRadius:4}}>📍 {m.local}</span> : null}
                  </div>
                  <div style={{fontSize:11,color:'var(--ink-mute)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                    {m.producteur} · <strong>−{m.manque}</strong>/{m.total}
                  </div>
                </div>
                {/* Raison (badge si renseignée, sinon select) */}
                <div style={{flex:'1 1 130px',minWidth:0}}>
                  {m.isLM ? (
                    <span className="badge badge-info" style={{fontSize:11}}>dispatché ↓</span>
                  ) : (
                    <select value={m.reason || ''} onChange={e => onReason(m, e.target.value)}
                      style={{fontSize:12,padding:'4px 6px',width:'100%',
                        borderColor: m.hasReason ? 'var(--line)' : 'var(--warn)'}}>
                      <option value="">— raison —</option>
                      {PREP_REASONS.map(r => <option key={r.id} value={r.id}>{r.label}</option>)}
                    </select>
                  )}
                </div>
                {/* Actions */}
                <div style={{flex:'0 0 auto',display:'flex',gap:4}}>
                  {!m.isLM && (
                    <button className="btn-secondary" onClick={() => onDispatch(m)} title="Produit arrivé → dispatcher"
                      style={{fontSize:12,padding:'5px 8px',whiteSpace:'nowrap'}}>🚚</button>
                  )}
                  <button className="btn-ghost" onClick={() => onDelete(m)} style={{fontSize:13,padding:'5px 6px'}}>🗑️</button>
                </div>
              </div>
            ))}
          </div>

          {/* Champ "préciser" pour les raisons = Autre */}
          {rows.some(m => m.reason === 'autre' && !m.isLM) && (
            <div className="stack" style={{gap:4}}>
              {rows.filter(m => m.reason === 'autre' && !m.isLM).map(m => (
                <div key={m.id} style={{display:'flex',alignItems:'center',gap:6,fontSize:12}}>
                  <span style={{color:'var(--ink-mute)',whiteSpace:'nowrap',maxWidth:120,overflow:'hidden',textOverflow:'ellipsis'}}>{m.produit} :</span>
                  <input type="text" placeholder="préciser la raison…" defaultValue={m.reasonNote||''}
                    onBlur={e => onReason(m, 'autre', e.target.value)} style={{flex:1,fontSize:12}} />
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ============================================================
    // PAGE PRÉPA — DISPATCH (uploads PDF + manquants + dispatch dernière minute)
    // ============================================================
    function PrepDispatchPage({ session }) {
      const showToast = React.useContext(ToastContext);

      // --- Date de distribution choisie (obligatoire) ---
      const [day, setDay] = React.useState(null); // dayKey choisie, null = pas encore choisi
      const today = todayKey();
      const nextDay = nextDistribDate(today);
      const dayAfter = nextDay ? nextDistribDate(addDays(nextDay, 1)) : null;

      // Locaux disponibles pour la date choisie
      const sitesForDay = day ? sitesForDate(day) : [];

      // --- Données du jour choisi (chargées localement à cette page) ---
      const [dispatchData, setDispatchData] = React.useState({});
      const [manquants, setManquants] = React.useState([]);
      const [lastmin, setLastmin] = React.useState([]);
      const [remises, setRemises] = React.useState([]);
      const [dayOrders, setDayOrders] = React.useState([]);

      React.useEffect(() => {
        if (!day) { setDispatchData({}); setManquants([]); setLastmin([]); setRemises([]); setDayOrders([]); return; }
        const u0 = storage.subscribe(`day_${day}_dispatch`, (arr) => {
          const map = {};
          for (const d of arr) {
            map[d.id] = {
              master: d.master ? safeJSON(d.master) : null,
              frais: d.frais ? safeJSON(d.frais) : null,
              sec: d.sec ? safeJSON(d.sec) : null,
              nd: d.nd ? safeJSON(d.nd) : null,
              meta: { uploadedBy: d.uploadedBy, uploadedAt: d.uploadedAt, parts: d.parts || [] },
            };
          }
          setDispatchData(map);
        });
        const u1 = storage.subscribe(`day_${day}_manquants`, setManquants);
        const u2 = storage.subscribe(`day_${day}_lastminute`, setLastmin);
        const u3 = storage.subscribe(`day_${day}_remises`, setRemises);
        const u4 = storage.subscribe(`day_${day}_orders`, (arr) => {
          const doc = (arr || []).find(x => x.id === 'data') || (arr || [])[0];
          setDayOrders(doc && doc.orders ? doc.orders : []);
        });
        return () => { u0(); u1(); u2(); u3(); u4(); };
      }, [day]);

      const setRemiseReason = async (r, reason) => {
        await storage.setDoc(`day_${day}_remises`, r.id, { ...r, reason });
      };

      // --- Uploads dispatch par site ---
      const [dispSite, setDispSite] = React.useState('');
      const [masterFile, setMasterFile] = React.useState(null);
      const [fraisFile, setFraisFile] = React.useState(null);
      const [secFile, setSecFile] = React.useState(null);
      const [ndFile, setNdFile] = React.useState(null);
      const [busy, setBusy] = React.useState(false);

      // Quand on choisit la date, pré-sélectionne un local valide
      React.useEffect(() => {
        if (day && sitesForDay.length && !sitesForDay.includes(dispSite)) {
          setDispSite(sitesForDay.includes(session.site) ? session.site : sitesForDay[0]);
        }
      }, [day]);

      // --- Manquants (global) ---
      const [manqFiles, setManqFiles] = React.useState([]); // plusieurs PDF d'un coup
      const [lmModal, setLmModal] = React.useState(null);    // manquant en cours de transformation
      const [showManual, setShowManual] = React.useState(false);
      const [manProduit, setManProduit] = React.useState('');
      const [manProducteur, setManProducteur] = React.useState('');
      const [manQty, setManQty] = React.useState('');
      const [manLocal, setManLocal] = React.useState(''); // '' = tous locaux, sinon ciblé

      const lmByManquant = React.useMemo(() => {
        return new Set(lastmin.map(l => l.manquantId));
      }, [lastmin]);

      const sitesLoaded = Object.keys(dispatchData || {});

      // ÉCRAN 1 : choix de la date (bloquant tant que pas choisi)
      if (!day) {
        return (
          <div className="stack">
            <h1>Manquants &amp; ND</h1>
            <div className="card">
              <h3 style={{marginBottom:6}}>Pour quelle distribution travailles-tu ?</h3>
              <p style={{fontSize:13,color:'var(--ink-soft)',marginBottom:14}}>
                Choisis le jour de distribution pour lequel tu charges les documents. Tu pourras en changer ensuite.
              </p>
              <div className="stack" style={{gap:8}}>
                {isDistribDay(today) && (
                  <button className="btn-primary btn-block" onClick={() => setDay(today)}>
                    Aujourd'hui — {dayLabelShort(today)}
                  </button>
                )}
                {nextDay && nextDay !== today && (
                  <button className={isDistribDay(today) ? 'btn-secondary btn-block' : 'btn-primary btn-block'} onClick={() => setDay(nextDay)}>
                    Prochaine distrib — {dayLabelShort(nextDay)}
                  </button>
                )}
                {dayAfter && dayAfter !== nextDay && (
                  <button className="btn-secondary btn-block" onClick={() => setDay(dayAfter)}>
                    Suivante — {dayLabelShort(dayAfter)}
                  </button>
                )}
                <div style={{marginTop:6}}>
                  <label style={{fontSize:12,fontWeight:600,display:'block',marginBottom:4}}>Ou une autre date</label>
                  <input type="date" value={today} min={today}
                    onChange={(e) => {
                      const v = e.target.value;
                      if (!v) return;
                      if (!isDistribDay(v)) { showToast('Pas de distribution ce jour-là'); return; }
                      setDay(v);
                    }} style={{fontSize:14}} />
                </div>
              </div>
            </div>
          </div>
        );
      }

      const handleUploadDispatch = async () => {
        if (!dispSite) { showToast('Choisis un local'); return; }
        if (!masterFile && !fraisFile && !secFile && !ndFile) { showToast('Ajoute au moins un PDF'); return; }
        if (!window.pdfjsLib) { showToast('PDF.js non chargé, recharge la page'); return; }
        setBusy(true);
        try {
          const buf = (f) => f.arrayBuffer();
          const payload = { uploadedBy: session.name, uploadedAt: new Date().toISOString() };
          const parts = [];
          if (masterFile) { const m = await parseMasterPDF(await buf(masterFile)); payload.master = JSON.stringify(m); parts.push(`Master (${Object.keys(m).length})`); }
          if (fraisFile) { const d = await parseDispatchPDF(await buf(fraisFile)); payload.frais = JSON.stringify(d); parts.push(`Frais (${d.products.length})`); }
          if (secFile) { const d = await parseDispatchPDF(await buf(secFile)); payload.sec = JSON.stringify(d); parts.push(`Sec (${d.products.length})`); }
          if (ndFile) { const n = await parseNDPDF(await buf(ndFile)); payload.nd = JSON.stringify(n); parts.push(`ND (${n.length})`); }
          payload.parts = parts;
          await storage.setDoc(`day_${day}_dispatch`, dispSite, payload);
          showToast(`✓ Dispatch ${dispSite} : ${parts.join(' · ')}`);
          setMasterFile(null); setFraisFile(null); setSecFile(null); setNdFile(null);
        } catch (e) { showToast('Erreur PDF : ' + e.message); }
        finally { setBusy(false); }
      };

      const handleUploadManquants = async () => {
        if (!manqFiles.length) { showToast('Choisis le(s) PDF des manquants'); return; }
        if (!window.pdfjsLib) { showToast('PDF.js non chargé'); return; }
        setBusy(true);
        try {
          // Plusieurs PDF (plusieurs pages du site) chargés d'un coup, cumulés.
          let count = 0;
          for (const f of manqFiles) {
            const items = await parseManquantsPDF(await f.arrayBuffer());
            for (const it of items) {
              const id = dispatchNorm(it.producteur + '|' + it.produit) || `m_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
              await storage.setDoc(`day_${day}_manquants`, id, {
                produit: it.produit, producteur: it.producteur, cond: it.cond,
                fini: it.fini, total: it.total, manque: it.manque,
                reason: '', reasonNote: '',
                status: 'rupture', // rupture par défaut
                uploadedBy: session.name, uploadedAt: new Date().toISOString(),
              });
              count++;
            }
          }
          showToast(`✓ ${count} manquants → ruptures (${manqFiles.length} PDF)`);
          setManqFiles([]);
        } catch (e) { showToast('Erreur PDF : ' + e.message); }
        finally { setBusy(false); }
      };

      // Ajout d'un manquant à la main (produit non présent dans le JSON), éventuellement ciblé sur un local
      const handleAddManual = async () => {
        if (!manProduit.trim()) { showToast('Indique le produit'); return; }
        const qty = parseInt(manQty, 10) || 0;
        setBusy(true);
        try {
          const idBase = dispatchNorm(manProducteur + '|' + manProduit) || `m_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
          const id = manLocal ? `${idBase}__${manLocal}` : idBase;
          await storage.setDoc(`day_${day}_manquants`, id, {
            produit: manProduit.trim(), producteur: manProducteur.trim(), cond: '',
            fini: 0, total: qty, manque: qty,
            reason: '', reasonNote: '',
            status: 'rupture', manuel: true,
            local: manLocal || null,
            uploadedBy: session.name, uploadedAt: new Date().toISOString(),
          });
          showToast(manLocal ? `✓ Manquant ajouté pour ${manLocal}` : '✓ Manquant ajouté');
          setManProduit(''); setManProducteur(''); setManQty(''); setManLocal(''); setShowManual(false);
        } catch (e) { showToast('Erreur : ' + e.message); }
        finally { setBusy(false); }
      };

      // Supprime le dispatch (Master/frais/sec/ND) d'un local
      const handleResetSite = async (site) => {
        if (!confirm(`Supprimer le dispatch chargé pour ${site} ?\n\nCela retire le Master, le dispatch frais, le sec et le ND de ce local. Les manquants et le dispatch dernière minute du jour ne sont PAS touchés.`)) return;
        setBusy(true);
        try {
          await storage.deleteDoc(`day_${day}_dispatch`, site);
          showToast(`✓ Dispatch ${site} supprimé`);
        } catch (e) { showToast('Erreur : ' + e.message); }
        finally { setBusy(false); }
      };

      // Reset complet du dispatch du jour (tous locaux + manquants + lastminute)
      const handleResetAll = async () => {
        if (!confirm(`⚠️ Tout réinitialiser pour la distribution du ${dayLabelShort(day)} ?\n\nCela supprime :\n• les dispatch de TOUS les locaux\n• la liste des manquants\n• les dispatch dernière minute\n\nLes commandes, statuts clients, anomalies qualité ne sont PAS touchés.`)) return;
        if (!confirm('Vraiment sûr ? Action irréversible.')) return;
        setBusy(true);
        try {
          await storage.deleteAll(`day_${day}_dispatch`);
          await storage.deleteAll(`day_${day}_manquants`);
          await storage.deleteAll(`day_${day}_lastminute`);
          showToast('✓ Dispatch du jour réinitialisé');
        } catch (e) { showToast('Erreur : ' + e.message); }
        finally { setBusy(false); }
      };

      const setReason = async (m, reason, note) => {
        await storage.setDoc(`day_${day}_manquants`, m.id, { ...m, reason, reasonNote: note ?? m.reasonNote ?? '' });
      };
      const deleteManquant = async (m) => {
        if (!confirm('Retirer ce manquant ?')) return;
        await storage.deleteDoc(`day_${day}_manquants`, m.id);
      };

      const withReason = manquants.filter(m => m.reason).length;

      return (
        <div className="stack">
          <h1>Manquants &amp; ND</h1>

          <div className="card-flat" style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,padding:'10px 14px',background:'var(--accent-soft)'}}>
            <div>
              <div style={{fontSize:12,color:'var(--ink-soft)'}}>Distribution du</div>
              <strong style={{fontSize:16,textTransform:'capitalize'}}>📅 {dayLabelShort(day)}</strong>
              <div style={{fontSize:11,color:'var(--ink-mute)',marginTop:2}}>Locaux ce jour : {sitesForDay.join(', ')}</div>
            </div>
            <button className="btn-secondary" onClick={() => { setDay(null); setMasterFile(null); setFraisFile(null); setSecFile(null); setNdFile(null); setManqFiles([]); }} style={{fontSize:13,whiteSpace:'nowrap'}}>
              Changer
            </button>
          </div>

          {/* ============ RÉCAP — CE QUI RESTE À TRAITER ============ */}
          {(() => {
            const mNoReason = manquants.filter(m => !m.reason && !lmByManquant.has(m.id)).length;
            const rNoReason = remises.filter(r => !r.reason).length;
            const allDone = mNoReason === 0 && rNoReason === 0;
            return (
              <div className="card" style={{borderLeft:`3px solid ${allDone ? 'var(--ok,#2e7d32)' : 'var(--warn,#e0a800)'}`}}>
                <h3 style={{margin:0,marginBottom:6}}>{allDone ? '✓ Tout est traité' : '📋 À traiter'}</h3>
                <div style={{display:'flex',flexWrap:'wrap',gap:14,fontSize:13}}>
                  <span>📦 <strong>{manquants.length}</strong> manquants{mNoReason>0 && <span style={{color:'var(--warn,#b8860b)'}}> · {mNoReason} sans raison</span>}</span>
                  <span>🏷️ <strong>{remises.length}</strong> remisés{rNoReason>0 && <span style={{color:'var(--warn,#b8860b)'}}> · {rNoReason} sans raison</span>}</span>
                  <span>🚚 <strong>{lastmin.length}</strong> ND dernière minute</span>
                </div>
                {manquants.length === 0 && remises.length === 0 && (
                  <p style={{fontSize:12,color:'var(--ink-mute)',marginTop:8,marginBottom:0}}>
                    Aucun manquant ni remisé chargé. Ils apparaissent automatiquement au chargement du JSON commandes (onglet Admin). Tu peux aussi en ajouter un à la main ci-dessous.
                  </p>
                )}
              </div>
            );
          })()}

          {/* ============ MANQUANTS ============ */}
          <div className="card">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
              <h3 style={{margin:0}}>📦 Produits manquants</h3>
              <button className="btn-ghost" onClick={() => setShowManual(s=>!s)} style={{fontSize:13}}>
                {showManual ? 'Annuler' : '+ Ajouter'}
              </button>
            </div>
            <p style={{fontSize:12,color:'var(--ink-soft)',marginBottom:10}}>
              Indique la <strong>raison</strong> de chaque manque. Si le produit <strong>arrive le matin</strong>, clique 🚚 pour le répartir entre les locaux (ND dernière minute).
            </p>

            {/* Ajout manuel — ciblage local possible */}
            {showManual && (
              <div className="card-flat" style={{marginBottom:12,padding:'12px',background:'var(--accent-soft)'}}>
                <div style={{fontWeight:600,fontSize:13,marginBottom:8}}>Nouveau manquant</div>
                <input type="text" placeholder="Produit *" value={manProduit} onChange={e=>setManProduit(e.target.value)} style={{marginBottom:6,fontSize:13}} />
                <input type="text" placeholder="Producteur" value={manProducteur} onChange={e=>setManProducteur(e.target.value)} style={{marginBottom:6,fontSize:13}} />
                <input type="number" min="0" placeholder="Quantité manquante" value={manQty} onChange={e=>setManQty(e.target.value)} style={{marginBottom:6,fontSize:13}} />
                <label style={{fontSize:12,fontWeight:600,display:'block',marginBottom:4}}>Cibler un local (optionnel)</label>
                <select value={manLocal} onChange={e=>setManLocal(e.target.value)} style={{marginBottom:8,fontSize:13}}>
                  <option value="">Tous les locaux</option>
                  {sitesForDay.map(s => <option key={s} value={s}>{s}</option>)}
                </select>
                <div style={{display:'flex',gap:6}}>
                  <button className="btn-primary" disabled={busy || !manProduit.trim()} onClick={handleAddManual} style={{flex:1,fontSize:13}}>Ajouter</button>
                  <button className="btn-secondary" onClick={()=>{setShowManual(false);setManProduit('');setManProducteur('');setManQty('');setManLocal('');}} style={{fontSize:13}}>Annuler</button>
                </div>
              </div>
            )}

            {manquants.length > 0 ? (
              <ManquantsTable
                manquants={manquants}
                lmByManquant={lmByManquant}
                onReason={setReason}
                onDispatch={(m) => setLmModal(m)}
                onDelete={deleteManquant}
              />
            ) : (
              <p style={{fontSize:13,color:'var(--ink-mute)',textAlign:'center',padding:'8px 0'}}>Aucun manquant pour cette distribution.</p>
            )}
          </div>

          {/* ============ PRODUITS REMISÉS ============ */}
          {remises.length > 0 && (
            <div className="card">
              <h3 style={{marginBottom:4}}>🏷️ Produits remisés</h3>
              <p style={{fontSize:12,color:'var(--ink-soft)',marginBottom:10}}>
                Produits dont la quantité ou le prix a été réduit. Renseigne la raison de chacun.
              </p>
              <div className="stack" style={{gap:0}}>
                {remises.slice().sort((a,b)=>{
                  const ar = a.reason?1:0, br = b.reason?1:0;
                  if (ar!==br) return ar-br;
                  return (a.produit||'').localeCompare(b.produit||'','fr');
                }).map((r,i) => (
                  <div key={r.id} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 0',
                    borderTop: i ? '1px solid var(--line)' : 'none',
                    background: r.reason ? 'transparent' : 'var(--warn-soft)'}}>
                    <div style={{flex:'2 1 140px',minWidth:0}}>
                      <div style={{fontWeight:600,fontSize:13,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r.produit}</div>
                      <div style={{fontSize:11,color:'var(--ink-mute)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                        {r.producteur} · {r.clients} client(s){r.percentage ? ` · −${r.percentage}%` : ''}
                      </div>
                    </div>
                    <div style={{flex:'1 1 130px',minWidth:0}}>
                      <select value={r.reason || ''} onChange={e => setRemiseReason(r, e.target.value)}
                        style={{fontSize:12,padding:'4px 6px',width:'100%',
                          borderColor: r.reason ? 'var(--line)' : 'var(--warn)'}}>
                        <option value="">— raison —</option>
                        {PREP_REASONS.map(pr => <option key={pr.id} value={pr.id}>{pr.label}</option>)}
                      </select>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
          {lastmin.length > 0 && (
            <div className="card">
              <h3 style={{marginBottom:8}}>🚚 Dispatch dernière minute du jour</h3>
              <div className="list">
                {lastmin.map(l => {
                  const totalAlloc = Object.values(l.allocBySite || {}).reduce((s, arr) => s + arr.reduce((x,c)=>x+c.qty,0), 0);
                  return (
                    <div key={l.id} className="list-item" style={{flexDirection:'column',alignItems:'stretch',gap:6}}>
                      <div style={{display:'flex',justifyContent:'space-between',gap:8}}>
                        <div className="list-item-name">{l.produit}</div>
                        <button className="btn-ghost" onClick={async()=>{ if(confirm('Annuler ce dispatch ?')) await storage.deleteDoc(`day_${day}_lastminute`, l.id); }} style={{fontSize:13}}>🗑️</button>
                      </div>
                      <div className="list-item-sub">{l.qtyReceived} reçus · {totalAlloc} attribués</div>
                      <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                        {Object.entries(l.allocBySite || {}).map(([site, arr]) => (
                          <span key={site} className="badge badge-site">{site} : {arr.reduce((x,c)=>x+c.qty,0)}</span>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {(sitesLoaded.length > 0 || manquants.length > 0 || lastmin.length > 0) && (
            <div className="card card-flat" style={{borderColor:'var(--danger-soft)'}}>
              <h3 style={{marginBottom:6,fontSize:14,color:'var(--danger)'}}>⚠️ Réinitialiser</h3>
              <p style={{fontSize:12,color:'var(--ink-soft)',marginBottom:10}}>
                Repartir à zéro pour aujourd'hui : supprime <strong>tous</strong> les dispatch chargés, les manquants et les dispatch dernière minute. Les commandes, statuts clients et anomalies ne sont pas touchés.
              </p>
              <button className="btn-danger btn-block" disabled={busy} onClick={handleResetAll}>
                Tout réinitialiser ({sitesLoaded.length} locaux · {manquants.length} manquants · {lastmin.length} dispatch LM)
              </button>
            </div>
          )}

          {lmModal && (
            <LastMinuteModal
              manquant={lmModal}
              dispatchData={dispatchData}
              dayOrders={dayOrders}
              session={session}
              day={day}
              onClose={() => setLmModal(null)}
              onSaved={() => { setLmModal(null); showToast('✓ Dispatch dernière minute enregistré'); }}
            />
          )}
        </div>
      );
    }

    // ============================================================
    // MODAL — transformer un manquant en dispatch dernière minute
    // ============================================================
    function LastMinuteModal({ manquant, dispatchData, dayOrders, session, day, onClose, onSaved }) {
      const showToast = React.useContext(ToastContext);
      const [qty, setQty] = React.useState(manquant.manque || 0);
      const [excludeLivdom, setExcludeLivdom] = React.useState(true);
      const [allocMode, setAllocMode] = React.useState('auto'); // 'auto' (prorata) | 'manuel'
      const [alloc, setAlloc] = React.useState({});  // {site: nombre}
      const [busy, setBusy] = React.useState(false);
      // Mode SANS PDF : l'utilisateur choisit les locaux et les quantités à la main.
      const [noPdfAlloc, setNoPdfAlloc] = React.useState({}); // {site: nombre}

      // Besoin par local : priorité au bySite du manquant (calculé depuis les commandes retirées),
      // puis calcul depuis les items des commandes, puis repli sur les dispatch PDF.
      const needBySite = React.useMemo(() => {
        const exclude = excludeLivdom ? ['DOM'] : [];
        // 1) bySite stocké sur le manquant (la demande réelle par local)
        if (manquant.bySite && Object.keys(manquant.bySite).length) {
          const out = {};
          for (const [site, n] of Object.entries(manquant.bySite)) {
            if (exclude.includes(site)) continue;
            if (n > 0) out[site] = { total: n, casiers: [] };
          }
          if (Object.keys(out).length) return out;
        }
        // 2) calcul depuis les items des commandes
        const fromOrders = computeNeedFromOrders(manquant, dayOrders, { excludeSites: exclude });
        if (Object.keys(fromOrders).length) return fromOrders;
        // 3) repli : dispatch PDF
        return computeNeedBySite(manquant, dispatchData, { excludeSites: exclude });
      }, [manquant, dispatchData, dayOrders, excludeLivdom]);

      // Proposition au prorata quand qty / besoin change — uniquement en mode auto
      React.useEffect(() => {
        if (allocMode === 'auto') setAlloc(allocateProrata(needBySite, parseInt(qty, 10) || 0));
      }, [needBySite, qty, allocMode]);

      const sites = Object.keys(needBySite);
      const totalNeed = sites.reduce((s, k) => s + needBySite[k].total, 0);
      const totalAlloc = Object.values(alloc).reduce((s, n) => s + (parseInt(n,10)||0), 0);

      const setSiteAlloc = (site, val) => {
        if (allocMode !== 'manuel') setAllocMode('manuel'); // toute saisie passe en manuel
        const n = Math.max(0, Math.min(parseInt(val,10)||0, needBySite[site].total));
        setAlloc(a => ({ ...a, [site]: n }));
      };

      // Met tout le reçu sur un seul local (plafonné à son besoin), 0 ailleurs
      const putAllOn = (target) => {
        setAllocMode('manuel');
        const recu = parseInt(qty,10) || 0;
        const next = {};
        for (const s of sites) next[s] = (s === target) ? Math.min(recu, needBySite[s].total) : 0;
        setAlloc(next);
      };

      // Repasse en prorata auto
      const resetAuto = () => {
        setAllocMode('auto');
        setAlloc(allocateProrata(needBySite, parseInt(qty,10) || 0));
      };
