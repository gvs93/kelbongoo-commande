                  {c.remark && <div style={{marginTop:6,fontSize:13,fontStyle:'italic',color:'var(--ink-soft)'}}>« {c.remark} »</div>}
                  {session.isMaster && c.status !== 'credited' && (
                    <div style={{marginTop:8}}>
                      <button className="btn-primary" style={{padding:'6px 10px',fontSize:12}} onClick={() => setStatus(c, 'credited')}>
                        ✓ Marquer crédité (avoir créé)
                      </button>
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}

          {showForm && (
            <ConsigneForm orders={sitOrders} consumersByEmail={consumersByEmail} session={session} currentSite={currentSite} editing={editing} onClose={() => { setShowForm(false); setEditing(null); }} />
          )}
        </div>
      );
    }

    // ============================================================
    // PAGE SUIVI : Non-récup + Oublis casier
    // ============================================================
    function FollowUpPage({ session, currentSite, consumersByEmail }) {
      const [subTab, setSubTab] = React.useState('non_recup'); // 'non_recup' | 'oublis'
      // Charger les oublis (anomalies de type oubli_casier non résolues)
      const [forgottens, setForgottens] = React.useState([]);
      React.useEffect(() => {
        // On charge les anomalies de toutes les dates récentes
        // Approche : on s'abonne à followups + on lit les collections day_*_anomalies
        // Plus simple : on stocke les oublis dans une collection séparée
        const unsub = storage.subscribe('forgotten_items', setForgottens);
        return unsub;
      }, []);
      const forgottensOpen = forgottens.filter(f =>
        f.site === currentSite && f.status !== 'returned' && f.status !== 'picked_up'
      );
      const alertOublis = forgottensOpen.filter(f => daysSince(f.day || f.createdAt) >= 3).length;

      return (
        <div className="stack">
          <div className="filter-row" style={{marginBottom:0}}>
            <div className={`chip ${subTab==='non_recup'?'selected':''}`} onClick={()=>setSubTab('non_recup')}>
              📞 Non récupérés
            </div>
            <div className={`chip ${subTab==='oublis'?'selected':''}`} onClick={()=>setSubTab('oublis')}>
              📦 Oublis casier
              {alertOublis > 0 && <span className="badge badge-anom" style={{marginLeft:6,padding:'1px 6px',fontSize:10}}>{alertOublis}!</span>}
            </div>
          </div>
          {subTab === 'non_recup'
            ? <NonRecupSubPage session={session} currentSite={currentSite} consumersByEmail={consumersByEmail} />
            : <OublisSubPage session={session} currentSite={currentSite} forgottens={forgottens} consumersByEmail={consumersByEmail} />}
        </div>
      );
    }

    // ----- Sous-page Non-récup (ancien contenu de FollowUpPage) -----
    function NonRecupSubPage({ session, currentSite, consumersByEmail }) {
      const showToast = React.useContext(ToastContext);
      const [followUps, setFollowUps] = React.useState([]);
      const [filter, setFilter] = React.useState('pending');

      React.useEffect(() => {
        const unsub = storage.subscribe('followups', setFollowUps);
        return unsub;
      }, []);

      // Statuts terminaux : client venu / dossier clos / retour PDP récupéré → sortent du suivi actif.
      const TERMINAL = ['resolved', 'picked_up', 'credited', 'returned'];
      const visible = followUps.filter(f => {
        if (f.site !== currentSite) return false;
        if (filter === 'pending') return !TERMINAL.includes(f.status);
        if (filter === 'resolved') return TERMINAL.includes(f.status);
        return true;
      });

      // Envoyer un client en retour PDP AVANT les 7 jours (décision du distributeur).
      const sendToPdpNow = async (f) => {
        if (!confirm(`Envoyer la commande de ${f.consumer_name || 'ce client'} en retour PDP maintenant ?\n(au lieu d'attendre ${ALERT_DAYS_NON_RECUP} jours)`)) return;
        await storage.setDoc('followups', f.id || f.orderId, {
          ...f, forceReturnPdp: true, forceReturnPdpBy: session.name, forceReturnPdpAt: new Date().toISOString(),
          updatedBy: session.name, updatedAt: new Date().toISOString(),
        });
        showToast('✓ Envoyé en retour PDP');
      };

      const setStatus = async (f, newStatus) => {
        const docId = f.id || f.orderId;
        if (!docId) { showToast('Impossible : identifiant manquant'); return; }
        const extra = {};
        if (newStatus === 'relance') extra.relanceAt = new Date().toISOString();
        await storage.setDoc('followups', docId, {
          ...f, status: newStatus, ...extra,
          updatedBy: session.name, updatedAt: new Date().toISOString(),
        });
        showToast(newStatus === 'relance' ? 'Relancé ✓' : `Statut: ${newStatus}`);
      };

      const removeFromFollowUp = async (f) => {
        if (!confirm(`Retirer ${f.consumer_name} du suivi ?`)) return;
        await storage.deleteDoc('followups', f.id || f.orderId);
        showToast('Retiré');
      };

      // Envoie un mail au client via le proxy Freshdesk (ticket + email sortant)
      const sendEmail = async (f) => {
        if (f.emailSentAt) { showToast('Mail déjà envoyé à ce client'); return; }
        if (!f.email) { showToast('Pas d\'email pour ce client'); return; }
        if (!FRESHDESK_PROXY_URL || FRESHDESK_PROXY_URL.includes('TON_')) { showToast('Proxy Freshdesk non configuré'); return; }
        if (!confirm(`Envoyer un mail à ${f.consumer_name || f.email} ?`)) return;
        const docId = f.id || f.orderId;
        try {
          const payload = {
            secret: FRESHDESK_SECRET,
            clients: [{
              email: f.email,
              name: f.consumer_name || f.clientName || '',
              site: f.site,
              siteName: siteLabel(f.site),
              subject: 'Votre commande Kelbongoo à récupérer',
              body: `Bonjour ${f.consumer_name || ''},\n\nVotre commande Kelbongoo n'a pas pu être récupérée sur le point ${siteLabel(f.site)}. Vous pouvez venir la chercher dès la prochaine distribution.\n\nÀ bientôt,\nL'équipe Kelbongoo`,
              tag: 'non-recupere',
            }],
          };
          const data = await freshdeskPost(payload);
          if (data.ok && data.success) {
            // Note dans le suivi : mail envoyé auto
            await storage.setDoc('followups', docId, { ...f, status:'emailed', emailSentAt: new Date().toISOString(), emailSentBy: session.name });
            showToast('✓ Mail envoyé');
          } else {
            showToast('Échec envoi : ' + (data.error || 'inconnu'));
          }
        } catch (e) { showToast('Erreur réseau : ' + e.message); }
      };

      // Escalade : le distributeur n'arrive pas à joindre → demander à Henry (va dans le récap master)
      const askHenry = async (f) => {
        const docId = f.id || f.orderId;
        await storage.setDoc('followups', docId, {
          ...f, escalated: true, escalatedBy: session.name, escalatedAt: new Date().toISOString(),
        });
        showToast('✓ Transmis à Henry');
      };

      const enriched = visible.map(f => {
        if (f.phone || f.email) return f;
        const cached = consumersByEmail && consumersByEmail[f.email];
        return {
          ...f,
          phone: cached?.telephone || '',
          hasPhone: !!(cached?.telephone && cached.telephone.length >= 9),
        };
      });

      // Grouper par date
      const byDate = {};
      for (const f of enriched) {
        const date = f.distribDate || f.day || todayKey();
        if (!byDate[date]) byDate[date] = [];
        byDate[date].push(f);
      }
      const sortedDates = Object.keys(byDate).sort((a, b) => b.localeCompare(a));
      const totalPending = enriched.length;
      // Statuts "terminaux" : le client est venu / dossier clos → JAMAIS de retour PDP
      const TERMINAL_STATUSES = ['resolved', 'picked_up', 'credited', 'returned'];
      const alertCount = enriched.filter(f =>
        !TERMINAL_STATUSES.includes(f.status) &&
        daysSince(f.distribDate || f.day) >= ALERT_DAYS_NON_RECUP
      ).length;

      return (
        <div className="stack">
          <h1>Non-récupérés · {currentSite}</h1>
          <p style={{color:'var(--ink-soft)',fontSize:13,marginTop:-8}}>
            Distrib : appellent les clients avec téléphone. Master : email aux autres.
          </p>

          {alertCount > 0 && (
            <div className="alert-red">
              🔴 {alertCount} client{alertCount > 1 ? 's' : ''} non récupéré{alertCount > 1 ? 's' : ''} depuis +{ALERT_DAYS_NON_RECUP}j — retour PDP entrepôt
            </div>
          )}

          <div className="stat-grid">
            <div className="stat"><div className="stat-value">{totalPending}</div><div className="stat-label">À traiter</div></div>
            <div className="stat"><div className="stat-value">{sortedDates.length}</div><div className="stat-label">Distrib</div></div>
            <div className="stat"><div className="stat-value" style={{color:'var(--danger)'}}>{alertCount}</div><div className="stat-label">Alerte 7j+</div></div>
          </div>

          <div className="filter-row">
            <div className={`chip ${filter==='pending'?'selected':''}`} onClick={()=>setFilter('pending')}>À traiter</div>
            <div className={`chip ${filter==='resolved'?'selected':''}`} onClick={()=>setFilter('resolved')}>Résolus</div>
            <div className={`chip ${filter==='all'?'selected':''}`} onClick={()=>setFilter('all')}>Tous</div>
          </div>

          {sortedDates.length === 0 ? (
            <div className="empty-state"><div className="icon">✓</div><p>Aucun client.</p></div>
          ) : (
            sortedDates.map(date => {
              const items = byDate[date];
              const days = daysSince(date);
              const isAlert = days >= ALERT_DAYS_NON_RECUP;
              return (
                <details key={date} className={`distrib-section ${isAlert ? 'has-alert' : ''}`} open={isAlert || date === todayKey()}>
                  <summary>
                    <span>
                      {isAlert && '🔴 '}Distrib du {formatDateShort(date)}
                      <span style={{fontWeight:'normal',marginLeft:6,fontSize:12,opacity:0.8}}>
                        ({items.length} client{items.length > 1 ? 's' : ''}, il y a {days}j)
                      </span>
                    </span>
                    <span style={{fontSize:11}}>▼</span>
                  </summary>
                  <div>
                    {isAlert && <div className="retour-pdp">⚠️ Retour PDP entrepôt à organiser</div>}
                    {items.sort((a,b) => (a.consumer_name||'').localeCompare(b.consumer_name||'')).map(f => (
                      <div key={f.orderId} className="list-item" style={{flexDirection:'column',alignItems:'stretch'}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
                          <div className="list-item-main">
                            <div className="list-item-name">{f.consumer_name}</div>
                            <div className="list-item-sub">
                              {f.hasPhone
                                ? <a href={`tel:${f.phone}`} style={{color:'var(--accent-dark)',fontWeight:600}}>📞 {f.phone}</a>
                                : <span style={{color:'var(--warn)'}}>✉️ Email</span>}
                              {session.isMaster && f.email && <span style={{color:'var(--ink-mute)'}}>· {f.email}</span>}
                            </div>
                          </div>
                          {f.status && f.status !== 'pending' && <span className="badge badge-info">{f.status}</span>}
                        </div>
                        <div style={{display:'flex',gap:6,marginTop:8,flexWrap:'wrap'}}>
                          {f.hasPhone ? (
                            <>
                              <button className="btn-secondary" style={{padding:'6px 10px',fontSize:12}} onClick={() => setStatus(f, 'called')}>Contacté</button>
                              <button className="btn-secondary" style={{padding:'6px 10px',fontSize:12}} onClick={() => setStatus(f, 'no_answer')}>No answer</button>
                              <button className="btn-secondary" style={{padding:'6px 10px',fontSize:12}} onClick={() => setStatus(f, 'relance')}>Relancé</button>
                              {!f.escalated && (
                                <button className="btn-secondary" style={{padding:'6px 10px',fontSize:12,color:'var(--warn)'}} onClick={() => askHenry(f)}>🙋 Demander à Henry</button>
                              )}
                            </>
                          ) : (
                            f.email
                              ? (f.emailSentAt
                                  ? <span style={{fontSize:12,color:'var(--accent-dark)',fontWeight:600,padding:'6px 0'}}>✉️ Mail déjà envoyé — pas de relance auto (éviter le harcèlement)</span>
                                  : <button className="btn-secondary" style={{padding:'6px 10px',fontSize:12}} onClick={() => sendEmail(f)}>✉️ Envoyer le mail</button>)
                              : <span style={{fontSize:12,color:'var(--ink-mute)'}}>Pas de contact</span>
                          )}
                          <button className="btn-primary" style={{padding:'6px 10px',fontSize:12}} onClick={() => setStatus(f, 'resolved')}>✓ Résolu</button>
                          {!f.forceReturnPdp && daysSince(f.distribDate || f.day) < ALERT_DAYS_NON_RECUP && (
                            <button className="btn-secondary" style={{padding:'6px 10px',fontSize:12,color:'var(--info)'}} onClick={() => sendToPdpNow(f)}>↩️ Retour PDP maintenant</button>
                          )}
                          {f.forceReturnPdp && <span style={{fontSize:11,color:'var(--info)',fontWeight:600,padding:'6px 0'}}>↩️ En retour PDP</span>}
                          {session.isMaster && (
                            <button className="btn-ghost" style={{padding:'6px 10px',fontSize:12}} onClick={() => removeFromFollowUp(f)}>🗑️</button>
                          )}
                        </div>
                        {f.emailSentAt && <div style={{fontSize:11,color:'var(--accent-dark)',marginTop:4}}>✉️ Mail envoyé le {formatDateShort(f.emailSentAt.slice(0,10))}</div>}
                        {f.relanceAt && <div style={{fontSize:11,color:'var(--warn)',marginTop:4}}>🔁 Relancé le {formatDateShort(f.relanceAt.slice(0,10))}</div>}
                        {f.escalated && <div style={{fontSize:11,color:'var(--warn)',marginTop:4}}>🙋 Transmis à Henry</div>}
                      </div>
                    ))}
                  </div>
                </details>
              );
            })
          )}

          {session.isMaster && (() => {
            const emailOnly = enriched.filter(f => !f.hasPhone && f.email && f.status !== 'resolved');
            if (emailOnly.length === 0) return null;
            return (
              <div className="card" style={{display:'flex',flexDirection:'column',gap:8}}>
                <div style={{fontSize:13,fontWeight:600}}>Relancer les {emailOnly.length} client(s) à contacter par email</div>
                <FreshdeskRelanceButton clients={emailOnly} onDone={() => {}} session={session} />
              </div>
            );
          })()}
        </div>
      );
    }

    // Bouton qui envoie les relances via le proxy Freshdesk (crée 1 ticket + mail par client)
    function FreshdeskRelanceButton({ clients, onDone, session }) {
      const showToast = React.useContext(ToastContext);
      const [busy, setBusy] = React.useState(false);
      const [result, setResult] = React.useState(null);

      const handleSend = async () => {
        if (!FRESHDESK_PROXY_URL || FRESHDESK_PROXY_URL.includes('TON_')) {
          showToast('Proxy Freshdesk non configuré');
          return;
        }
        if (!confirm(`Créer ${clients.length} ticket(s) Freshdesk et envoyer les emails de relance ?`)) return;
        setBusy(true);
        setResult(null);
        try {
          const payload = {
            secret: FRESHDESK_SECRET,
            clients: clients.map(c => ({
              email: c.email,
              name: c.consumer_name || c.clientName || '',
              site: c.site,
              siteName: siteLabel(c.site),
              subject: 'Votre commande Kelbongoo à récupérer',
              body: `Bonjour ${c.consumer_name || ''},\n\nVotre commande Kelbongoo n'a pas encore été récupérée sur le point ${siteLabel(c.site)}. Merci de nous indiquer quand vous pourrez venir la chercher, ou de nous recontacter.\n\nÀ bientôt,\nL'équipe Kelbongoo`,
            })),
          };
          // Apps Script Web App nécessite un POST sans en-tête custom (sinon préflight CORS)
          const data = await freshdeskPost(payload);
          if (data.ok) {
            // Enregistre tous les envois
            try {
              for (const c of clients) {
                await storage.setDoc('client_mail_history', `${c.email}_${Date.now()}_${Math.random()}`, {
                  clientEmail: c.email,
                  clientName: c.consumer_name || c.clientName || '',
                  type: 'non_recup',
                  subject: 'Votre commande Kelbongoo à récupérer',
                  sentAt: new Date().toISOString(),
                  sentBy: session?.name || 'anonyme',
                  site: c.site,
                });
              }
            } catch (e) { /* erreur log non-bloquante */ }
            setResult(data);
            showToast(`✓ ${data.success} ticket(s) créé(s)${data.failed ? `, ${data.failed} échec(s)` : ''}`);
            onDone && onDone();
          } else {
            showToast('Erreur : ' + (data.error || 'inconnue'));
          }
        } catch (err) {
          showToast('Erreur réseau : ' + err.message);
        } finally { setBusy(false); }
      };

      return (
        <>
          <button className="btn-primary btn-lg" disabled={busy} onClick={handleSend}>
            {busy ? 'Envoi en cours…' : `🎫 Créer ${clients.length} ticket(s) Freshdesk + envoyer`}
          </button>
          {result && (
            <div style={{fontSize:12,color:'var(--ink-soft)',marginTop:4}}>
              {result.success} envoyé(s){result.failed ? `, ${result.failed} échec(s)` : ''}.
            </div>
          )}
        </>
      );
    }

    // ----- Sous-page Oublis casier -----
    function OublisSubPage({ session, currentSite, forgottens, consumersByEmail }) {
      const showToast = React.useContext(ToastContext);
      const [filter, setFilter] = React.useState('pending');

      // Enrichir avec le contact client (depuis le cache consumers si pas déjà présent)
      const enrich = (f) => {
        const cached = consumersByEmail && f.clientEmail ? consumersByEmail[f.clientEmail] : null;
        return {
          ...f,
          phone: f.clientPhone || cached?.telephone || '',
          email: f.clientEmail || '',
        };
      };

      // "traité" = sorti de la vue active, archivé dans l'historique
      const isActive = (f) => f.status !== 'done';
      const visible = forgottens.filter(f => {
        if (f.site !== currentSite) return false;
        if (filter === 'pending') return isActive(f);
        if (filter === 'history') return f.status === 'done';
        return true;
      }).map(enrich);

      const setStatus = async (f, patch) => {
        await storage.setDoc('forgotten_items', f.id, {
          ...f, ...patch,
          updatedBy: session.name, updatedAt: new Date().toISOString(),
        });
      };

      const markDone = async (f) => {
        await setStatus(f, { status: 'done' });
        showToast('✓ Traité — déplacé dans l\'historique');
      };

      const toggleAvoir = async (f) => {
        await setStatus(f, { avoirApplied: !f.avoirApplied });
        showToast(f.avoirApplied ? 'Avoir retiré' : '✓ Avoir marqué appliqué');
      };

      const removeForgotten = async (f) => {
        if (!confirm(`Supprimer définitivement cet oubli ?`)) return;
        await storage.deleteDoc('forgotten_items', f.id);
        showToast('Supprimé');
      };

      // Grouper par date
      const byDate = {};
      for (const f of visible) {
        const d = f.day || (f.createdAt ? f.createdAt.slice(0,10) : todayKey());
        if (!byDate[d]) byDate[d] = [];
        byDate[d].push(f);
      }
      const sortedDates = Object.keys(byDate).sort((a, b) => b.localeCompare(a));
      const allActive = forgottens.filter(f => f.site === currentSite && isActive(f)).map(enrich);
      const totalPending = allActive.length;
      const alertCount = allActive.filter(f => daysSince(f.day || f.createdAt) >= 3).length;

      return (
        <div className="stack">
          <h1>Oublis casier · {currentSite}</h1>
          <p style={{color:'var(--ink-soft)',fontSize:13,marginTop:-8}}>
            Articles oubliés par les clients dans leurs casiers. Au bout de 3j sans nouvelles → renvoyer à l'entrepôt.
          </p>

          {filter === 'pending' && alertCount > 0 && (
            <div className="alert-red">
              🔴 {alertCount} article{alertCount > 1 ? 's' : ''} oublié{alertCount > 1 ? 's' : ''} depuis +3j — à renvoyer entrepôt
            </div>
          )}

    // Bouton Freshdesk pour relancer un client sur un oubli casier
    function FreshdeskOubliButton({ client }) {
      const showToast = React.useContext(ToastContext);
      const [busy, setBusy] = React.useState(false);
      const [sent, setSent] = React.useState(false);

      const handleSend = async () => {
        if (!FRESHDESK_PROXY_URL || FRESHDESK_PROXY_URL.includes('TON_')) {
          showToast('Proxy Freshdesk non configuré');
          return;
        }
        setBusy(true);
        try {
          const payload = {
            secret: FRESHDESK_SECRET,
            clients: [{
              email: client.email,
              name: client.clientName || '',
              site: client.site,
              siteName: siteLabel(client.site),
              subject: 'Article oublié dans votre casier Kelbongoo',
              body: `Bonjour ${client.clientName || ''},\n\nVous avez oublié un article dans votre casier lors de la distribution sur le point ${siteLabel(client.site)} :\n- ${client.productLabel || 'article'}\n\nMerci de venir le récupérer dans les prochains jours. Sans nouvelles de votre part sous 3 jours, l'article sera retourné à l'entrepôt.\n\nÀ bientôt,\nL'équipe Kelbongoo`,
            }],
          };
          const data = await freshdeskPost(payload);
          if (data.ok && data.success > 0) {
            // Enregistre l'envoi
            try {
              await storage.setDoc('client_mail_history', `${client.email}_${Date.now()}`, {
                clientEmail: client.email,
                clientName: client.clientName || '',
                type: 'oubli',
                subject: 'Article oublié dans votre casier Kelbongoo',
                sentAt: new Date().toISOString(),
                sentBy: 'oubli-auto',
                site: client.site,
              });
            } catch (e) { /* erreur log non-bloquante */ }
            setSent(true);
            showToast('✓ Ticket Freshdesk créé + mail envoyé');
          } else {
            showToast('Erreur : ' + (data.error || (data.results && data.results[0]?.error) || 'inconnue'));
          }
        } catch (err) {
          showToast('Erreur réseau : ' + err.message);
        } finally { setBusy(false); }
      };

      return (
        <div>
          <button className={sent ? 'btn-secondary' : 'btn-secondary'} style={{padding:'6px 10px',fontSize:12}} disabled={busy} onClick={handleSend}>
            {busy ? 'Envoi…' : sent ? '🎫 Relance envoyée ✓' : '🎫 Relancer (Freshdesk)'}
          </button>
          <ClientMailHistory clientEmail={client.email} />
        </div>
      );
    }

    // ============================================================
    // PAGE CLÔTURE
    // ============================================================
    // ============================================================
    // Charge un script externe à la volée (une seule fois), renvoie une promesse.
    function loadScript(src) {
      return new Promise((resolve, reject) => {
        if (document.querySelector(`script[data-dyn="${src}"]`)) { resolve(); return; }
        const s = document.createElement('script');
        s.src = src; s.async = true; s.setAttribute('data-dyn', src);
        s.onload = () => resolve();
        s.onerror = () => reject(new Error('Échec du chargement : ' + src));
        document.head.appendChild(s);
      });
    }

    const ZXING_SRC = 'https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js';

    // ============================================================
    // LECTEUR CAMÉRA (code-barres) — caméra du smartphone/tablette
    // Natif BarcodeDetector si dispo, sinon ZXing chargé à la volée.
    // ============================================================
    function BarcodeScanner({ onDetected }) {
      const videoRef = React.useRef(null);
      const streamRef = React.useRef(null);
      const detectorRef = React.useRef(null);
      const zxingRef = React.useRef(null);
      const timerRef = React.useRef(null);
      const lastRef = React.useRef({ code: '', t: 0 });
      const [status, setStatus] = React.useState('init'); // init | running | denied | error
      const [errMsg, setErrMsg] = React.useState('');
      const [torchable, setTorchable] = React.useState(false);
      const [torchOn, setTorchOn] = React.useState(false);

      const FORMATS = ['ean_13','ean_8','upc_a','upc_e','code_128','code_39'];

      const beep = () => {
        try {
          const C = window.AudioContext || window.webkitAudioContext; if (!C) return;
          const ctx = beep._ctx || (beep._ctx = new C());
          if (ctx.state === 'suspended') ctx.resume();
          const o = ctx.createOscillator(), g = ctx.createGain();
          o.frequency.value = 880; o.connect(g); g.connect(ctx.destination);
          g.gain.setValueAtTime(0.12, ctx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.12);
          o.start(); o.stop(ctx.currentTime + 0.13);
        } catch(e) {}
      };

      const emit = (raw) => {
        const code = String(raw || '').trim();
        if (!code) return;
        const now = Date.now();
        if (code === lastRef.current.code && now - lastRef.current.t < 1500) return; // anti-rebond
        lastRef.current = { code, t: now };
        try { navigator.vibrate && navigator.vibrate(60); } catch(e){}
        beep();
        onDetected(code);
      };

      React.useEffect(() => {
        let cancelled = false;
        (async () => {
          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              video: { facingMode: { ideal: 'environment' } }, audio: false
            });
            if (cancelled) { stream.getTracks().forEach(t => t.stop()); return; }
            streamRef.current = stream;
            const v = videoRef.current;
            v.srcObject = stream; v.setAttribute('playsinline', 'true'); v.muted = true;
            await v.play().catch(()=>{});

            const track = stream.getVideoTracks()[0];
            const caps = (track && track.getCapabilities) ? track.getCapabilities() : {};
            if (caps && caps.torch) setTorchable(true);

            let supported = [];
            if ('BarcodeDetector' in window) {
              try { supported = await window.BarcodeDetector.getSupportedFormats(); } catch(e){}
            }
            const useNative = supported.length && FORMATS.some(f => supported.includes(f));

            if (useNative) {
              detectorRef.current = new window.BarcodeDetector({ formats: FORMATS.filter(f => supported.includes(f)) });
              setStatus('running');
              const tick = async () => {
                if (cancelled) return;
                try {
                  const codes = await detectorRef.current.detect(v);
                  if (codes && codes.length) emit(codes[0].rawValue);
                } catch(e){}
                timerRef.current = setTimeout(tick, 160);
              };
              tick();
            } else {
              await loadScript(ZXING_SRC);
              if (cancelled) return;
              const ZX = window.ZXing;
              if (!ZX || !ZX.BrowserMultiFormatReader) throw new Error('Lecteur indisponible');
              const reader = new ZX.BrowserMultiFormatReader();
              zxingRef.current = reader;
              setStatus('running');
              const cb = (result) => { if (!cancelled && result) emit(result.getText ? result.getText() : result.text); };
              if (typeof reader.decodeFromStream === 'function') {
                await reader.decodeFromStream(stream, v, cb);
              } else if (typeof reader.decodeFromVideoElement === 'function') {
                await reader.decodeFromVideoElement(v, cb);
              } else {
                await reader.decodeFromVideoDevice(null, v, cb);
              }
            }
          } catch(e) {
            if (cancelled) return;
            if (e && (e.name === 'NotAllowedError' || e.name === 'SecurityError')) setStatus('denied');
            else { setStatus('error'); setErrMsg(e.message || String(e)); }
          }
        })();

        return () => {
          cancelled = true;
          if (timerRef.current) clearTimeout(timerRef.current);
          try { zxingRef.current && zxingRef.current.reset(); } catch(e){}
          try { const s = streamRef.current; if (s) s.getTracks().forEach(t => t.stop()); } catch(e){}
        };
      }, []);

      const toggleTorch = async () => {
        try {
          const track = streamRef.current && streamRef.current.getVideoTracks()[0];
          if (!track) return;
          await track.applyConstraints({ advanced: [{ torch: !torchOn }] });
          setTorchOn(t => !t);
        } catch(e){}
      };

      return (
        <div>
          <div style={{position:'relative',width:'100%',maxWidth:420,margin:'0 auto',borderRadius:10,overflow:'hidden',background:'#000',aspectRatio:'4 / 3'}}>
            <video ref={videoRef} muted playsInline style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}} />
            <div style={{position:'absolute',inset:0,pointerEvents:'none',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <div style={{width:'74%',height:'32%',border:'2px solid rgba(255,255,255,0.92)',borderRadius:10}} />
            </div>
            {torchable && (
              <button onClick={toggleTorch} style={{position:'absolute',top:8,right:8,padding:'6px 10px',borderRadius:8,border:'none',background:'rgba(0,0,0,0.55)',color:'#fff',fontSize:13}}>
                {torchOn ? '🔦 Éteindre' : '🔦 Lampe'}
              </button>
            )}
          </div>
          <div style={{fontSize:12,textAlign:'center',marginTop:6,color:'var(--ink-soft)'}}>
            {status==='init' && 'Démarrage de la caméra…'}
            {status==='running' && 'Vise un code-barre — détection automatique.'}
            {status==='denied' && '⚠️ Accès caméra refusé. Autorise la caméra dans le navigateur. (La caméra exige la version en ligne HTTPS, pas un fichier local.)'}
            {status==='error' && ('⚠️ ' + errMsg)}
          </div>
        </div>
      );
    }

    // Saisie de quantité : garde un état chaîne (autorise le champ vide pendant la frappe),
    // ne se fait pas écraser par une MAJ externe tant que le champ a le focus.
    function QtyInput({ value, onCommit, style }) {
      const [str, setStr] = React.useState(value ? String(value) : '');
      const focused = React.useRef(false);
      React.useEffect(() => { if (!focused.current) setStr(value ? String(value) : ''); }, [value]);
      const handle = (raw) => {
        const s = String(raw).replace(/[^\d]/g, '');
        setStr(s);
        onCommit(s === '' ? 0 : parseInt(s, 10));
      };
      return (
        <input type="number" inputMode="numeric" min="0" value={str} placeholder="0"
          onFocus={e=>{ focused.current = true; e.target.select(); }}
          onBlur={()=>{ focused.current = false; }}
          onChange={e=>handle(e.target.value)}
          style={style} />
      );
    }

              <div>
                <div style={{fontWeight:600,fontSize:12,marginBottom:3}}>Derniers codes associés</div>
                <div className="stack" style={{gap:2,maxHeight:'40vh',overflowY:'auto'}}>
                  {learnStats.recent.map(e => (
                    <div key={e.id || e.ean} style={{fontSize:12,padding:'3px 0',borderBottom:'1px solid var(--border)'}}>
                      <div style={{display:'flex',justifyContent:'space-between',gap:8}}>
                        <span style={{fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{prodById[e.productId]?.name || e.productId}</span>
                        <span style={{color:'var(--ink-mute)',whiteSpace:'nowrap'}}>{e.learnedBy || '—'}</span>
                      </div>
                      <div style={{color:'var(--ink-mute)'}}>{e.ean} · {fmt(e.learnedAt)}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ============================================================
    // INVENTAIRE FRUITS & LÉGUMES — lit la liste FL du nouveau Sheet
    // (onglet « FL SITE KBG »). Seuls les produits ACTIFS sont saisissables.
    // 2 quantités par produit : Stock Cagette (colis) + Stock Mu (sachets µ).
    // À la validation : écrit STOCK MU + STOCK CAGETTE (cellule par cellule,
    // formules préservées) via l'action proxy fl_write_stock.
    // Une section « Produits inactifs » permet de retrouver et saisir un
    // produit même inactif ; toute quantité saisie sur un inactif déclenche
    // un mail d'alerte à Raimbaud (rr@pribon.org).
    // ============================================================
    const FL_SHEET_ID = '1PXQU4QP_bh_sRCEHonrMM7FkWmJWtNPyxDBPPRBlNVQ';
    const FL_SHEET_TAB = 'UNIQUEMENT STOCK A REMPLIR PAR PDP ';
    // Mots-clés de catégorie identifiant un produit « Fruits & Légumes » dans le cache produits.
    // ⚠️ À CONFIRMER : ajuste selon la valeur réelle de la catégorie FL dans le JSON produits
    //    (la prévisualisation de synchro montre exactement ce qui est capté avant toute écriture).
    const FL_CATEGORY_KEYWORDS = ['fruit', 'legume'];
    // Si renseigné (ex. [2]), la détection FL se base sur le dispatch_type des produits —
    // plus fiable que la catégorie quand l'export producerproduct n'a pas de nom de catégorie.
    // PRIORITAIRE sur les mots-clés ci-dessus. Laisse vide [] pour utiliser la catégorie.
    const FL_DISPATCH_TYPES = [];
    // FL = catégorie « Fruits, Légumes ». Exception ŒUFS = catégorie « Basse Cour & Œufs »
    // ET nom contenant « œuf » (→ vrais œufs de poule, PAS œufs de truite ni volaille).
    // Critère basé sur la CATÉGORIE (fiable), jamais sur le seul nom.
    function isFLProduct(p) {
      const c = normalizeText((p && p.category) || '');
      const n = normalizeText((p && p.name) || '');
      if (c.indexOf('fruit') >= 0 && c.indexOf('legume') >= 0) return true;       // Fruits, Légumes
      if (c.indexOf('basse cour') >= 0 && (n.indexOf('oeuf') >= 0 || n.indexOf('\u0153uf') >= 0)) return true; // œufs
      return false;
    }

    // Affiche une quantité de cagettes avec fraction lisible : 2.33 → « 2⅓ », 0.5 → « ½ ».
    const CAGETTE_FRACTIONS = [
      { label: '0', val: 0 }, { label: '¼', val: 0.25 }, { label: '⅓', val: 0.33 },
      { label: '½', val: 0.5 }, { label: '⅔', val: 0.67 }, { label: '¾', val: 0.75 },
    ];
    function fmtCagette(v) {
      v = Number(v) || 0;
      const whole = Math.floor(v + 0.001);
      const frac = Math.round((v - whole) * 100) / 100;
      const closest = CAGETTE_FRACTIONS.reduce((b, f) => Math.abs(f.val - frac) < Math.abs(b.val - frac) ? f : b, CAGETTE_FRACTIONS[0]);
      const sym = closest.val === 0 ? '' : closest.label;
      if (whole === 0) return sym || '0';
      return sym ? `${whole}${sym}` : `${whole}`;
    }
    // Pavé de saisie « cagettes » pensé entrepôt : gros − / + pour les cagettes entières,
    // rangée de fractions pour la cagette entamée. Utilisable au pouce, à une main.
    function FractionPad({ value, onChange, onClose, label }) {
      const v = Number(value) || 0;
      const whole = Math.floor(v + 0.001);
      const frac = Math.round((v - whole) * 100) / 100;
      const closest = CAGETTE_FRACTIONS.reduce((b, f) => Math.abs(f.val - frac) < Math.abs(b.val - frac) ? f : b, CAGETTE_FRACTIONS[0]);
      const setWhole = (w) => onChange(Math.max(0, w) + frac);
      const setFrac = (f) => onChange(whole + f);
      const bigBtn = { width: 52, height: 52, fontSize: 26, fontWeight: 800, borderRadius: 12, border: '1px solid var(--border)', background: 'var(--bg-card,#fff)', cursor: 'pointer', lineHeight: 1 };
      return (
        <div style={{ padding: '12px 8px', background: 'var(--accent-soft)', borderTop: '1px dashed var(--accent)' }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 14, marginBottom: 12 }}>
            <button onClick={() => setWhole(whole - 1)} style={bigBtn}>−</button>
            <div style={{ minWidth: 96, textAlign: 'center' }}>
              <div style={{ fontSize: 30, fontWeight: 800, lineHeight: 1 }}>🥬 {fmtCagette(v)}</div>
              <div style={{ fontSize: 11, color: 'var(--ink-mute)', marginTop: 2 }}>{label || 'cagettes'} · {v.toFixed(2)}</div>
            </div>
            <button onClick={() => setWhole(whole + 1)} style={bigBtn}>+</button>
          </div>
          <div style={{ display: 'flex', gap: 6, justifyContent: 'center', flexWrap: 'wrap' }}>
            {CAGETTE_FRACTIONS.map(f => {
              const sel = Math.abs(closest.val - f.val) < 0.001;
              return (
                <button key={f.label} onClick={() => setFrac(f.val)}
                  style={{ minWidth: 48, height: 48, fontSize: 20, fontWeight: 700, borderRadius: 10, cursor: 'pointer',
                    border: sel ? '2px solid var(--accent)' : '1px solid var(--border)',
                    background: sel ? 'var(--accent)' : 'var(--bg-card,#fff)', color: sel ? '#fff' : 'var(--ink)' }}>
                  {f.label}
                </button>
              );
            })}
          </div>
          <div style={{ textAlign: 'center', marginTop: 12 }}>
            <button onClick={onClose} className="btn-primary" style={{ padding: '10px 28px', fontSize: 15 }}>✓ OK</button>
          </div>
        </div>
      );
    }

    function FLInventoryPage({ session, invDate }) {
      const showToast = React.useContext(ToastContext);
      const [items, setItems] = React.useState(null);          // actifs
      const [inactiveItems, setInactiveItems] = React.useState([]); // inactifs (recherche)
      const [counts, setCounts] = React.useState({});
      const [fracOpen, setFracOpen] = React.useState(null); // clé du produit dont le pavé cagettes est ouvert
      const [loading, setLoading] = React.useState(true);
      const [err, setErr] = React.useState('');
      const [search, setSearch] = React.useState('');
      const [sortMode, setSortMode] = React.useState('fournisseur'); // 'fournisseur' | 'alpha'
      const [validating, setValidating] = React.useState(false);
      const [lastValidated, setLastValidated] = React.useState(null);
      const [showInactive, setShowInactive] = React.useState(false);
      const [inactiveSearch, setInactiveSearch] = React.useState('');
      const [addedInactive, setAddedInactive] = React.useState({}); // key -> item
      const alertedRef = React.useRef({});
      const [lastInv, setLastInv] = React.useState(null);
      const refreshLastInv = React.useCallback(async () => {
        try {
          const d = await flPost({ secret: FRESHDESK_SECRET, action: 'fl_last_inventory' });
          if (d && d.ok && !d.none) setLastInv(d);
        } catch (e) {}
      }, []);
      React.useEffect(() => { refreshLastInv(); }, [refreshLastInv]);

      const loadFL = React.useCallback(async () => {
        setLoading(true); setErr('');
        try {
          const data = await flPost({ secret: FRESHDESK_SECRET, action: 'fl_read', tab: FL_SHEET_TAB, ts: Date.now() });
          if (!data.ok) throw new Error(data.error || 'réponse proxy invalide');
          const rows = data.rows || [];
          if (!rows.length) throw new Error('Feuille vide');
          const header = rows[0].map(h => String(h || '').trim().toLowerCase());
          const find = (aliases) => { for (const a of aliases) { const i = header.indexOf(a); if (i >= 0) return i; } return -1; };
          const iProd = find(['producteur']);
          const iName = find(['designation site kelbongoo','désignation site kelbongoo','produit','designation']);
          const iUv   = find(['unite de vente','unité de vente','uv']);
          const iType = find(['type']);
          const iAct  = find(['actif ?','actif','actif?']);
          const iCode = find(['code interne probon','code probon','code']);
          const actifs = [], inactifs = [];
          for (let r = 1; r < rows.length; r++) {
            const row = rows[r];
            const producer = String(row[iProd] || '').trim();
            const produit  = String((iName >= 0 ? row[iName] : '') || '').trim();
            if (!producer || !produit) continue;
            const uv   = String((iUv   >= 0 ? row[iUv]   : '') || '').trim();
            const type = String((iType >= 0 ? row[iType] : '') || '').trim();
            const code = String((iCode >= 0 ? row[iCode] : '') || '').trim();
            const actRaw = iAct >= 0 ? String(row[iAct] || '').trim().toLowerCase() : '';
            const isActive = iAct < 0 ? true : (actRaw === '' ? true : (actRaw.indexOf('non') !== 0 && actRaw !== 'inactif'));
            const it = { key: `${producer}__${produit}`, producer, produit, uv, type, code, actif: isActive };
            (isActive ? actifs : inactifs).push(it);
          }
          setItems(actifs); setInactiveItems(inactifs);
        } catch (e) {
          setErr(e.message || String(e));
        } finally {
          setLoading(false);
        }
      }, []);

      React.useEffect(() => { loadFL(); }, [loadFL]);

      React.useEffect(() => {
        setCounts({});
        const u = storage.subscribe(`fl_inventory_${invDate}`, (arr) => {
          const c = {}; for (const e of arr) { c[e.id] = { colis: e.colis || 0, mu: e.mu || 0 }; }
          setCounts(c);
        });
        return () => { u && u(); };
      }, [invDate]);

      // Liste de saisie = actifs + inactifs explicitement ajoutés
      const entryItems = React.useMemo(() => {
        const base = items || [];
        const extra = Object.keys(addedInactive).map(k => addedInactive[k]);
        const seen = {}, all = [];
        for (const it of base.concat(extra)) { if (!seen[it.key]) { seen[it.key] = 1; all.push(it); } }
        return all;
      }, [items, addedInactive]);

      const setQty = async (item, field, value) => {
        const v = Math.max(0, parseFloat(String(value).replace(',', '.')) || 0);
        const prev = counts[item.key] || { colis: 0, mu: 0 };
        const next = { ...prev, [field]: v };
        await storage.setDoc(`fl_inventory_${invDate}`, item.key, {
          id: item.key, producer: item.producer, produit: item.produit, uv: item.uv,
          colis: next.colis || 0, mu: next.mu || 0,
          countedBy: session.name, countedAt: new Date().toISOString(),
        });
        // Alerte stock inactif → Raimbaud (une seule fois par produit / session)
        if (item.actif === false && v > 0 && !alertedRef.current[item.key]) {
          alertedRef.current[item.key] = true;
          try {
            await flPost({ secret: FRESHDESK_SECRET, action: 'mail_inactive_stock',
              items: [{ producer: item.producer, produit: item.produit, colis: next.colis || 0, mu: next.mu || 0 }] });
            showToast('⚠️ Produit inactif en stock — Raimbaud a été prévenu');
          } catch (e) { showToast('Produit inactif noté (mail non parti : ' + e.message + ')'); }
        }
      };

      const addInactive = (it) => {
        setAddedInactive(prev => ({ ...prev, [it.key]: Object.assign({}, it, { actif: false }) }));
        showToast(`« ${it.produit} » ajouté à la saisie (inactif)`);
      };

      const exportCSV = () => {
        if (!entryItems.length) return;
        const lines = [['Producteur','Produit','UV','Actif','Colis en stock','Stock Mu']];
        for (const it of entryItems) {
          const c = counts[it.key] || {};
          lines.push([it.producer, it.produit, it.uv, it.actif ? 'Actif' : 'Inactif', c.colis ?? '', c.mu ?? '']);
        }
        const csv = lines.map(r => r.map(v => {
          const s = String(v ?? '');
          return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
        }).join(',')).join('\n');
        const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `inventaire_FL_${invDate}.csv`;
        a.click();
        URL.revokeObjectURL(a.href);
      };

      React.useEffect(() => {
        setLastValidated(null);
        (async () => {
          try {
            const meta = await storage.getDoc('fl_inventory_meta', invDate);
            if (meta) setLastValidated(meta);
          } catch (e) {}
        })();
      }, [invDate]);

      const validate = async () => {
        if (!entryItems.length) return;
        const payloadItems = entryItems.map(it => {
          const c = counts[it.key] || {};
          return { producer: it.producer, produit: it.produit, colis: c.colis || 0, mu: c.mu || 0 };
        });
        if (!confirm(`Valider l'inventaire FL du ${invDate} ?\n\nLes quantités (stock colis + stock mu) seront écrites dans l'onglet « ${FL_SHEET_TAB} ».`)) return;
        setValidating(true);
        try {
          const data = await flPost({ secret: FRESHDESK_SECRET, action: 'fl_write_stock', tab: FL_SHEET_TAB, items: payloadItems });
          if (!data.ok) { showToast('Erreur écriture Sheet : ' + (data.error || 'inconnue')); setValidating(false); return; }
          const meta = {
            date: invDate, validatedBy: session.name, validatedAt: new Date().toISOString(),
            written: data.written || 0, notFound: (data.notFound || []).length,
            nbColis, nbMu, nbSaisis, total: entryItems.length,
          };
          await storage.setDoc('fl_inventory_meta', invDate, meta, { replace: true });
          setLastValidated(meta);
          // Journalise dans l'onglet HISTORIQUE INVENTAIRE FL (date / heure / par qui / nb comptés)
          const nbCounted = payloadItems.filter(p => (p.colis || 0) > 0 || (p.mu || 0) > 0).length;
          try {
            await flPost({ secret: FRESHDESK_SECRET, action: 'fl_log_inventory', by: session.name, count: nbCounted, date: invDate });
            refreshLastInv();
          } catch (e) {}
          let msg = `✓ Inventaire validé : ${data.written} ligne(s) écrites dans le Sheet`;
          if (data.notFound && data.notFound.length) msg += ` · ${data.notFound.length} non trouvée(s)`;
          showToast(msg);
        } catch (e) {
          showToast('Erreur réseau : ' + e.message);
        } finally {
          setValidating(false);
        }
      };

      if (loading) return <div className="card"><p style={{fontSize:13,color:'var(--ink-mute)'}}>Chargement de la liste FL…</p></div>;
      if (err) return (
        <div className="alert-warning">
          Impossible de charger l'onglet « {FL_SHEET_TAB} » : {err}<br/>
          <span style={{fontSize:12}}>Vérifie que le proxy lit bien le Sheet <code>{FL_SHEET_ID}</code>, onglet « {FL_SHEET_TAB} », avec l'action <code>fl_read</code>.</span>
        </div>
      );
      if (!items || items.length === 0) return <div className="alert-warning">Aucun produit FL actif trouvé dans « {FL_SHEET_TAB} ».</div>;

      const q = normalizeText(search);
      const filtered = (q ? entryItems.filter(it => normalizeText(it.producer + ' ' + it.produit).includes(q)) : entryItems);

      const nbColis = entryItems.reduce((t,it)=>t + ((counts[it.key]?.colis)||0), 0);
      const nbMu = entryItems.reduce((t,it)=>t + ((counts[it.key]?.mu)||0), 0);
      const nbSaisis = entryItems.filter(it => { const c = counts[it.key]; return c && (c.colis>0 || c.mu>0); }).length;

      const renderRow = (it) => {
        const c = counts[it.key] || {};
        const bump = (field, delta) => {
          const cur = c[field] || 0;
          setQty(it, field, Math.max(0, Math.round((cur + delta) * 10) / 10));
        };
        return (
          <div key={it.key} style={{borderBottom:'1px solid var(--border)',background: it.actif===false ? 'rgba(242,130,63,0.08)' : (fracOpen===it.key ? 'var(--accent-soft)' : 'transparent')}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:6,padding:'6px 4px'}}>
              <div style={{fontSize:13,minWidth:0,flex:1}}>
                <div style={{fontWeight:600,lineHeight:1.2,wordBreak:'break-word'}}>
                  {it.actif===false && <span title="Inactif" style={{color:'var(--warn,#F2823F)'}}>🔒 </span>}{it.produit}
                </div>
                <div style={{color:'var(--ink-mute)',fontSize:11}}>
                  {sortMode==='alpha' && <span>{it.producer}{it.uv?' · ':''}</span>}{it.uv}
                </div>
              </div>
              {/* Colis : bouton tappable (ouvre le pavé fraction) */}
              <button onClick={function(){ setFracOpen(fracOpen===it.key ? null : it.key); }}
                style={{minWidth:64,height:44,borderRadius:10,fontSize:16,fontWeight:700,cursor:'pointer',
                  border: fracOpen===it.key ? '2px solid var(--accent)' : '1px solid var(--border)',
                  background: (c.colis>0) ? 'var(--accent-soft)' : 'var(--bg-card,#fff)',
                  color: (c.colis>0) ? 'var(--accent-dark)' : 'var(--ink-mute)'}}>
                🥬 {fmtCagette(c.colis ?? 0)}
              </button>
              {/* MU : sachets µ (stepper compact) */}
              <div style={{display:'flex',alignItems:'center',gap:2}}>
                <button onClick={function(){bump('mu',-1)}} style={{width:30,height:44,fontSize:18,border:'1px solid var(--border)',borderRadius:8,background:'var(--cream,#faf8f0)',cursor:'pointer',lineHeight:1}}>−</button>
                <QtyInputDec value={c.mu ?? 0} onCommit={function(v){setQty(it,'mu',v)}} style={{width:46,height:44,textAlign:'center',fontSize:15,padding:'0 2px'}} />
                <button onClick={function(){bump('mu',1)}} style={{width:30,height:44,fontSize:18,border:'1px solid var(--border)',borderRadius:8,background:'var(--cream,#faf8f0)',cursor:'pointer',lineHeight:1}}>+</button>
              </div>
            </div>
            {fracOpen===it.key && (
              <FractionPad value={c.colis ?? 0} label="cagettes"
                onChange={function(v){ setQty(it,'colis',v); }}
                onClose={function(){ setFracOpen(null); }} />
            )}
          </div>
        );
      };

      // tri / regroupement
      let body;
      if (sortMode === 'fournisseur') {
        const byProducer = {};
        for (const it of filtered) { (byProducer[it.producer] = byProducer[it.producer] || []).push(it); }
        const producersSorted = Object.keys(byProducer).sort((a,b)=>a.localeCompare(b,'fr'));
        body = producersSorted.map(prod => (
          <div key={prod} className="card">
            <h3 style={{marginBottom:8}}>{prod} · {byProducer[prod].length}</h3>
            <div style={{display:'flex',fontSize:11,color:'var(--ink-mute)',gap:8,padding:'0 4px 4px',justifyContent:'flex-end'}}>
              <span style={{width:70,textAlign:'center'}}>Colis</span><span style={{width:70,textAlign:'center'}}>Sachets µ</span>
            </div>
            <div className="stack" style={{gap:4}}>
              {byProducer[prod].slice().sort((a,b)=>a.produit.localeCompare(b.produit,'fr')).map(renderRow)}
            </div>
          </div>
        ));
      } else {
        const flat = filtered.slice().sort((a,b)=>a.produit.localeCompare(b.produit,'fr'));
        body = (
          <div className="card">
            <div style={{display:'flex',fontSize:11,color:'var(--ink-mute)',gap:8,padding:'0 4px 4px',justifyContent:'flex-end'}}>
              <span style={{width:70,textAlign:'center'}}>Colis</span><span style={{width:70,textAlign:'center'}}>Sachets µ</span>
            </div>
            <div className="stack" style={{gap:4}}>{flat.map(renderRow)}</div>
          </div>
        );
      }

      const qi = normalizeText(inactiveSearch);
      const inactiveFiltered = qi ? inactiveItems.filter(it => normalizeText(it.producer + ' ' + it.produit).includes(qi)) : [];

      return (
        <>
          <div className={lastInv ? "alert-info" : "alert-warning"} style={{fontSize:13, borderLeft:`3px solid ${lastInv ? 'var(--ok,#2e7d32)' : 'var(--warn,#F2823F)'}`}}>
            {lastInv
              ? <span>🗓️ Dernier inventaire FL : <strong>{lastInv.date}</strong> à <strong>{lastInv.heure}</strong> par <strong>{lastInv.par}</strong>{lastInv.count !== '' && lastInv.count != null ? <span> · {lastInv.count} produit(s)</span> : null}</span>
              : <span>⚠️ Aucun inventaire FL enregistré pour l'instant.</span>}
          </div>

          <div className="stat-grid">
            <div className="stat"><div className="stat-value">{nbSaisis}/{entryItems.length}</div><div className="stat-label">Produits saisis</div></div>
            <div className="stat"><div className="stat-value">{nbColis}</div><div className="stat-label">Colis (cagettes)</div></div>
            <div className="stat"><div className="stat-value">{nbMu}</div><div className="stat-label">Sachets µ</div></div>
          </div>

          <div className="card" style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Rechercher un produit ou producteur…" style={{flex:1,minWidth:160,fontSize:15,padding:'8px'}} />
            <div className="role-tabs" style={{display:'flex',gap:4}}>
              <div className={`chip ${sortMode==='fournisseur'?'selected':''}`} onClick={()=>setSortMode('fournisseur')}>🚜 Fournisseur</div>
              <div className={`chip ${sortMode==='alpha'?'selected':''}`} onClick={()=>setSortMode('alpha')}>🔤 A→Z</div>
            </div>
            <button className="btn-secondary" style={{fontSize:13}} disabled={loading} onClick={() => loadFL()}>{loading ? '⏳…' : '🔄'}</button>
            <button className="btn-secondary" style={{fontSize:13}} onClick={exportCSV}>⬇️ CSV</button>
            <button className="btn-primary" style={{fontSize:13}} disabled={validating} onClick={validate}>{validating ? 'Validation…' : '✅ Valider'}</button>
          </div>

          {lastValidated && (
            <div className="alert-info" style={{borderLeft:'3px solid var(--ok, #2e7d32)',fontSize:13}}>
              ✓ Validé le {new Date(lastValidated.validatedAt).toLocaleString('fr-FR',{dateStyle:'short',timeStyle:'short'})} par {lastValidated.validatedBy} · {lastValidated.written} ligne(s) écrites.
              {lastValidated.notFound > 0 && <span> ({lastValidated.notFound} non trouvée(s))</span>}
            </div>
          )}

          {body}

          <div className="card">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}} onClick={()=>setShowInactive(s=>!s)}>

                {!qi && <p style={{fontSize:12,color:'var(--ink-mute)'}}>Tape un nom de produit pour l'afficher.</p>}

                      <div style={{fontSize:13,minWidth:0,flex:1}}>
                        <div style={{fontWeight:600}}>{it.produit}</div>
                        <div style={{color:'var(--ink-mute)',fontSize:11}}>{it.producer}{it.uv?' · '+it.uv:''}</div>
