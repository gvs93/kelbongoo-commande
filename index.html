        if (needsDlc && !retourDlc) { showToast('Indique la DLC du produit'); return; }
        setBusy(true);
        try {
          const id = editing?.id || `anom_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
          let productLabel = '';
          let prodName = '', prodProducer = '';
          if (productKey.startsWith('FREE:')) { productLabel = productKey.substring(5); prodName = productLabel; }
          else {
            const [prod, name] = productKey.split('|');
            productLabel = `${name} (${prod})`;
            prodProducer = prod; prodName = name;
          }
          const effName = clientName || (isOrphan ? 'Produit non attribué' : '');
          // orderId robuste : commande du jour, sinon email, sinon clé, sinon id
          const safeOrderId = selectedOrder ? selectedOrder.orderId : (clientEmail || selectedKey || id);
          const data = {
            orderId: safeOrderId, site: currentSite,
            clientName: effName,
            clientEmail: clientEmail,
            clientPhone: selectedOrder?.telephone || '',
            hasOrderToday: !!selectedOrder,
            productKey, productLabel,
            day: activeDay(),
            anomalyTypes, actions,
            amountRefund: parseFloat(amountRefund) || 0,
            amountCredit: parseFloat(amountCredit) || 0,
            retourQty: parseInt(retourQty, 10) || 1,
            retourDlc: needsDlc ? retourDlc : '',
            retourPerteSeche: !!isPerteSeche,
            retourRecupPerso: !!(isPerteSeche && perteRecupPerso),
            remark,
            createdBy: session.name,
            createdAt: editing?.createdAt || new Date().toISOString(),
            updatedAt: new Date().toISOString(),
          };
          await storage.setDoc(`day_${activeDay()}_anomalies`, id, data);

          // Si l'anomalie est de type "oubli_casier", on crée aussi une entrée
          // dans forgotten_items pour le suivi (avec alerte à 3j)
          if (anomalyTypes.includes('oubli_casier')) {
            const forgottenId = `forg_${id}`; // lié à l'anomalie
            await storage.setDoc('forgotten_items', forgottenId, {
              id: forgottenId,
              anomalyId: id,
              orderId: safeOrderId, site: currentSite,
              clientName: data.clientName,
              clientEmail: data.clientEmail,
              productKey, productLabel,
              remark,
              day: activeDay(),
              status: 'pending', // 'pending' | 'picked_up' | 'returned'
              createdBy: session.name,
              createdAt: editing?.createdAt || new Date().toISOString(),
              updatedAt: new Date().toISOString(),
            });
          } else if (editing && editing.anomalyTypes && editing.anomalyTypes.includes('oubli_casier')) {
            // Si l'utilisateur a retiré le type oubli_casier en édition → on supprime l'entrée
            await storage.deleteDoc('forgotten_items', `forg_${id}`);
          }

          // Type DLC-décisionnel (retour_pdp, dlc_courte, dlc dépassée, en_trop) — V9.1
          // Selon la DLC, soit PERTE SÈCHE (le produit ne tiendra pas jusqu'à la récup prépa
          // ou DLC déjà dépassée ou qualité), soit RETOUR PDP normal pour redistribution.
          if (needsDlc) {
            const qty = parseInt(retourQty, 10) || 1;
            // Raison de perte adaptée au type d'anomalie
            const lossReason = (anomalyTypes.includes('pourri') || anomalyTypes.includes('casse')) ? 'abime'
              : isEnTrop ? 'non_vendu'
              : 'dlc';
            // Étiquette du type d'anomalie pour les messages
            const anomalyLabel = isDlcDepassee ? 'DLC dépassée'
              : isDlcCourte ? 'DLC courte'
              : isEnTrop ? 'En trop'
              : 'Retour PDP';
            if (isPerteSeche) {
              // Perte sèche → ajoutée aux pertes de la prépa.
              await storage.deleteDoc('pdp_returns', `pdpret_${id}`);
              await storage.setDoc('losses', `lossret_${id}`, {
                id: `lossret_${id}`,
                productKey, producteur: prodProducer, produit: prodName,
                unite: '',
                destination: 'jete',
                reason: lossReason,
                usingWeight: false, quantity: qty, weight: 0,
                unitPrice: 0, totalValue: 0,
                dlc: retourDlc,
                recupPerso: !!perteRecupPerso,
                remark: `${anomalyLabel} distrib ${currentSite}${perteRecupPerso ? ' · récupéré par le distributeur' : ''}${remark ? ' · ' + remark : ''}`,
                day: activeDay(), fromReturn: true, fromDistrib: true,
                createdBy: session.name, createdAt: editing?.createdAt || new Date().toISOString(), updatedAt: new Date().toISOString(),
              });
              showToast(isDlcDepassee
                ? '🔴 DLC dépassée → perte sèche (jetée) — ajoutée aux pertes prépa.'
                : isQualityIssue
                  ? '⚠️ Perte sèche (qualité) — ajoutée aux pertes prépa. Tu peux le récupérer pour chez toi si consommable.'
                  : '⚠️ DLC trop courte → perte sèche — ajoutée aux pertes prépa. Tu peux le récupérer pour chez toi.');
            } else {
              // Retour PDP normal : le produit tiendra jusqu'à la récup prépa.
              await storage.deleteDoc('losses', `lossret_${id}`);
              await storage.setDoc('pdp_returns', `pdpret_${id}`, {
                id: `pdpret_${id}`, anomalyId: id, site: currentSite,
                productKey, productLabel,
                produit: prodName, producteur: prodProducer,
                qty,
                clientName: effName,
                dlc: retourDlc,
                pickupDate: nextDelivForSite || '',
                anomalyLabel,
                remark,
                day: activeDay(),
                status: 'pending', // pending → recovered (chauffeur) → treated (entrepôt)
                createdBy: session.name,
                createdAt: editing?.createdAt || new Date().toISOString(),
                updatedAt: new Date().toISOString(),
              });
              // Source 3 de la console DLC : un retour PDP avec DLC alimente la surveillance DLC.
              if (retourDlc) {
                try {
                  await storage.setDoc('dlc_watch', `pdpret_${id}`, {
                    id: `pdpret_${id}`, produit: prodName, producteur: prodProducer,
                    qty, dlc: retourDlc, status: 'watch', source: 'retour_pdp', site: currentSite,
                    createdBy: session.name, createdAt: new Date().toISOString(),
                  });
                } catch (e) {}
              }
            }
          } else if (editing && editing.anomalyTypes && editing.anomalyTypes.some(t => ['retour_pdp','dlc_courte','dlc','en_trop'].includes(t))) {
            // Édition : l'utilisateur a retiré tous les types DLC-décisionnels → on nettoie les deux côtés
            await storage.deleteDoc('pdp_returns', `pdpret_${id}`);
            try { await storage.deleteDoc('losses', `lossret_${id}`); } catch (e) {}
            try { await storage.deleteDoc('dlc_watch', `pdpret_${id}`); } catch (e) {}
          }

          showToast(editing ? '✓ Mise à jour' : '✓ Anomalie enregistrée');
          onClose();
        } catch (err) {
          showToast('Erreur : ' + err.message);
        } finally { setBusy(false); }
      };
      return (
        <div className="modal-backdrop" onClick={(e) => { if (e.target.className === 'modal-backdrop') onClose(); }}>
          <div className="modal">
            <div className="modal-header">
              <h2>{editing ? 'Modifier anomalie' : 'Nouvelle anomalie'}</h2>
              <button className="modal-close" onClick={onClose}>×</button>
            </div>
            <div className="field">
              <label>Client{isOrphan ? ' (facultatif)' : ''}</label>
              <ConsigneClientPicker
                orders={orders}
                consumersByEmail={consumersByEmail}
                selectedKey={selectedKey}
                selectedName={clientName}
                onPick={handlePickClient}
                onClear={() => { setSelectedKey(''); setClientName(''); setClientEmail(''); }}
              />
              {isOrphan && (
                <p style={{fontSize:11,color:'var(--ink-mute)',marginTop:4}}>Produit non attribué : tu peux laisser le client vide.</p>
              )}
            </div>
            <div className="field">
              <label>Produit concerné</label>
              <ProductPicker products={products} value={productKey} onChange={setProductKey} allowFreetext={true} />
            </div>
            <div className="field">
              <label>Problème(s)</label>
              <div className="chip-group">
                {ANOMALIES.map(a => (
                  <div key={a.id} className={`chip chip-${a.color} ${anomalyTypes.includes(a.id) ? 'selected' : ''}`} onClick={() => toggle(anomalyTypes, setAnomalyTypes, a.id)}>{a.label}</div>
                ))}
              </div>
            </div>
            {needsDlc && (
              <div className="field">
                <label>Quantité concernée</label>
                <input type="text" inputMode="numeric" value={retourQty}
                  onChange={e => setRetourQty(e.target.value.replace(/[^0-9]/g, ''))} placeholder="1" />
                <p style={{fontSize:11,color:'var(--ink-mute)',marginTop:4}}>Sera renvoyée à PDP ou comptée en perte selon la DLC.</p>
              </div>
            )}
            {needsDlc && (
              <div className="field">
                <label>DLC du produit <span style={{color:'var(--danger)'}}>*</span></label>
                <input type="date" value={retourDlc} onChange={e => setRetourDlc(e.target.value)} />
                {nextDelivForSite && (
                  <p style={{fontSize:11,color:'var(--ink-mute)',marginTop:4}}>
                    Prochaine récup prépa sur {currentSite} : <strong>{dayLabelShort(nextDelivForSite)}</strong>.
                  </p>
                )}
                {retourDlc && (
                  isPerteSeche ? (
                    <div className="alert-warning" style={{marginTop:8,fontSize:12}}>
                      {isDlcDepassee
                        ? '🔴 DLC dépassée → perte sèche (jetée). Le produit n\'est plus consommable, il ne part pas à PDP.'
                        : isQualityIssue
                          ? '🟠 Problème de qualité → perte sèche. Garde-le pour chez toi si consommable, il ne part pas à PDP.'
                          : (dlcToday
                              ? '🟠 DLC aujourd\'hui → perte sèche. Garde-le pour chez toi (à consommer aujourd\'hui), il ne part pas à PDP.'
                              : '🟠 DLC trop courte (avant la prochaine récup prépa) → perte sèche. Garde-le pour chez toi.')}
                      <div style={{marginTop:8}}>
                        <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontWeight:600}}>
                          <input type="checkbox" checked={perteRecupPerso} onChange={e => setPerteRecupPerso(e.target.checked)} style={{width:16,height:16}} />
                          Je le récupère personnellement (chez moi)
                        </label>
                        <div style={{fontSize:11,fontWeight:'normal',marginTop:4}}>Dans tous les cas, le produit est ajouté aux <strong>pertes de la prépa</strong>.</div>
                      </div>
                    </div>
                  ) : (
                    <div className="alert-info" style={{marginTop:8,fontSize:12}}>
                      ✅ DLC OK → part en <strong>Retour PDP</strong>. La prépa le récupérera le {dayLabelShort(nextDelivForSite)}.
                    </div>
                  )
                )}
              </div>
            )}
            <div className="field">
              <label>Action apportée</label>
              <div className="chip-group">
                {ACTIONS.map(a => (
                  <div key={a.id} className={`chip ${actions.includes(a.id) ? 'selected' : ''}`} onClick={() => toggle(actions, setActions, a.id)}>{a.label}</div>
                ))}
              </div>
            </div>
            {(actions.includes('remise') || actions.includes('remboursement')) && (
              <div className="field">
                <label>Montant remise / remboursement (€)</label>
                <input type="number" step="0.01" min="0" value={amountRefund} onChange={e => setAmountRefund(e.target.value)} placeholder="0.00" />
              </div>
            )}
            {actions.includes('avoir') && (
              <div className="field">
                <label>Montant de l'avoir (€)</label>
                <input type="number" step="0.01" min="0" value={amountCredit} onChange={e => setAmountCredit(e.target.value)} placeholder="0.00" />
              </div>
            )}
            <div className="field">
              <label>Remarque</label>
              <textarea rows={3} value={remark} onChange={e => setRemark(e.target.value)} placeholder="Précisions…" />
            </div>
            <div className="row">
              <button className="btn-secondary" onClick={onClose}>Annuler</button>
              <button className="btn-primary" disabled={busy} onClick={handleSubmit}>
                {busy ? 'Enregistrement…' : (editing ? 'Mettre à jour' : 'Enregistrer')}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // CONSIGNE FORM
    // ============================================================
    function ConsigneForm({ orders, consumersByEmail, session, currentSite, onClose, editing }) {
      const showToast = React.useContext(ToastContext);
      // Si editing → on garde l'orderId existant. Sinon on commence avec un selectedKey vide.
      // selectedKey = soit orderId (si client a commandé aujourd'hui) soit email (si pas de commande)
      const [selectedKey, setSelectedKey] = React.useState(editing?.orderId || editing?.clientEmail || '');
      const [selectedName, setSelectedName] = React.useState(editing?.clientName || '');
      const [selectedEmail, setSelectedEmail] = React.useState(editing?.clientEmail || '');
      const [nbPots, setNbPots] = React.useState(editing?.nbPots || '1');
      const [remark, setRemark] = React.useState(editing?.remark || '');
      const [busy, setBusy] = React.useState(false);

      // Si la sélection correspond à une commande du jour, on récupère l'orderId
      const selectedOrder = orders.find(o => o.orderId === selectedKey);

      const handleSubmit = async () => {
        if (!selectedKey || !selectedName) { showToast('Choisis un client'); return; }
        const n = parseInt(nbPots, 10);
        if (!n || n < 1) { showToast('Nombre de pots invalide'); return; }
        setBusy(true);
        try {
          const id = editing?.id || `cons_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
          // orderId : commande du jour si dispo, sinon email, sinon la clé manuelle (jamais vide)
          const safeOrderId = selectedOrder ? selectedOrder.orderId : (selectedEmail || selectedKey || id);
          const data = {
            orderId: safeOrderId,
            site: currentSite,
            clientName: selectedName,
            clientEmail: selectedEmail,
            hasOrderToday: !!selectedOrder,
            nbPots: n,
            remark,
            day: activeDay(),
            status: 'pending',
            createdBy: session.name,
            createdAt: editing?.createdAt || new Date().toISOString(),
            updatedAt: new Date().toISOString(),
          };
          await storage.setDoc('consignes', id, data);
          showToast(editing ? '✓ Mise à jour' : '✓ Consigne enregistrée');
          onClose();
        } catch (err) {
          showToast('Erreur : ' + err.message);
        } finally { setBusy(false); }
      };

      const handlePickClient = (info) => {
        setSelectedKey(info.key);
        setSelectedName(info.name);
        setSelectedEmail(info.email || '');
      };

      return (
        <div className="modal-backdrop" onClick={(e) => { if (e.target.className === 'modal-backdrop') onClose(); }}>
          <div className="modal">
            <div className="modal-header">
              <h2>{editing ? 'Modifier consigne' : 'Dépôt de pots'}</h2>
              <button className="modal-close" onClick={onClose}>×</button>
            </div>
            <div className="field">
              <label>Client</label>
              <ConsigneClientPicker
                orders={orders}
                consumersByEmail={consumersByEmail}
                selectedKey={selectedKey}
                selectedName={selectedName}
                onPick={handlePickClient}
                onClear={() => { setSelectedKey(''); setSelectedName(''); setSelectedEmail(''); }}
              />
            </div>
            <div className="field">
              <label>Nombre de pots déposés</label>
              <input type="number" min="1" value={nbPots} onChange={e => setNbPots(e.target.value)} />
            </div>
            <div className="field">
              <label>Remarque (optionnel)</label>
              <textarea rows={2} value={remark} onChange={e => setRemark(e.target.value)} placeholder="Précisions…" />
            </div>
            <div className="row">
              <button className="btn-secondary" onClick={onClose}>Annuler</button>
              <button className="btn-primary" disabled={busy} onClick={handleSubmit}>
                {busy ? 'Enregistrement…' : 'Enregistrer'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // Picker spécifique aux consignes : cherche d'abord dans les commandes du jour,
    // sinon dans tous les consumers Kelbongoo
    function ConsigneClientPicker({ orders, consumersByEmail, selectedKey, selectedName, onPick, onClear }) {
      const [search, setSearch] = React.useState('');

      const results = React.useMemo(() => {
        const s = normalizeText(search);
        if (!s) {
          // Pas de recherche → on liste les commandes du jour (limité)
          return orders.slice(0, 20).map(o => ({
            key: o.orderId,
            name: displayName(o),
            email: o.email || '',
            hasOrderToday: true,
          }));
        }
        // Recherche : on commence par les commandes du jour matchant
        const fromOrders = orders
          .filter(o => normalizeText(displayName(o)).includes(s))
          .map(o => ({
            key: o.orderId,
            name: displayName(o),
            email: o.email || '',
            hasOrderToday: true,
          }));
        // Puis on cherche dans tous les consumers
        const orderEmails = new Set(orders.map(o => o.email));
        const fromConsumers = [];
        const cs = consumersByEmail || {};
        for (const email in cs) {
          if (fromConsumers.length >= 30) break;
          if (orderEmails.has(email)) continue; // déjà dans fromOrders
          const c = cs[email];
          const fullName = `${c.last_name || ''} ${c.first_name || ''}`.trim() || c.name || '';
          if (normalizeText(fullName).includes(s)) {
            fromConsumers.push({
              key: email,
              name: fullName,
              email,
              hasOrderToday: false,
            });
          }
        }
        return [...fromOrders, ...fromConsumers].slice(0, 50);
      }, [orders, consumersByEmail, search]);

      if (selectedKey && selectedName) {
        return (
          <div className="alert-success" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span>✓ <strong>{selectedName}</strong></span>
            <button className="btn-ghost" style={{padding:'2px 8px', fontSize:11}} onClick={onClear}>Changer</button>
          </div>
        );
      }

      return (
        <>
          <div className="search-box">
            <input type="text" value={search} onChange={e => setSearch(e.target.value)} placeholder="Chercher un client (commande du jour ou autre)…" />
          </div>
          <div style={{fontSize:11,color:'var(--ink-soft)',padding:'4px 6px'}}>
            {!search ? "Commandes du jour. Tape un nom pour chercher dans tous les clients." : `${results.length} résultat${results.length>1?'s':''}`}
          </div>
          <div className="product-list">
            {results.length === 0 ? (
              <div style={{padding: 14, textAlign: 'center', color: 'var(--ink-mute)', fontSize: 13}}>
                Aucun client trouvé dans la liste
              </div>
            ) : results.map(r => (
              <div key={r.key} className="product-item" onClick={() => onPick(r)}>
                <span>{r.name}</span>
                {!r.hasOrderToday && <span className="badge badge-info" style={{marginLeft:8,fontSize:10}}>pas de commande</span>}
              </div>
            ))}
          </div>
          {/* Saisie manuelle si le client n'est pas trouvé */}
          {search.trim().length >= 2 && (
            <div style={{marginTop:8,padding:'8px',background:'var(--accent-soft)',borderRadius:8}}>
              <div style={{fontSize:11,color:'var(--ink-soft)',marginBottom:6}}>Client introuvable ? Utilise ce nom tel quel :</div>
              <button className="btn-secondary btn-block" style={{fontSize:13}} onClick={() => onPick({ key: `MANUAL:${search.trim()}`, name: search.trim().toUpperCase(), email: '' })}>
                + Utiliser « {search.trim()} »
              </button>
            </div>
          )}
        </>
      );
    }

    // ============================================================
    // PAGE CLIENTS (jour J) — distrib + master
    // ============================================================
    // Bouton « rappel fin de distribution » : actif seulement dans les 30 dernières
    // minutes avant la fermeture de la boutique (BIC/BOR/STB/PDC). Envoie un mail aux
    // clients du local pas encore passés (avec email). Un seul envoi par boutique/jour.
    function EndOfDistribReminder({ session, currentSite, notPassed }) {
      const showToast = React.useContext(ToastContext);
      const [busy, setBusy] = React.useState(false);
      const [sentDoc, setSentDoc] = React.useState(null);
      const dayKey = activeDay();

      React.useEffect(() => {
        const u = storage.subscribe(`day_${dayKey}_endmail`, (arr) => {
          setSentDoc((arr || []).find(d => d.site === currentSite) || null);
        });
        return () => { u && u(); };
      }, [currentSite, dayKey]);

      // Heure de Paris, indépendante du fuseau réglé sur le téléphone du distributeur.
      const parisNow = new Date(new Date().toLocaleString('en-US', { timeZone: 'Europe/Paris' }));
      const endHour = DISTRIB_END[currentSite] && DISTRIB_END[currentSite][parisNow.getDay()];
      if (endHour == null) return null; // pas de bouton pour ce local / ce jour

      const nowMin = parisNow.getHours() * 60 + parisNow.getMinutes();
      const endMin = endHour * 60;
      const startMin = endMin - 30;
      const before = nowMin < startMin;
      const inWindow = nowMin >= startMin && nowMin <= endMin;
      const fmtMin = (m) => `${Math.floor(m / 60)}h${m % 60 ? String(m % 60).padStart(2, '0') : ''}`;
      const recipients = (notPassed || []).filter(o => o.email);

      const send = async () => {
        if (!recipients.length) { showToast('Aucun client à relancer (tous passés ou sans email)'); return; }
        if (!FRESHDESK_PROXY_URL || FRESHDESK_PROXY_URL.includes('TON_')) { showToast('Proxy Freshdesk non configuré'); return; }
        if (!confirm(`Envoyer un rappel à ${recipients.length} client(s) pas encore passé(s) à ${siteLabel(currentSite)} ?`)) return;
        setBusy(true);
        try {
          const siteName = siteLabel(currentSite);
          const clients = recipients.map(o => ({
            email: o.email,
            name: o.name || displayName(o),
            site: currentSite, siteName,
            subject: 'Votre panier Kelbongoo vous attend 🧺',
            body: `Bonjour ${o.name || ''},\n\nPetit rappel : votre panier Kelbongoo vous attend aujourd'hui à la boutique de ${siteName}.\n\nLa distribution se termine à ${endHour}h — pensez à passer le récupérer avant la fermeture !\n\nÀ tout à l'heure,\nL'équipe Kelbongoo`,
            tag: 'rappel-fin-distrib',
          }));
          const data = await freshdeskPost({ secret: FRESHDESK_SECRET, clients });
          if (data && data.ok && data.success) {
            await storage.setDoc(`day_${dayKey}_endmail`, currentSite, {
              site: currentSite, sentAt: new Date().toISOString(), sentBy: session.name, count: recipients.length,
            });
            showToast(`✓ Rappel envoyé à ${recipients.length} client(s)`);
          } else {
            showToast('Échec envoi : ' + ((data && data.error) || 'inconnu'));
          }
        } catch (e) { showToast('Erreur : ' + e.message); }
        finally { setBusy(false); }
      };

      return (
        <div className="card" style={{borderLeft:'4px solid var(--accent)'}}>
          <div style={{fontWeight:700,fontSize:15}}>📧 Rappel fin de distribution</div>
          {sentDoc ? (
            <div style={{fontSize:13,color:'var(--accent-dark)',marginTop:6}}>
              ✓ Rappel déjà envoyé à {sentDoc.count} client(s){sentDoc.sentBy ? ` par ${sentDoc.sentBy}` : ''} à {new Date(sentDoc.sentAt).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}.
            </div>
          ) : before ? (
            <div style={{fontSize:13,color:'var(--ink-mute)',marginTop:6}}>
              ⏳ Disponible à partir de <strong>{fmtMin(startMin)}</strong> (30 min avant la fermeture de {endHour}h, heure de Paris).
            </div>
          ) : inWindow ? (
            <>
              <div style={{fontSize:13,color:'var(--ink-soft)',margin:'6px 0'}}>
                {recipients.length} client(s) pas encore passé(s) avec email · fermeture à {endHour}h.
              </div>
              <button className="btn-primary" disabled={busy || !recipients.length} onClick={send} style={{width:'100%'}}>
                {busy ? 'Envoi…' : `📧 Rappeler les ${recipients.length} clients pas encore passés`}
              </button>
            </>
          ) : (
            <div style={{fontSize:13,color:'var(--ink-mute)',marginTop:6}}>Distribution terminée ({endHour}h).</div>
          )}
        </div>
      );
    }

    function ClientsPage({ session, currentSite, orders, isClosed, dispatch, lastminute }) {
      const [statuses, setStatuses] = React.useState([]);
      const [refunds, setRefunds] = React.useState([]);
      const [filter, setFilter] = React.useState('not_passed');
      const [search, setSearch] = React.useState('');
      const [selectedClient, setSelectedClient] = React.useState(null);

      // Index dispatch dernière minute pour CE site : { [casier]: [{produit, qty}] }
      const lmByCasier = React.useMemo(() => {
        const idx = {};
        for (const l of (lastminute || [])) {
          const arr = (l.allocBySite && l.allocBySite[currentSite]) || [];
          for (const c of arr) {
            if (!idx[c.casier]) idx[c.casier] = [];
            idx[c.casier].push({ produit: l.produit, producteur: l.producteur, qty: c.qty });
          }
        }
        return idx;
      }, [lastminute, currentSite]);

      // Dispatch dernière minute SANS casier (bac ND) pour CE site : à répartir sur place
      const lmBacND = React.useMemo(() => {
        const out = [];
        for (const l of (lastminute || [])) {
          const arr = (l.allocBySite && l.allocBySite[currentSite]) || [];
          for (const c of arr) {
            if (c.casier === 'ND') out.push({ produit: l.produit, producteur: l.producteur, qty: c.qty });
          }
        }
        return out;
      }, [lastminute, currentSite]);

      React.useEffect(() => {
        const unsub = storage.subscribe(`day_${activeDay()}_statuses`, setStatuses);
        return unsub;
      }, []);

      React.useEffect(() => {
        const u = storage.subscribe(`day_${activeDay()}_refunds`, setRefunds);
        return u;
      }, []);
      // Remboursement total par commande (somme des remises produit).
      const refundByOrder = React.useMemo(() => {
        const m = {};
        for (const r of refunds) m[r.orderId] = (m[r.orderId] || 0) + (r.refundCents || 0);
        return m;
      }, [refunds]);
      const orderRefundTotal = (o) => (o._subOrderIds || [o.orderId]).reduce((s, id) => s + (refundByOrder[id] || 0), 0);

      const statusMap = React.useMemo(() => {
        const m = {};
        for (const s of statuses) m[s.orderId] = s;
        return m;
      }, [statuses]);

      const visibleRaw = orders.filter(o => o.site === currentSite);
      // Fusion : un client = une ligne (course principale + ajouts « fusionnée »)
      const visible = React.useMemo(() => {
        const groups = {};
        for (const o of visibleRaw) {
          const key = o.consumerId || o.email || displayName(o);
          (groups[key] = groups[key] || []).push(o);
        }
        return Object.values(groups).map(mergeClientOrders).filter(Boolean);
      }, [orders, currentSite]);

      const isPassed = (o) => {
        const ids = o._subOrderIds || [o.orderId];
        return ids.length > 0 && ids.every(id => statusMap[id]?.passed);
      };

      const togglePassed = async (order) => {
        if (isClosed) return;
        const newPassed = !isPassed(order);
        const ids = order._subOrderIds || [order.orderId];
        for (const id of ids) {
          await storage.setDoc(`day_${activeDay()}_statuses`, id, {
            orderId: id, site: currentSite,
            passed: newPassed,
            consumer_name: displayName(order),
            email: order.email,
            telephone: order.telephone || '',
            hasPhone: order.hasPhone,
            updatedBy: session.name,
            updatedAt: new Date().toISOString(),
          });
        }
      };

      const filtered = visible.filter(o => {
        const passed = isPassed(o);
        if (filter === 'passed' && !passed) return false;
        if (filter === 'not_passed' && passed) return false;
        if (search) {
          const s = normalizeText(search);
          if (!s) return true;
          const inName = normalizeText(displayName(o)).includes(s);
          const inItems = (o.items || []).some(it => normalizeText(it.produit || '').includes(s));
          const inRemoved = (o.removed || []).some(r => normalizeText(r.produit || '').includes(s));
          if (!inName && !inItems && !inRemoved) return false;
        }
        return true;
      }).sort((a, b) => displayName(a).localeCompare(displayName(b)));

      const stats = {
        total: visible.length,
        passed: visible.filter(isPassed).length,
        notPassed: visible.filter(o => !isPassed(o)).length,
      };

      // Si journée clôturée et distrib (non master), on cache les noms
      const hideNames = isClosed && !session.isMaster;

      // Données chargées via la méthode JSON (V4) : casiers/pain/ND déjà inclus dans la commande.
      // Dans ce cas, plus besoin des anciens bandeaux "dispatch PDF".
      const isV4Data = orders.some(o => Array.isArray(o.items) || Array.isArray(o.casiersFrais) || Array.isArray(o.pains));

      return (
        <div className="stack">
          <h1>Clients · {currentSite}</h1>

          {isClosed && (
            <div className="alert-info">
              🔒 Journée clôturée — modifications désactivées
            </div>
          )}

          {orders.length === 0 && !isClosed && (
            <div className="alert-warning">
              ⚠️ Aucune commande chargée. Va dans <strong>Admin</strong> pour charger les données du jour.
            </div>
          )}

          {!isV4Data && !dispatch && orders.length > 0 && (
            <div className="alert-info">
              📦 Pas de dispatch chargé pour {currentSite}. Charge les données du jour dans <strong>Admin</strong> pour voir le détail par casier.
            </div>
          )}
          {!isV4Data && dispatch && (
            <div className="alert-success">
              📦 Dispatch chargé{dispatch.meta?.parts?.length ? ` (${dispatch.meta.parts.join(' · ')})` : ''}{dispatch.meta?.uploadedBy ? ` · par ${dispatch.meta.uploadedBy}` : ''} — clique un client pour voir ses casiers.
            </div>
          )}

          {lmBacND.length > 0 && (
            <div className="alert-info" style={{borderLeft:'3px solid var(--info)'}}>
              <strong>🚚 Bac ND — dispatch dernière minute à répartir sur place :</strong>
              <div style={{marginTop:4}}>
                {lmBacND.map((p, i) => (
                  <div key={i} style={{fontSize:13}}>
                    • {p.produit}{p.producteur ? ` · ${p.producteur}` : ''} — <strong>{p.qty}</strong>
                  </div>
                ))}
              </div>
              <div style={{fontSize:11,color:'var(--ink-mute)',marginTop:4}}>
                Ces articles n'ont pas d'attribution client (pas de dispatch chargé) : à distribuer manuellement depuis le bac ND.
              </div>
            </div>
          )}

          <div className="stat-grid">
            <div className="stat"><div className="stat-value">{stats.total}</div><div className="stat-label">Total</div></div>
            <div className="stat"><div className="stat-value" style={{color:'var(--accent)'}}>{stats.passed}</div><div className="stat-label">Passés</div></div>
            <div className="stat"><div className="stat-value" style={{color:'var(--warn)'}}>{stats.notPassed}</div><div className="stat-label">Restants</div></div>
          </div>

          {!isClosed && <EndOfDistribReminder session={session} currentSite={currentSite} notPassed={visible.filter(o => !isPassed(o))} />}

          {hideNames ? (
            <div className="empty-state">
              <div className="icon">🔒</div>
              <p>Liste des clients masquée après la clôture.<br/>Consulter le suivi si besoin.</p>
            </div>
          ) : (
            <>
              <div className="search-box">
                <input type="text" value={search} onChange={e => setSearch(e.target.value)} placeholder="Rechercher…" />
              </div>
              <div className="filter-row">
                <div className={`chip ${filter==='not_passed'?'selected':''}`} onClick={()=>setFilter('not_passed')}>Non passés ({stats.notPassed})</div>
                <div className={`chip ${filter==='passed'?'selected':''}`} onClick={()=>setFilter('passed')}>Passés ({stats.passed})</div>
                <div className={`chip ${filter==='all'?'selected':''}`} onClick={()=>setFilter('all')}>Tous</div>
              </div>

              {filtered.length === 0 ? (
                <div className="empty-state">
                  <div className="icon">{stats.notPassed === 0 && stats.total > 0 ? '🎉' : '📭'}</div>
                  <p>{stats.notPassed === 0 && stats.total > 0 ? 'Tous passés !' : 'Aucun client.'}</p>
                </div>
              ) : (
                <div className="list">
                  {filtered.map(o => {
                    const passed = isPassed(o);
                    const amt = orderAmounts(o);
                    const rfTotal = orderRefundTotal(o);
                    const reelNet = amt.reel - rfTotal;
                    // V4 : les données pain/ND/casiers sont directement dans la commande chargée
                    const isV4 = Array.isArray(o.items) || Array.isArray(o.pains) || Array.isArray(o.casiersFrais);
                    const cd = (!isV4 && dispatch) ? buildClientDispatch(o, dispatch.master, dispatch.frais, dispatch.sec) : null;
                    // Casiers
                    const casiersFrais = isV4 ? (o.casiersFrais || []) : (cd ? cd.frais.map(f => f.casier) : []);
                    const casiersSec   = isV4 ? (o.casiersSec || [])   : (cd ? cd.sec.map(s => s.casier) : []);
                    // Pain / ND / frais
                    const pains      = isV4 ? (o.pains || []) : (cd ? cd.sec.flatMap(s => s.produits) : []);
                    const ndItems    = isV4 ? (o.nds || [])   : [];
                    const fraisItems = isV4 ? (o.frais || []) : (cd ? cd.frais.flatMap(f => f.produits) : []);
                    // Dispatch dernière minute pour les casiers de ce client (inchangé)
                    const lmItems = (casiersFrais.length || casiersSec.length)
                      ? [...casiersFrais, ...casiersSec].flatMap(cas => (lmByCasier[cas] || []))
                      : [];
                    const allCasiers = [...casiersFrais.map(c=>({c,t:'F'})), ...casiersSec.map(c=>({c,t:'S'}))];
                    const clickable = isV4 || cd; // détail ouvrable si on a des données
                    return (
                      <div key={o.orderId} className={`list-item order-row ${passed ? 'passed' : ''}`}>
                        <div className="list-item-main" style={clickable ? {cursor:'pointer'} : {}} onClick={() => clickable && setSelectedClient(o)}>
                          <div className="list-item-name">
                            <span className={`indicator-dot ${passed ? 'passed' : 'not-passed'}`}></span>
                            {displayName(o)}
                            {o._mergedCount > 1 && (
                              <span className="badge" style={{marginLeft:6,background:'var(--info-soft)',color:'var(--info)',fontSize:10}}>🔗 fusionné ×{o._mergedCount}</span>
                            )}
                            {allCasiers.length > 0 && (
                              <span style={{marginLeft:8,display:'inline-flex',gap:4,flexWrap:'wrap'}}>
                                {allCasiers.map((x,i) => (
                                  <span key={i} className="badge" style={{background:x.t==='S'?'var(--warn-soft)':'var(--accent-soft)',color:x.t==='S'?'var(--warn)':'var(--accent-dark)'}}>
                                    {x.t==='S'?'🍞':'🧊'} {x.c}
                                  </span>
                                ))}
                              </span>
                            )}
                            {!isV4 && dispatch && !cd && (
                              <span className="badge" style={{marginLeft:8,background:'var(--bg-muted)',color:'var(--ink-mute)'}}>hors master</span>
                            )}
                          </div>
                          {/* Résumé : pain 🍞 + ND 🥬 + dispatch dernière minute */}
                          {(pains.length > 0 || ndItems.length > 0 || lmItems.length > 0) && (
                            <div style={{marginTop:4,display:'flex',flexDirection:'column',gap:2,fontSize:12}}>
                              {pains.length > 0 && (
                                <div style={{color:'var(--warn)'}}>🍞 {pains.map(p => p.produit + (p.qty>1?` ×${p.qty}`:'')).join(', ')}</div>
                              )}
                              {ndItems.length > 0 && (
                                <div style={{color:'var(--accent-dark)',fontWeight:600}}>🥬 {ndItems.map(p => p.produit + (p.qty>1?` ×${p.qty}`:'')).join(', ')}</div>
                              )}
                              {lmItems.length > 0 && (
                                <div style={{
                                  marginTop:4, color:'#fff', fontWeight:700, fontSize:12,
                                  background:'var(--danger)', borderRadius:6, padding:'4px 8px',
                                  display:'inline-block',
                                }}>
                                  🔴 ND Dernière minute (Supprimé dans l'autre appli — à RAJOUTER, sinon le client ne sera pas facturé !) : {lmItems.map(p => p.produit + (p.qty>1?` ×${p.qty}`:'')).join(', ')}
                                </div>
                              )}
                            </div>
                          )}
                          <div className="list-item-sub" style={{marginTop:4,display:'flex',gap:10,alignItems:'baseline',flexWrap:'wrap'}}>
                            <span style={{fontWeight:700,fontSize:13}}>{fmtEuro(reelNet)}</span>
                            {(reelNet !== amt.theorique) && (
                              <span style={{fontSize:11,color:'var(--ink-mute)'}}>
                                / {fmtEuro(amt.theorique)} théorique
                                {amt.manquant > 0 && <span style={{color:'var(--warn)'}}> · −{fmtEuro(amt.manquant)} rupture</span>}
                                {amt.remise > 0 && <span style={{color:'var(--info)'}}> · −{fmtEuro(amt.remise)} remise</span>}
                                {rfTotal > 0 && <span style={{color:'var(--info)'}}> · −{fmtEuro(rfTotal)} remb.</span>}
                              </span>
                            )}
                          </div>
                          <div className="list-item-sub">
                            {o.hasPhone
                              ? <a href={`tel:${o.telephone}`} onClick={e=>e.stopPropagation()} style={{color:'var(--accent-dark)',fontWeight:600}}>📞 {o.telephone}</a>
                              : <span style={{color:'var(--warn)'}}>✉️ Email</span>}
                            {session.isMaster && o.email && <span style={{color:'var(--ink-mute)'}}>· {o.email}</span>}
                            <span style={{color:'var(--info)',marginLeft:6}}>· détail ›</span>
                          </div>
                        </div>
                        <button className={passed ? 'btn-secondary' : 'btn-primary'} onClick={() => togglePassed(o)} disabled={isClosed} style={{padding:'8px 12px',fontSize:13,minWidth:90}}>
                          {passed ? '↩ Annuler' : '✓ Passé'}
                        </button>
                      </div>
                    );
                  })}
                </div>
              )}
            </>
          )}

          {selectedClient && !dispatch && (Array.isArray(selectedClient.items)) && (
            <ClientDetailV4 order={selectedClient} lmByCasier={lmByCasier} session={session} onClose={() => setSelectedClient(null)} />
          )}
          {selectedClient && dispatch && (
            <DispatchModal
              order={selectedClient}
              clientDispatch={buildClientDispatch(selectedClient, dispatch.master, dispatch.frais, dispatch.sec)}
              nd={dispatch.nd}
              lmByCasier={lmByCasier}
              onClose={() => setSelectedClient(null)}
            />
          )}
        </div>
      );
    }

    // ============================================================
    // MODAL DÉTAIL CLIENT V4 — commande complète (frais / pain / ND)
    // ============================================================
    // Modal de remboursement / remise sur un produit d'une commande.
    // 4 façons de saisir, l'app calcule le % et le montant remboursé :
    //  • Retrait total (100%)  • X cassés sur Y (œufs…)  • Poids réel < prévu  • Remise directe %
    function RefundModal({ order, product, session, existing, onClose }) {
      const showToast = React.useContext(ToastContext);
      const lineCents = (product.consumer_price || 0) * (product.qty || 1);
      const name = product.produit || '';
      const unitHint = (() => { const m = name.match(/(?:x|par\s*)(\d{1,3})\b/i) || name.match(/(\d{1,3})\s*(?:oeufs|œufs|pi[èe]ces?|pcs|unit[ée]s?)/i); return m ? +m[1] : ''; })();
      const weightHint = (() => { const m = name.match(/(\d+(?:[.,]\d+)?)\s*(kg|g|gr|grammes?)\b/i); if (!m) return ''; let v = parseFloat(m[1].replace(',', '.')); if (/kg/i.test(m[2])) v *= 1000; return Math.round(v); })();
      const [mode, setMode] = React.useState(existing ? existing.mode : 'units');
      const [brokenN, setBrokenN] = React.useState('1');
      const [totalN, setTotalN] = React.useState(unitHint ? String(unitHint) : '');
      const [wTarget, setWTarget] = React.useState(weightHint ? String(weightHint) : '');
      const [wReal, setWReal] = React.useState('');
      const [pctDirect, setPctDirect] = React.useState('10');

      let pct = 0;
      if (mode === 'total') pct = 100;
      else if (mode === 'units') { const b = +brokenN || 0, t = +totalN || 0; pct = t > 0 ? Math.min(100, Math.round((b / t) * 100)) : 0; }
      else if (mode === 'weight') { const W = +wTarget || 0, R = +wReal || 0; pct = (W > 0 && R >= 0) ? Math.max(0, Math.min(100, Math.round(((W - R) / W) * 100))) : 0; }
      else if (mode === 'pct') pct = Math.max(0, Math.min(100, Math.round(+pctDirect || 0)));
      const refundCents = Math.round(lineCents * pct / 100);

      const MODES = [
        { id: 'units', label: '🥚 Unités cassées' },
        { id: 'weight', label: '⚖️ Poids insuffisant' },
        { id: 'pct', label: '% Remise directe' },
        { id: 'total', label: '🗑️ Retrait total' },
      ];
      const numStyle = { width: 80, height: 48, fontSize: 22, textAlign: 'center', fontWeight: 700, border: '1px solid var(--border)', borderRadius: 10 };
      const stepBtn = { width: 44, height: 48, fontSize: 24, fontWeight: 800, border: '1px solid var(--border)', borderRadius: 10, background: 'var(--bg-card,#fff)', cursor: 'pointer', lineHeight: 1 };

      const save = async () => {
        if (pct <= 0) { showToast("Indique d'abord la remise"); return; }
        const dayKey = activeDay();
        const id = `${order.orderId}__${product.id || normalizeText(product.produit)}`;
        const detail = mode === 'units' ? `${brokenN} cassé(s) sur ${totalN}` : mode === 'weight' ? `${wReal} g au lieu de ${wTarget} g` : mode === 'pct' ? `remise ${pct}%` : 'retrait total';
        await storage.setDoc(`day_${dayKey}_refunds`, id, {
          orderId: order.orderId, productId: product.id || '', produit: product.produit, producteur: product.producteur || '',
          client: order.name || displayName(order), email: order.email || '', site: order.site,
          qty: product.qty || 1, lineCents, pct, refundCents, mode, detail,
          status: 'a_qualifier', reason: '', createdBy: (session && session.name) || '', createdAt: new Date().toISOString(),
        });
        showToast(`✓ Remboursement ${pct}% (${fmtEuro(refundCents)}) → Qualité`);
        onClose();
      };
      const remove = async () => {
        const dayKey = activeDay();
        const id = `${order.orderId}__${product.id || normalizeText(product.produit)}`;
        await storage.deleteDoc(`day_${dayKey}_refunds`, id);
        showToast('Remboursement annulé');
        onClose();
      };

      return (
        <div className="modal-backdrop" onClick={(e) => { if (e.target.className === 'modal-backdrop') onClose(); }} style={{ zIndex: 1000 }}>
          <div className="modal" style={{ maxWidth: 440 }}>
            <div className="modal-header">
              <h2 style={{ fontSize: 16 }}>Remise · {product.produit}</h2>
              <button className="modal-close" onClick={onClose}>×</button>
            </div>
            <div style={{ fontSize: 13, color: 'var(--ink-soft)', marginBottom: 10 }}>
              Prix de la ligne : <strong>{fmtEuro(lineCents)}</strong> ({product.qty || 1} × {fmtEuro(product.consumer_price || 0)})
            </div>

            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 12 }}>
              {MODES.map(m => (
                <button key={m.id} onClick={() => setMode(m.id)}
                  style={{ flex: '1 1 45%', minHeight: 44, fontSize: 13, fontWeight: 700, borderRadius: 10, cursor: 'pointer',
                    border: mode === m.id ? '2px solid var(--accent)' : '1px solid var(--border)',
                    background: mode === m.id ? 'var(--accent)' : 'var(--bg-card,#fff)', color: mode === m.id ? '#fff' : 'var(--ink)' }}>
                  {m.label}
                </button>
              ))}
            </div>

            {mode === 'units' && (
              <div style={{ marginBottom: 12 }}>
                <div style={{ fontSize: 13, marginBottom: 6 }}>Combien de cassés / manquants, sur combien dans le lot ?</div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, justifyContent: 'center', flexWrap: 'wrap' }}>
                  <button style={stepBtn} onClick={() => setBrokenN(String(Math.max(0, (+brokenN || 0) - 1)))}>−</button>
                  <input type="number" inputMode="numeric" value={brokenN} onChange={e => setBrokenN(e.target.value)} style={numStyle} />
                  <button style={stepBtn} onClick={() => setBrokenN(String((+brokenN || 0) + 1))}>+</button>
                  <span style={{ fontSize: 18, fontWeight: 700 }}>sur</span>
                  <input type="number" inputMode="numeric" value={totalN} onChange={e => setTotalN(e.target.value)} placeholder="lot" style={numStyle} />
                </div>
              </div>
            )}
            {mode === 'weight' && (
              <div style={{ marginBottom: 12 }}>
                <div style={{ fontSize: 13, marginBottom: 6 }}>Poids réel pesé, et poids prévu (étiquette) — en grammes :</div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, justifyContent: 'center', flexWrap: 'wrap' }}>
                  <div style={{ textAlign: 'center' }}>
                    <input type="number" inputMode="decimal" value={wReal} onChange={e => setWReal(e.target.value)} placeholder="réel" style={numStyle} />
                    <div style={{ fontSize: 11, color: 'var(--ink-mute)' }}>réel (g)</div>
                  </div>
                  <span style={{ fontSize: 18 }}>/</span>
                  <div style={{ textAlign: 'center' }}>
                    <input type="number" inputMode="decimal" value={wTarget} onChange={e => setWTarget(e.target.value)} placeholder="prévu" style={numStyle} />
                    <div style={{ fontSize: 11, color: 'var(--ink-mute)' }}>prévu (g)</div>
                  </div>
                </div>
              </div>
            )}
            {mode === 'pct' && (
              <div style={{ marginBottom: 12 }}>
                <div style={{ fontSize: 13, marginBottom: 6 }}>Remise à appliquer :</div>
                <div style={{ display: 'flex', gap: 6, justifyContent: 'center', flexWrap: 'wrap' }}>
                  {[5, 10, 15, 20, 25, 30, 50].map(p => (
                    <button key={p} onClick={() => setPctDirect(String(p))}
                      style={{ minWidth: 48, height: 44, fontSize: 16, fontWeight: 700, borderRadius: 10, cursor: 'pointer',
                        border: (+pctDirect === p) ? '2px solid var(--accent)' : '1px solid var(--border)',
                        background: (+pctDirect === p) ? 'var(--accent)' : 'var(--bg-card,#fff)', color: (+pctDirect === p) ? '#fff' : 'var(--ink)' }}>{p}%</button>
                  ))}
                </div>
              </div>
            )}
            {mode === 'total' && (
              <div style={{ marginBottom: 12, fontSize: 13, color: 'var(--ink-soft)' }}>Produit entièrement retiré → remboursement de 100 %.</div>
            )}

            <div style={{ textAlign: 'center', padding: '10px', background: 'var(--accent-soft)', borderRadius: 10, marginBottom: 12 }}>
              <div style={{ fontSize: 13, color: 'var(--ink-soft)' }}>Remboursement</div>
              <div style={{ fontSize: 28, fontWeight: 800 }}>{pct}% · {fmtEuro(refundCents)}</div>
            </div>

            <div style={{ display: 'flex', gap: 8 }}>
              <button className="btn-primary" style={{ flex: 1, height: 48, fontSize: 16 }} onClick={save}>✓ Appliquer</button>
              {existing && <button className="btn-secondary" style={{ height: 48 }} onClick={remove}>Annuler la remise</button>}
            </div>
          </div>
        </div>
      );
    }

    function ClientDetailV4({ order, lmByCasier, session, onClose }) {
      const o = order;
      const dayKey = activeDay();
      const [refunds, setRefunds] = React.useState([]);
      const [refundFor, setRefundFor] = React.useState(null); // produit en cours de remise
      const orderIds = o._subOrderIds || [o.orderId];
      React.useEffect(() => {
        const u = storage.subscribe(`day_${dayKey}_refunds`, (arr) => {
          setRefunds((arr || []).filter(r => orderIds.includes(r.orderId)));
        });
        return () => { u && u(); };
      }, [o.orderId, dayKey]);
      const refundByProd = {};
      for (const r of refunds) refundByProd[r.productId || r.produit] = r;
      const totalRefund = refunds.reduce((s, r) => s + (r.refundCents || 0), 0);

      const amt = orderAmounts(o);
      const reelNet = amt.reel - totalRefund;
      const casiers = [...(o.casiersFrais || []).map(c => ({ c, t: '🧊' })), ...(o.casiersSec || []).map(c => ({ c, t: '🍞' }))];
      const lm = [...(o.casiersFrais || []), ...(o.casiersSec || [])].flatMap(cas => (lmByCasier && lmByCasier[cas]) || []);
      const reducedByKey = {};
      for (const r of (o.reduced || [])) reducedByKey[r.id || r.produit] = r.percentage || 0;
      const lineEuro = (p) => fmtEuro((p.consumer_price || 0) * (p.qty || 1));

      const Section = ({ emoji, titre, items, color }) => (
        items && items.length > 0 ? (
          <div style={{ marginBottom: 12 }}>
            <h4 style={{ margin: '0 0 6px', fontSize: 13, color }}>{emoji} {titre}</h4>
            <div className="stack" style={{ gap: 3 }}>
              {items.map((p, i) => {
                const pct = reducedByKey[p.id || p.produit] || 0;
                const rf = refundByProd[p.id || p.produit];
                return (
                  <div key={i} style={{ padding: '4px 0', borderBottom: '1px solid var(--border)' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', gap: 8, fontSize: 13, alignItems: 'center' }}>
                      <span style={{ minWidth: 0 }}>{p.produit}{p.producteur ? ` · ${p.producteur}` : ''}{pct > 0 && <span style={{ color: 'var(--info)', fontSize: 11 }}> · −{pct}%</span>}</span>
                      <span style={{ whiteSpace: 'nowrap', display: 'flex', alignItems: 'center', gap: 6 }}>
                        <span><strong>×{p.qty}</strong> <span style={{ color: 'var(--ink-mute)' }}>{lineEuro(p)}</span></span>
                        <button onClick={() => setRefundFor(p)} title="Remise / remboursement"
                          style={{ border: rf ? '1px solid var(--info)' : '1px solid var(--border)', background: rf ? 'var(--info-soft)' : 'var(--bg-card,#fff)', color: rf ? 'var(--info)' : 'var(--ink-soft)', borderRadius: 8, padding: '4px 8px', fontSize: 12, cursor: 'pointer', whiteSpace: 'nowrap' }}>
                          {rf ? `−${rf.pct}%` : '⚠️'}
                        </button>
                      </span>
                    </div>
                    {rf && <div style={{ fontSize: 11, color: 'var(--info)', marginTop: 2 }}>Remboursement {fmtEuro(rf.refundCents)} ({rf.detail}) · {rf.status === 'qualified' ? `qualifié : ${rf.reason}` : '🕒 à qualifier en Qualité'}</div>}
                  </div>
                );
              })}
            </div>
          </div>
        ) : null
      );

      return (
        <div className="modal-backdrop" onClick={(e) => { if (e.target.className === 'modal-backdrop') onClose(); }}>
          <div className="modal">
            <div className="modal-header">
              <h2>{o.name || displayName(o)}{o._mergedCount > 1 && <span style={{ fontSize: 12, fontWeight: 400, color: 'var(--info)' }}> · 🔗 {o._mergedCount} commandes</span>}</h2>
              <button className="modal-close" onClick={onClose}>×</button>
            </div>
            <div style={{ display: 'flex', gap: 12, alignItems: 'baseline', marginBottom: 10, padding: '8px 10px', background: 'var(--bg-muted)', borderRadius: 8, flexWrap: 'wrap' }}>
              <div><div style={{ fontSize: 11, color: 'var(--ink-mute)' }}>Réel (à payer)</div><div style={{ fontWeight: 800, fontSize: 18 }}>{fmtEuro(reelNet)}</div></div>
              <div><div style={{ fontSize: 11, color: 'var(--ink-mute)' }}>Théorique (tout)</div><div style={{ fontWeight: 600, fontSize: 15, color: 'var(--ink-soft)' }}>{fmtEuro(amt.theorique)}</div></div>
              {amt.manquant > 0 && <div><div style={{ fontSize: 11, color: 'var(--ink-mute)' }}>Ruptures</div><div style={{ fontWeight: 600, fontSize: 14, color: 'var(--warn)' }}>−{fmtEuro(amt.manquant)}</div></div>}
              {amt.remise > 0 && <div><div style={{ fontSize: 11, color: 'var(--ink-mute)' }}>Remises</div><div style={{ fontWeight: 600, fontSize: 14, color: 'var(--info)' }}>−{fmtEuro(amt.remise)}</div></div>}
              {totalRefund > 0 && <div><div style={{ fontSize: 11, color: 'var(--ink-mute)' }}>Remboursements</div><div style={{ fontWeight: 700, fontSize: 14, color: 'var(--info)' }}>−{fmtEuro(totalRefund)}</div></div>}
            </div>
            <div style={{ marginBottom: 10 }}>
              {casiers.length > 0 && (
                <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap', marginBottom: 8 }}>
                  {casiers.map((x, i) => <span key={i} className="badge" style={{ background: x.t === '🍞' ? 'var(--warn-soft)' : 'var(--accent-soft)', color: x.t === '🍞' ? 'var(--warn)' : 'var(--accent-dark)' }}>{x.t} {x.c}</span>)}
                </div>
              )}
              {o.tel && <div style={{ fontSize: 13 }}>📞 <a href={`tel:${o.tel}`}>{o.tel}</a></div>}
            </div>
            <div style={{ fontSize: 11, color: 'var(--ink-mute)', marginBottom: 8 }}>Touche ⚠️ sur un produit pour appliquer une remise / remboursement (œuf cassé, poids manquant…).</div>
            <Section emoji="🥬" titre="Non-dispatch (à remettre à la main)" items={o.nds} color="var(--accent-dark)" />
            <Section emoji="🍞" titre="Pain" items={o.pains} color="var(--warn)" />
            <Section emoji="🧊" titre="Frais (en casier)" items={o.frais} color="var(--accent)" />
            {lm.length > 0 && (
              <div style={{ marginBottom: 12, background: 'var(--danger)', borderRadius: 8, padding: '10px 12px', color: '#fff' }}>
                <h4 style={{ margin: '0 0 6px', fontSize: 13, color: '#fff' }}>🔴 ND à rajouter au client (non facturé)</h4>
                <div style={{ fontSize: 12, opacity: 0.9, marginBottom: 6 }}>Ces articles étaient manquants : à ajouter manuellement, ils ne sont pas sur la commande.</div>
                <div className="stack" style={{ gap: 3 }}>
                  {lm.map((p, i) => (
                    <div key={i} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, padding: '2px 0' }}>
                      <span>{p.produit}{p.producteur ? ` · ${p.producteur}` : ''}</span>
                      <strong>×{p.qty}</strong>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {o.removed && o.removed.length > 0 && (
              <div style={{ marginTop: 8, marginBottom: 4 }}>
                <h4 style={{ margin: '0 0 6px', fontSize: 13, color: 'var(--warn)' }}>⚠️ Ruptures (non livré, non facturé)</h4>
                <div className="stack" style={{ gap: 3 }}>
                  {o.removed.map((r, i) => (
                    <div key={i} style={{ display: 'flex', justifyContent: 'space-between', gap: 8, fontSize: 13, padding: '3px 0', borderBottom: '1px dashed var(--border)', color: 'var(--ink-soft)' }}>
                      <span style={{ minWidth: 0 }}>{r.produit}{r.producteur ? ` · ${r.producteur}` : ''}</span>
                      <span style={{ whiteSpace: 'nowrap' }}><strong>×{r.qty}</strong> <span style={{ color: 'var(--ink-mute)' }}>{lineEuro(r)}</span></span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
          {refundFor && <RefundModal order={o} product={refundFor} session={session} existing={refundByProd[refundFor.id || refundFor.produit]} onClose={() => setRefundFor(null)} />}
        </div>
      );
    }

    // ============================================================
    // MODAL DISPATCH CLIENT — casiers frais/sec + produits + ND
    // ============================================================
    function DispatchModal({ order, clientDispatch, nd, lmByCasier, onClose }) {
      const cd = clientDispatch;
      const renderCasierBlock = (entry, type) => {
        const color = type === 'frais' ? 'var(--accent)' : 'var(--warn)';
        const totalQty = entry.produits.reduce((s, p) => s + (p.qty || 1), 0);
        const lm = (lmByCasier && lmByCasier[entry.casier]) || [];
        return (
          <div key={type + entry.casier} className="card-flat" style={{padding:'12px 14px', marginBottom:10}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
              <span style={{fontWeight:700,fontSize:15,color}}>
                Casier {type} n°{entry.casier}
              </span>
              <span className="badge badge-info">{entry.produits.length} produit{entry.produits.length>1?'s':''}{totalQty>entry.produits.length?` · ${totalQty} art.`:''}</span>
            </div>
            {entry.produits.length === 0 ? (
              <div style={{color:'var(--ink-mute)',fontSize:13,fontStyle:'italic'}}>Aucun produit dispatché dans ce casier aujourd'hui.</div>
            ) : (
              <div className="stack" style={{gap:6}}>
                {entry.produits.map((p, i) => (
                  <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',gap:10,fontSize:14,borderBottom:'1px solid var(--line)',paddingBottom:5}}>
                    <span>
                      <strong>{p.produit}</strong>
                      {p.producteur && <span style={{color:'var(--ink-mute)',fontSize:12}}> · {p.producteur}</span>}
                    </span>
                    {p.qty > 1 && <span className="badge badge-anom" style={{whiteSpace:'nowrap'}}>×{p.qty}</span>}
                  </div>
                ))}
              </div>
            )}
            {lm.length > 0 && (
              <div style={{marginTop:8,padding:'8px 10px',background:'var(--danger)',borderRadius:'var(--radius-sm)',color:'#fff'}}>
                <div style={{fontSize:12,fontWeight:700,marginBottom:4}}>🔴 ND à rajouter (non facturé)</div>
                {lm.map((p, i) => (
                  <div key={i} style={{fontSize:13,display:'flex',justifyContent:'space-between'}}>
                    <span>{p.produit}</span>{p.qty>1 && <strong>×{p.qty}</strong>}
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      };

      return (
        <div className="modal-backdrop" onClick={(e) => { if (e.target.className === 'modal-backdrop') onClose(); }}>
          <div className="modal" style={{maxWidth:560}}>
            <div className="modal-header">
              <div>
                <strong style={{fontSize:17}}>📦 {displayName(order)}</strong>
                {cd?.telephone && <div style={{fontSize:13,color:'var(--ink-mute)'}}>📞 {cd.telephone}</div>}
              </div>
              <button className="modal-close" onClick={onClose}>×</button>
            </div>
            <div className="stack" style={{gap:14}}>
              {!cd ? (
                <div className="alert-warning">Ce client n'est pas dans le Master du jour.</div>
              ) : (
                <>
                  {/* FRAIS */}
                  <div>
                    <h3 style={{margin:'0 0 8px',fontSize:14,color:'var(--accent)'}}>🧊 Frais — {cd.frais.length} casier{cd.frais.length>1?'s':''}</h3>
                    {cd.frais.length === 0
                      ? <div style={{color:'var(--ink-mute)',fontSize:13}}>Aucun casier frais.</div>
                      : cd.frais.map(e => renderCasierBlock(e, 'frais'))}
                  </div>
                  {/* SEC */}
                  <div>
                    <h3 style={{margin:'0 0 8px',fontSize:14,color:'var(--warn)'}}>🍞 Sec — {cd.sec.length} casier{cd.sec.length>1?'s':''}</h3>
                    {cd.sec.length === 0
                      ? <div style={{color:'var(--ink-mute)',fontSize:13}}>Aucun casier sec.</div>
                      : cd.sec.map(e => renderCasierBlock(e, 'sec'))}
                  </div>
                  {/* ND — produits à remettre à la main (commun au site) */}
                  {nd && nd.length > 0 && (
                    <div>
                      <h3 style={{margin:'0 0 8px',fontSize:14,color:'var(--ink-soft)'}}>✋ Non-dispatch (à remettre à la main)</h3>
                      <div className="alert-info" style={{fontSize:12}}>Liste commune au site — vérifier la commande du client avant de remettre.</div>
                      <div className="stack" style={{gap:4,marginTop:8}}>
                        {nd.map((p, i) => (
                          <div key={i} style={{display:'flex',justifyContent:'space-between',fontSize:13,borderBottom:'1px solid var(--line)',paddingBottom:4}}>
                            <span>{p.produit}</span>
                            {p.total ? <span className="badge badge-info">total {p.total}</span> : null}
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </>
              )}
            </div>
          </div>
        </div>
      );
    }
    function QualityPage({ session, currentSite, orders, products, isClosed, consumersByEmail }) {
      const [anomalies, setAnomalies] = React.useState([]);
      const [refunds, setRefunds] = React.useState([]);
      const [showForm, setShowForm] = React.useState(false);
      const [editing, setEditing] = React.useState(null);
      const showToast = React.useContext(ToastContext);

      React.useEffect(() => {
        const unsub = storage.subscribe(`day_${activeDay()}_anomalies`, setAnomalies);
        return unsub;
      }, []);
      React.useEffect(() => {
        const u = storage.subscribe(`day_${activeDay()}_refunds`, setRefunds);
        return u;
      }, []);

      // Remboursements créés depuis le détail client, à qualifier (raison qualité).
      const QUAL_REASONS = [
        { id: 'casse', label: '💥 Casse' }, { id: 'pourri', label: '🤢 Pourri / abîmé' },
        { id: 'poids', label: '⚖️ Poids manquant' }, { id: 'dlc', label: '📅 DLC' },
        { id: 'erreur', label: '❌ Erreur prépa' }, { id: 'autre', label: '… Autre' },
      ];
      const siteRefunds = refunds.filter(r => r.site === currentSite);
      const toQualify = siteRefunds.filter(r => r.status !== 'qualified');
      const qualifyRefund = async (r, reasonId) => {
        await storage.setDoc(`day_${activeDay()}_refunds`, r.id, {
          ...r, status: 'qualified', reason: reasonId, qualifiedBy: session.name, qualifiedAt: new Date().toISOString(),
        });
        showToast('✓ Qualifié');
      };
      const cancelRefund = async (r) => {
        if (!confirm('Annuler ce remboursement ?')) return;
        await storage.deleteDoc(`day_${activeDay()}_refunds`, r.id);
        showToast('Annulé');
      };

      const visible = anomalies.filter(a => a.site === currentSite);
      const handleDelete = async (id) => {
        if (!confirm('Supprimer cette anomalie ?')) return;
        await storage.deleteDoc(`day_${activeDay()}_anomalies`, id);
        try { await storage.deleteDoc('pdp_returns', `pdpret_${id}`); } catch (e) {}
        try { await storage.deleteDoc('forgotten_items', `forg_${id}`); } catch (e) {}
        showToast('Supprimée');
      };

      const sitOrders = orders.filter(o => o.site === currentSite);

      // Si clôturé et pas master, le distrib ne voit plus les anomalies
      const hideAfterClose = isClosed && !session.isMaster;

      return (
        <div className="stack">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <h1>Qualité · {currentSite}</h1>
            {!isClosed && (
              <button className="btn-primary" onClick={() => { setEditing(null); setShowForm(true); }}>+ Nouvelle</button>
            )}
          </div>

          {isClosed && (
            <div className="alert-info">🔒 Journée clôturée</div>
          )}

          {hideAfterClose ? (
            <div className="empty-state">
              <div className="icon">🔒</div>
              <p>Anomalies masquées après la clôture.</p>
            </div>
          ) : (
            <>
              {/* Remboursements créés au détail client → à qualifier puis dispatcher vers la raison */}
              {siteRefunds.length > 0 && (
                <div className="card" style={{borderLeft:'4px solid var(--info)'}}>
                  <div style={{fontWeight:800,fontSize:15,marginBottom:6}}>🕒 Remboursements à qualifier {toQualify.length>0 && <span className="badge" style={{background:'var(--warn-soft)',color:'var(--warn)'}}>{toQualify.length}</span>}</div>
                  <div className="stack" style={{gap:8}}>
                    {siteRefunds.sort((a,b)=>(a.status==='qualified')-(b.status==='qualified')).map(r => (
                      <div key={r.id} style={{padding:'8px 10px',border:'1px solid var(--line)',borderRadius:8,background:r.status==='qualified'?'transparent':'var(--info-soft)'}}>
                        <div style={{display:'flex',justifyContent:'space-between',gap:8,alignItems:'baseline'}}>
                          <div style={{fontWeight:600,fontSize:13,minWidth:0}}>{r.produit} <span style={{color:'var(--ink-mute)',fontWeight:400}}>· {r.client}</span></div>
                          <div style={{whiteSpace:'nowrap',fontWeight:700,color:'var(--info)'}}>−{r.pct}% · {fmtEuro(r.refundCents)}</div>
                        </div>
                        <div style={{fontSize:11,color:'var(--ink-mute)',marginTop:2}}>{r.detail}{r.producteur?` · ${r.producteur}`:''} · par {r.createdBy}</div>
                        {r.status === 'qualified' ? (
                          <div style={{fontSize:12,color:'var(--ok,#2e7d32)',marginTop:6,display:'flex',justifyContent:'space-between'}}>
                            <span>✓ {(QUAL_REASONS.find(x=>x.id===r.reason)||{}).label || r.reason}</span>
                            {!isClosed && <button className="btn-ghost" style={{padding:'2px 6px',fontSize:11}} onClick={()=>cancelRefund(r)}>🗑️</button>}
                          </div>
                        ) : !isClosed ? (
                          <div style={{marginTop:8}}>
                            <div style={{fontSize:11,color:'var(--ink-soft)',marginBottom:4}}>Qualifier la raison :</div>
                            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                              {QUAL_REASONS.map(q => (
                                <button key={q.id} onClick={()=>qualifyRefund(r,q.id)}
                                  style={{border:'1px solid var(--border)',background:'var(--bg-card,#fff)',borderRadius:8,padding:'6px 10px',fontSize:12,cursor:'pointer'}}>{q.label}</button>
                              ))}
                              <button onClick={()=>cancelRefund(r)} style={{border:'none',background:'transparent',color:'var(--ink-mute)',fontSize:12,cursor:'pointer'}}>annuler</button>
                            </div>
                          </div>
                        ) : null}
                      </div>
                    ))}
                  </div>
                </div>
              )}

              <div className="stat-grid">
                <div className="stat"><div className="stat-value">{visible.length}</div><div className="stat-label">Anomalies</div></div>
                <div className="stat"><div className="stat-value">{visible.reduce((s,a) => s + (a.amountRefund||0), 0).toFixed(2)}€</div><div className="stat-label">Remboursé</div></div>
                <div className="stat"><div className="stat-value">{visible.reduce((s,a) => s + (a.amountCredit||0), 0).toFixed(2)}€</div><div className="stat-label">Avoirs</div></div>
              </div>

              {visible.length === 0 ? (
                <div className="empty-state"><div className="icon">📋</div><p>Pas d'anomalies aujourd'hui.</p></div>
              ) : (
                <div className="list">
                  {visible.sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||'')).map(a => (
                    <div key={a.id} className="list-item" style={{flexDirection:'column',alignItems:'stretch'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div className="list-item-name">{a.clientName || '(client inconnu)'}</div>
                          <div className="list-item-sub">
                            {formatDateShort(a.day || a.createdAt)} · {formatTimeFR(a.createdAt)} · {a.createdBy}
                          </div>
                          {a.productLabel && (
                            <div style={{fontSize:13,color:'var(--ink-soft)',marginTop:4,fontWeight:500}}>📦 {a.productLabel}</div>
                          )}
                        </div>
                        {!isClosed && (
                          <div style={{display:'flex',gap:4}}>
                            <button className="btn-ghost" onClick={() => { setEditing(a); setShowForm(true); }} style={{fontSize:13}}>✏️</button>
                            <button className="btn-ghost" onClick={() => handleDelete(a.id)} style={{fontSize:13}}>🗑️</button>
                          </div>
                        )}
                      </div>
                      <div style={{marginTop:8,display:'flex',flexWrap:'wrap',gap:4}}>
                        {(a.anomalyTypes||[]).map(t => {
                          const def = ANOMALIES.find(x => x.id === t);
                          return <span key={t} className={`badge badge-${def?.color==='danger'?'danger':'anom'}`}>{def?.label || t}</span>;
                        })}
                        {(a.actions||[]).map(t => {
                          const def = ACTIONS.find(x => x.id === t);
                          return <span key={t} className="badge badge-info">{def?.label || t}</span>;
                        })}
                      </div>
                      {(a.amountRefund > 0 || a.amountCredit > 0) && (
                        <div style={{marginTop:6,fontSize:13,color:'var(--ink-soft)'}}>
                          {a.amountRefund > 0 && <>Remb. {a.amountRefund.toFixed(2)}€ </>}
                          {a.amountCredit > 0 && <>· Avoir {a.amountCredit.toFixed(2)}€</>}
                        </div>
                      )}
                      {a.remark && <div style={{marginTop:6,fontSize:13,fontStyle:'italic',color:'var(--ink-soft)'}}>« {a.remark} »</div>}
                    </div>
                  ))}
                </div>
              )}
            </>
          )}

          {showForm && (
            <AnomalyForm orders={sitOrders} products={products} session={session} currentSite={currentSite} consumersByEmail={consumersByEmail} editing={editing} onClose={() => { setShowForm(false); setEditing(null); }} />
          )}
        </div>
      );
    }

    // ============================================================
    // PAGE CONSIGNES
    // ============================================================
    function ConsignesPage({ session, currentSite, orders, isClosed, consumersByEmail }) {
      const [consignes, setConsignes] = React.useState([]);
      const [showForm, setShowForm] = React.useState(false);
      const [editing, setEditing] = React.useState(null);
      const showToast = React.useContext(ToastContext);

      React.useEffect(() => {
        const unsub = storage.subscribe('consignes', setConsignes);
        return unsub;
      }, []);

      const visibleAll = consignes.filter(c => c.site === currentSite);
      const visibleToday = visibleAll.filter(c => c.day === todayKey());

      const handleDelete = async (id) => {
        if (!confirm('Supprimer cette consigne ?')) return;
        await storage.deleteDoc('consignes', id);
        showToast('Supprimée');
      };

      const setStatus = async (c, newStatus) => {
        await storage.setDoc('consignes', c.id, {
          ...c, status: newStatus,
          updatedBy: session.name, updatedAt: new Date().toISOString(),
        });
        showToast('Mis à jour');
      };

      const sitOrders = orders.filter(o => o.site === currentSite);
      const pending = visibleAll.filter(c => c.status !== 'credited');
      const totalPots = visibleToday.reduce((s, c) => s + (c.nbPots || 0), 0);

      // Distrib seulement peut saisir, master peut traiter
      const canCreate = session.role === 'distrib' && !isClosed;

      return (
        <div className="stack">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <h1>Consignes · {currentSite}</h1>
            {canCreate && (
              <button className="btn-primary" onClick={() => { setEditing(null); setShowForm(true); }}>+ Dépôt</button>
            )}
          </div>

          <p style={{color:'var(--ink-soft)',fontSize:13,marginTop:-8}}>
            Pots en verre déposés par les clients à reprendre en compte.
          </p>

          <div className="stat-grid">
            <div className="stat"><div className="stat-value">{visibleToday.length}</div><div className="stat-label">Aujourd'hui</div></div>
            <div className="stat"><div className="stat-value">{totalPots}</div><div className="stat-label">Pots jour</div></div>
            <div className="stat"><div className="stat-value" style={{color:'var(--warn)'}}>{pending.length}</div><div className="stat-label">À créditer</div></div>
          </div>

          {visibleAll.length === 0 ? (
            <div className="empty-state"><div className="icon">🍯</div><p>Pas de consignes enregistrées.</p></div>
          ) : (
            <div className="list">
              {visibleAll.sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||'')).map(c => (
                <div key={c.id} className="list-item" style={{flexDirection:'column',alignItems:'stretch'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div className="list-item-name">{c.clientName} · <strong>{c.nbPots} pot{c.nbPots>1?'s':''}</strong></div>
                      <div className="list-item-sub">
                        {formatDateShort(c.day || c.createdAt)} · {formatTimeFR(c.createdAt)} · {c.createdBy}
                      </div>
                    </div>
                    <div style={{display:'flex',gap:4,alignItems:'center'}}>
                      {c.status === 'credited' ? (
                        <span className="badge badge-ok">✓ Crédité</span>
                      ) : (
                        <span className="badge badge-anom">À traiter</span>
                      )}
                      {!isClosed && session.role === 'distrib' && (
                        <>
                          <button className="btn-ghost" onClick={() => { setEditing(c); setShowForm(true); }} style={{fontSize:13}}>✏️</button>
                          <button className="btn-ghost" onClick={() => handleDelete(c.id)} style={{fontSize:13}}>🗑️</button>
                        </>
                      )}
                    </div>
                  </div>
