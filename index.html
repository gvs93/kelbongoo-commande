<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Kelbongoo — Distribution v2</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script>
    if (window.pdfjsLib) {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
    }
  </script>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import {
      getFirestore, collection, doc, setDoc, getDoc, getDocs,
      onSnapshot, query, where, deleteDoc, updateDoc, writeBatch, serverTimestamp
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
    import {
      getAuth, signInAnonymously, onAuthStateChanged
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    window.__firebase = {
      initializeApp, getFirestore, collection, doc, setDoc, getDoc, getDocs,
      onSnapshot, query, where, deleteDoc, updateDoc, writeBatch, serverTimestamp,
      getAuth, signInAnonymously, onAuthStateChanged
    };
    window.dispatchEvent(new Event('firebase-ready'));
  </script>

  <style>
    /* === Design system — pastel naturel, plus aéré, plus pro === */
    :root {
      --bg: #f7f5f0;
      --bg-card: #ffffff;
      --bg-muted: #fcfaf6;
      --ink: #1f1d1a;
      --ink-soft: #57534d;
      --ink-mute: #94908a;
      --line: #e8e3da;
      --line-strong: #d6d0c4;
      --accent: #4a7c3b;
      --accent-dark: #355a29;
      --accent-soft: #ebf3e6;
      --warn: #b85820;
      --warn-soft: #fff1e6;
      --danger: #a32a2a;
      --danger-soft: #fde6e6;
      --info: #2c4a8c;
      --info-soft: #e1e8f5;
      --master: #6e4a9c;
      --master-soft: #f0e8fa;
      --prep: #b88a1a;
      --prep-soft: #fdf4dd;
      --radius: 12px;
      --radius-sm: 8px;
      --radius-lg: 18px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
      --shadow: 0 2px 6px rgba(0,0,0,.05), 0 1px 2px rgba(0,0,0,.03);
      --shadow-lg: 0 10px 25px rgba(0,0,0,.06), 0 4px 10px rgba(0,0,0,.04);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--ink); font-size: 15px;
      -webkit-font-smoothing: antialiased; min-height: 100vh;
      line-height: 1.5;
    }
    h1, h2, h3, h4 { margin: 0; font-weight: 600; letter-spacing: -0.015em; }
    h1 { font-size: 24px; line-height: 1.2; }
    h2 { font-size: 19px; line-height: 1.3; }
    h3 { font-size: 12px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
    p { margin: 0; }
    a { color: var(--accent-dark); text-decoration: none; }

    /* === BOUTONS === */
    button {
      font-family: inherit; font-size: 14px; font-weight: 500;
      border: none; border-radius: var(--radius-sm); padding: 10px 16px;
      cursor: pointer; transition: all .15s ease;
      -webkit-tap-highlight-color: transparent;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: white; box-shadow: var(--shadow-sm); }
    .btn-primary:hover:not(:disabled) { background: var(--accent-dark); }
    .btn-secondary { background: white; color: var(--ink); border: 1px solid var(--line); }
    .btn-secondary:hover:not(:disabled) { background: var(--bg-muted); border-color: var(--line-strong); }
    .btn-danger { background: var(--danger); color: white; }
    .btn-warn { background: var(--warn); color: white; }
    .btn-ghost { background: transparent; color: var(--ink-soft); padding: 8px 12px; }
    .btn-ghost:hover:not(:disabled) { background: rgba(0,0,0,0.04); color: var(--ink); }
    .btn-lg { padding: 14px 22px; font-size: 15px; border-radius: var(--radius); }
    .btn-block { width: 100%; }

    /* === FORMS === */
    input, select, textarea {
      font-family: inherit; font-size: 15px;
      padding: 11px 14px; border: 1px solid var(--line); border-radius: var(--radius-sm);
      background: white; width: 100%; transition: all .15s ease;
      color: var(--ink);
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    label {
      display: block; font-size: 12px; font-weight: 600; color: var(--ink-soft);
      margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .field { margin-bottom: 16px; }

    /* === LAYOUT === */
    .app-shell { max-width: 760px; margin: 0 auto; padding: 0 16px 90px; }
    .topbar {
      position: sticky; top: 0; z-index: 50;
      background: rgba(247, 245, 240, 0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between;
      margin: 0 -16px 18px; gap: 10px;
    }
    .topbar-title { display: flex; flex-direction: column; gap: 1px; min-width: 0; flex: 1; }
    .topbar-title strong { font-size: 15px; display: flex; align-items: center; gap: 6px; }
    .topbar-title small { font-size: 11px; color: var(--ink-mute); }
    .topbar-actions { display: flex; align-items: center; gap: 6px; }

    /* === BADGES === */
    .badge {
      display: inline-flex; align-items: center; padding: 3px 9px;
      border-radius: 999px; font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .badge-site { background: var(--accent-soft); color: var(--accent-dark); }
    .badge-master { background: var(--master-soft); color: var(--master); }
    .badge-prep { background: var(--prep-soft); color: var(--prep); }
    .badge-anom { background: var(--warn-soft); color: var(--warn); }
    .badge-info { background: var(--info-soft); color: var(--info); }
    .badge-danger { background: var(--danger-soft); color: var(--danger); }
    .badge-ok { background: var(--accent-soft); color: var(--accent-dark); }

    /* === CARDS === */
    .card {
      background: var(--bg-card); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 18px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 12px;
    }
    .card-flat { background: var(--bg-muted); border: 1px solid var(--line); box-shadow: none; }

    /* === TAB BAR === */
    .tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--line);
      display: flex; z-index: 100;
      padding: 6px 4px 8px;
    }
    .tab-bar button {
      flex: 1; background: transparent; color: var(--ink-mute);
      padding: 8px 2px; border-radius: var(--radius-sm);
      font-size: 10px; font-weight: 600;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      text-transform: uppercase; letter-spacing: 0.03em;
    }
    .tab-bar button.active { color: var(--accent); background: var(--accent-soft); }
    .tab-bar button .tab-icon { font-size: 19px; line-height: 1; }

    /* === STACK / ROW === */
    .stack { display: flex; flex-direction: column; gap: 12px; }
    .stack-sm { display: flex; flex-direction: column; gap: 6px; }
    .row { display: flex; gap: 10px; align-items: center; }
    .row > * { flex: 1; }
    .row-tight { display: flex; gap: 6px; align-items: center; }

    /* === CHIPS === */
    .chip-group { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      padding: 8px 13px; border-radius: 999px;
      border: 1px solid var(--line); background: white;
      font-size: 13px; cursor: pointer; transition: all .15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .chip:hover { border-color: var(--line-strong); }
    .chip.selected { background: var(--ink); color: white; border-color: var(--ink); }
    .chip-warn.selected { background: var(--warn); border-color: var(--warn); }
    .chip-danger.selected { background: var(--danger); border-color: var(--danger); }

    /* === LIST ITEMS === */
    .list { background: var(--bg-card); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--line); }
    .list-item {
      padding: 14px 16px; border-bottom: 1px solid var(--line);
      display: flex; justify-content: space-between; align-items: center; gap: 10px;
    }
    .list-item:last-child { border-bottom: none; }
    .list-item-main { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 0; }
    .list-item-name { font-weight: 600; font-size: 14px; color: var(--ink); }
    .list-item-sub { font-size: 12px; color: var(--ink-mute); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

    /* === EMPTY STATE === */
    .empty-state { text-align: center; padding: 40px 20px; color: var(--ink-mute); }
    .empty-state .icon { font-size: 42px; margin-bottom: 10px; opacity: 0.5; }
    .empty-state p { font-size: 14px; }

    /* === LOGIN === */
    .login-shell {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px;
      background: radial-gradient(ellipse at top, #ecf3e4 0%, #f7f5f0 60%);
    }
    .login-card {
      background: white; border-radius: var(--radius-lg); padding: 32px 28px;
      width: 100%; max-width: 400px; box-shadow: var(--shadow-lg);
      border: 1px solid var(--line);
    }
    .login-logo { text-align: center; margin-bottom: 24px; }
    .login-logo .title {
      font-size: 26px; font-weight: 700; color: var(--accent);
      letter-spacing: -0.02em;
    }
    .login-logo .subtitle { font-size: 12px; color: var(--ink-mute); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.08em; }

    /* Role tabs sur login */
    .role-tabs {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
      background: var(--bg-muted); padding: 4px; border-radius: var(--radius); margin-bottom: 18px;
    }
    .role-tab {
      padding: 10px 8px; border-radius: var(--radius-sm); text-align: center;
      cursor: pointer; font-size: 13px; font-weight: 600; transition: all .15s ease;
      color: var(--ink-soft); border: 1px solid transparent;
    }
    .role-tab.active { background: white; color: var(--ink); border-color: var(--line); box-shadow: var(--shadow-sm); }
    .role-tab .role-icon { display: block; font-size: 20px; margin-bottom: 2px; }

    /* === MODAL === */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      z-index: 200; display: flex; align-items: flex-end; justify-content: center;
      backdrop-filter: blur(2px);
    }
    .modal {
      background: white; width: 100%; max-width: 760px;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0; padding: 22px;
      max-height: 90vh; overflow-y: auto;
      animation: slideUp .25s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--line);
    }
    .modal-close {
      background: var(--bg-muted); border: none; font-size: 18px; width: 32px; height: 32px;
      border-radius: 50%; cursor: pointer; color: var(--ink-soft); padding: 0;
      display: flex; align-items: center; justify-content: center;
    }

    /* === SEARCH === */
    .search-box { position: relative; }
    .search-box input { padding-left: 38px; }
    .search-box::before {
      content: "🔍"; position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%); font-size: 14px; opacity: 0.5;
    }

    /* === TOAST === */
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: var(--ink); color: white; padding: 12px 20px;
      border-radius: 999px; font-size: 13px; z-index: 300;
      box-shadow: var(--shadow-lg);
      animation: fadeInUp .2s ease;
      max-width: 90%; text-align: center;
    }
    @keyframes fadeInUp { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }

    /* === UPLOAD ZONE === */
    .upload-zone {
      border: 2px dashed var(--line-strong); border-radius: var(--radius);
      padding: 22px; text-align: center; cursor: pointer;
      transition: all .15s ease; background: var(--bg-muted);
      display: block;
    }
    .upload-zone:hover { border-color: var(--accent); background: var(--accent-soft); }
    .upload-zone.has-file { border-style: solid; border-color: var(--accent); background: var(--accent-soft); }
    .upload-zone input { display: none; }
    .upload-icon { font-size: 26px; margin-bottom: 6px; opacity: 0.7; }

    /* === ALERTES === */
    .connection-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
    .connection-dot.live { background: #4ade80; animation: pulse 2s infinite; }
    .connection-dot.offline { background: var(--warn); }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

    .alert-warning {
      background: #fef9e0; border: 1px solid #f0d264; color: #6b4d0e;
      padding: 11px 14px; border-radius: var(--radius-sm); font-size: 13px;
    }
    .alert-red {
      background: var(--danger-soft); border: 2px solid var(--danger); color: var(--danger);
      padding: 12px 14px; border-radius: var(--radius); font-size: 13px; font-weight: 600;
    }
    .alert-info { background: var(--info-soft); border: 1px solid #c4d2f0; color: var(--info); padding: 10px 14px; border-radius: var(--radius-sm); font-size: 12px; }
    .alert-success { background: var(--accent-soft); border: 1px solid var(--accent); color: var(--accent-dark); padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px; }

    /* === FILTER ROW === */
    .filter-row { display: flex; gap: 6px; overflow-x: auto; padding: 4px 0 8px; -webkit-overflow-scrolling: touch; }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-row .chip { flex-shrink: 0; font-size: 12px; padding: 6px 12px; }

    /* === STATS === */
    .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .stat {
      background: white; padding: 14px 10px; border-radius: var(--radius);
      border: 1px solid var(--line); text-align: center;
    }
    .stat-value { font-size: 22px; font-weight: 700; color: var(--ink); }
    .stat-label { font-size: 10px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; font-weight: 600; }

    /* === CLIENT ROWS === */
    .order-row.passed { opacity: 0.5; }
    .order-row.passed .list-item-name { text-decoration: line-through; }
    .indicator-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; vertical-align: middle; }
    .indicator-dot.passed { background: var(--accent); }
    .indicator-dot.not-passed { background: #fbbf24; }

    /* === DISTRIB SECTION (suivi par date) === */
    details.distrib-section { margin-bottom: 12px; }
    details.distrib-section summary {
      cursor: pointer; padding: 14px 16px;
      background: white;
      border: 1px solid var(--line); border-radius: var(--radius);
      font-weight: 600; font-size: 14px; list-style: none;
      display: flex; justify-content: space-between; align-items: center;
    }
    details.distrib-section summary::-webkit-details-marker { display: none; }
    details.distrib-section[open] summary { border-radius: var(--radius) var(--radius) 0 0; border-bottom: none; }
    details.distrib-section > div { border: 1px solid var(--line); border-top: none; border-radius: 0 0 var(--radius) var(--radius); background: white; }
    .distrib-section.has-alert summary { background: var(--danger-soft); border-color: var(--danger); color: var(--danger); }
    .retour-pdp { background: var(--danger); color: white; padding: 8px 12px; border-radius: var(--radius-sm); font-weight: 600; font-size: 12px; text-align: center; margin: 10px 12px 4px; }

    /* === ARRIVED BANNER === */
    .arrived-banner {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      color: white; padding: 22px; border-radius: var(--radius-lg);
      text-align: center; margin-bottom: 20px;
      box-shadow: var(--shadow);
    }
    .arrived-banner h2 { color: white; margin-bottom: 6px; }
    .arrived-banner p { font-size: 13px; opacity: 0.9; }
    .arrived-banner button { background: white; color: var(--accent-dark); margin-top: 14px; font-weight: 600; }

    /* === PRODUCT SEARCH === */
    .product-list { max-height: 280px; overflow-y: auto; border: 1px solid var(--line); border-radius: var(--radius-sm); }
    .product-item { padding: 10px 14px; border-bottom: 1px solid var(--line); cursor: pointer; font-size: 14px; }
    .product-item:hover { background: var(--bg-muted); }
    .product-item.selected { background: var(--accent-soft); }
    .product-item small { display: block; color: var(--ink-mute); font-size: 11px; margin-top: 2px; }

    /* === DATE RANGE === */
    .date-range { display: flex; gap: 8px; align-items: center; }
    .date-range input { flex: 1; }

    /* === BAR CHART === */
    .bar-chart { display: flex; flex-direction: column; gap: 6px; padding: 8px 0; }
    .bar-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .bar-label { flex: 0 0 35%; color: var(--ink-soft); }
    .bar-track { flex: 1; height: 22px; background: var(--bg-muted); border-radius: 4px; overflow: hidden; position: relative; }
    .bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.3s ease; }
    .bar-value { flex: 0 0 50px; text-align: right; font-weight: 600; font-size: 12px; }

    /* === Responsive === */
    @media (max-width: 480px) {
      h1 { font-size: 20px; }
      .topbar-title strong { font-size: 14px; }
      .login-card { padding: 26px 20px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    // ============================================================
    // CONFIG
    // ============================================================
    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyDiOCgkDItazkaUfNC1kTjF9Z7K9rSqqow",
      authDomain: "distribkbg.firebaseapp.com",
      projectId: "distribkbg",
      storageBucket: "distribkbg.firebasestorage.app",
      messagingSenderId: "255791649801",
      appId: "1:255791649801:web:bcf2d080e524000f3194d8",
      measurementId: "G-XYQF244BCR"
    };

    const MASTER_PASSWORD = "Adminkelbongoo93!";
    const PREP_PASSWORD = "Prepa2026";   // mot de passe préparateurs
    const DISTRIB_PASSWORD = "Distrib2026";  // mot de passe distributeurs (partagé)
    const SITES = ["BAR","BIC","BOR","CES","CHA","DOM","FOR","LIL","NCA","NCC","PAD","PDC","PDP","ROB","ROM","STB","TOL"];

    // Calendrier des distributions Kelbongoo (jour JS : 0=dim … 6=sam).
    // Stable toute l'année. NB : PDP ne distribue PAS le samedi.
    const DISTRIB_SCHEDULE = {
      0: [],                                                           // dimanche
      1: [],                                                           // lundi
      2: [],                                                           // mardi
      3: ["BIC","BOR","STB","PDP","TOL"],                              // mercredi
      4: ["CHA","CES","BAR","LIL","NCC","NCA","BOR","DOM","PDC","PDP","ROB"], // jeudi
      5: ["BIC","BOR","PDP","STB"],                                    // vendredi
      6: ["DOM","CHA","CES","BAR","ROM","PAD","FOR","BIC","BOR","STB","ROB","TOL"], // samedi (PDP retiré)
    };
    // Locaux distribuant à une dayKey donnée
    function sitesForDate(dayKey) {
      const d = new Date(dayKey + 'T12:00:00');
      return DISTRIB_SCHEDULE[d.getDay()] || [];
    }
    // Y a-t-il une distribution ce jour-là ?
    function isDistribDay(dayKey) {
      return sitesForDate(dayKey).length > 0;
    }
    // Prochaine date de distribution à partir d'une dayKey (incluse). Renvoie null si rien dans 14 jours.
    function nextDistribDate(fromDayKey) {
      let d = fromDayKey;
      for (let i = 0; i < 14; i++) {
        if (isDistribDay(d)) return d;
        d = addDays(d, 1);
      }
      return null;
    }
    // Libellé court "samedi 30 mai"
    function dayLabelShort(dayKey) {
      const d = new Date(dayKey + 'T12:00:00');
      return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
    }
    const ALERT_DAYS_NON_RECUP = 7;

    const ANOMALIES = [
      { id:"casse", label:"Casse", color:"danger" },
      { id:"dlc", label:"DLC dépassée", color:"danger" },
      { id:"pourri", label:"Pourri / Moisi / Flétri / Abîmé", color:"danger" },
      { id:"en_trop", label:"En trop (non commandé)", color:"warn" },
      { id:"manque", label:"Manque (commandé, absent)", color:"warn" },
      { id:"erreur_produit", label:"Erreur produit (inversion)", color:"warn" },

    // ============================================================

    let fb = null;

    async function initFirebase() {
      if (FIREBASE_CONFIG.apiKey === "REMPLACE_MOI") return false;
      try {
        const { initializeApp, getFirestore, getAuth, signInAnonymously, onAuthStateChanged } = window.__firebase;
        const app = initializeApp(FIREBASE_CONFIG);
        const db = getFirestore(app);
        const auth = getAuth(app);
        fb = { db, auth, ...window.__firebase };

        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error('Auth timeout')), 10000);
          onAuthStateChanged(auth, (user) => {
            if (user) { clearTimeout(timer); resolve(); }
          });
          signInAnonymously(auth).catch(reject);
        });
        return true;
      } catch (e) { console.error("Firebase init failed", e); return false; }
    }

    // ============================================================
    // STORAGE
    // ============================================================
    const storage = {
      _key: (c, id) => `kb_distrib_${c}_${id || 'list'}`,
      async setDoc(c, id, data, opts = {}) {
        const merge = opts.replace ? false : true;
        if (firebaseConfigured) {
          await fb.setDoc(fb.doc(fb.db, c, id), { ...data, _ts: fb.serverTimestamp() }, { merge });
        } else {
          const key = this._key(c, 'list');
          const ex = JSON.parse(localStorage.getItem(key) || '{}');
          ex[id] = opts.replace ? { ...data, _ts: Date.now() } : { ...(ex[id] || {}), ...data, _ts: Date.now() };
          localStorage.setItem(key, JSON.stringify(ex));
          window.dispatchEvent(new CustomEvent('local-data-change', { detail: { collection: c } }));
        }
      },
      async deleteDoc(c, id) {
        if (firebaseConfigured) {
          await fb.deleteDoc(fb.doc(fb.db, c, id));
        } else {
          const key = this._key(c, 'list');
          const ex = JSON.parse(localStorage.getItem(key) || '{}');
          delete ex[id];
          localStorage.setItem(key, JSON.stringify(ex));
          window.dispatchEvent(new CustomEvent('local-data-change', { detail: { collection: c } }));
        }
      },
      async getAll(c) {
        if (firebaseConfigured) {
          const snap = await fb.getDocs(fb.collection(fb.db, c));
          return snap.docs.map(d => ({ id: d.id, ...d.data() }));
        } else {
          const key = this._key(c, 'list');
          const ex = JSON.parse(localStorage.getItem(key) || '{}');
          return Object.entries(ex).map(([id, data]) => ({ id, ...data }));
        }
      },
      // Lit un document par id, ou null s'il n'existe pas.
      async getDoc(c, id) {
        if (firebaseConfigured) {
          const snap = await fb.getDoc(fb.doc(fb.db, c, id));
          return snap.exists() ? { id: snap.id, ...snap.data() } : null;
        } else {
          const key = this._key(c, 'list');
          const ex = JSON.parse(localStorage.getItem(key) || '{}');
          return ex[id] ? { id, ...ex[id] } : null;
        }
      },
      // Supprime tous les documents d'une collection (utile pour reset).
      async deleteAll(c) {
        if (firebaseConfigured) {
          const snap = await fb.getDocs(fb.collection(fb.db, c));
          // Pas de writeBatch ici pour rester simple — vol. faible (qq docs/jour)
          for (const d of snap.docs) await fb.deleteDoc(fb.doc(fb.db, c, d.id));
        } else {
          localStorage.removeItem(this._key(c, 'list'));
          window.dispatchEvent(new CustomEvent('local-data-change', { detail: { collection: c } }));
        }
      },
      subscribe(c, callback) {
        if (firebaseConfigured) {
          return fb.onSnapshot(fb.collection(fb.db, c), (snap) => {
            callback(snap.docs.map(d => ({ id: d.id, ...d.data() })));
          });
        } else {
          const fire = () => { this.getAll(c).then(callback); };
          fire();
          const handler = (e) => { if (e.detail.collection === c) fire(); };
          window.addEventListener('local-data-change', handler);
          window.addEventListener('storage', fire);
          return () => {
            window.removeEventListener('local-data-change', handler);
            window.removeEventListener('storage', fire);
          };
        }
      },
    };

    // ============================================================
    // PARSING
    // ============================================================
    function parseOrdersCSV(csvText) {
      const parsed = Papa.parse(csvText, {
        header: true, delimiter: ';', skipEmptyLines: true,
        transformHeader: h => h.trim().replace(/^\uFEFF/, ''),
      });
      return parsed.data.map(row => {
        const email = (row.Consommateur || '').trim().toLowerCase();
        const nameRaw = (row['Adresse mail'] || '').trim();
        return {
          orderId: (row.ID || '').trim(),
          email, name: nameRaw,
          site: (row.Local || '').trim().toUpperCase(),
          amount: parseFloat(row.Montant || 0) / 100, // Montant en centimes → euros
          status: (row.Status || '').trim().toLowerCase(),
        };
      }).filter(o => {
        // On garde UNIQUEMENT les commandes avec status "compilée"
        // (les "fusionnée" sont anciennes versions déjà intégrées, à ignorer)
        if (!o.orderId || !o.site) return false;
        return o.status === 'compilée' || o.status === 'compilee';
      });
    }

    // ============================================================
    // NOUVEAU SYSTÈME DE CHARGEMENT (orders + produits + consommateurs JSON)
    // ============================================================
    const oid = (v) => (v && typeof v === 'object') ? (v.$oid || v.oid || '') : (v || '');
    const DISPATCH_TYPE = { 0: 'frais', 1: 'pain', 2: 'nd' };

    // v4_cache : la donnée est stockée en CHAÎNE JSON (un seul champ → une seule entrée
    // d'index Firestore, évite "too many index entries"). Rétro-compatible avec l'ancien
    // format objet imbriqué pour les caches déjà en place.
    function unpackCacheData(cached) {
      if (!cached || cached.data == null) return null;
      if (typeof cached.data === 'string') {
        try { return JSON.parse(cached.data); } catch (e) { return null; }
      }
      return cached.data; // ancien format (objet)
    }

    // Écrit un gros objet en le découpant en morceaux (~700 Ko) pour rester
    // sous la limite Firebase de 1 Mo par champ. Clés : <name> = méta, <name>_p0.._pN = morceaux.
    const CACHE_CHUNK = 700000;
    async function writeCache(name, obj) {
      const full = JSON.stringify(obj);
      const nParts = Math.max(1, Math.ceil(full.length / CACHE_CHUNK));
      // Écrit les morceaux
      for (let i = 0; i < nParts; i++) {
        const part = full.slice(i * CACHE_CHUNK, (i + 1) * CACHE_CHUNK);
        await storage.setDoc('v4_cache', `${name}_p${i}`, { part }, { replace: true });
      }
      // Méta en dernier (sert aussi de marqueur du nombre de morceaux)
      await storage.setDoc('v4_cache', name, { parts: nParts, updatedAt: new Date().toISOString() }, { replace: true });
    }

    // Lit un cache découpé. Rétro-compatible : ancien format mono-champ {data:...}.
    async function readCache(name) {
      const meta = await storage.getDoc('v4_cache', name);
      if (!meta) return null;
      if (meta.parts == null) return unpackCacheData(meta); // ancien format
      let full = '';
      for (let i = 0; i < meta.parts; i++) {
        const c = await storage.getDoc('v4_cache', `${name}_p${i}`);
        if (!c || c.part == null) return null;
        full += c.part;
      }
      try { return JSON.parse(full); } catch (e) { return null; }
    }

    // Lit le JSON produits → index par id { id: {name, producer, dispatchType} }
    function parseProducersJSON(jsonText) {
      const data = typeof jsonText === 'string' ? JSON.parse(jsonText) : jsonText;
      const arr = Array.isArray(data) ? data : (data.producerproducts || data.products || []);
      const byId = {};
      for (const p of arr) {
        const id = oid(p._id);
        if (!id) continue;
        byId[id] = {
          name: p.product_name || p.name || '',
          producer: p.producer_name || '',
          dispatchType: (p.dispatch_type === 0 || p.dispatch_type) ? p.dispatch_type : null,
          category: p.category_name || p.category || p.product_category || p.family || p.rayon || '',
        };
      }
      return byId;
    }

    // Lit le JSON consommateurs → index par id { id: {nom, email, tel} }
    function parseConsumersById(jsonTextOrArr) {
      const data = typeof jsonTextOrArr === 'string' ? JSON.parse(jsonTextOrArr) : jsonTextOrArr;
      const arr = Array.isArray(data) ? data : (data.consumers || []);
      const byId = {};
      for (const c of arr) {
        const id = oid(c._id);
        if (!id) continue;
        byId[id] = {
          nom: `${c.firstname || ''} ${c.lastname || ''}`.trim(),
          email: (c.email || '').trim().toLowerCase(),
          tel: (c.telephone || c.phone || '').replace(/\s+/g, ''),
        };
      }
      return byId;
    }

    // Lit le JSON orders (préparation) et construit les commandes enrichies.
    // statusKeep : tableau de statuts à conserver (défaut : tout sauf 8 et 0).
    // Renvoie { orders:[...], missingConsumers:Set, missingProducts:Set, dateKey }
    function parseOrdersJSON(jsonText, prodById, consById, statusKeep) {
      const data = typeof jsonText === 'string' ? JSON.parse(jsonText) : jsonText;
      const arr = Array.isArray(data) ? data : (data.orders || []);
      const keep = statusKeep || null; // null = règle par défaut
      const missingConsumers = new Set();
      const missingProducts = new Set();
      const aggManquants = {};
      const aggRemises = {};
      const out = [];
      let dateKey = null;

      for (const o of arr) {
        const status = o.status;
        // Filtre statut : si liste fournie, on garde ceux dedans ; sinon défaut = exclure 8 (annulé) et 0 (panier)
        if (keep) { if (!keep.includes(status)) continue; }
        else { if (status === 8 || status === 0) continue; }

        const cid = oid(o.consumer_id);
        const cons = consById[cid];
        if (!cons) missingConsumers.add(cid);

        // Date de distribution → clé jour (YYYYMMDD)
        const dIso = oid(o.distribution_date) || (o.distribution_date && o.distribution_date.$date) || o.distribution_date;
        if (dIso && !dateKey) {
          const d = new Date(dIso);
          if (!isNaN(d)) dateKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        // Produits commandés, classés par dispatch_type
        const items = (o.items || []).map(it => {
          const pid = oid(it.producerproduct_id);
          const p = prodById[pid];
          if (!p) missingProducts.add(pid);
          return {
            id: pid,
            produit: p ? p.name : '(produit inconnu)',
            producteur: p ? p.producer : '',
            qty: it.quantity || 1,
            dispatchType: p ? p.dispatchType : null,
            cat: p ? (DISPATCH_TYPE[p.dispatchType] || 'frais') : 'frais',
          };
        });

        out.push({
          orderId: oid(o._id),
          status,
          site: (o.locale || '').trim().toUpperCase(),
          consumerId: cid,
          name: cons ? cons.nom : '(client inconnu)',
          email: cons ? cons.email : '',
          tel: cons ? cons.tel : '',
          casiersFrais: (o.bacs_frais || []).map(String),
          casiersSec: (o.bacs_sec || []).map(String),
          items,
          pains: items.filter(i => i.cat === 'pain'),
          nds: items.filter(i => i.cat === 'nd'),
          frais: items.filter(i => i.cat === 'frais'),
          removed: (o.removed || []).map(r => {
            const p = prodById[oid(r.producerproduct_id)];
            return { produit: p ? p.name : '(inconnu)', qty: r.quantity || 1, reason: r.reason };
          }),
          reduced: (o.reduced || []).map(r => {
            const p = prodById[oid(r.producerproduct_id)];
            return { produit: p ? p.name : '(inconnu)', qty: r.quantity || 1, percentage: r.percentage };
          }),
        });

        // Agrégation des manquants (removed) et remisés (reduced) par produit
        const oSite = (o.locale || '').trim().toUpperCase();
        for (const r of (o.removed || [])) {
          const pid = oid(r.producerproduct_id);
          const p = prodById[pid];
          if (!aggManquants[pid]) aggManquants[pid] = { id: pid, produit: p ? p.name : '(produit inconnu)', producteur: p ? p.producer : '', qty: 0, clients: 0, bySite: {} };
          const qq = (r.quantity || 1);
          aggManquants[pid].qty += qq;
          aggManquants[pid].clients += 1;
          if (oSite) aggManquants[pid].bySite[oSite] = (aggManquants[pid].bySite[oSite] || 0) + qq;
        }
        for (const r of (o.reduced || [])) {
          const pid = oid(r.producerproduct_id);
          const p = prodById[pid];
          if (!aggRemises[pid]) aggRemises[pid] = { id: pid, produit: p ? p.name : '(produit inconnu)', producteur: p ? p.producer : '', qty: 0, clients: 0, percentage: r.percentage };
          aggRemises[pid].qty += (r.quantity || 1);
          aggRemises[pid].clients += 1;
        }
      }
      return {
        orders: out, missingConsumers, missingProducts, dateKey,
        manquants: Object.values(aggManquants),
        remises: Object.values(aggRemises),
      };
    }

    function parseProductsCSV(csvText) {

    // ============================================================
    // PARSING PDF (PDF.js) — Master, Dispatch frais/sec, Non-dispatch
    // Logique validée sur les PDF réels Kelbongoo (mêmes coordonnées X/Y
    // que pdfplumber). Tout se passe dans le navigateur, aucun upload serveur.
    // ============================================================

    // Lit un PDF (ArrayBuffer) et renvoie, page par page, des "lignes" de mots
    // regroupés par position verticale (baseline), chaque mot ayant {text, x}.
    async function pdfToRows(arrayBuffer) {
      const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      const pages = [];
      for (let p = 1; p <= pdf.numPages; p++) {
        const page = await pdf.getPage(p);
        const content = await page.getTextContent();
        const vh = page.getViewport({ scale: 1 }).height;
        // items -> mots {text, x, top}
        const words = [];
        for (const it of content.items) {
          const txt = (it.str || '').trim();
          if (!txt) continue;
          const x = it.transform[4];
          const top = vh - it.transform[5]; // origine bas-gauche -> top
          words.push({ text: txt, x, top });
        }
        // cluster par baseline (tol 4px), comme côté Python
        words.sort((a, b) => a.top - b.top);
        const rows = [];
        let cur = [], base = null;
        for (const w of words) {
          if (base === null || Math.abs(w.top - base) <= 4) {
            cur.push(w); if (base === null) base = w.top;
          } else {
            rows.push(cur); cur = [w]; base = w.top;
          }
        }
        if (cur.length) rows.push(cur);
        pages.push(rows.map(r => r.sort((a, b) => a.x - b.x)));
      }
      return pages; // [ [ [word,...], ... ], ... ]
    }

    // Une chaîne ne contenant que chiffres / virgules / espaces / (xN) = liste de casiers
    function isCasierText(t) {
      if (!t || !t.trim()) return false;
      return t.replace(/[\d\s,()x]/g, '') === '';
    }
    // "1 (x4), 3 (x2), 5" -> [{casier:'1',qty:4},{casier:'3',qty:2},{casier:'5',qty:1}]
    function parseCasiers(t) {
      const out = [];
      const re = /(\d+)\s*(?:\(x(\d+)\))?/g;
      let m;
      while ((m = re.exec(t)) !== null) {
        if (!m[1]) continue;
        out.push({ casier: m[1], qty: m[2] ? parseInt(m[2], 10) : 1 });
      }
      return out;
    }

    // MASTER : email -> { casiersFrais:[], casiersSec:[], nom, tel }
    // Colonnes : Nom<300, Email 170-330, Tél 330-415, Frais 415-465, Sec 465-516
    async function parseMasterPDF(arrayBuffer) {
      const pages = await pdfToRows(arrayBuffer);
      const byEmail = {};
      for (const rows of pages) {
        for (const r of rows) {
          const email = r.filter(w => w.x > 170 && w.x < 330).map(w => w.text).join('');
          if (!email.includes('@')) continue;
          const emailNorm = email.trim().toLowerCase();
          const nom = r.filter(w => w.x < 170).map(w => w.text).join(' ').trim();
          const tel = r.filter(w => w.x >= 330 && w.x < 415).map(w => w.text).join('').replace(/\s+/g, '');
          const fraisTxt = r.filter(w => w.x >= 415 && w.x < 465).map(w => w.text).join(' ');
          const secTxt = r.filter(w => w.x >= 465 && w.x < 516).map(w => w.text).join(' ');
          const toList = (t) => (t.match(/\d+/g) || []);
          byEmail[emailNorm] = {
            nom,
            telephone: /\d/.test(tel) ? tel : '',
            casiersFrais: toList(fraisTxt),
            casiersSec: toList(secTxt),
          };
        }
      }
      return byEmail;
    }

    // DISPATCH (frais ou sec) : reconstruit les blocs produit (nom / producteur /
    // conditionnement) et y rattache les casiers. Renvoie un index :
    // { [casier]: [ {produit, producteur, qty}, ... ] }  + liste produits complète
    const COND_RE = /^(sachet|paquet|pi[èe]ce|pot|barquette|botte|bouteille|panier|bo[îi]te|2 tubes)/i;
    async function parseDispatchPDF(arrayBuffer) {
      const pages = await pdfToRows(arrayBuffer);
      // aplatir en lignes {left, right}
      const lines = [];
      for (const rows of pages) {
        for (const r of rows) {
          const left = r.filter(w => w.x < 300).map(w => w.text).join(' ').trim();
          const right = r.filter(w => w.x >= 300).map(w => w.text).join(' ').trim();
          if (/^Dispatch/i.test(left) || /^Nondispatch/i.test(left) || right === 'BOR' || /^BOR$/.test(right)) {
            // en-tête : ignorer le label, mais garder un éventuel casier à droite
            if (right && right !== 'BOR' && isCasierText(right)) lines.push({ left: '', right });
            continue;
          }
          lines.push({ left, right });
        }
      }
      const products = [];
      let cur = null;
      for (const { left, right } of lines) {
        const cas = isCasierText(right) ? right : '';
        if (COND_RE.test(left)) {
          if (cur) { cur.cond = left; if (cas) cur.casText.push(cas); }
          continue;
        }
        if (cas && !left) { // ligne de casiers en continuation
          if (cur) cur.casText.push(cas);
          continue;
        }
        if (!cur || cur.cond) {
          cur = { produit: left, producteur: '', cond: '', casText: cas ? [cas] : [] };
          products.push(cur);
        } else {
          if (!cur.producteur) cur.producteur = left;
          else cur.produit += ' ' + left;
          if (cas) cur.casText.push(cas);
        }
      }
      // construire index casier -> produits
      const byCasier = {};
      for (const p of products) {
        const casiers = parseCasiers(p.casText.join(', '));
        p.casiers = casiers;
        for (const c of casiers) {
          if (!byCasier[c.casier]) byCasier[c.casier] = [];
          byCasier[c.casier].push({ produit: p.produit, producteur: p.producteur, qty: c.qty });
        }
      }
      return { byCasier, products: products.filter(p => p.casiers && p.casiers.length) };
    }

    // NON-DISPATCH : produits sans casier, avec un total à distribuer à la main.
    // Bloc = producteur / produit / conditionnement <total>. Le nombre est à droite.
    async function parseNDPDF(arrayBuffer) {
      const pages = await pdfToRows(arrayBuffer);
      const lines = [];
      for (const rows of pages) {
        for (const r of rows) {
          const txt = r.map(w => w.text).join(' ').trim();
          const nums = r.filter(w => /^\d+$/.test(w.text)).map(w => w.text);
          lines.push({ txt, lastNum: nums.length ? nums[nums.length - 1] : '' });
        }
      }
      const items = [];
      let buf = [];
      for (const { txt, lastNum } of lines) {
        if (/^Nondispatch/i.test(txt)) continue;
        // une ligne conditionnement contient le total à la fin
        if (COND_RE.test(txt) || /\(\d/.test(txt)) {
          const total = lastNum || (txt.match(/(\d+)\s*$/) || [])[1] || '';
          const label = buf.join(' ').replace(/\s+/g, ' ').trim();
          if (label) items.push({ produit: label, total: total ? parseInt(total, 10) : 0, cond: txt.replace(/\s*\d+\s*$/, '').trim() });
          buf = [];
        } else {
          buf.push(txt);
        }
      }
      return items.filter(i => i.produit);
    }

    // JOINTURE : pour une commande (email), retrouve via le Master ses casiers,
    // puis via les dispatch les produits à mettre dans chacun.
    function buildClientDispatch(order, master, dispatchFrais, dispatchSec) {
      if (!master) return null;
      const m = master[(order.email || '').toLowerCase()];
      if (!m) return null;
      const collect = (casiers, dispatch) => (casiers || []).map(cas => ({
        casier: cas,
        produits: (dispatch && dispatch.byCasier[cas]) ? dispatch.byCasier[cas] : [],
      }));
      return {
        nom: m.nom,
        telephone: m.telephone,
        frais: collect(m.casiersFrais, dispatchFrais),
        sec: collect(m.casiersSec, dispatchSec),
      };
    }

    // MANQUANTS (PDF global imprimé depuis preparations.kelbongoo.com)
    // Bloc régulier : nom produit / ligne "fini / total" / producteur / conditionnement.
    async function parseManquantsPDF(arrayBuffer) {
      const pages = await pdfToRows(arrayBuffer);
      const items = [];
      let cur = null;
      const SKIP = [
        /^Prépa/i, /preparations\.kelbongoo/i, /Dispatch (frais|sec)/i,
        /Progrès.*Fini/i, /Tous\.tes/i, /Eléments \d/i, /Précédent/i,
        /^\d+ sur \d+/i, /Globale du/i, /Chercher un produit/i,
      ];
      for (const rows of pages) {
        for (const r of rows) {
          const txt = r.map(w => w.text).join(' ').trim();
          if (!txt || SKIP.some(re => re.test(txt))) continue;
          const m = txt.match(/^(\d+)\s*\/\s*(\d+)$/);
          if (m) {
            if (cur) {
              cur.fini = parseInt(m[1], 10);
              cur.total = parseInt(m[2], 10);
              cur.manque = cur.total - cur.fini;
              cur._stage = 1;
            }
            continue;
          }
          if (!cur || cur._stage === undefined) {
            cur = { produit: txt, producteur: '', cond: '', _stage: 0 };
            items.push(cur);
          } else if (cur._stage === 1) { cur.producteur = txt; cur._stage = 2; }
          else if (cur._stage === 2) { cur.cond = txt; cur._stage = 3; }
          else { cur = { produit: txt, producteur: '', cond: '', _stage: 0 }; items.push(cur); }
        }
      }
      return items.filter(i => i.total != null).map(({ _stage, ...x }) => x);
    }

    // Normalisation forte pour rapprocher manquant <-> produit du dispatch
    function dispatchNorm(s) {
      return (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]/g, '');
    }
    // Retrouve un produit manquant dans le dispatch d'un local.
    // Renvoie l'entrée produit (avec .casiers) ou null.
    function findProductInDispatch(manquant, dispatch) {
      if (!dispatch || !dispatch.products) return null;
      const mp = dispatchNorm(manquant.produit), mpr = dispatchNorm(manquant.producteur);
      let hit = dispatch.products.find(p => dispatchNorm(p.produit) === mp && dispatchNorm(p.producteur) === mpr);
      if (hit) return hit;
      hit = dispatch.products.find(p => dispatchNorm(p.produit) === mp);
      return hit || null;
    }

    // Besoin d'un produit manquant par local, à partir des dispatch chargés.
    // dispatchBySite = { [site]: {frais, sec, ...} }
    // Renvoie { [site]: { casiers:[{casier,qty}], total } } (frais + sec confondus)
    // Besoin par local calculé À PARTIR DES COMMANDES JSON (plus de PDF).
    // Pour le produit manquant, compte combien d'unités sont commandées par local.
    // orders = liste des commandes du jour (chaque o a .site et .items[{id, produit, qty}])
    function computeNeedFromOrders(manquant, orders, { excludeSites = [] } = {}) {
      const out = {};
      const targetId = manquant.id || null;
      const targetName = normalizeText(manquant.produit || '');
      for (const o of (orders || [])) {
        const site = (o.site || '').toUpperCase();
        if (!site || excludeSites.includes(site)) continue;
        let q = 0;
        for (const it of (o.items || [])) {
          // match par id de produit si dispo, sinon par nom normalisé
          const sameId = targetId && it.id && it.id === targetId;
          const sameName = !targetId && normalizeText(it.produit || '') === targetName;
          if (sameId || sameName) q += (it.qty || 0);
        }
        if (q > 0) {
          if (!out[site]) out[site] = { total: 0, casiers: [] };
          out[site].total += q;
        }
      }
      return out;
    }

    function computeNeedBySite(manquant, dispatchBySite, { excludeSites = [] } = {}) {
      const out = {};
      for (const [site, d] of Object.entries(dispatchBySite || {})) {
        if (excludeSites.includes(site)) continue;
        const casiers = [];
        for (const disp of [d.frais, d.sec]) {
          const hit = findProductInDispatch(manquant, disp);
          if (hit) for (const c of hit.casiers) casiers.push({ casier: c.casier, qty: c.qty });
        }
        if (casiers.length) {
          const total = casiers.reduce((s, c) => s + c.qty, 0);
          out[site] = { casiers, total };
        }
      }
      return out;
    }

    // Répartition d'un stock reçu entre locaux, au prorata du besoin (plus gros reste).
    // needBySite = { site: {total} } ; qty = quantité reçue
    // Renvoie { [site]: nombre alloué }
    function allocateProrata(needBySite, qty) {
      const sites = Object.keys(needBySite);
      const totalNeed = sites.reduce((s, k) => s + needBySite[k].total, 0);
      if (totalNeed === 0 || qty <= 0) return Object.fromEntries(sites.map(s => [s, 0]));
      if (qty >= totalNeed) return Object.fromEntries(sites.map(s => [s, needBySite[s].total]));
      // base = floor(qty * need / totalNeed), puis distribuer le reste aux plus gros restes
      const raw = sites.map(s => {
        const exact = qty * needBySite[s].total / totalNeed;
        return { site: s, base: Math.floor(exact), frac: exact - Math.floor(exact) };
      });
      let used = raw.reduce((s, r) => s + r.base, 0);
      let left = qty - used;
      raw.sort((a, b) => b.frac - a.frac);
      for (let i = 0; i < raw.length && left > 0; i++) { raw[i].base++; left--; }
      // ne pas dépasser le besoin du site
      const alloc = {};
      for (const r of raw) alloc[r.site] = Math.min(r.base, needBySite[r.site].total);
      return alloc;
    }

    // Attribue le stock alloué à un local aux casiers.
    // casiers = [{casier, qty}] ; allocated = nombre d'articles dispo pour ce local
    // order = 'biggest' (plus grosses commandes d'abord, défaut) | 'casier' (ordre casier croissant)
    // Renvoie [{casier, qty}] (qty effectivement servie, casiers non servis omis)
    function attributeToCasiers(casiers, allocated, order = 'biggest') {
      const sorted = [...casiers].sort((a, b) => {
        if (order === 'casier') return parseInt(a.casier, 10) - parseInt(b.casier, 10);
        // 'biggest' : plus grosse commande d'abord ; à égalité, casier croissant
        if (b.qty !== a.qty) return b.qty - a.qty;
        return parseInt(a.casier, 10) - parseInt(b.casier, 10);
      });
      const out = [];
      let left = allocated;
      for (const c of sorted) {
        if (left <= 0) break;
        const give = Math.min(c.qty, left);
        out.push({ casier: c.casier, qty: give });
        left -= give;
      }
      // ré-ordonne le rendu par casier croissant pour rester lisible côté distributeur
      return out.sort((a, b) => parseInt(a.casier, 10) - parseInt(b.casier, 10));
    }

    function enrichOrders(orders, consumersByEmail) {
      return orders.map(o => {
        const c = consumersByEmail[o.email];
        // V4 : la commande porte déjà tel/nom. On garde ces valeurs en priorité.
        const phone = o.tel || c?.telephone || '';
        return {
          ...o,
          firstname: o.firstname || c?.firstname || '',
          lastname: o.lastname || c?.lastname || '',
          telephone: phone,
          hasPhone: !!(phone && phone.replace(/\D/g,'').length >= 9),
        };
      });
    }

    // ============================================================
    // HELPERS
    // ============================================================
    function todayKey() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    // Date "active" = la distribution affichée. Par défaut aujourd'hui, mais peut être
    // pilotée par le dernier fichier chargé (stockée dans Firebase pour tous les opérateurs).
    // On lit d'abord un éventuel override en mémoire, sinon localStorage, sinon aujourd'hui.
    let _activeDayOverride = null;
    function activeDay() {
      if (_activeDayOverride) return _activeDayOverride;
      try { const s = localStorage.getItem('kb_active_day'); if (s) return s; } catch(e){}
      return todayKey();
    }
    function setActiveDay(dayKey) {
      _activeDayOverride = dayKey || null;
      try { if (dayKey) localStorage.setItem('kb_active_day', dayKey); else localStorage.removeItem('kb_active_day'); } catch(e){}
      window.dispatchEvent(new CustomEvent('active-day-change', { detail: { dayKey } }));
    }
    // Renvoie une dayKey décalée de n jours par rapport à une autre dayKey (n peut être négatif)
    function addDays(dayKey, n) {
      const d = new Date(dayKey + 'T12:00:00');
      d.setDate(d.getDate() + n);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function formatDateFR(d = new Date()) {
      if (typeof d === 'string') d = new Date(d);
      return d.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
    }
    function formatDateShort(d) {
      if (typeof d === 'string') {
        if (/^\d{4}-\d{2}-\d{2}$/.test(d)) d = new Date(d + 'T12:00:00');
        else d = new Date(d);
      }
      return d.toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit' });
    }
    function formatTimeFR(d = new Date()) {
      if (typeof d === 'string') d = new Date(d);
      return d.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
    }
    function daysSince(isoDateOrDayKey) {
      let d;
      if (typeof isoDateOrDayKey === 'string') {
        if (/^\d{4}-\d{2}-\d{2}$/.test(isoDateOrDayKey)) d = new Date(isoDateOrDayKey + 'T12:00:00');
        else d = new Date(isoDateOrDayKey);
      } else { d = isoDateOrDayKey; }
      const today = new Date();
      const ms = today - d;
      return Math.floor(ms / (1000 * 60 * 60 * 24));
    }
    function displayName(order) {
      if (order.lastname || order.firstname) {
        return `${(order.lastname || '').toUpperCase()} ${order.firstname || ''}`.trim();
      }
      return order.name || order.email;
    }
    function normalizeText(s) {
      return (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    }
    function safeJSON(s) {
      if (s == null) return null;
      if (typeof s !== 'string') return s;
      try { return JSON.parse(s); } catch { return null; }
    }
    const parseChunk = (c) => {
      if (c.data && typeof c.data === 'string') {
        try { return JSON.parse(c.data); } catch { return {}; }
      }
      if (c.byEmail) return c.byEmail;
      return {};
    };

    // Semaine courante : retourne {monday: 'YYYY-MM-DD', friday: 'YYYY-MM-DD'}
    function currentWeek() {
      const d = new Date();
      const day = d.getDay();
      const diffToMonday = day === 0 ? -6 : 1 - day;
      const monday = new Date(d);
      monday.setDate(d.getDate() + diffToMonday);
      monday.setHours(0,0,0,0);
      const friday = new Date(monday);
      friday.setDate(monday.getDate() + 4);
      friday.setHours(23,59,59,999);
      const toKey = (x) => `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;
      return { monday: toKey(monday), friday: toKey(friday), mondayDate: monday, fridayDate: friday };
    }

    // ============================================================
    // GÉNÉRATION PDF PERTES
    // ============================================================
    function generateLossesPDF(losses, weekInfo) {
      // jsPDF chargé en UMD : window.jspdf.jsPDF
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

      // En-tête
      doc.setFillColor(74, 124, 59); // accent
      doc.rect(0, 0, 210, 30, 'F');
      doc.setTextColor(255,255,255);
      doc.setFontSize(18);
      doc.setFont(undefined, 'bold');
      doc.text('Rapport hebdomadaire des pertes', 14, 14);
      doc.setFontSize(11);
      doc.setFont(undefined, 'normal');
      doc.text(`Kelbongoo · Semaine du ${formatDateShort(weekInfo.mondayDate)} au ${formatDateShort(weekInfo.fridayDate)}`, 14, 22);

      doc.setTextColor(0,0,0);

      // Stats globales
      const jete = losses.filter(l => l.destination === 'jete');
      const pribon = losses.filter(l => l.destination === 'pribon');
      const totalJete = jete.reduce((s, l) => s + (l.totalValue || 0), 0);
      const totalPribon = pribon.reduce((s, l) => s + (l.totalValue || 0), 0);
      const total = totalJete + totalPribon;

      doc.setFontSize(11);
      let y = 42;
      doc.setFont(undefined, 'bold');
      doc.text('Récapitulatif', 14, y);
      y += 6;
      doc.setFont(undefined, 'normal');
      doc.setFontSize(10);
      doc.text(`Pertes jetées : ${jete.length} entrée${jete.length>1?'s':''} · ${totalJete.toFixed(2)} €`, 14, y);
      y += 5;
      doc.text(`Envoyé à Pribon Montreuil (ROB) : ${pribon.length} entrée${pribon.length>1?'s':''} · ${totalPribon.toFixed(2)} €`, 14, y);
      y += 5;
      doc.setFont(undefined, 'bold');
      doc.text(`TOTAL valorisé : ${total.toFixed(2)} €`, 14, y);
      y += 8;

      // Tableau des pertes
      const REASON_LABELS = {};
      LOSS_REASONS.forEach(r => REASON_LABELS[r.id] = r.label);
      const DEST_LABELS = { jete: 'Jeté', pribon: 'Pribon ROB' };

      const rows = losses.map(l => [
        formatDateShort(l.day),
        l.producteur || '',
        l.produit || '',
        REASON_LABELS[l.reason] || l.reason,
        DEST_LABELS[l.destination] || l.destination,
        l.usingWeight ? `${l.weight} kg` : `${l.quantity} u`,
        `${(l.unitPrice || 0).toFixed(2)} €`,
        `${(l.totalValue || 0).toFixed(2)} €`,
      ]);

      doc.autoTable({
        startY: y,
        head: [['Date','Producteur','Produit','Raison','Dest.','Qté/Poids','PU achat','Total']],
        body: rows,
        styles: { fontSize: 8, cellPadding: 1.5 },
        headStyles: { fillColor: [74, 124, 59], textColor: 255 },
        alternateRowStyles: { fillColor: [248, 248, 245] },
        columnStyles: { 7: { halign: 'right', fontStyle: 'bold' } },
      });

      const finalY = doc.lastAutoTable.finalY + 8;
      doc.setFontSize(9);
      doc.setTextColor(100,100,100);
      doc.text(`Rapport généré le ${formatDateFR()} à ${formatTimeFR()} · ${losses.length} ligne${losses.length>1?'s':''} au total`, 14, finalY);

      return doc;
    }

    // ============================================================
    // TOAST
    // ============================================================
    const ToastContext = React.createContext(() => {});
    function ToastProvider({ children }) {
      const [msg, setMsg] = React.useState(null);
      const show = React.useCallback((text) => {
        setMsg(text); setTimeout(() => setMsg(null), 2400);
      }, []);
      return (
        <ToastContext.Provider value={show}>
          {children}
          {msg && <div className="toast">{msg}</div>}
        </ToastContext.Provider>
      );
    }
    // ============================================================
    // LOGIN avec sélection du rôle
    // ============================================================
    function LoginScreen({ onLogin }) {
      const [role, setRole] = React.useState('distrib'); // 'distrib' | 'prep' | 'master'
      const [site, setSite] = React.useState('');
      const [name, setName] = React.useState('');
      const [password, setPassword] = React.useState('');
      const [error, setError] = React.useState('');
      const [now, setNow] = React.useState(new Date());
      const [sitesOfDay, setSitesOfDay] = React.useState([]); // calculé depuis les commandes du jour

      React.useEffect(() => {
        const t = setInterval(() => setNow(new Date()), 30000);
        return () => clearInterval(t);
      }, []);

      // Charger la liste des sites depuis les commandes du jour
      React.useEffect(() => {
        const unsub = storage.subscribe(`day_${activeDay()}_orders`, (arr) => {
          if (arr.length && arr[0].orders) {
            const sites = [...new Set(arr[0].orders.map(o => o.site).filter(Boolean))].sort();
            setSitesOfDay(sites);
          } else {
            setSitesOfDay([]);
          }
        });
        return unsub;
      }, []);

      // Charger aussi les sites ayant des clients non récupérés EN ATTENTE
      // (pour qu'un distrib puisse se connecter même sans commandes du jour,
      //  ex : un client revient récupérer en retard sur un point sans distrib ce jour)
      const [sitesWithPending, setSitesWithPending] = React.useState([]);
      React.useEffect(() => {
        const unsub = storage.subscribe('followups', (arr) => {
          const sites = [...new Set(
            (arr || [])
              .filter(f => f.status !== 'resolved')
              .map(f => f.site)
              .filter(Boolean)
          )].sort();
          setSitesWithPending(sites);
        });
        return unsub;
      }, []);

      // Sites à proposer au distrib : ceux du jour + ceux avec des non-récup en attente
      // Si rien du tout, on retombe sur la liste complète historique
      const availableSites = React.useMemo(() => {
        const merged = [...new Set([...sitesOfDay, ...sitesWithPending])].sort();
        return merged.length > 0 ? merged : SITES;
      }, [sitesOfDay, sitesWithPending]);

      const handleSubmit = () => {
        setError('');
        if (!name.trim()) { setError('Entre ton prénom.'); return; }

        if (role === 'master') {
          if (password !== MASTER_PASSWORD) { setError('Mot de passe master incorrect.'); return; }
          onLogin({ role: 'master', isMaster: true, site: site || availableSites[0] || 'BOR', name: name.trim(), loggedAt: new Date().toISOString() });
          return;
        }
        if (role === 'prep') {
          if (password !== PREP_PASSWORD) { setError('Mot de passe préparateur incorrect.'); return; }
          onLogin({ role: 'prep', isPrep: true, site: 'ENTREPOT', name: name.trim(), loggedAt: new Date().toISOString() });
          return;
        }
        // Distrib
        if (!site) { setError('Choisis un lieu.'); return; }
        if (password !== DISTRIB_PASSWORD) { setError('Mot de passe distributeur incorrect.'); return; }
        onLogin({ role: 'distrib', site, name: name.trim(), loggedAt: new Date().toISOString() });
      };

      return (
        <div className="login-shell">
          <div className="login-card">
            <div className="login-logo">
              <div className="title">Kelbongoo</div>
              <div className="subtitle">Distribution</div>
            </div>

            <div className="role-tabs">
              <div className={`role-tab ${role==='distrib'?'active':''}`} onClick={()=>setRole('distrib')}>
                <span className="role-icon">🚚</span>Distrib
              </div>
              <div className={`role-tab ${role==='prep'?'active':''}`} onClick={()=>setRole('prep')}>
                <span className="role-icon">📦</span>Prépa
              </div>
              <div className={`role-tab ${role==='master'?'active':''}`} onClick={()=>setRole('master')}>
                <span className="role-icon">⚙️</span>Master
              </div>
            </div>

            <div className="field">
              <label>Date</label>
              <div style={{padding:'4px 0',color:'var(--ink-soft)',fontSize:13}}>
                {formatDateFR(now)} · <strong style={{color:'var(--ink)'}}>{formatTimeFR(now)}</strong>
              </div>
            </div>

            {role === 'distrib' && (
              <div className="field">
                <label>Lieu de distribution</label>
                <select value={site} onChange={e => setSite(e.target.value)}>
                  <option value="">— Choisir —</option>
                  {sitesOfDay.length > 0 && (
                    <optgroup label="Distribution aujourd'hui">
                      {sitesOfDay.map(s => <option key={s} value={s}>{s}</option>)}
                    </optgroup>
                  )}
                  {(() => {
                    // Sites avec non-récup en attente mais SANS distrib aujourd'hui
                    const pendingOnly = sitesWithPending.filter(s => !sitesOfDay.includes(s));
                    if (pendingOnly.length === 0) return null;
                    return (
                      <optgroup label="Clients en retard à récupérer">
                        {pendingOnly.map(s => <option key={s} value={s}>{s} (retards)</option>)}
                      </optgroup>
                    );
                  })()}
                  {sitesOfDay.length === 0 && sitesWithPending.length === 0 && (
                    <optgroup label="Tous les sites">
                      {SITES.map(s => <option key={s} value={s}>{s}</option>)}
                    </optgroup>
                  )}
                </select>
                {sitesOfDay.length === 0 && sitesWithPending.length === 0 && (
                  <div style={{fontSize:11,color:'var(--warn)',marginTop:6}}>
                    ⚠️ Pas de commandes chargées aujourd'hui. Liste complète affichée.
                  </div>
                )}
                {(sitesOfDay.length > 0 || sitesWithPending.length > 0) && (
                  <div style={{fontSize:11,color:'var(--ink-mute)',marginTop:6}}>
                    {sitesOfDay.length} avec distrib aujourd'hui
                    {sitesWithPending.filter(s => !sitesOfDay.includes(s)).length > 0 &&
                      ` · ${sitesWithPending.filter(s => !sitesOfDay.includes(s)).length} avec retards à gérer`}
                  </div>
                )}
              </div>
            )}

            {role === 'master' && (
              <div className="field">
                <label>Site (modifiable ensuite)</label>

      const [freetext, setFreetext] = React.useState('');

        if (!products) return [];
        const s = normalizeText(search);
        if (!s) return products.slice(0, 30);
        return products.filter(p =>
          normalizeText(p.produit).includes(s) ||
          normalizeText(p.producteur).includes(s)
        ).slice(0, 30);
      }, [products, search]);
      const selected = (products || []).find(p => `${p.producteur}|${p.produit}` === value);

      return (
        <div>
          {selected && (
            <div className="alert-success" style={{marginBottom: 8, display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>

              <span>✏️ {value.substring(5)}</span>
              <button className="btn-ghost" style={{padding:'2px 8px', fontSize:11}} onClick={() => onChange('')}>Changer</button>

    // ============================================================
    // ANOMALY FORM
    // ============================================================
    function AnomalyForm({ orders, products, session, currentSite, onClose, editing, consumersByEmail }) {
      const showToast = React.useContext(ToastContext);
      const [selectedKey, setSelectedKey] = React.useState(editing?.orderId || '');
      const [clientName, setClientName] = React.useState(editing?.clientName || '');
      const [clientEmail, setClientEmail] = React.useState(editing?.clientEmail || '');
      const [productKey, setProductKey] = React.useState(editing?.productKey || '');
      const [anomalyTypes, setAnomalyTypes] = React.useState(editing?.anomalyTypes || []);
      const [actions, setActions] = React.useState(editing?.actions || []);
      const [amountRefund, setAmountRefund] = React.useState(editing?.amountRefund || '');
      const [amountCredit, setAmountCredit] = React.useState(editing?.amountCredit || '');
      const [remark, setRemark] = React.useState(editing?.remark || '');
      const [busy, setBusy] = React.useState(false);
      const selectedOrder = orders.find(o => o.orderId === selectedKey);
      const toggle = (list, setList, id) => {
        if (list.includes(id)) setList(list.filter(x => x !== id));
        else setList([...list, id]);
      };
      const handlePickClient = (info) => {
        setSelectedKey(info.key);
        setClientName(info.name);
        setClientEmail(info.email || '');
      };
      const handleSubmit = async () => {
        if (!selectedKey || !clientName) { showToast('Choisis un client'); return; }
        if (!productKey) { showToast('Choisis un produit'); return; }
        if (anomalyTypes.length === 0) { showToast("Au moins un type d'anomalie"); return; }
        setBusy(true);
        try {
          const id = editing?.id || `anom_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
          let productLabel = '';
          if (productKey.startsWith('FREE:')) productLabel = productKey.substring(5);
          else {
            const [prod, name] = productKey.split('|');
            productLabel = `${name} (${prod})`;
          }
          // orderId robuste : commande du jour, sinon email, sinon clé, sinon id
          const safeOrderId = selectedOrder ? selectedOrder.orderId : (clientEmail || selectedKey || id);
          const data = {
            orderId: safeOrderId, site: currentSite,
            clientName: clientName,
            clientEmail: clientEmail,
            clientPhone: selectedOrder?.telephone || '',
            hasOrderToday: !!selectedOrder,
            productKey, productLabel,
            day: activeDay(),
            anomalyTypes, actions,
            amountRefund: parseFloat(amountRefund) || 0,
            amountCredit: parseFloat(amountCredit) || 0,
            remark,
            createdBy: session.name,
            createdAt: editing?.createdAt || new Date().toISOString(),
            updatedAt: new Date().toISOString(),
          };
          await storage.setDoc(`day_${activeDay()}_anomalies`, id, data);

          // Si l'anomalie est de type "oubli_casier", on crée aussi une entrée
          // dans forgotten_items pour le suivi (avec alerte à 3j)
          if (anomalyTypes.includes('oubli_casier')) {
            const forgottenId = `forg_${id}`; // lié à l'anomalie
            await storage.setDoc('forgotten_items', forgottenId, {
              id: forgottenId,
              anomalyId: id,
              orderId: safeOrderId, site: currentSite,
              clientName: data.clientName,
              clientEmail: data.clientEmail,
              productKey, productLabel,
              remark,
              day: activeDay(),
              status: 'pending', // 'pending' | 'picked_up' | 'returned'
              createdBy: session.name,
              createdAt: editing?.createdAt || new Date().toISOString(),
              updatedAt: new Date().toISOString(),
            });
          } else if (editing && editing.anomalyTypes && editing.anomalyTypes.includes('oubli_casier')) {
            // Si l'utilisateur a retiré le type oubli_casier en édition → on supprime l'entrée
            await storage.deleteDoc('forgotten_items', `forg_${id}`);
          }

          showToast(editing ? '✓ Mise à jour' : '✓ Anomalie enregistrée');
          onClose();
        } catch (err) {
          showToast('Erreur : ' + err.message);
        } finally { setBusy(false); }
      };
      return (
        <div className="modal-backdrop" onClick={(e) => { if (e.target.className === 'modal-backdrop') onClose(); }}>
          <div className="modal">
            <div className="modal-header">
              <h2>{editing ? 'Modifier anomalie' : 'Nouvelle anomalie'}</h2>
              <button className="modal-close" onClick={onClose}>×</button>
            </div>
            <div className="field">
              <label>Client</label>
              <ConsigneClientPicker
                orders={orders}
                consumersByEmail={consumersByEmail}
                selectedKey={selectedKey}
                selectedName={clientName}
                onPick={handlePickClient}
                onClear={() => { setSelectedKey(''); setClientName(''); setClientEmail(''); }}
              />
            </div>
            <div className="field">
              <label>Produit concerné</label>
              <ProductPicker products={products} value={productKey} onChange={setProductKey} allowFreetext={true} />
            </div>
            <div className="field">
              <label>Problème(s)</label>
              <div className="chip-group">
                {ANOMALIES.map(a => (
                  <div key={a.id} className={`chip chip-${a.color} ${anomalyTypes.includes(a.id) ? 'selected' : ''}`} onClick={() => toggle(anomalyTypes, setAnomalyTypes, a.id)}>{a.label}</div>
                ))}
              </div>
            </div>
            <div className="field">
              <label>Action apportée</label>
              <div className="chip-group">
                {ACTIONS.map(a => (
                  <div key={a.id} className={`chip ${actions.includes(a.id) ? 'selected' : ''}`} onClick={() => toggle(actions, setActions, a.id)}>{a.label}</div>
                ))}
              </div>
            </div>
            {(actions.includes('remise') || actions.includes('remboursement')) && (
              <div className="field">
                <label>Montant remise / remboursement (€)</label>
                <input type="number" step="0.01" min="0" value={amountRefund} onChange={e => setAmountRefund(e.target.value)} placeholder="0.00" />
              </div>
            )}
            {actions.includes('avoir') && (
              <div className="field">
                <label>Montant de l'avoir (€)</label>
                <input type="number" step="0.01" min="0" value={amountCredit} onChange={e => setAmountCredit(e.target.value)} placeholder="0.00" />
              </div>
            )}
            <div className="field">
              <label>Remarque</label>
              <textarea rows={3} value={remark} onChange={e => setRemark(e.target.value)} placeholder="Précisions…" />
            </div>
            <div className="row">
              <button className="btn-secondary" onClick={onClose}>Annuler</button>
              <button className="btn-primary" disabled={busy} onClick={handleSubmit}>
                {busy ? 'Enregistrement…' : (editing ? 'Mettre à jour' : 'Enregistrer')}
              </button>
            </div>
          </div>
        </div>
      );
    }
