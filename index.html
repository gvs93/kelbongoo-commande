    // ============================================================
    // PURGE — report des pertes sèches du jour dans la colonne "purge" (U)
    // de la feuille de stock. Règle : perte sèche (jeté/partage) ET pas un
    // retour boutique rattaché à une commande client (déjà sortie du stock).
    // Rien n'est écrit en aveugle : récap à cocher → Valider.
    // ============================================================
    function PurgeFromLossesBlock({ session, invDate, stockProducts }) {
      const showToast = React.useContext(ToastContext);
      const [losses, setLosses] = React.useState([]);
      const [excluded, setExcluded] = React.useState({});
      const [busy, setBusy] = React.useState(false);
      const [result, setResult] = React.useState(null);

      React.useEffect(() => {
        const u = storage.subscribe('losses', (arr) => setLosses(arr || []));
        return () => u && u();
      }, []);

      // Quitte le stock Kelbongoo → à déduire : jeté, partage, OU envoyé à ROB (pribon).
      // Pas "rayon" (remis en rayon = reste en stock). Et pas un retour rattaché à une
      // commande client (déjà sorti du stock car vendu) — sauf "en trop / surstock".
      const isPurge = (l) => {
        const dest = l.destination;
        if (dest !== 'jete' && dest !== 'partage' && dest !== 'pribon') return false;
        if (l.fromReturn && l.reason !== 'non_vendu') return false;
        return true;
      };

      const agg = React.useMemo(() => {
        const m = {};
        for (const l of losses) {
          if ((l.day || '') !== invDate) continue;
          if (!isPurge(l)) continue;
          const key = l.productKey || `${l.producteur || ''}|${l.produit || ''}`;
          const qty = l.usingWeight ? (Number(l.weight) || 0) : (Number(l.quantity) || 0);
          if (!m[key]) m[key] = { key, produit: l.produit || '', producteur: l.producteur || '', qty: 0, sources: [] };
          m[key].qty += qty;
          m[key].sources.push({ dest: l.destination, reason: l.reason, fromReturn: !!l.fromReturn, qty });
        }
        return Object.values(m).filter(a => a.qty > 0);
      }, [losses, invDate]);

      const stockMap = React.useMemo(() => {
        const m = {};
        (stockProducts || []).forEach(sp => {
          if (!sp || !sp.id) return;
          const pn = normalizeText(sp.name || sp.produit || '');
          const full = normalizeText(sp.producteur || '') + '|' + pn;
          if (!(full in m)) m[full] = sp.id;
          if (!(('|' + pn) in m)) m['|' + pn] = sp.id;   // secours par produit seul
        });
        return m;
      }, [stockProducts]);

      const enriched = agg.map(a => {
        const k = normalizeText(a.producteur) + '|' + normalizeText(a.produit);
        const id = stockMap[k] || stockMap['|' + normalizeText(a.produit)] || '';
        return { ...a, id, found: !!id, checked: !excluded[a.key] };
      });

      const toWrite  = enriched.filter(e => e.checked && e.found);
      const notFound = enriched.filter(e => e.checked && !e.found);

      const validate = async () => {
        if (!stockProducts) { showToast('Liste stock non chargée — impossible de relier à la feuille.'); return; }
        if (!toWrite.length && !notFound.length) return;
        if (!confirm(`Reporter ${toWrite.length} produit(s) dans la colonne purge de la feuille ${invDate} ?`)) return;
        setBusy(true);
        try {
          let written = 0;
          if (toWrite.length) {
            const data = await stockPost({ secret: FRESHDESK_SECRET, action: 'stock_purge_write',
              date: invDate, items: toWrite.map(e => ({ id: e.id, produit: e.produit, qty: e.qty })) });
            if (!data || !data.ok) throw new Error((data && data.error) || 'erreur proxy (action stock_purge_write déployée ?)');
            written = data.written || 0;
          }
          if (notFound.length) {
            const lines = notFound.map(e => `• ${e.produit}${e.producteur ? ' (' + e.producteur + ')' : ''} — ${e.qty}`).join('\n');
            await stockPost({ secret: FRESHDESK_SECRET, action: 'send_mail',
              to: 'rr@pribon.org', cc: 'hg@probon.fr',
              subject: `[Purge] Produits introuvables dans la feuille de stock ${invDate}`,
              body: `Ces pertes du jour n'ont pas pu être reportées automatiquement dans la colonne purge (produit introuvable dans la feuille ${invDate}). À reporter à la main :\n\n${lines}\n\n— App Distribution Kelbongoo` });
          }
          setResult({ written, notFound: notFound.length });
          showToast(`✓ Purge : ${written} écrit(s)${notFound.length ? ` · ${notFound.length} introuvable(s) → mail envoyé` : ''}`);
        } catch (e) {
          showToast('Erreur purge : ' + e.message);
        } finally { setBusy(false); }
      };

      const reasonLabel = (id) => {
        const r = (typeof LOSS_REASONS !== 'undefined' ? LOSS_REASONS : []).find(x => x.id === id);
        return r ? r.label : (id || '');
      };

      return (
        <div className="card" style={{borderLeft:'4px solid var(--brand,#4A7C59)'}}>
          <h3 style={{marginBottom:4}}>🗑️ Pertes du jour → purge (feuille de stock)</h3>
          <p style={{fontSize:12,color:'var(--ink-mute)',marginBottom:8}}>
            Reporte dans la colonne <strong>purge</strong> tout ce qui <strong>quitte le stock</strong> le {invDate} : jeté, partage équipe, et <strong>envoyé à ROB</strong>.
            Exclut « remis en rayon » (reste en stock) et les retours boutique rattachés à une commande client (déjà vendus). Décoche au besoin, puis Valider.
          </p>

          {enriched.length === 0 ? (
            <div style={{fontSize:13,color:'var(--ink-mute)'}}>Aucune perte sèche à reporter pour le {invDate}.</div>
          ) : (
            <div>
              <div style={{maxHeight:260,overflowY:'auto',border:'1px solid var(--line)',borderRadius:6}}>
                {enriched.map((e,i) => (
                  <div key={e.key} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 10px',borderTop:i?'1px solid var(--line)':'none',background: e.found ? 'transparent' : 'var(--warn-soft)'}}>
                    <input type="checkbox" checked={e.checked} onChange={() => setExcluded(x => ({ ...x, [e.key]: e.checked }))} style={{width:18,height:18,flex:'0 0 auto'}} />
                    <div style={{flex:'1 1 auto',minWidth:0}}>
                      <div style={{fontWeight:600,fontSize:13,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{e.produit}{e.producteur ? <span style={{color:'var(--ink-mute)',fontWeight:400}}> — {e.producteur}</span> : ''}</div>
                      <div style={{fontSize:11,color:'var(--ink-mute)'}}>
                        {e.sources.map((s,j) => <span key={j}>{j?' · ':''}{s.fromReturn ? '↩️ retour' : '🏭 prépa'} {s.dest==='partage'?'partage':(s.dest==='pribon'?'ROB':'jeté')}{s.reason?` (${reasonLabel(s.reason)})`:''}</span>)}
                        {!e.found && <span style={{color:'var(--warn,#b8860b)',fontWeight:600}}> · ⚠️ introuvable feuille stock</span>}
                      </div>
                    </div>
                    <div style={{flex:'0 0 auto',fontWeight:800,fontSize:16,minWidth:34,textAlign:'right'}}>{e.qty}</div>
                  </div>
                ))}
              </div>
              <div style={{display:'flex',gap:10,flexWrap:'wrap',marginTop:8,fontSize:12,color:'var(--ink-mute)'}}>
                <span>✓ <strong>{toWrite.length}</strong> à écrire</span>
                {notFound.length > 0 && <span style={{color:'var(--warn,#b8860b)'}}>⚠️ {notFound.length} introuvable(s) → mail rr@ + hg@</span>}
              </div>
              <button className="btn-primary btn-block" disabled={busy || (!toWrite.length && !notFound.length)} onClick={validate} style={{marginTop:8}}>
                {busy ? '⏳ Écriture…' : `⬇️ Valider → écrire dans purge (${invDate})`}
              </button>
              {result && <div className="alert-success" style={{marginTop:8}}>✓ {result.written} produit(s) écrit(s) en purge{result.notFound ? ` · ${result.notFound} introuvable(s) signalé(s) par mail` : ''}.</div>}
            </div>
          )}
        </div>
      );
    }

    // PAGE INVENTAIRE (expérimental — saisie manuelle + scan qui apprend les EAN)
    // ============================================================
    function InventoryPage({ session }) {
      const showToast = React.useContext(ToastContext);
      const [products, setProducts] = React.useState([]);
      const [eanMap, setEanMap] = React.useState({});
      const [counts, setCounts] = React.useState({});
      const [countMeta, setCountMeta] = React.useState({}); // {id: {by, at}} — qui a compté (multi-utilisateur)
      const [search, setSearch] = React.useState('');
      const [invSort, setInvSort] = React.useState('fournisseur'); // 'nom' | 'famille' | 'fournisseur'
      const [scanMode, setScanMode] = React.useState(false);
      const [scanInput, setScanInput] = React.useState('');
      const [pendingEan, setPendingEan] = React.useState(null);
      const [scannedIds, setScannedIds] = React.useState([]); // produits touchés dans la session de scan (plus récent en tête)
      const [manuallyAddedIds, setManuallyAddedIds] = React.useState(new Set()); // produits choisis manuellement depuis le message "non trouvé"
      const [lastUnknownCode, setLastUnknownCode] = React.useState(null); // dernier code non trouvé
      const [dlcInputs, setDlcInputs] = React.useState({}); // {productId: 'YYYY-MM-DD'} — DLC saisie pendant l'inventaire
      const [dlcExpandedId, setDlcExpandedId] = React.useState(null); // produit dont le champ DLC est ouvert
      const [invDate, setInvDate] = React.useState(() => todayKey()); // date d'inventaire libre, par défaut aujourd'hui
      // Mode d'inventaire :
      //   'matin' → mardi avant 10h uniquement → écrit "Inventaire soir" de la feuille de la VEILLE (vendredi), écrase
      //   'soir'  → tous les jours après prépa → écrit "Inventaire soir" de la feuille DU JOUR, n'écrase pas (signale conflits)
      const [mode, setMode] = React.useState(() => (new Date().getDay() === 2 && new Date().getHours() < 10) ? 'matin' : 'soir');
      const [closingInv, setClosingInv] = React.useState(false); // état d'envoi à la clôture
      const [invType, setInvType] = React.useState('complet'); // 'complet' | 'tournant'
      const [scopeKind, setScopeKind] = React.useState('producer'); // 'producer' | 'type' | 'family'
      const [scopeValue, setScopeValue] = React.useState(''); // producteur / type / famille sélectionné
      const [showLearn, setShowLearn] = React.useState(false); // section apprentissage des codes (temps du test)
      const [learnPendingEan, setLearnPendingEan] = React.useState(null);
      const [learnSearch, setLearnSearch] = React.useState('');
      const [lastLearn, setLastLearn] = React.useState(null); // {ean, name, status:'known'|'new'}
      const [showHistory, setShowHistory] = React.useState(() => !!(session && session.isMaster)); // historique réservé master, ouvert par défaut
      // Écriture feuille de stock (matin/soir) + article manquant
      const [dispatchDone, setDispatchDone] = React.useState(false);
      const [writing, setWriting] = React.useState(false);
      const [writeResult, setWriteResult] = React.useState(null);
      const [showManquant, setShowManquant] = React.useState(false);
      const [mqProduit, setMqProduit] = React.useState('');
      const [mqQty, setMqQty] = React.useState('');
      const [mqDlc, setMqDlc] = React.useState('');
      const [mqSending, setMqSending] = React.useState(false);
      // Liste des produits ACTIFS = colonne E « produit » de la DERNIÈRE feuille de stock.
      // null = non chargée → on retombe sur le cache produits (comportement historique).
      const [stockProducts, setStockProducts] = React.useState(null);
      const [stockNote, setStockNote] = React.useState('');

      React.useEffect(() => {
        (async () => {
          try {
            const data = await readCache('products');
            if (data) {
              const arr = Object.entries(data).map(([id, p]) => ({ id, ...p }));
              setProducts(arr);
            }
          } catch(e) {}
        })();
        const u1 = storage.subscribe('ean_mapping', (arr) => {
          const m = {}; for (const e of arr) { if (e.ean) m[e.ean] = e.productId; } setEanMap(m);
        });
        return () => { u1 && u1(); };
      }, []);

      // Liste des produits réellement vendus = colonne E « produit » de la DERNIÈRE feuille
      // de stock (les produits actifs du site). On la croise ensuite avec le cache produits
      // pour récupérer fournisseur / famille / code-barres (scan & tri). Fallback cache si
      // l'action proxy n'est pas déployée → l'inventaire ne casse jamais.
      React.useEffect(() => {
        (async () => {
          try {
            const data = await stockPost({ secret: FRESHDESK_SECRET, action: 'stock_products' });
            if (data && data.ok && Array.isArray(data.products) && data.products.length) {
              // La feuille de stock peut renvoyer soit des chaînes (nom seul),
              // soit des objets {produit/name, categorie, famille}. On normalise les deux
              // pour ne JAMAIS retomber sur "[object Object]".
              const pickStr = (o, keys) => {
                for (const k of keys) { if (o && o[k] != null && String(o[k]).trim() !== '') return String(o[k]).trim(); }
                return '';
              };
              const cleaned = data.products.map(s => {
                if (s == null) return null;
                if (typeof s === 'string' || typeof s === 'number') {
                  const name = String(s).trim();
                  return name ? { name, category: '', family: '' } : null;
                }
                if (typeof s === 'object') {
                  const name = pickStr(s, ['produit', 'name', 'nom', 'product', 'product_name', 'libelle', 'Produit']);
                  if (!name) return null;
                  return {
                    id: pickStr(s, ['id', 'ID', 'Id', 'id_produit', 'product_id', 'idSite', 'id site kbg']),
                    producteur: pickStr(s, ['producteur', 'producer', 'Producteur', 'fournisseur']),
                    name,
                    category: pickStr(s, ['categorie', 'category', 'catégorie', 'category_name', 'rayon', 'Catégorie', 'Categorie']),
                    family: pickStr(s, ['famille', 'family', 'family_name', 'sous_categorie', 'subcategory', 'Famille'])
                              .replace(/^[\s\-–—]+|[\s\-–—]+$/g, ''),
                  };
                }
                return null;
              }).filter(Boolean);
              setStockProducts(cleaned);
              setStockNote(data.sheet ? `Liste issue de la feuille de stock « ${data.sheet} » (col E)` : 'Liste issue de la dernière feuille de stock (col E)');
            } else {
              setStockProducts(null);
              setStockNote('⚠️ Action « stock_products » indisponible — liste basée sur le cache produits.');
            }
          } catch (e) {
            setStockProducts(null);
            setStockNote('⚠️ Lecture feuille de stock impossible — liste basée sur le cache produits.');
          }
        })();
      }, []);
      React.useEffect(() => {
        setCounts({});
        const u = storage.subscribe(`inventory_${invDate}_${mode}`, (arr) => {
          const c = {}; const meta = {};
          for (const e of arr) { c[e.id] = e.qty; meta[e.id] = { by: e.countedBy || '', at: e.countedAt || '' }; }
          setCounts(c); setCountMeta(meta);
        });
        return () => { u && u(); };
      }, [invDate, mode]);

      // Charge le type / périmètre mémorisés pour cette date (partagé entre opérateurs)
      React.useEffect(() => {
        (async () => {
          try {
            const meta = await storage.getDoc('inventory_meta', invDate);
            if (meta) {
              setInvType(meta.type || 'complet');
              // Avant, le périmètre « family » filtrait en réalité la catégorie.
              // On le remappe vers « category » pour conserver le comportement.
              setScopeKind(meta.scopeKind === 'family' && meta.scopeValueLevel !== 'family' ? 'category' : (meta.scopeKind || 'producer'));
              setScopeValue(meta.scopeValue || '');
            } else {
              setInvType('complet'); setScopeValue('');
            }
          } catch(e){}
        })();
      }, [invDate]);

      const saveMeta = async (patch) => {
        try {
          await storage.setDoc('inventory_meta', invDate, {
            date: invDate, type: invType, scopeKind, scopeValue,
            updatedBy: session.name, updatedAt: new Date().toISOString(),
            ...patch,
          }, { replace: true });
        } catch(e){}
      };

      // Univers d'inventaire : si la feuille de stock a été lue → uniquement ses produits
      // (col E), enrichis depuis le cache par correspondance de nom (NFD/minuscule). Un produit
      // de la feuille absent du cache reste saisissable (sans code-barres). Sinon → cache complet.
      const universe = React.useMemo(() => {
        if (!stockProducts) return products;
        const byName = {};
        for (const p of products) { const k = normalizeText(p.name || ''); if (k) byName[k] = p; }
        const seen = new Set(); const out = [];
        for (const sp of stockProducts) {
          const name = sp && sp.name ? sp.name : '';
          const k = normalizeText(name);
          if (!k || seen.has(k)) continue;
          seen.add(k);
          const match = byName[k];
          if (match) {
            // Produit du cache : on garde ses champs, en complétant catégorie/famille
            // depuis la feuille si le cache ne les a pas.
            out.push({
              ...match,
              category: match.category || (sp.category || ''),
              family: match.family || (sp.family || ''),
            });
          } else {
            // Produit présent dans la feuille mais absent du cache : saisissable quand même
            // (sans code-barres), avec la catégorie/famille fournies par la feuille.
            out.push({
              id: 'stk_' + k.replace(/\s+/g, '_'), name,
              producer: '', category: sp.category || '', family: sp.family || '', _stockOnly: true,
            });
          }
        }
        return out;
      }, [stockProducts, products]);

      const producers = React.useMemo(() => {
        const s = new Set(); for (const p of universe) if (p.producer) s.add(p.producer);
        return [...s].sort((a,b)=>a.localeCompare(b,'fr'));
      }, [universe]);

      // Catégories (niveau haut : « Produits laitiers », « Viandes »…)
      const categories = React.useMemo(() => {
        const s = new Set(); for (const p of universe) if (p.category) s.add(p.category);
        return [...s].sort((a,b)=>a.localeCompare(b,'fr'));
      }, [universe]);
      const hasCategories = categories.length > 0;

      // Familles (niveau fin : « Yaourt et desserts au lait de chèvre »…), groupées par catégorie
      const families = React.useMemo(() => {
        const s = new Set(); for (const p of universe) if (p.family) s.add(p.family);
        return [...s].sort((a,b)=>a.localeCompare(b,'fr'));
      }, [universe]);
      const hasFamilies = families.length > 0;
      const familiesByCat = React.useMemo(() => {
        const m = {};
        for (const p of universe) {
          if (!p.family) continue;
          const cat = p.category || '— Sans catégorie —';
          if (!m[cat]) m[cat] = new Set();
          m[cat].add(p.family);
        }
        const out = {};
        for (const cat of Object.keys(m).sort((a,b)=>a.localeCompare(b,'fr'))) {
          out[cat] = [...m[cat]].sort((a,b)=>a.localeCompare(b,'fr'));
        }
        return out;
      }, [universe]);

      const TYPE_LABELS = { frais: '🧊 Frais', pain: '🍞 Pain', nd: '🥬 Non-dispatch' };

      const inScope = React.useCallback((p) => {
        if (invType !== 'tournant' || !scopeValue) return true;
        if (scopeKind === 'producer') return p.producer === scopeValue;
        if (scopeKind === 'type') return DISPATCH_TYPE[p.dispatchType] === scopeValue;
        if (scopeKind === 'category') return p.category === scopeValue;
        if (scopeKind === 'family') return p.family === scopeValue;
        return true;
      }, [invType, scopeKind, scopeValue]);

      const scopeProducts = React.useMemo(() => {
        if (invType !== 'tournant' || !scopeValue) return [];
        return universe.filter(inScope);
      }, [universe, inScope, invType, scopeValue]);

      const prodById = React.useMemo(() => {
        const m = {}; for (const p of products) m[p.id] = p; for (const p of universe) m[p.id] = p; return m;
      }, [products, universe]);

      const setCount = async (productId, qty) => {
        const q = Math.max(0, parseInt(qty,10) || 0);
        await storage.setDoc(`inventory_${invDate}_${mode}`, productId, {
          id: productId, qty: q,
          produit: prodById[productId]?.name || '',
          countedBy: session.name, countedAt: new Date().toISOString(),
        });
        // Indexe la date (fusion : ne touche pas au type/périmètre éventuellement déjà posés)
        try {
          await storage.setDoc('inventory_meta', invDate, {
            date: invDate, type: invType, scopeKind, scopeValue,
            lastBy: session.name, lastAt: new Date().toISOString(),
          });
        } catch(e){}
      };

      const matches = React.useMemo(() => {
        const baseAll = (invType === 'tournant') ? scopeProducts : universe;
        // Exclut les « lignes vides » : produits sans nom substantiel (après normalisation)
        const base = baseAll.filter(p => {
          const n = (p.name || '').trim();
          return n && n.length > 0 && normalizeText(n).length > 0;
        });
        const q = normalizeText(search);
        const filtered = q ? base.filter(p => normalizeText(p.name + ' ' + (p.producer||'')).includes(q)) : base.slice();
        const fam = p => (p.family || p.famille || '');
        filtered.sort((a, b) => {
          if (invSort === 'nom') return normalizeText(a.name).localeCompare(normalizeText(b.name));
          if (invSort === 'famille') {
            const c = normalizeText(fam(a)).localeCompare(normalizeText(fam(b)));
            return c !== 0 ? c : normalizeText(a.name).localeCompare(normalizeText(b.name));
          }
          // fournisseur
          const c = normalizeText(a.producer||'').localeCompare(normalizeText(b.producer||''));
          return c !== 0 ? c : normalizeText(a.name).localeCompare(normalizeText(b.name));
        });
        return filtered.slice(0, 800);
      }, [search, products, universe, invType, scopeProducts, invSort]);

      // Pour associer un code inconnu : on cherche dans TOUT le catalogue (pas seulement le périmètre)
      const assocMatches = React.useMemo(() => {
        const q = normalizeText(search);
        if (!q) return [];
        return products.filter(p => normalizeText(p.name + ' ' + (p.producer||'')).includes(q)).slice(0, 30);
      }, [search, products]);

      const bumpScanned = (pid) => setScannedIds(prev => [pid, ...prev.filter(x => x !== pid)]);

      const handleScan = (ean) => {
        ean = (ean||'').trim();
        if (!ean) return;
        let pid = eanMap[ean];
        if (!pid) {
          const p = products.find(x => String(x.barcode||'').trim() === ean);
          if (p) pid = p.id;
        }
        if (pid) {
          const next = (counts[pid]||0) + 1;
          setCount(pid, next);
          bumpScanned(pid);
          setManuallyAddedIds(prev => { const s = new Set(prev); s.delete(pid); return s; }); // enlever du manual si c'est un bon scan
          const outScope = (invType === 'tournant' && scopeValue && !inScope(prodById[pid] || {}));
          showToast(`+1 → ${next} · ${prodById[pid]?.name || ''}${outScope ? ' (hors périmètre)' : ''}`);
        } else {
          setLastUnknownCode(ean);
          showToast('Code inconnu — cherche dans la liste ci-dessous');
        }
        setScanInput('');
      };

      const learnEan = async (productId) => {
        if (!pendingEan) return;
        await storage.setDoc('ean_mapping', pendingEan, { ean: pendingEan, productId, learnedBy: session.name, learnedAt: new Date().toISOString() });
        await setCount(productId, (counts[productId]||0) + 1);
        bumpScanned(productId);
        showToast(`✓ ${pendingEan} associé`);
        setPendingEan(null);
        setSearch('');
      };

      // --- Apprentissage seul : associe les codes sans rien compter ---
      const handleLearnScan = (ean) => {
        ean = (ean||'').trim();
        if (!ean) return;
        let pid = eanMap[ean];
        if (!pid) { const p = products.find(x => String(x.barcode||'').trim() === ean); if (p) pid = p.id; }
        if (pid) {
          setLastLearn({ ean, name: prodById[pid]?.name || '', status: 'known' });
          showToast(`Déjà appris → ${prodById[pid]?.name || ''}`);
        } else {
          setLearnPendingEan(ean);
          showToast('Code inconnu — associe-le');
        }
      };

      const learnAssoc = async (productId) => {
        if (!learnPendingEan) return;
        await storage.setDoc('ean_mapping', learnPendingEan, { ean: learnPendingEan, productId, learnedBy: session.name, learnedAt: new Date().toISOString() });
        setLastLearn({ ean: learnPendingEan, name: prodById[productId]?.name || '', status: 'new' });
        showToast(`✓ ${learnPendingEan} associé`);
        setLearnPendingEan(null);
        setLearnSearch('');
      };

      // Sélection manuelle d'un produit quand le scan a échoué
      const handleManualSelection = (productId) => {
        setCount(productId, (counts[productId]||0) + 1);
        setManuallyAddedIds(prev => new Set([...prev, productId])); // marquer comme ajout manuel
        bumpScanned(productId);
        showToast(`✓ ${prodById[productId]?.name || ''} (saisie manuelle)`);
        setLastUnknownCode(null);
      };

      // Signaler une DLC pendant l'inventaire → crée une entrée dans dlc_watch
      const saveDlcFromInventory = async (productId, dlcDate) => {
        setDlcInputs(prev => ({ ...prev, [productId]: dlcDate }));
        if (!dlcDate) return;
        const p = prodById[productId];
        const qty = counts[productId] || 1;
        const days = Math.round((new Date(dlcDate) - new Date(todayKey())) / 86400000);
        if (days > 7) {
          showToast(`📅 DLC notée (${days}j) — pas d'alerte, DLC longue`);
          return;
        }
        // Créer une entrée dlc_watch
        const id = `dlcw_inv_${productId}_${dlcDate}`;
        const now = new Date().toISOString();
        try {
          await storage.setDoc('dlc_watch', id, {
            produit: p?.name || '', producteur: p?.producer || '',
            dlc: dlcDate, qty, qtyInit: qty,
            invDay: invDate, domShort: false,
            status: 'watch',
            createdBy: session.name, createdAt: now,
            lastCheckAt: now, lastCheckBy: session.name,
            fromInventory: true,
          });
          if (days <= 0) {
            showToast(`⚠️ DLC dépassée ! Ajouté en vigilance DLC`);
          } else if (days <= 3) {
            showToast(`🔴 DLC courte (${days}j) → ajouté en vigilance DLC`);
          } else {
            showToast(`🟠 DLC à surveiller (${days}j) → ajouté en vigilance DLC`);
          }
        } catch (e) {
          showToast('Erreur DLC : ' + e.message);
        }
      };

      const learnMatches = React.useMemo(() => {
        const q = normalizeText(learnSearch);
        if (!q) return [];
        return products.filter(p => normalizeText(p.name + ' ' + (p.producer||'')).includes(q)).slice(0, 30);
      }, [learnSearch, products]);

      const counted = Object.keys(counts).filter(id => counts[id] !== undefined && counts[id] !== null);
      const clearCount = async (id) => {
        try { await storage.deleteDoc(`inventory_${invDate}_${mode}`, id); } catch(e){}
      };
      const isTuesday = new Date().getDay() === 2;
      const beforeTen = new Date().getHours() < 10;
      const canMatin = isTuesday && beforeTen;            // inventaire matin : mardi avant 10h uniquement
      const target = mode === 'matin' ? 'veille' : 'jour';
      const scopeOk = invType !== 'tournant' || !!scopeValue;
      const completBlocked = false;                        // mode choisi explicitement (plus de porte horaire auto)

      // Récap visuel HTML envoyé à Raimbaud à la clôture
      const buildRecapHtml = (data, initials) => {
        const esc = s => String(s==null?'':s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
        const writtenItems = counted.filter(id => !manuallyAddedIds.has(id));
        const byCat = {};
        for (const id of writtenItems) { const p = prodById[id]||{}; const cat = (p.category||p.family||'—'); byCat[cat]=(byCat[cat]||0)+1; }
        const catRows = Object.keys(byCat).sort().map(c => `<tr><td style="padding:3px 10px;border-bottom:1px solid #eee">${esc(c)}</td><td style="padding:3px 10px;border-bottom:1px solid #eee;text-align:right">${byCat[c]}</td></tr>`).join('');
        const conflicts = data.conflicts || [];
        const confRows = conflicts.map(c => `<tr><td style="padding:3px 10px;border-bottom:1px solid #f3d6d6">${esc(c.produit)}</td><td style="padding:3px 10px;border-bottom:1px solid #f3d6d6;text-align:right">feuille : <b>${esc(c.existing)}</b></td><td style="padding:3px 10px;border-bottom:1px solid #f3d6d6;text-align:right">inventaire : <b>${esc(c.counted)}</b></td></tr>`).join('');
        const dlcRows = Object.keys(dlcInputs).filter(id => dlcInputs[id]).map(id => `<tr><td style="padding:3px 10px;border-bottom:1px solid #fde9c8">${esc((prodById[id]||{}).name||id)}</td><td style="padding:3px 10px;border-bottom:1px solid #fde9c8;text-align:right">${esc(dlcInputs[id])}</td></tr>`).join('');
        const cible = mode==='matin' ? `feuille de la veille (${esc(data.sheet||'')})` : `feuille du jour (${esc(data.sheet||'')})`;
        return `<div style="font-family:Arial,sans-serif;color:#222;max-width:640px">`
          + `<h2 style="margin:0 0 4px">📋 Inventaire ${mode==='matin'?'du matin':'du soir'} — ${esc(invDate)}</h2>`
          + `<p style="margin:0 0 12px;color:#666;font-size:13px">Clôturé par <b>${esc(initials)}</b> · ${esc(session.name)} · écrit dans « Inventaire soir » de la ${cible}</p>`
          + `<table style="border-collapse:collapse;font-size:14px;margin-bottom:14px">`
          + `<tr><td style="padding:3px 10px">Produits comptés</td><td style="padding:3px 10px;text-align:right"><b>${writtenItems.length}</b></td></tr>`
          + `<tr><td style="padding:3px 10px">Écrits dans la feuille</td><td style="padding:3px 10px;text-align:right"><b>${data.written||0}</b></td></tr></table>`
          + `<h3 style="margin:0 0 4px;font-size:15px">Par catégorie</h3>`
          + `<table style="border-collapse:collapse;font-size:13px;margin-bottom:14px">${catRows||'<tr><td style="padding:3px 10px;color:#999">—</td></tr>'}</table>`
          + (conflicts.length?`<h3 style="margin:0 0 4px;font-size:15px;color:#b23b3b">⚠️ Conflits — valeurs non écrasées (à corriger à la main)</h3><table style="border-collapse:collapse;font-size:13px;margin-bottom:14px">${confRows}</table>`:'')
          + (dlcRows?`<h3 style="margin:0 0 4px;font-size:15px;color:#c47f17">🔴 DLC courte / produits à vigilance</h3><table style="border-collapse:collapse;font-size:13px;margin-bottom:14px">${dlcRows}</table>`:'')
          + `</div>`;
      };

      const validateStock = async () => {
        if (!STOCK_PROXY_URL) { showToast('⚠️ Proxy stock non configuré (STOCK_PROXY_URL vide)'); return; }
        if (mode === 'matin' && !canMatin) { showToast('⛔ L\'inventaire du matin ne se fait que le mardi avant 10h.'); return; }
        if (mode === 'soir' && !dispatchDone) {
          if (!confirm('La prépa du jour n\'est pas marquée terminée.\nClôturer l\'inventaire du soir quand même ?')) return;
        }
        const items = counted
          .filter(id => !manuallyAddedIds.has(id))
          .map(id => ({ id, produit: prodById[id]?.name || '', qty: counts[id] }));
        if (!items.length) { showToast('Rien à écrire (tous les articles comptés sont en saisie manuelle)'); return; }

        const initials = (prompt('Tes initiales pour clôturer l\'inventaire :') || '').trim();
        if (initials.length < 2) { showToast('Initiales requises (2 caractères min).'); return; }

        const manual = counted.filter(id => manuallyAddedIds.has(id)).length;
        const cibleLbl = mode==='matin' ? '« Inventaire soir » de la feuille de la VEILLE (vendredi)' : '« Inventaire soir » de la feuille DU JOUR';
        if (!confirm(`Clôturer l'inventaire ${mode.toUpperCase()} ?\n\n${items.length} produit(s) → ${cibleLbl}.${manual?`\n${manual} en saisie manuelle (non écrits).`:''}\n\nUn récap part à rr@pribon.org.`)) return;

        setClosingInv(true); setWriting(true); setWriteResult(null);
        try {
          const data = await stockPost({ secret: FRESHDESK_SECRET, action: 'stock_inv_write', target, date: invDate, items });
          if (!data.ok) { showToast('Erreur écriture : ' + (data.error || 'inconnue')); setWriting(false); setClosingInv(false); return; }
          setWriteResult(data);
          // Historique inventaire (master)
          try {
            await storage.setDoc('inventory_log', `${invDate}_${mode}_${Date.now()}`, {
              date: invDate, mode, target, by: session.name, initials,
              at: new Date().toISOString(), nbProducts: items.length,
              written: data.written||0, conflicts: (data.conflicts||[]).length, sheet: data.sheet||'',
            });
          } catch(e){}
          // Mail récap visuel à Raimbaud
          try {
            await stockPost({ secret: FRESHDESK_SECRET, action: 'send_mail',
              to: 'rr@pribon.org', cc: 'hg@probon.fr',
              subject: `Inventaire ${mode} du ${invDate} — ${items.length} produit(s) (${initials})`,
              htmlBody: buildRecapHtml(data, initials) });
          } catch(e){}
          let m = `✓ Inventaire ${mode} clôturé : ${data.written||0} écrit(s)`;
          if (data.conflicts && data.conflicts.length) m += ` · ${data.conflicts.length} conflit(s) → rr@`;
          if (data.notFound && data.notFound.length) m += ` · ${data.notFound.length} non trouvé(s)`;
          showToast(m);
        } catch (e) { showToast('Erreur réseau : ' + e.message); }
        finally { setWriting(false); setClosingInv(false); }
      };

      const undoLastInventory = async () => {
        if (!STOCK_PROXY_URL) { showToast('⚠️ Proxy stock non configuré'); return; }
        const ids = counted.filter(id => !manuallyAddedIds.has(id));
        if (!ids.length) { showToast('Rien à annuler (aucun produit compté).'); return; }
        if (!confirm(`Annuler le dernier inventaire ${mode.toUpperCase()} ?\n\nEfface ${ids.length} valeur(s) écrites par l'appli dans « Inventaire soir » (${mode==='matin'?'feuille de la veille':'feuille du jour'}).\nTes saisies MANUELLES ne sont pas touchées.`)) return;
        setWriting(true);
        try {
          const data = await stockPost({ secret: FRESHDESK_SECRET, action: 'stock_inv_clear', target, column: 'soir', date: invDate, ids });
          if (!data.ok) { showToast('Erreur : ' + (data.error || 'inconnue')); setWriting(false); return; }
          showToast(`✓ ${data.cleared||0} valeur(s) effacée(s) dans « ${data.sheet||''} »`);
        } catch (e) { showToast('Erreur réseau : ' + e.message); }
        finally { setWriting(false); }
      };

      const sendManquant = async () => {
        const prod = (mqProduit || '').trim();
        if (!prod) { showToast('Indique le produit'); return; }
        if (!STOCK_PROXY_URL) { showToast('⚠️ Proxy stock non configuré'); return; }
        setMqSending(true);
        try {
          const data = await stockPost({ secret: FRESHDESK_SECRET, action: 'mail_warehouse_only',
            date: invDate, by: session.name,
            items: [{ produit: prod, qty: parseFloat(String(mqQty).replace(',', '.')) || 0, dlc: mqDlc || '' }] });
          if (!data.ok) { showToast('Erreur mail : ' + (data.error || 'inconnue')); setMqSending(false); return; }
          showToast('✓ Mail envoyé à Raimbaud (produit dispo entrepôt, pas en vente)');
          setMqProduit(''); setMqQty(''); setMqDlc(''); setShowManquant(false);
        } catch (e) { showToast('Erreur réseau : ' + e.message); }
        finally { setMqSending(false); }
      };

      return (
        <div className="stack">
          <h1>📋 Inventaire</h1>

          {session.isMaster && (
            <div className="card" style={{borderLeft:'3px solid var(--master)'}}>
              <div onClick={()=>setShowHistory(s=>!s)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}}>
                <div style={{fontWeight:600}}>📜 Historique des inventaires <span style={{fontWeight:400,fontSize:12,color:'var(--ink-mute)'}}>(master)</span></div>
                <span style={{fontSize:13,color:'var(--master)'}}>{showHistory ? 'Masquer ▲' : 'Ouvrir ▼'}</span>
              </div>
              {showHistory && <InventoryHistory />}
            </div>
          )}

          <div className="alert-info" style={{borderLeft:'3px solid var(--info)'}}>
            🚧 <strong>Module en test (prochainement disponible).</strong> Utilisable pour s'entraîner. Le scan apprend les codes au fur et à mesure.
          </div>

          {products.length > 0 && (
            <div className="card" style={{borderLeft:'3px solid var(--info)'}}>
              <div onClick={()=>setShowLearn(s=>!s)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}}>
                <div style={{fontWeight:600}}>🏷️ Apprentissage des codes-barres <span style={{fontWeight:400,fontSize:12,color:'var(--ink-mute)'}}>({Object.keys(eanMap).length} appris)</span></div>
                <span style={{fontSize:13,color:'var(--info)'}}>{showLearn ? 'Masquer ▲' : 'Ouvrir ▼'}</span>
              </div>
              {showLearn && (
                <div style={{marginTop:10}}>
                  <p style={{fontSize:12,color:'var(--ink-soft)',marginTop:0}}>
                    Scanne tes produits pour leur apprendre les codes — <strong>sans rien compter</strong>. Une fois associé, le code est reconnu partout (et c'est mémorisé pour de bon).
                  </p>
                  <BarcodeScanner onDetected={handleLearnScan} />
                  <div style={{marginTop:10}}>
                    <div style={{fontSize:11,color:'var(--ink-mute)',marginBottom:4}}>ou tape / scanne le code à la main :</div>
                    <input
                      onKeyDown={e=>{ if(e.key==='Enter'){ handleLearnScan(e.target.value); e.target.value=''; } }}
                      placeholder="Code-barre puis Entrée…" style={{fontSize:16,padding:'10px',width:'100%'}} />
                  </div>
                  {lastLearn && (
                    <div style={{marginTop:8,fontSize:13,padding:'6px 8px',borderRadius:6,background: lastLearn.status==='new' ? 'var(--ok-soft, #e7f6ec)' : 'var(--bg2, #f3f3f3)'}}>
                      {lastLearn.status==='new' ? '✓ Associé' : 'ℹ️ Déjà connu'} : <strong>{lastLearn.ean}</strong> → {lastLearn.name}
                    </div>
                  )}
                  {learnPendingEan && (
                    <div style={{marginTop:10,padding:10,background:'var(--warn-soft)',borderRadius:8}}>
                      <div style={{fontSize:13,marginBottom:6}}>Code <strong>{learnPendingEan}</strong> inconnu. À quel produit l'associer ?</div>
                      <input value={learnSearch} onChange={e=>setLearnSearch(e.target.value)} placeholder="Chercher le produit…" style={{width:'100%',marginBottom:6}} />
                      <div className="stack" style={{gap:3,maxHeight:200,overflowY:'auto'}}>
                        {learnMatches.map(p => (
                          <div key={p.id} onClick={()=>learnAssoc(p.id)} style={{padding:'6px 8px',border:'1px solid var(--border)',borderRadius:6,cursor:'pointer',fontSize:13}}>
                            {p.name} <span style={{color:'var(--ink-mute)'}}>· {p.producer}</span>
                          </div>
                        ))}
                        {learnSearch.trim() && learnMatches.length===0 && <p style={{fontSize:13,color:'var(--ink-mute)'}}>Aucun produit trouvé.</p>}
                      </div>
                      <button className="btn-ghost" style={{marginTop:6,fontSize:12}} onClick={()=>setLearnPendingEan(null)}>Annuler</button>
                    </div>
                  )}
                </div>
              )}
            </div>
          )}

          {!isTuesday && <p style={{fontSize:12,color:'var(--ink-mute)',marginTop:-4}}>L'inventaire officiel est le mardi matin, mais tu peux en faire à n'importe quelle date.</p>}

          <div className="card" style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
            <label style={{fontSize:13,fontWeight:600}}>📅 Date d'inventaire</label>
            <input type="date" value={invDate} onChange={e=>setInvDate(e.target.value || todayKey())}
              style={{fontSize:15,padding:'6px 8px'}} />
            {invDate !== todayKey() && (
              <button className="btn-ghost" style={{fontSize:12}} onClick={()=>setInvDate(todayKey())}>Aujourd'hui</button>
            )}
            <span style={{fontSize:12,color:'var(--ink-mute)'}}>chaque date a son propre comptage</span>
          </div>

          {session.isMaster && (
            <PurgeFromLossesBlock session={session} invDate={invDate} stockProducts={stockProducts} />
          )}

          <div className="card" style={{paddingBottom:10}}>
            <div className="filter-row" style={{marginBottom:scopeOk?8:0}}>
              <div className={`chip ${invType==='complet'?'selected':''}`}
                onClick={()=>{ setInvType('complet'); setScopeValue(''); saveMeta({type:'complet', scopeValue:''}); }}>
                📦 Inventaire complet
              </div>
              <div className={`chip ${invType==='tournant'?'selected':''}`}
                onClick={()=>{ setInvType('tournant'); saveMeta({type:'tournant'}); }}>
                🔄 Inventaire tournant
              </div>
              <div className={`chip ${invType==='fl'?'selected':''}`}
                onClick={()=>{ setInvType('fl'); saveMeta({type:'fl'}); }}>
                🥬 Fruits & Légumes (soir)
              </div>
            </div>
            {invType === 'complet' && (
              <div style={{fontSize:12,color:'var(--ink-mute)'}}>Tout le catalogue. À faire au moins 1×/semaine — sert de référence.</div>
            )}
            {(invType === 'complet' || invType === 'tournant') && stockNote && (
              <div style={{fontSize:11,color: stockNote.startsWith('⚠️') ? 'var(--danger)' : 'var(--ink-mute)', marginTop:4}}>
                {stockProducts ? `📋 ${stockProducts.length} produits actifs · ` : ''}{stockNote}
              </div>
            )}
            {invType === 'tournant' && (
              <div>
                <div className="filter-row" style={{marginBottom:6}}>
                  <div className={`chip ${scopeKind==='producer'?'selected':''}`}
                    onClick={()=>{ setScopeKind('producer'); setScopeValue(''); saveMeta({scopeKind:'producer', scopeValue:''}); }}>Par producteur</div>
                  <div className={`chip ${scopeKind==='type'?'selected':''}`}
                    onClick={()=>{ setScopeKind('type'); setScopeValue(''); saveMeta({scopeKind:'type', scopeValue:''}); }}>Par type</div>
                  {hasCategories && (
                    <div className={`chip ${scopeKind==='category'?'selected':''}`}
                      onClick={()=>{ setScopeKind('category'); setScopeValue(''); saveMeta({scopeKind:'category', scopeValue:''}); }}>Par catégorie</div>
                  )}
                  {hasFamilies && (
                    <div className={`chip ${scopeKind==='family'?'selected':''}`}
                      onClick={()=>{ setScopeKind('family'); setScopeValue(''); saveMeta({scopeKind:'family', scopeValue:'', scopeValueLevel:'family'}); }}>Par famille</div>
                  )}
                </div>
                {scopeKind === 'producer' && (
                  <select value={scopeValue} onChange={e=>{ setScopeValue(e.target.value); saveMeta({scopeValue:e.target.value}); }}
                    style={{width:'100%',fontSize:15,padding:'8px'}}>
                    <option value="">— Choisir un producteur ({producers.length}) —</option>
                    {producers.map(pr => <option key={pr} value={pr}>{pr}</option>)}
                  </select>
                )}
                {scopeKind === 'type' && (
                  <div className="filter-row" style={{marginBottom:0}}>
                    {['frais','pain','nd'].map(t => (
                      <div key={t} className={`chip ${scopeValue===t?'selected':''}`}
                        onClick={()=>{ setScopeValue(t); saveMeta({scopeValue:t}); }}>{TYPE_LABELS[t]}</div>
                    ))}
                  </div>
                )}
                {scopeKind === 'category' && hasCategories && (
                  <select value={scopeValue} onChange={e=>{ setScopeValue(e.target.value); saveMeta({scopeValue:e.target.value}); }}
                    style={{width:'100%',fontSize:15,padding:'8px'}}>
                    <option value="">— Choisir une catégorie ({categories.length}) —</option>
                    {categories.map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                )}
                {scopeKind === 'family' && hasFamilies && (
                  <select value={scopeValue} onChange={e=>{ setScopeValue(e.target.value); saveMeta({scopeValue:e.target.value, scopeValueLevel:'family'}); }}
                    style={{width:'100%',fontSize:15,padding:'8px'}}>
                    <option value="">— Choisir une famille ({families.length}) —</option>
                    {Object.keys(familiesByCat).map(cat => (
                      <optgroup key={cat} label={cat}>
                        {familiesByCat[cat].map(f => <option key={cat+'|'+f} value={f}>{f}</option>)}
                      </optgroup>
                    ))}
                  </select>
                )}
                {!scopeOk && <div style={{fontSize:12,color:'var(--warn)',marginTop:6}}>Choisis un {scopeKind==='producer'?'producteur':scopeKind==='category'?'catégorie':scopeKind==='family'?'famille':'type'} pour démarrer le comptage.</div>}

    // ============================================================
    // PAGE RÉCAP MASTER — vue globale tous locaux (consignes + suivi + oublis)
    // ============================================================
    // Bouton Freshdesk générique pour relancer un client non récupéré (récap master)
    // Affiche l'historique des mails envoyés à un client (via le bouton Relancer).
    function ClientMailHistory({ clientEmail }) {
      const [history, setHistory] = React.useState([]);
      React.useEffect(() => {
        if (!clientEmail) return;
        const u = storage.subscribe('client_mail_history', (arr) => {
          const filtered = arr.filter(h => h.clientEmail === clientEmail);
          filtered.sort((a, b) => new Date(b.sentAt) - new Date(a.sentAt));
          setHistory(filtered.slice(0, 3)); // 3 derniers
        });
        return () => { u && u(); };
      }, [clientEmail]);
      if (!history.length) return null;
      return (
        <div style={{fontSize:11,color:'var(--ink-mute)',marginTop:4}}>
          {history.map((h, i) => (
            <div key={i}>📧 {h.type==='oubli'?'Oubli':h.type==='non_recup'?'Récup':'Mail'} · {formatDateShort(h.sentAt)} {h.sentBy ? `(${h.sentBy})` : ''}</div>
          ))}
        </div>
      );
    }

    function FreshdeskRecupButton({ client, mode, session }) {
      const showToast = React.useContext(ToastContext);
      const [busy, setBusy] = React.useState(false);
      const [sent, setSent] = React.useState(false);
      const email = client.email || client.clientEmail;
      const isOubli = mode === 'oubli';

      const handleSend = async () => {
        if (!FRESHDESK_PROXY_URL || FRESHDESK_PROXY_URL.includes('TON_')) { showToast('Proxy Freshdesk non configuré'); return; }
        if (!email) { showToast('Pas d\'email pour ce client'); return; }
        const who = client.consumer_name || client.clientName || email;
        if (!confirm(`Envoyer un mail de relance à ${who} ?`)) return;
        setBusy(true);
        try {
          const payload = {
            secret: FRESHDESK_SECRET,
            clients: [{
              email,
              name: client.consumer_name || client.clientName || '',
              site: client.site,
              siteName: siteLabel(client.site),
              subject: isOubli ? 'Article oublié dans votre casier Kelbongoo' : 'Votre commande Kelbongoo à récupérer',
              body: isOubli
                ? `Bonjour ${client.clientName || client.consumer_name || ''},\n\nVous avez oublié un article dans votre casier lors de la distribution sur le point ${siteLabel(client.site)} :\n- ${client.productLabel || 'article'}\n\nMerci de venir le récupérer dans les prochains jours. Sans nouvelles de votre part sous 3 jours, l'article sera retourné à l'entrepôt.\n\nÀ bientôt,\nL'équipe Kelbongoo`
                : `Bonjour ${client.consumer_name || client.clientName || ''},\n\nVotre commande Kelbongoo n'a pas encore été récupérée sur le point ${siteLabel(client.site)}. Vous pouvez venir la chercher dès la prochaine distribution, ou nous recontacter.\n\nÀ bientôt,\nL'équipe Kelbongoo`,
              tag: isOubli ? 'oubli-casier' : 'non-recupere',
            }],
          };
          const data = await freshdeskPost(payload);
          if (data.ok && (data.success > 0 || data.success === undefined)) {
            // Enregistre l'envoi dans l'historique
            try {
              await storage.setDoc('client_mail_history', `${email}_${Date.now()}`, {
                clientEmail: email,
                clientName: client.consumer_name || client.clientName || '',
                type: isOubli ? 'oubli' : 'non_recup',
                subject: isOubli ? 'Article oublié dans votre casier Kelbongoo' : 'Votre commande Kelbongoo à récupérer',
                sentAt: new Date().toISOString(),
                sentBy: session?.name || 'anonyme',
                site: client.site,
              });
            } catch (e) { /* erreur log non-bloquante */ }
            setSent(true);
            showToast('✓ Ticket Freshdesk créé + mail envoyé');
          } else {
            showToast('Erreur : ' + (data.error || (data.results && data.results[0]?.error) || 'inconnue'));
          }
        } catch (err) { showToast('Erreur réseau : ' + err.message); }
        finally { setBusy(false); }
      };

      if (!email) return null;
      return (
        <div>
          <button className="btn-secondary" style={{padding:'6px 10px',fontSize:12}} disabled={busy} onClick={handleSend}>
            {busy ? 'Envoi…' : sent ? '🎫 Mail envoyé ✓' : '🎫 Relancer par mail (Freshdesk)'}
          </button>
          <ClientMailHistory clientEmail={email} />
        </div>
      );
    }

    function MasterRecapPage({ session, consumersByEmail }) {
      const showToast = React.useContext(ToastContext);
      const [consignes, setConsignes] = React.useState([]);
      const [followups, setFollowups] = React.useState([]);
      const [forgottens, setForgottens] = React.useState([]);
      const [pdpReturns, setPdpReturns] = React.useState([]);
      const [siteFilter, setSiteFilter] = React.useState('TOUS');
      const [section, setSection] = React.useState('followups'); // followups | consignes | oublis

      React.useEffect(() => {
        const u1 = storage.subscribe('consignes', setConsignes);
        const u2 = storage.subscribe('followups', setFollowups);
        const u3 = storage.subscribe('forgotten_items', setForgottens);
        const u4 = storage.subscribe('pdp_returns', setPdpReturns);
        return () => { u1 && u1(); u2 && u2(); u3 && u3(); u4 && u4(); };
      }, []);

      const [alerting, setAlerting] = React.useState(false);
      const overduePdp = computeOverduePdpReturns(pdpReturns);
      const sendOverdueAlert = async () => {
        if (overduePdp.length === 0) { showToast('Aucun retour en retard'); return; }
        if (!confirm(`Envoyer l'alerte (${overduePdp.length} retour(s) non traité(s)) à ${PDP_ALERT_EMAILS.join(' + ')} ?`)) return;
        setAlerting(true);
        try {
          const res = await sendPdpAlert(overduePdp);
          // Le proxy renvoie { ok:false, error } si MailApp échoue : on ne ment plus sur le succès.
          if (res && res.ok === false) { showToast('❌ Échec envoi : ' + (res.error || 'action send_mail du proxy stock')); }
          else if (res && res.fallback) { showToast('✉️ Ouvre ta messagerie'); }
          else { showToast('✓ Alerte envoyée à ' + PDP_ALERT_EMAILS.join(' + ')); }
        } catch (e) { showToast('Erreur : ' + e.message); }
        finally { setAlerting(false); }
      };

      // ── Envoi AUTOMATIQUE de l'alerte (1×/jour) dès qu'un retour PDP est en retard ──
      // Il n'existait aucun déclencheur auto : l'alerte ne partait QUE sur clic du bouton.
      // Ici, le 1er master qui ouvre le récap avec des retours en retard déclenche l'envoi.
      // Verrou quotidien partagé (collection pdp_alert_log/<jour>) → pas de doublon entre postes.
      const autoSentRef = React.useRef(false);
      React.useEffect(() => {
        if (autoSentRef.current) return;
        if (!firebaseConfigured) return;            // pas d'auto-envoi en mode local (1 seul poste)
        if (overduePdp.length === 0) return;
        autoSentRef.current = true;                 // verrou local immédiat (évite les rafales de re-render)
        (async () => {
          const dayK = todayKey();
          try {
            const flag = await storage.getDoc('pdp_alert_log', dayK);
            if (flag && flag.sent) return;          // déjà envoyé aujourd'hui par un autre poste
            const res = await sendPdpAlert(overduePdp);
            if (res && res.ok === false) { autoSentRef.current = false; return; } // échec → réessai possible
            await storage.setDoc('pdp_alert_log', dayK, {
              sent: true, count: overduePdp.length, at: new Date().toISOString(), by: session.name,
            }, { replace: true });
            showToast('✉️ Alerte retours PDP envoyée automatiquement (' + overduePdp.length + ')');
          } catch (e) { autoSentRef.current = false; } // réessai au prochain rendu
        })();
      }, [overduePdp.length]);

      const phoneOf = (email, fallback) => {
        if (fallback) return fallback;
        const c = consumersByEmail && email ? consumersByEmail[email.toLowerCase()] : null;
        return c?.telephone || '';
      };

      // --- Suivi clients à contacter (non récupérés), non résolus ---
      const followOpen = followups
        .filter(f => f.status !== 'resolved')
        .map(f => ({ ...f, phone: phoneOf(f.email, f.phone) }))
        // Les clients "demander à Henry" remontent en tête
        .sort((a, b) => (b.escalated ? 1 : 0) - (a.escalated ? 1 : 0));

      // --- Consignes non traitées (ni créditées, ni marquées traitées) ---
      const consigneOpen = consignes.filter(c => c.status !== 'credited' && c.status !== 'done');

      // --- Oublis casier actifs ---
      const oublisOpen = forgottens
        .filter(f => f.status !== 'done' && f.status !== 'returned' && f.status !== 'picked_up')
        .map(f => ({ ...f, phone: phoneOf(f.clientEmail, f.clientPhone) }));

      const applyFilter = (arr) => siteFilter === 'TOUS' ? arr : arr.filter(x => x.site === siteFilter);
      const fFollow = applyFilter(followOpen);
      const fConsigne = applyFilter(consigneOpen);
      const fOublis = applyFilter(oublisOpen);

      // Locaux présents dans les données
      const sitesPresent = [...new Set([
        ...followOpen.map(x => x.site),
        ...consigneOpen.map(x => x.site),
        ...oublisOpen.map(x => x.site),
      ].filter(Boolean))].sort();

      // Groupage par local
      const groupBySite = (arr) => {
        const g = {};
        for (const x of arr) { const s = x.site || '?'; (g[s] = g[s] || []).push(x); }
        return g;
      };

      const setFollowStatus = async (f, newStatus) => {
        await storage.setDoc('followups', f.id || f.orderId, { ...f, status: newStatus, updatedBy: session.name, updatedAt: new Date().toISOString() });
        showToast(`Statut : ${newStatus}`);
      };
      const setConsigneStatus = async (c, newStatus) => {
        await storage.setDoc('consignes', c.id, { ...c, status: newStatus, updatedBy: session.name, updatedAt: new Date().toISOString() });
        showToast('Mis à jour');
      };
      const setOubliDone = async (f) => {
        await storage.setDoc('forgotten_items', f.id, { ...f, status: 'done', updatedBy: session.name, updatedAt: new Date().toISOString() });
        showToast('✓ Traité');
      };

      const PhoneOrEmail = ({ phone, email }) => (
        phone && phone.replace(/\D/g,'').length >= 9
          ? <a href={`tel:${phone}`} style={{color:'var(--accent-dark)',fontWeight:600}}>📞 {phone}</a>
          : <span style={{color:'var(--warn)'}}>✉️ {email || 'pas de contact'}</span>
      );

      return (
        <div className="stack">
          <h1>📋 Récap master — tous locaux</h1>
          <p style={{color:'var(--ink-soft)',fontSize:13,marginTop:-8}}>
            Vue globale pour traiter sans changer de local : clients à rappeler, consignes en attente, oublis casier.
          </p>

          {overduePdp.length > 0 && (
            <div className="alert-red" style={{display:'flex',flexDirection:'column',gap:8}}>
              <div>⏰ <strong>{overduePdp.length} retour{overduePdp.length>1?'s':''} PDP non traité{overduePdp.length>1?'s':''}</strong> par les préparateurs (délai dépassé).</div>
              <div style={{fontSize:12,fontWeight:'normal'}}>
                {overduePdp.slice(0,6).map(o => (
                  <div key={o.id}>• {o.site} — {o.produit} · signalé {formatDateShort(o.day)}{o.dlc ? ` · DLC ${formatDateShort(o.dlc)}` : ''}</div>
                ))}
                {overduePdp.length > 6 && <div>… +{overduePdp.length-6} autre(s)</div>}
              </div>
              <button className="btn-primary" style={{alignSelf:'flex-start',padding:'6px 12px',fontSize:13}} disabled={alerting} onClick={sendOverdueAlert}>
                {alerting ? 'Envoi…' : '✉️ Envoyer l\'alerte (rr@ + hg@)'}
              </button>
            </div>
          )}

          {/* Filtre local */}
          <div className="row" style={{flexWrap:'wrap',gap:8}}>
            <label style={{fontSize:13,fontWeight:600}}>Local :</label>
            <select value={siteFilter} onChange={e => setSiteFilter(e.target.value)} style={{width:'auto',fontSize:13,padding:'6px 10px'}}>
              <option value="TOUS">Tous les locaux</option>
              {sitesPresent.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
          </div>

          {/* Onglets de section avec compteurs */}
          <div className="filter-row" style={{marginBottom:0}}>
            <div className={`chip ${section==='followups'?'selected':''}`} onClick={()=>setSection('followups')}>
              📞 À contacter <span className="badge badge-anom" style={{marginLeft:6,padding:'1px 6px',fontSize:10}}>{fFollow.length}</span>
            </div>
            <div className={`chip ${section==='consignes'?'selected':''}`} onClick={()=>setSection('consignes')}>
              🍯 Consignes <span className="badge badge-info" style={{marginLeft:6,padding:'1px 6px',fontSize:10}}>{fConsigne.length}</span>
            </div>
            <div className={`chip ${section==='oublis'?'selected':''}`} onClick={()=>setSection('oublis')}>
              📦 Oublis <span className="badge badge-info" style={{marginLeft:6,padding:'1px 6px',fontSize:10}}>{fOublis.length}</span>
            </div>
          </div>

          {/* ----- SECTION : clients à contacter ----- */}
          {section === 'followups' && (
            fFollow.length === 0 ? <div className="empty-state"><div className="icon">✓</div><p>Aucun client à contacter.</p></div> :
            Object.entries(groupBySite(fFollow)).sort((a,b)=>a[0].localeCompare(b[0])).map(([s, items]) => (
              <div key={s} className="card">
                <h3 style={{marginBottom:8}}>{s} · {items.length} client{items.length>1?'s':''}</h3>
                <div className="list">
                  {items.sort((a,b)=>((b.escalated?1:0)-(a.escalated?1:0)) || (a.consumer_name||'').localeCompare(b.consumer_name||'')).map(f => (
                    <div key={f.orderId} className="list-item" style={{flexDirection:'column',alignItems:'stretch',...(f.escalated?{borderLeft:'3px solid var(--warn)'}:{})}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
                        <div className="list-item-main">
                          <div className="list-item-name">{f.escalated && '🙋 '}{f.consumer_name || '(client)'}</div>
                          <div className="list-item-sub"><PhoneOrEmail phone={f.phone} email={f.email} /></div>
                          {f.escalated && <div style={{fontSize:11,color:'var(--warn)'}}>Demande de {f.escalatedBy} — distrib n'a pas pu joindre</div>}
                        </div>
                        {f.status && f.status !== 'pending' && <span className="badge badge-info">{f.status}</span>}
                      </div>
                      <div style={{display:'flex',gap:6,marginTop:8,flexWrap:'wrap'}}>
                        <button className="btn-secondary" style={{padding:'6px 10px',fontSize:12}} onClick={()=>setFollowStatus(f,'called')}>Contacté</button>
                        <button className="btn-secondary" style={{padding:'6px 10px',fontSize:12}} onClick={()=>setFollowStatus(f,'no_answer')}>No answer</button>
                        <FreshdeskRecupButton client={f} />
                        <button className="btn-primary" style={{padding:'6px 10px',fontSize:12}} onClick={()=>setFollowStatus(f,'resolved')}>✓ Résolu</button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ))
          )}

          {/* ----- SECTION : consignes ----- */}
          {section === 'consignes' && (
            fConsigne.length === 0 ? <div className="empty-state"><div className="icon">🍯</div><p>Aucune consigne en attente.</p></div> :
            Object.entries(groupBySite(fConsigne)).sort((a,b)=>a[0].localeCompare(b[0])).map(([s, items]) => (
              <div key={s} className="card">
                <h3 style={{marginBottom:8}}>{s} · {items.reduce((t,c)=>t+(c.nbPots||0),0)} pot(s)</h3>
                <div className="list">
                  {items.map(c => (
                    <div key={c.id} className="list-item" style={{flexDirection:'column',alignItems:'stretch'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
                        <div className="list-item-main">
                          <div className="list-item-name">{c.clientName || c.consumerName || c.consumer_name || '(client)'} · {c.nbPots||0} pot(s)</div>
                          <div className="list-item-sub">{c.remark ? `« ${c.remark} »` : (c.day || '')}</div>
                        </div>
                        {c.status && <span className="badge badge-info">{c.status}</span>}
                      </div>
                      <div style={{display:'flex',gap:6,marginTop:8,flexWrap:'wrap'}}>
                        <button className="btn-secondary" style={{padding:'6px 10px',fontSize:12}} onClick={()=>setConsigneStatus(c,'done')}>✓ Traité</button>
                        <button className="btn-primary" style={{padding:'6px 10px',fontSize:12}} onClick={()=>setConsigneStatus(c,'credited')}>✓ Crédité</button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ))
          )}

          {/* ----- SECTION : oublis casier ----- */}
          {section === 'oublis' && (
            fOublis.length === 0 ? <div className="empty-state"><div className="icon">📦</div><p>Aucun oubli en cours.</p></div> :
            Object.entries(groupBySite(fOublis)).sort((a,b)=>a[0].localeCompare(b[0])).map(([s, items]) => (
              <div key={s} className="card">
                <h3 style={{marginBottom:8}}>{s} · {items.length} oubli{items.length>1?'s':''}</h3>
                <div className="list">
                  {items.sort((a,b)=>(a.clientName||'').localeCompare(b.clientName||'')).map(f => {
                    const days = daysSince(f.day || f.createdAt);
                    return (
                      <div key={f.id} className="list-item" style={{flexDirection:'column',alignItems:'stretch'}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
                          <div className="list-item-main">
                            <div className="list-item-name">{days>=3 && '🔴 '}{f.clientName || '(client)'}</div>
                            <div className="list-item-sub">📦 {f.productLabel || '(produit)'} · <PhoneOrEmail phone={f.phone} email={f.clientEmail} /></div>
                          </div>
                          <span style={{fontSize:11,color:'var(--ink-mute)'}}>il y a {days}j</span>
                        </div>
                        <div style={{display:'flex',gap:6,marginTop:8,flexWrap:'wrap'}}>
                          <FreshdeskRecupButton client={f} mode="oubli" />
                          <button className="btn-primary" style={{padding:'6px 10px',fontSize:12}} onClick={()=>setOubliDone(f)}>✓ Traité</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))
          )}
        </div>
      );
    }

    function ClosurePage({ session, currentSite, orders, consumersByEmail, isClosed, onReopen }) {
      const showToast = React.useContext(ToastContext);
      const [statuses, setStatuses] = React.useState([]);
      const [confirming, setConfirming] = React.useState(false);
      const [closing, setClosing] = React.useState(false);
      const [progress, setProgress] = React.useState({ done: 0, total: 0 });
      const [reopenPwd, setReopenPwd] = React.useState('');
      const [askReopen, setAskReopen] = React.useState(false);
      // Distributions passées non clôturées sur ce site (master seulement)
      const [pastUnclosed, setPastUnclosed] = React.useState([]);

      React.useEffect(() => {
        const unsub = storage.subscribe(`day_${activeDay()}_statuses`, setStatuses);
        return unsub;
      }, []);

      // Master : détecter les jours passés avec commandes mais sans clôture pour ce site
      React.useEffect(() => {
        if (!session.isMaster) return;
        // On regarde les 14 derniers jours
        const checkPast = async () => {
          const out = [];
          for (let i = 1; i <= 14; i++) {
            const day = addDays(activeDay(), -i);
            try {
              const ordersDay = await storage.getAll(`day_${day}_orders`);
              if (ordersDay.length === 0 || !ordersDay[0].orders) continue;
              const siteOrders = ordersDay[0].orders.filter(o => o.site === currentSite);
              if (siteOrders.length === 0) continue;
              // Y a-t-il une clôture pour ce site ce jour-là ?
              const closures = await storage.getAll(`day_${day}_closure`);
              const closed = closures.find(c => (c.site || c.id) === currentSite);
              if (!closed) {
                out.push({ day, orderCount: siteOrders.length });
              }
            } catch (e) { /* ignore */ }
          }
          setPastUnclosed(out);
        };
        checkPast();
      }, [session, currentSite]);

      const handleClosePastDay = async (day, orderCount) => {
        if (!confirm(`Clôturer la distribution du ${formatDateShort(day)} pour ${currentSite} ?\nLes clients non marqués passés iront dans le suivi non-récup.`)) return;
        try {
          const ordersDay = await storage.getAll(`day_${day}_orders`);
          const allOrdersOfDay = ordersDay[0]?.orders || [];
          const siteOrdersOfDay = allOrdersOfDay.filter(o => o.site === currentSite);
          const statusesDay = await storage.getAll(`day_${day}_statuses`);
          const statusMapDay = {};
          for (const s of statusesDay) statusMapDay[s.orderId] = s;
          const passedOfDay = siteOrdersOfDay.filter(o => statusMapDay[o.orderId]?.passed);
          const notPassedOfDay = siteOrdersOfDay.filter(o => !statusMapDay[o.orderId]?.passed);
          for (const o of notPassedOfDay) {
            const cached = consumersByEmail && consumersByEmail[o.email];
            await storage.setDoc('followups', o.orderId, {
              orderId: o.orderId, site: currentSite,
              consumer_name: displayName(o),
              clientName: displayName(o),
              email: o.email,
              phone: cached?.telephone || o.telephone || '',
              hasPhone: !!(cached?.telephone || o.telephone),
              day, distribDate: day,
              items: o.items || [],
              status: 'pending',
              createdBy: session.name,
              createdAt: new Date().toISOString(),
            });
          }
          await storage.setDoc(`day_${day}_closure`, currentSite, {
            site: currentSite, closedBy: session.name,
            closedAt: new Date().toISOString(),
            notPassedCount: notPassedOfDay.length, passedCount: passedOfDay.length,
            lateClosure: true,
          });
          setPastUnclosed(curr => curr.filter(p => p.day !== day));
          showToast(`✓ Distribution du ${formatDateShort(day)} clôturée`);
        } catch (e) {
          showToast('Erreur : ' + e.message);
        }
      };

      const statusMap = React.useMemo(() => {
        const m = {}; for (const s of statuses) m[s.orderId] = s; return m;
      }, [statuses]);

      const visible = orders.filter(o => o.site === currentSite);
      const notPassed = visible.filter(o => !statusMap[o.orderId]?.passed);
      const passed = visible.filter(o => statusMap[o.orderId]?.passed);

      const handleCloseDay = async () => {
        setClosing(true);
        setProgress({ done: 0, total: notPassed.length });
        try {
          for (let i = 0; i < notPassed.length; i++) {
            const o = notPassed[i];
            const cached = consumersByEmail && consumersByEmail[o.email];
            await storage.setDoc('followups', o.orderId, {
              orderId: o.orderId, site: currentSite,
              consumer_name: displayName(o),
              clientName: displayName(o),
              email: o.email,
              phone: cached?.telephone || o.telephone || '',
              hasPhone: !!(cached?.telephone || o.telephone),
              day: activeDay(),
              distribDate: activeDay(),
              items: o.items || [],
              status: 'pending',
              createdBy: session.name,
              createdAt: new Date().toISOString(),
            });
            setProgress({ done: i + 1, total: notPassed.length });
          }
          await storage.setDoc(`day_${activeDay()}_closure`, currentSite, {
            site: currentSite, closedBy: session.name,
            closedAt: new Date().toISOString(),
            notPassedCount: notPassed.length, passedCount: passed.length,
          });
          setConfirming(false);
          showToast(`✓ Journée clôturée pour ${currentSite}`);
        } catch (e) { showToast('Erreur : ' + e.message); }
        finally { setClosing(false); }
      };

      const handleReopen = async () => {
        if (reopenPwd !== MASTER_PASSWORD) { showToast('Mot de passe incorrect'); return; }
        await storage.deleteDoc(`day_${activeDay()}_closure`, currentSite);
        setAskReopen(false);
        setReopenPwd('');
        showToast('Journée ré-ouverte');
        onReopen && onReopen();
      };

      return (
        <div className="stack">
          <h1>Clôture · {currentSite}</h1>
          <p style={{color:'var(--ink-soft)',fontSize:13,marginTop:-8}}>
            Validation de fin de journée. Les non-passés iront dans le suivi.
          </p>

          {session.isMaster && pastUnclosed.length > 0 && (
            <div className="alert-red">
              <strong>⚠️ Distribution{pastUnclosed.length > 1 ? 's' : ''} précédente{pastUnclosed.length > 1 ? 's' : ''} non clôturée{pastUnclosed.length > 1 ? 's' : ''} sur {currentSite} :</strong>
              <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:6}}>
                {pastUnclosed.map(p => (
                  <div key={p.day} style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,background:'rgba(255,255,255,0.5)',padding:'8px 10px',borderRadius:6}}>
                    <span style={{fontSize:13}}>
                      <strong>{formatDateShort(p.day)}</strong> · {p.orderCount} commande{p.orderCount > 1 ? 's' : ''}
                    </span>
                    <button className="btn-primary" style={{padding:'4px 10px',fontSize:12}} onClick={() => handleClosePastDay(p.day, p.orderCount)}>
                      Clôturer
                    </button>
                  </div>
                ))}
              </div>
            </div>
          )}

          {isClosed ? (
            <>
              <div className="alert-info" style={{padding:14}}>
                🔒 <strong>Cette journée est déjà clôturée pour {currentSite}.</strong>
              </div>
              {session.isMaster && (
                !askReopen ? (
                  <button className="btn-secondary" onClick={() => setAskReopen(true)}>
                    🔓 Ré-ouvrir (master)
                  </button>
                ) : (
                  <div className="card">
                    <h3 style={{marginBottom:10}}>Confirmer ré-ouverture</h3>
                    <input type="password" value={reopenPwd} onChange={e => setReopenPwd(e.target.value)} placeholder="Mot de passe master" autoFocus />
                    <div className="row" style={{marginTop:10}}>
                      <button className="btn-secondary" onClick={() => { setAskReopen(false); setReopenPwd(''); }}>Annuler</button>
                      <button className="btn-warn" onClick={handleReopen}>Confirmer</button>
                    </div>
                  </div>
                )
              )}
            </>
          ) : (
            <>
              <div className="stat-grid">
                <div className="stat"><div className="stat-value">{visible.length}</div><div className="stat-label">Total</div></div>
                <div className="stat"><div className="stat-value" style={{color:'var(--accent)'}}>{passed.length}</div><div className="stat-label">Passés</div></div>
                <div className="stat"><div className="stat-value" style={{color:'var(--warn)'}}>{notPassed.length}</div><div className="stat-label">Non récup.</div></div>
              </div>

              {notPassed.length > 0 && (
                <div className="card">
                  <h3 style={{marginBottom:10}}>Clients non récupérés ({notPassed.length})</h3>
                  <div style={{maxHeight:200,overflowY:'auto'}}>
                    {notPassed.map(o => (
                      <div key={o.orderId} style={{padding:'6px 0',fontSize:13,borderBottom:'1px solid var(--line)'}}>
                        {displayName(o)} {o.hasPhone ? '📞' : '✉️'}
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {!confirming ? (
                <button className="btn-warn btn-lg btn-block" onClick={() => setConfirming(true)} disabled={visible.length === 0}>
                  🔒 Clôturer la journée
                </button>
              ) : (
                <div className="card" style={{background:'var(--warn-soft)',border:'1px solid var(--warn)'}}>
                  <h3 style={{color:'var(--warn)',marginBottom:8}}>⚠️ Confirmation</h3>
                  <p style={{fontSize:13,marginBottom:12,color:'var(--ink-soft)'}}>
                    {notPassed.length} non-passés vont être ajoutés au suivi pour relance.
                    <br/><br/>
                    <em>N'oublie pas de marquer aussi sur distributions.kelbongoo.com.</em>
                  </p>
                  {closing && (
                    <div style={{margin:'12px 0',fontSize:12,color:'var(--ink-soft)'}}>
                      Traitement : {progress.done} / {progress.total}
                    </div>
                  )}
                  <div className="row">
                    <button className="btn-secondary" onClick={() => setConfirming(false)} disabled={closing}>Annuler</button>
                    <button className="btn-warn" onClick={handleCloseDay} disabled={closing}>
                      {closing ? 'Clôture…' : 'Oui, clôturer'}
                    </button>
                  </div>
                </div>
              )}
            </>
          )}
        </div>
      );
    }

    // ============================================================
    // TABLEAU MANQUANTS — vue compacte, filtrable, scannable
    // ============================================================
    function ManquantsTable({ manquants, lmByManquant, onReason, onDispatch, onDelete }) {
      const [filter, setFilter] = React.useState('all'); // all | noreason | reason | dispatched
      const [q, setQ] = React.useState('');
      const [openReason, setOpenReason] = React.useState(null); // id de la ligne dont les raisons sont ouvertes

      const reasonOf = (id) => PREP_REASONS.find(r => r.id === id) || null;
      const reasonLabel = (id) => (PREP_REASONS.find(r => r.id === id) || {}).label || '';

      const enriched = manquants.map(m => ({
        ...m,
        isLM: lmByManquant.has(m.id),
        hasReason: !!m.reason,
      }));

      const counts = {
        all: enriched.length,
        noreason: enriched.filter(m => !m.hasReason && !m.isLM).length,
        reason: enriched.filter(m => m.hasReason && !m.isLM).length,
        dispatched: enriched.filter(m => m.isLM).length,
      };

      let rows = enriched;
      if (filter === 'noreason') rows = rows.filter(m => !m.hasReason && !m.isLM);
      else if (filter === 'reason') rows = rows.filter(m => m.hasReason && !m.isLM);
      else if (filter === 'dispatched') rows = rows.filter(m => m.isLM);
      if (q.trim()) {
        const nq = q.toLowerCase();
        rows = rows.filter(m => (m.produit||'').toLowerCase().includes(nq) || (m.producteur||'').toLowerCase().includes(nq));
      }
      // Tri : sans raison d'abord (à traiter), puis avec raison, puis dispatchés ; alpha à l'intérieur
      rows = [...rows].sort((a, b) => {
        const rank = (m) => m.isLM ? 2 : (m.hasReason ? 1 : 0);
        const d = rank(a) - rank(b);
        if (d !== 0) return d;
