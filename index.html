                      <div key={i} style={{padding:'4px 0',borderBottom:'1px solid #cdd8e3'}}>
                        <div>{u.produit}{u.producer ? <span style={{color:'var(--ink-mute)'}}> — {u.producer}</span> : ''}</div>
                        {u.probonDesignation
                          ? <div style={{color:'#2e7d32',fontSize:11.5}}>→ proche de <strong>{u.probonDesignation}</strong> {u.sim != null ? <span style={{color:'var(--ink-mute)'}}>({u.sim}%)</span> : null}{u.suggestedCode ? <span> · code {u.suggestedCode}</span> : null}</div>
                          : (codeMatches.length ? <div style={{color:'var(--warn,#b8860b)',fontSize:11.5}}>→ aucune désignation proche dans le fichier Probon</div> : null)}
                      </div>
                    ))}
                  </div>
                  <button className="btn-secondary" style={{marginTop:8,fontSize:13}} disabled={sendingNew} onClick={sendMailProbonNew}>
                    {sendingNew ? 'Envoi…' : '✉️ Demander confirmation à Stéphane (désignations à vérifier)'}
                  </button>
                </div>
              )}

              {/* PARTIE 3 — actifs site mais absents du fichier Probon → on prévient Stéphane */}
              {missing.length > 0 && (
                <div style={{background:'#fffbe6',border:'1px solid #ffe58f',borderRadius:6,padding:10,marginBottom:8}}>
                  <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>📣 Actifs sur le site, mais absents du fichier Probon</div>
                  <div style={{fontSize:11,color:'var(--ink-mute)',marginBottom:6}}>On les vend (codés, actifs), mais ils ne sont pas dans le dernier fichier Probon. On prévient Stéphane — <strong>aucune désactivation automatique</strong>.</div>
                  <div style={{fontSize:12,maxHeight:140,overflowY:'auto'}}>
                    {missing.map((c,i) => (
                      <div key={i} style={{padding:'2px 0',borderBottom:'1px solid #f0e68c'}}>
                        <strong>{c.code}</strong> — {c.produit}{c.producer ? <span style={{color:'var(--ink-mute)'}}> ({c.producer})</span> : ''}
                      </div>
                    ))}
                  </div>
                  <button className="btn-secondary" style={{marginTop:8,fontSize:13}} disabled={sendingMail} onClick={sendMailProbon}>
                    {sendingMail ? 'Envoi…' : '✉️ Prévenir Stéphane (indispo chez Probon)'}
                  </button>
                </div>
              )}

              {/* Rappel Partie 2 */}
              <div style={{fontSize:11,color:'var(--ink-mute)',borderTop:'1px dashed var(--line)',paddingTop:8}}>
                ⏹️ <strong>Désactiver les produits plus sur le site</strong> : ça se fait au chargement <em>Produits</em> (liste à cocher « décoche ce qui doit rester » + Désactiver). Le Probon ne désactive rien.
              </div>
            </div>
          )}
        </div>
      );
    }

    // PAGE ADMIN
    // ============================================================
    // Encart "État du chargement" — visible par tous, lit la base partagée (Firebase)
    // pour la date active : commandes, produits, consommateurs en mémoire.
    function LoadStatusCard() {
      const [info, setInfo] = React.useState(null);

      const fmt = (iso) => { if(!iso) return '—'; const d=new Date(iso); return isNaN(d)?'—':d.toLocaleString('fr-FR',{dateStyle:'short',timeStyle:'short'}); };

      // Cherche la distribution la plus récemment chargée (toutes dates), pas seulement aujourd'hui.
      const refresh = React.useCallback(async () => {
        const out = {};
        try {
          const all = await storage.getAll('_days_index'); // index léger des chargements (voir handleV4Load)
          // Repli : on lit aussi la date active
        } catch(e) {}
        // Lit la date active ET cherche le dernier chargement enregistré
        let best = null;
        try {
          // activeDay() reflète la dernière distribution chargée (setActiveDay au chargement)
          const day = activeDay();
          const o = await storage.getDoc(`day_${day}_orders`, 'data');
          if (o && (o.count > 0 || (o.orders && o.orders.length))) {
            best = { day, count: o.count ?? o.orders.length, by: o.uploadedBy, at: o.uploadedAt };
          }
        } catch(e) {}
        out.orders = best;
        out.day = best ? best.day : activeDay();
        try { const p = await readCache('products'); out.products = p ? Object.keys(p).length : 0; } catch(e) { out.products = 0; }
        try { const c = await readCache('consumers'); out.consumers = c ? Object.keys(c).length : 0; } catch(e) { out.consumers = 0; }
        setInfo(out);
      }, []);

      React.useEffect(() => { refresh(); }, [refresh]);

      if (!info) return <div className="card"><p style={{fontSize:13,color:'var(--ink-mute)'}}>Vérification du chargement…</p></div>;

      const ok = info.orders && info.orders.count > 0;
      return (
        <div className="card" style={{borderLeft:`3px solid ${ok ? 'var(--ok,#2e7d32)' : 'var(--warn,#e0a800)'}`}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <h3 style={{margin:0}}>{ok ? '✓' : '⚠️'} État du chargement</h3>
            <button className="btn-ghost" style={{fontSize:12}} onClick={refresh}>↻ Rafraîchir</button>
          </div>
          {ok ? (
            <div style={{fontSize:14,marginTop:6}}>
              <div>Distribution du <strong>{dayLabelShort(info.day)}</strong></div>
              <div><strong>{info.orders.count}</strong> commandes chargées</div>
              <div style={{fontSize:12,color:'var(--ink-mute)'}}>par {info.orders.by || '—'} · {fmt(info.orders.at)}</div>
            </div>
          ) : (
            <div style={{fontSize:14,color:'var(--warn,#b8860b)',marginTop:6}}>Aucune commande chargée. Charge le JSON commandes ci-dessous.</div>
          )}
          <div style={{display:'flex',gap:16,marginTop:8,fontSize:13,color:'var(--ink-soft)'}}>
            <span>🏷️ {info.products} produits</span>
            <span>👤 {info.consumers} consommateurs</span>
          </div>
        </div>
      );
    }

    // Au-delà de ce nombre, on N'APPLIQUE PAS automatiquement (critère FL sans doute trop
    // large → ex. dispatch « tout le frais ») : on remonte la liste pour revue manuelle.
    const FL_AUTOSYNC_MAX_INACTIVATE = 12;
    const FL_AUTOSYNC_MAX_ADD = 60;

    // Construit la liste FL du catalogue (objet {id:produit}) → [{produit, producer}], dédupliquée.
    function buildCatalogFLFrom(prodById) {
      const arr = Object.entries(prodById || {}).map(([id, p]) => ({ id, ...p }));
      const seen = new Set(); const out = [];
      for (const p of arr) {
        if (!(p.name || '').trim() || !isFLProduct(p) || p.active === false) continue;
        const k = normalizeText(p.name); if (!k || seen.has(k)) continue; seen.add(k);
        out.push({ id: String(p.id || '').trim(), produit: (p.name || '').trim(), producer: (p.producer || '').trim(), uv: (p.uv || '').trim() });
      }
      return out;
    }

    // Synchro FL au chargement du catalogue. On AJOUTE tout de suite les nouveaux FL
    // (→ liste de commande Probon à jour, sans le fichier Probon). Les FL disparus du
    // catalogue ne sont JAMAIS désactivés automatiquement : ils remontent comme « soucis »
    // via onResult, que Henry traite (désactiver) ou envoie à Raimbaud pour vérif.
    async function autoSyncFLAfterImport(prodById, showToast, onResult) {
      try {
        const catalog = buildCatalogFLFrom(prodById);
        if (!catalog.length) { onResult && onResult(null); return; }
        const prev = await flPost({ secret: FRESHDESK_SECRET, action: 'fl_sync', op: 'preview', catalog });
        if (!prev || !prev.ok) { onResult && onResult({ error: (prev && prev.error) || 'action fl_sync indisponible (déployée ?)' }); return; }
        const toAdd = prev.toAdd || [];
        const toInactivate = prev.toInactivate || [];
        const possibleDuplicates = prev.possibleDuplicates || [];
        // Garde-fou : trop d'ajouts d'un coup → on n'écrit rien, on surface pour revue.
        if (toAdd.length > FL_AUTOSYNC_MAX_ADD) {
          onResult && onResult({ added: 0, toAddPending: toAdd, toInactivate, possibleDuplicates, tooMany: true });
          if (showToast) showToast('⚠️ ' + toAdd.length + ' FL à ajouter — trop pour un ajout auto, à vérifier');
          return;
        }
        let added = 0, fixedUv = 0, fixedType = 0, tab2 = null;
        {
          const res = await flPost({ secret: FRESHDESK_SECRET, action: 'fl_sync', op: 'apply', inactivate: false, catalog });
          if (res && res.ok) { added = res.added || 0; fixedUv = res.fixedUv || 0; fixedType = res.fixedType || 0; tab2 = res.tab2 || null; }
        }
        onResult && onResult({ added, fixedUv, fixedType, tab2, toInactivate, possibleDuplicates, currentActive: prev.currentActive });
        if (showToast) showToast('🥬 FL : +' + added + ' ajouté(s)'
          + (fixedUv ? ' · ' + fixedUv + ' UV' : '')
          + (fixedType ? ' · ' + fixedType + ' type' : '')
          + (possibleDuplicates.length ? ' · ' + possibleDuplicates.length + ' doublon(s) ?' : '')
          + (toInactivate.length ? ' · ' + toInactivate.length + ' à vérifier' : ''));
      } catch (e) { onResult && onResult({ error: e.message }); }
    }

    // Panneau affiché APRÈS un chargement du catalogue : récap de la synchro FL +
    // gestion des « soucis » (FL disparus du catalogue, à désactiver ou à vérifier).
    function FlSyncResultPanel({ info, onClear, catalog }) {
      const showToast = React.useContext(ToastContext);
      const [busy, setBusy] = React.useState(false);
      if (!info) return null;
      if (info.error) {
        return (
          <div className="card" style={{borderLeft:'4px solid var(--danger,#c0392b)'}}>
            <div style={{fontSize:13}}>🥬 Synchro FL non effectuée : {info.error}</div>
          </div>
        );
      }
      if (info.note) {
        return (
          <div className="card" style={{borderLeft:'4px solid var(--warn,#e0a800)'}}>
            <div style={{fontSize:13}}>🥬 {info.note}</div>
          </div>
        );
      }
      // Trop d'ajouts d'un coup : rien n'a été écrit, on demande une revue.
      if (info.tooMany) {
        const pend = info.toAddPending || [];
        return (
          <div className="card" style={{borderLeft:'4px solid var(--danger,#c0392b)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <h3 style={{margin:0}}>🥬 Synchro FL — ajout massif bloqué</h3>
              <button className="btn-ghost" style={{fontSize:12}} onClick={onClear}>✕</button>
            </div>
            <div style={{fontSize:13,marginTop:6}}>
              ⚠️ <strong>{pend.length}</strong> produits seraient ajoutés à la feuille Probon — c'est trop pour un ajout automatique.
              Le critère FL est probablement trop large (ex. <code>dispatch 0</code> = tout le frais, pas seulement les FL).
              <strong> Rien n'a été écrit.</strong> Vérifie le critère <code>FL_DISPATCH_TYPES</code> avant de relancer une synchro manuelle.
            </div>
            <div style={{maxHeight:140,overflowY:'auto',fontSize:12,marginTop:8}}>
              {pend.slice(0,80).map((it,i)=>(<div key={i}>{it.produit}{it.producer?` · ${it.producer}`:''}</div>))}
              {pend.length>80 && <div style={{color:'var(--ink-mute)'}}>… +{pend.length-80} autres</div>}
            </div>
          </div>
        );
      }
      const issues = info.toInactivate || [];
      const dups = info.possibleDuplicates || [];
      return (
        <div className="card" style={{borderLeft:`4px solid ${(issues.length || dups.length) ? 'var(--warn,#e0a800)' : 'var(--ok,#2e7d32)'}`}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <h3 style={{margin:0}}>🥬 Synchro FL (au chargement du catalogue)</h3>
            <button className="btn-ghost" style={{fontSize:12}} onClick={onClear}>✕</button>
          </div>
          <div style={{fontSize:13,marginTop:6}}>✓ <strong>{info.added || 0}</strong> nouveau(x) FL ajouté(s) à la liste de commande Probon.{info.fixedUv ? <span> · {info.fixedUv} UV complétée(s)</span> : null}{info.fixedType ? <span> · {info.fixedType} type(s)</span> : null}{info.tab2 && !info.tab2.missing ? <span style={{color:'var(--ink-mute)'}}> · onglet « vente du jour » : +{info.tab2.added || 0}</span> : null}{info.tab2 && info.tab2.missing ? <span style={{color:'var(--warn,#b8860b)'}}> · ⚠️ onglet « vente du jour » introuvable</span> : null}</div>
          {dups.length > 0 && <FlDuplicatesBlock pairs={dups} />}
          {issues.length === 0 ? (
            (dups.length === 0 ? <div style={{fontSize:13,color:'var(--ok,#2e7d32)',marginTop:4}}>✓ Tous les produits de la feuille sont encore sur le site — rien à désactiver.</div> : null)
          ) : (
            <FlRemovalsBlock issues={issues} onDone={onClear} />
          )}
        </div>
      );
    }

    // Bloc « doublons possibles » : noms proches entre le site et la feuille → on demande si
    // c'est le même produit. Si oui, on choisit quel nom garder ; l'ID est écrit sur la ligne
    // (lien permanent → plus de question ensuite). Si non, on ajoute comme nouveau produit.
    function FlDuplicatesBlock({ pairs }) {
      const showToast = React.useContext(ToastContext);
      const [done, setDone] = React.useState({});   // index -> libellé du choix
      const [busy, setBusy] = React.useState(-1);

      const resolve = async (i, kind) => {
        const pr = pairs[i]; if (!pr) return;
        setBusy(i);
        try {
          let r, label;
          if (kind === 'site') {        // même produit, garder le nom du SITE (écrase la feuille)
            r = await flPost({ secret: FRESHDESK_SECRET, action: 'fl_sync', op: 'merge',
              row: pr.sheet.row, id: pr.site.id, produit: pr.site.produit, producer: pr.site.producer, uv: pr.site.uv });
            label = 'fusionné (nom site)';
          } else if (kind === 'sheet') { // même produit, garder le nom FEUILLE (lien ID seulement)
            r = await flPost({ secret: FRESHDESK_SECRET, action: 'fl_sync', op: 'merge', row: pr.sheet.row, id: pr.site.id });
            label = 'fusionné (nom feuille)';
          } else {                       // produits DIFFÉRENTS → ajouter le produit du site
            r = await flPost({ secret: FRESHDESK_SECRET, action: 'fl_sync', op: 'apply', inactivate: false,
              catalog: [{ id: pr.site.id, produit: pr.site.produit, producer: pr.site.producer, uv: pr.site.uv }] });
            label = 'ajouté (différent)';
          }
          if (r && r.ok) { setDone(d => ({ ...d, [i]: label })); showToast('✓ ' + label); }
          else showToast('Erreur : ' + ((r && r.error) || '?'));
        } catch (e) { showToast('Erreur : ' + e.message); } finally { setBusy(-1); }
      };

      return (
        <div style={{marginTop:10}}>
          <div style={{fontSize:13,fontWeight:600,color:'var(--warn,#b8860b)'}}>❓ {pairs.length} doublon(s) possible(s) — noms proches. Même produit ?</div>
          <div style={{marginTop:6}}>
            {pairs.map((pr, i) => (
              <div key={i} style={{border:'1px solid var(--border)',borderRadius:8,padding:'8px 10px',marginBottom:6,fontSize:12}}>
                <div><strong>Site :</strong> {pr.site.produit}{pr.site.producer?` · ${pr.site.producer}`:''}</div>
                <div><strong>Feuille :</strong> {pr.sheet.produit}{pr.sheet.producer?` · ${pr.sheet.producer}`:''} <span style={{color:'var(--ink-mute)'}}>({pr.sim}% proche)</span></div>
                {done[i] ? (
                  <div style={{marginTop:6,color:'var(--ok,#2e7d32)'}}>✓ {done[i]}</div>
                ) : (
                  <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:8}}>
                    <button className="btn-ghost" disabled={busy===i} onClick={()=>resolve(i,'site')}>Même → garder nom site</button>
                    <button className="btn-ghost" disabled={busy===i} onClick={()=>resolve(i,'sheet')}>Même → garder nom feuille</button>
                    <button className="btn-ghost" disabled={busy===i} onClick={()=>resolve(i,'diff')}>Différents → ajouter</button>
                  </div>
                )}
              </div>
            ))}
          </div>
          <div style={{fontSize:11,color:'var(--ink-mute)'}}>« Même produit » écrit l'ID sur la ligne → plus de question la prochaine fois, même si le nom varie.</div>
        </div>
      );
    }

    // Bloc « produits à traiter » : sélection au cas par cas. On peut décocher ce qui doit
    // rester (ex. un produit saisonnier de retour), puis désactiver UNIQUEMENT les cochés
    // (statut → « Non actif » via fl_set_active) ou les envoyer à Raimbaud pour vérif.
    function FlRemovalsBlock({ issues, onDone }) {
      const showToast = React.useContext(ToastContext);
      const [busy, setBusy] = React.useState(false);
      const [sel, setSel] = React.useState(() => issues.map((_, i) => i)); // tous cochés au départ
      const toggle = (i) => setSel(s => s.includes(i) ? s.filter(x => x !== i) : [...s, i]);
      const selectedItems = () => sel.map(i => issues[i]).filter(Boolean);

      const deactivate = async () => {
        const items = selectedItems();
        if (!items.length) { showToast('Aucun produit coché'); return; }
        if (!confirm(`Passer ${items.length} produit(s) en « Non actif » sur la feuille Probon ?`)) return;
        setBusy(true);
        try {
          const r = await flPost({ secret: FRESHDESK_SECRET, action: 'fl_set_active',
            items: items.map(it => ({ producer: it.producer, produit: it.produit, actif: false })) });
          if (r && r.ok) { showToast(`⏹️ ${r.changed || 0} désactivé(s)`); onDone && onDone(); }
          else showToast('Erreur : ' + ((r && r.error) || '?'));
        } catch (e) { showToast('Erreur : ' + e.message); } finally { setBusy(false); }
      };
      const mailReview = async () => {
        const items = selectedItems();
        if (!items.length) { showToast('Aucun produit coché'); return; }
        setBusy(true);
        try {
          const r = await flPost({ secret: FRESHDESK_SECRET, action: 'fl_sync', op: 'mail_review', items });
          if (r && r.ok) showToast(`✉️ Envoyé à Raimbaud (${r.sent} produit(s))`);
          else showToast('Erreur envoi : ' + ((r && r.error) || '?'));
        } catch (e) { showToast('Erreur : ' + e.message); } finally { setBusy(false); }
      };
      const deleteRows = async () => {
        const items = selectedItems();
        const rows = items.map(it => it.row).filter(Boolean);
        if (!rows.length) { showToast('Aucune ligne à supprimer (lignes inconnues)'); return; }
        if (!confirm(`SUPPRIMER définitivement ${rows.length} ligne(s) de la feuille Probon ?\n\n(à utiliser pour les produits ajoutés par erreur : viande, etc.)`)) return;
        setBusy(true);
        try {
          const r = await flPost({ secret: FRESHDESK_SECRET, action: 'fl_sync', op: 'delete_rows', rows });
          if (r && r.ok) { showToast(`🗑️ ${r.deleted || 0} ligne(s) supprimée(s)`); onDone && onDone(); }
          else showToast('Erreur : ' + ((r && r.error) || '?'));
        } catch (e) { showToast('Erreur : ' + e.message); } finally { setBusy(false); }
      };

      return (
        <div style={{marginTop:8}}>
          <div style={{fontSize:14,fontWeight:700,color:'var(--warn,#b8860b)'}}>❓ Je ne trouve plus ces {issues.length} produit(s) sur le site — faut-il les désactiver ?</div>
          <div style={{fontSize:12,color:'var(--ink-mute)',margin:'2px 0 4px'}}>Ils sont encore « Actif » sur la feuille Probon mais ont disparu du catalogue Kelbongoo. Décoche ceux à garder, puis « Désactiver ».</div>
          <div style={{maxHeight:180,overflowY:'auto',fontSize:12,margin:'6px 0'}}>
            {issues.map((it, i) => (
              <label key={i} style={{display:'flex',gap:8,alignItems:'center',padding:'2px 0',cursor:'pointer'}}>
                <input type="checkbox" checked={sel.includes(i)} onChange={()=>toggle(i)} />
                <span>{it.produit}{it.producer ? ` · ${it.producer}` : ''}</span>
              </label>

    // ============================================================
    // SYNCHRO FL DEPUIS L'EXPORT SITE (CSV « fiches produits »)
    // Source fiable : le CSV du site contient la colonne « Catégorie » déjà résolue
    // (Fruits, Légumes) + « Produit Actif ». FL = catégorie Fruits,Légumes ET actif.
    // ============================================================
    function FlCsvSyncCard() {
      const showToast = React.useContext(ToastContext);
      const [busy, setBusy] = React.useState(false);
      const [fileName, setFileName] = React.useState('');
      const [stats, setStats] = React.useState(null);
      const [catalog, setCatalog] = React.useState(null);
      const [result, setResult] = React.useState(null);

      const handleFile = (file) => {
        if (!file) return;
        setBusy(true); setResult(null); setStats(null); setCatalog(null); setFileName(file.name);
        const reader = new FileReader();
        reader.onload = async (e) => {
          try {
            const parsed = Papa.parse(String(e.target.result || ''), { header: true, delimiter: ';', skipEmptyLines: true });
            const rows = parsed.data || [];
            const pick = (row, names) => { for (const n of names) { if (row[n] != null && row[n] !== '') return row[n]; } return ''; };
            const fl = []; const seen = new Set();
            for (const row of rows) {
              const cat = normalizeText(pick(row, ['Catégorie', 'Categorie', 'catégorie', 'categorie']));
              const actif = String(pick(row, ['Produit Actif', 'Produit actif', 'Actif']) || '').trim().toLowerCase();
              if (!cat.includes('legume')) continue;     // FL = catégorie « Fruits, Légumes »
              if (actif !== 'true') continue;             // produits actifs uniquement
              const produit = String(pick(row, ['Produit', 'produit']) || '').trim();
              const producer = String(pick(row, ['Producteur', 'producteur']) || '').trim();
              if (!produit) continue;
              const k = normalizeText(produit); if (seen.has(k)) continue; seen.add(k);
              fl.push({ produit, producer });
            }
            setStats({ total: rows.length, flActive: fl.length });
            setCatalog(fl);
            if (!fl.length) { setResult({ note: 'Aucun FL actif trouvé dans le CSV (vérifie la colonne « Catégorie » / « Produit Actif »).' }); setBusy(false); return; }
            const prev = await flPost({ secret: FRESHDESK_SECRET, action: 'fl_sync', op: 'preview', catalog: fl });
            if (!prev || !prev.ok) { setResult({ error: (prev && prev.error) || 'action fl_sync indisponible (déployée ?)' }); setBusy(false); return; }
            const toAdd = prev.toAdd || [], toInactivate = prev.toInactivate || [];
            if (toAdd.length > FL_AUTOSYNC_MAX_ADD) { setResult({ tooMany: true, toAddPending: toAdd, toInactivate }); setBusy(false); return; }
            let added = 0;
            if (toAdd.length) {
              const res = await flPost({ secret: FRESHDESK_SECRET, action: 'fl_sync', op: 'apply', inactivate: false, catalog: fl });
              if (res && res.ok) added = res.added || 0;
            }
            setResult({ added, toInactivate, currentActive: prev.currentActive });
            showToast('🥬 FL : +' + added + ' ajouté(s)' + (toInactivate.length ? ' · ' + toInactivate.length + ' à vérifier' : ''));
          } catch (err) { setResult({ error: err.message }); }
          finally { setBusy(false); }
        };
        reader.onerror = () => { setResult({ error: 'lecture du fichier impossible' }); setBusy(false); };
        reader.readAsText(file, 'UTF-8');
      };

      return (
        <div className="card" style={{borderLeft:'4px solid var(--ok,#2e7d32)'}}>
          <h3 style={{marginBottom:4}}>🥬 Synchroniser les FL (export site CSV)</h3>
          <p style={{fontSize:12,color:'var(--ink-mute)',marginBottom:8}}>
            Charge l'export « fiches produits » du site (CSV). On garde uniquement la catégorie <strong>Fruits, Légumes</strong> et les produits <strong>actifs</strong>, puis on ajoute les nouveaux à la feuille de commande Probon. Les disparus sont signalés (jamais désactivés automatiquement).
          </p>
          <label style={{display:'block',border:'1px dashed var(--border)',borderRadius:8,padding:'14px',textAlign:'center',cursor: busy?'default':'pointer',fontSize:14}}>
            {busy ? 'Traitement…' : (fileName || '📄 Choisir le fichier CSV (fiches produits)')}
            <input type="file" accept=".csv,text/csv" style={{display:'none'}} disabled={busy}
                   onChange={e=>handleFile(e.target.files && e.target.files[0])} />
          </label>
          {stats && (
            <div style={{fontSize:12,color:'var(--ink-mute)',marginTop:8}}>
              {stats.total} lignes lues · <strong>{stats.flActive}</strong> FL actifs détectés.
            </div>
          )}
          <div style={{marginTop:10}}>
            <FlSyncResultPanel info={result} catalog={catalog} onClear={()=>setResult(null)} />
          </div>
        </div>
      );
    }

    // ============================================================
    // SYNCHRO LISTE FL (catalogue → feuille FL/Probon)
    // Compare les produits FL du cache produits (JSON) à la feuille FL :
    //   - FL présents au catalogue, absents de la feuille → À AJOUTER
    //   - FL présents en feuille (actifs), absents du catalogue → À DÉSACTIVER (ACTIF? = NON)
    // PRÉVISUALISATION D'ABORD : aucune écriture tant que « Appliquer » n'est pas cliqué.
    // (Le chargement Probon Excel, lui, gère déjà add+désactivation pour la source Probon.)
    // ============================================================
    function FlSyncCard({ session }) {
      const showToast = React.useContext(ToastContext);
      const [busy, setBusy] = React.useState(false);
      const [preview, setPreview] = React.useState(null); // { toAdd:[], toInactivate:[], currentActive }
      const [applied, setApplied] = React.useState(null);

      // Construit la liste FL du catalogue depuis le cache produits.
      const buildCatalogFL = async () => {
        const data = await readCache('products');
        const arr = data ? Object.entries(data).map(([id, p]) => ({ id, ...p })) : [];
        const fl = arr.filter(p => (p.name || '').trim() && isFLProduct(p))
                      .map(p => ({ produit: (p.name || '').trim(), producer: (p.producer || '').trim() }));
        // déduplique par nom normalisé
        const seen = new Set(); const out = [];
        for (const it of fl) { const k = normalizeText(it.produit); if (k && !seen.has(k)) { seen.add(k); out.push(it); } }
        return out;
      };

      const runPreview = async () => {
        setBusy(true); setApplied(null); setPreview(null);
        try {
          const catalog = await buildCatalogFL();
          if (!catalog.length) { showToast('Aucun FL détecté au catalogue (vérifie FL_CATEGORY_KEYWORDS)'); setBusy(false); return; }
          const data = await flPost({ secret: FRESHDESK_SECRET, action: 'fl_sync', tab: FL_SHEET_TAB, apply: false, catalog });
          if (!data.ok) throw new Error(data.error || 'erreur proxy');
          setPreview({ toAdd: data.toAdd || [], toInactivate: data.toInactivate || [], currentActive: data.currentActive });
        } catch (e) { showToast('Erreur : ' + e.message); }
        finally { setBusy(false); }
      };

      const apply = async () => {
        if (!preview) return;
        const nAdd = preview.toAdd.length, nOff = preview.toInactivate.length;
        if (!confirm(`Appliquer la synchro FL ?\n\n• ${nAdd} produit(s) ajouté(s)\n• ${nOff} produit(s) passé(s) en INACTIF\n\nÉcriture dans l'onglet « ${FL_SHEET_TAB} ».`)) return;
        setBusy(true);
        try {
          const catalog = await buildCatalogFL();
          const data = await flPost({ secret: FRESHDESK_SECRET, action: 'fl_sync', tab: FL_SHEET_TAB, apply: true, catalog });
          if (!data.ok) throw new Error(data.error || 'erreur proxy');
          setApplied({ added: data.added || 0, inactivated: data.inactivated || 0 });
          setPreview(null);
          showToast(`✓ Synchro FL : ${data.added||0} ajouté(s) · ${data.inactivated||0} désactivé(s)`);
        } catch (e) { showToast('Erreur : ' + e.message); }
        finally { setBusy(false); }
      };

      return (
        <div className="card" style={{borderLeft:'4px solid var(--info,#2f6fc0)'}}>
          <h3 style={{marginBottom:4}}>🔄 Synchroniser la liste FL (catalogue → feuille)</h3>
          <p style={{fontSize:12,color:'var(--ink-mute)',marginBottom:10}}>
            Ajoute les FL nouveaux du JSON produits et passe en <strong>inactif</strong> ceux qui n'y sont plus.
            Prévisualisation obligatoire avant toute écriture. Mots-clés FL actuels : <code>{FL_CATEGORY_KEYWORDS.join(', ')}</code>.
          </p>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <button className="btn-ghost" disabled={busy} onClick={runPreview}>{busy && !preview ? 'Analyse…' : '🔍 Prévisualiser'}</button>
            {preview && (
              <button className="btn-primary" disabled={busy} onClick={apply}>
                {busy ? 'Écriture…' : `✅ Appliquer (+${preview.toAdd.length} / −${preview.toInactivate.length})`}
              </button>
            )}
          </div>

          {preview && (
            <div style={{marginTop:10,fontSize:13}}>
              <div style={{color:'var(--ink-mute)',marginBottom:6}}>Feuille : {preview.currentActive ?? '?'} FL actifs · catalogue analysé.</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <div>
                  <div style={{fontWeight:700,color:'var(--ok,#2e7d32)'}}>➕ À ajouter ({preview.toAdd.length})</div>
                  <div style={{maxHeight:160,overflowY:'auto',fontSize:12,marginTop:4}}>
                    {preview.toAdd.length ? preview.toAdd.map((it,i)=>(
                      <div key={i}>{it.produit}{it.producer?` · ${it.producer}`:''}</div>
                    )) : <span style={{color:'var(--ink-mute)'}}>—</span>}
                  </div>
                </div>
                <div>
                  <div style={{fontWeight:700,color:'var(--danger,#c0392b)'}}>⏹️ À désactiver ({preview.toInactivate.length})</div>
                  <div style={{maxHeight:160,overflowY:'auto',fontSize:12,marginTop:4}}>
                    {preview.toInactivate.length ? preview.toInactivate.map((it,i)=>(
                      <div key={i}>{it.produit}{it.producer?` · ${it.producer}`:''}</div>
                    )) : <span style={{color:'var(--ink-mute)'}}>—</span>}
                  </div>
                </div>
              </div>
              <div style={{fontSize:11,color:'var(--ink-mute)',marginTop:8}}>⚠️ Vérifie les listes avant d'appliquer — l'écriture modifie la colonne ACTIF ? de la feuille FL.</div>
            </div>
          )}

          {applied && (
            <div style={{marginTop:10,fontSize:13,color:'var(--ok,#2e7d32)'}}>
              ✓ Fait : {applied.added} ajouté(s) · {applied.inactivated} désactivé(s).
            </div>
          )}
        </div>
      );
    }

    function AdminPage({ session, ordersMeta, productsMeta, consumersMeta, catalogueMeta }) {
      const showToast = React.useContext(ToastContext);
      const [flSync, setFlSync] = React.useState(null); // résultat synchro FL au dernier chargement catalogue
      const [csvFile, setCsvFile] = React.useState(null);
      const [productsFile, setProductsFile] = React.useState(null);
      const [consumersFile, setConsumersFile] = React.useState(null);
      const [catalogueFile, setCatalogueFile] = React.useState(null);
      const [busy, setBusy] = React.useState(false);
      // Date cible pour les uploads (par défaut : aujourd'hui)
      const [targetDate, setTargetDate] = React.useState(todayKey());

      // --- V4 : chargement unifié (orders JSON + produits JSON + consommateurs JSON) ---
      const [v4Orders, setV4Orders] = React.useState(null);   // contenu JSON brut
      const [v4Prods, setV4Prods] = React.useState(null);
      const [v4Cons, setV4Cons] = React.useState(null);
      const [v4Result, setV4Result] = React.useState(null);   // {orders, missingConsumers, missingProducts}
      const [showSecours, setShowSecours] = React.useState(false); // ancien chargement PDF/CSV (repli)

      // --- Historique CA en masse (gros export commandes multi-dates) ---
      const [histOrders, setHistOrders] = React.useState(null);
      const [histProds, setHistProds] = React.useState(null);
      const [histFrom, setHistFrom] = React.useState(() => { const d = new Date(); d.setDate(d.getDate() - 60); return d.toISOString().slice(0,10); });
      const [histTo, setHistTo] = React.useState(() => new Date().toISOString().slice(0,10));
      const [histBusy, setHistBusy] = React.useState(false);
      const [histProgress, setHistProgress] = React.useState('');
      const [histResult, setHistResult] = React.useState(null);

      const handleLoadHistory = async () => {
        if (!histOrders) { showToast('Charge le fichier commandes (multi-dates)'); return; }
        setHistBusy(true); setHistResult(null); setHistProgress('Préparation…');
        try {
          // Produits : fichier fourni, sinon cache
          let prodById;
          if (histProds) { prodById = parseProductsFile(histProds); await writeCache('products', prodById); }
          else {
            const cd = await readCache('products');
            if (!cd) { showToast('Aucun fichier produits en mémoire : charge-le'); setHistBusy(false); return; }
            prodById = cd;
          }
          setHistProgress('Analyse des commandes…');
          const docs = buildDailyAnalytics(histOrders, prodById, { fromKey: histFrom, toKey: histTo });
          const dates = Object.keys(docs).sort();
          if (dates.length === 0) { showToast('Aucune distribution dans cette plage'); setHistBusy(false); setHistProgress(''); return; }
          let i = 0, caTot = 0;
          for (const dk of dates) {
            i++;
            setHistProgress(`Écriture ${i}/${dates.length} · ${dk}`);
            await storage.setDoc('ca_history', dk, docs[dk], { replace: true });
            caTot += docs[dk].totals.reel;
          }
          setHistResult({ dates: dates.length, first: dates[0], last: dates[dates.length-1], caTot });
          setHistProgress('');
          showToast(`✓ ${dates.length} distributions enregistrées`);
        } catch (e) { showToast('Erreur : ' + e.message); setHistProgress(''); }
        finally { setHistBusy(false); }
      };

      const readJSON = (file, setter) => {
        const r = new FileReader();
        r.onload = () => { try { setter(JSON.parse(r.result)); showToast(`✓ ${file.name}`); } catch(e){ showToast('JSON invalide : ' + file.name); } };
        r.readAsText(file);
      };
      // Fichier produits : on lit le TEXTE brut (JSON ou CSV) — la détection se fait au chargement.
      const readText = (file, setter) => {
        const r = new FileReader();
        r.onload = () => { setter(r.result); showToast(`✓ ${file.name}`); };
        r.onerror = () => showToast('Lecture impossible : ' + file.name);
        r.readAsText(file);
      };

      const handleV4Load = async () => {
        if (!v4Orders) { showToast('Charge au moins le fichier commandes'); return; }
        setBusy(true);
        try {
          // Produits : nouveau fichier si fourni, sinon cache Firebase
          let prodById;
          if (v4Prods) {
            prodById = parseProductsFile(v4Prods);
            await writeCache("products", prodById);
            autoSyncFLAfterImport(prodById, showToast, setFlSync);
          } else {
            const cd = await readCache('products');
            if (!cd) { showToast('Aucun fichier produits en mémoire : charge-le une première fois'); setBusy(false); return; }
            prodById = cd;
          }
          // Consommateurs : idem
          let consById;
          if (v4Cons) {
            consById = parseConsumersById(v4Cons);
            await writeCache('consumers', consById);
          } else {
            const cd = await readCache('consumers');
            if (!cd) { showToast('Aucun fichier consommateurs en mémoire : charge-le une première fois'); setBusy(false); return; }
            consById = cd;
          }

          const res = parseOrdersJSON(v4Orders, prodById, consById);
          const dayKey = res.dateKey || targetDate;
          await storage.setDoc(`day_${dayKey}_orders`, 'data', {
            orders: res.orders,
            uploadedBy: session.name,
            uploadedAt: new Date().toISOString(),
            count: res.orders.length,
            source: 'v4-json',
            targetDate: dayKey,
          });

          // Manquants (removed) → collection du jour, raison à saisir par le préparateur
          for (const m of (res.manquants || [])) {
            const id = dispatchNorm(m.producteur + '|' + m.produit) || `m_${m.id}`;
            await storage.setDoc(`day_${dayKey}_manquants`, id, {
              produit: m.produit, producteur: m.producteur, cond: '',
              fini: 0, total: m.qty, manque: m.qty, clients: m.clients,
              bySite: m.bySite || {},
              reason: '', reasonNote: '',
              status: 'rupture', source: 'json',
              uploadedBy: session.name, uploadedAt: new Date().toISOString(),
            });
          }
          // Remisés (reduced) → collection séparée, raison à saisir aussi
          for (const r of (res.remises || [])) {
            const id = dispatchNorm(r.producteur + '|' + r.produit) || `r_${r.id}`;
            await storage.setDoc(`day_${dayKey}_remises`, id, {
              produit: r.produit, producteur: r.producteur,
              qty: r.qty, clients: r.clients, percentage: r.percentage || null,
              reason: '', reasonNote: '',
              uploadedBy: session.name, uploadedAt: new Date().toISOString(),
            });
          }
          // CA par site (prévisionnel / réel théorique / manque à gagner)
          await storage.setDoc(`day_${dayKey}_ca`, 'data', {
            caBySite: res.caBySite || {},
            uploadedBy: session.name, uploadedAt: new Date().toISOString(),
          });
          // Historique CA (1 doc/date) — alimente le tableau de bord Bilan
          await storage.setDoc(
            'ca_history', dayKey,
            buildCaHistoryDoc(dayKey, res.caBySite, res.salesByProduct, res.orders.length, 'daily', res.manquants, res.remises),
            { replace: true }
          );
          // Garde-fou : on ne bascule le jour actif automatiquement que si le fichier
          // concerne AUJOURD'HUI. Pour une autre date (ex. demain préparé à l'avance),
          // on demande confirmation pour ne pas masquer la distribution en cours.
          if (dayKey === todayKey()) {
            setActiveDay(dayKey);
          } else {
            const ok = window.confirm(
              `⚠️ Ce fichier concerne le ${dayKey}, pas aujourd'hui (${todayKey()}).\n\n` +
              `Les commandes du ${dayKey} sont bien enregistrées (rien n'est écrasé).\n\n` +
              `Basculer l'affichage de l'appli sur le ${dayKey} ?\n` +
              `• OK = afficher le ${dayKey}\n` +
              `• Annuler = rester sur aujourd'hui (${todayKey()})`
            );
            if (ok) setActiveDay(dayKey);

          setV4Result({
            count: res.orders.length,
            missingConsumers: [...res.missingConsumers],

            header: true, delimiter: ';', skipEmptyLines: true,

          const statusCount = {};
          for (const r of (allParsed.data || [])) {
            const s = (r.Status || '').trim().toLowerCase();

          // Parser proprement (uniquement 'compilée' est gardé)

    // ============================================================
    // APP ROOT
    // ============================================================
    // ============================================================
    // SURVEILLANCE DLC — check matinal des produits sensibles + priorisation paniers
    // Collection Firebase : `dlc_watch` (NON liée à un jour : un produit suivi reste
    // visible jusqu'à sa résolution écoulé/ROB/perte). N'interfère PAS avec la logique
    // DLC existante (anomalies qualité, retours PDP, routeByDLC) : on la réutilise juste.
    // ============================================================
    function dlcDaysLeft(dlcKey, fromKey) {
      if (!dlcKey) return null;
      const a = new Date((fromKey || todayKey()) + 'T00:00:00');
      const b = new Date(dlcKey + 'T00:00:00');
      return Math.round((b - a) / 86400000);
    }
    // Niveau d'urgence selon les jours restants avant DLC (et la fenêtre d'alerte réglée).
    function dlcWatchLevel(days, alertDays) {
      if (days === null)  return { key:'none',  color:'var(--ink-mute)', soft:'var(--bg-muted)',   label:'DLC non renseignée', emoji:'⚪' };
      if (days < 0)       return { key:'past',  color:'var(--danger)',   soft:'var(--danger-soft)', label:'DLC dépassée', emoji:'🔴' };
      if (days === 0)     return { key:'today', color:'var(--danger)',   soft:'var(--danger-soft)', label:"DLC aujourd'hui", emoji:'🔴' };
      if (days <= 2)      return { key:'crit',  color:'var(--danger)',   soft:'var(--danger-soft)', label:'Prioriser les paniers MAINTENANT', emoji:'🔴' };
      if (days <= alertDays) return { key:'warn', color:'var(--warn)',   soft:'var(--warn-soft)',   label:'Anticiper — à pousser dans les paniers', emoji:'🟠' };
      return { key:'ok', color:'var(--accent)', soft:'var(--accent-soft)', label:'Sous surveillance', emoji:'🟢' };
    }

    // ════════════════════════════════════════════════════════════════
    // PROTOCOLE DLC SENSIBLE — calcul (jamais de seuil figé J+x)
    // Règle de fraîcheur client : DLC ≥ jour_de_retrait + 3  (4 jours pleins,
    // DLC incluse). Donc un produit est vendable un jour D si D ≤ DLC − 3.
    // « Sensible » = il faut l'écouler CETTE semaine car il ne tiendra pas
    // jusqu'à la première distrib « sûre » de la semaine suivante.
    // ════════════════════════════════════════════════════════════════
    // Samedi (fin de semaine de distrib) contenant `key`.
    function _saturdayOfWeek(key) {
      let d = key, i = 0;
      while (new Date(d + 'T12:00:00').getDay() !== 6 && i < 7) { d = addDays(d, 1); i++; }
      return d;
    }
    // 1er jour de distrib « sûr » de la semaine suivante (= mercredi suivant).
    function _firstSafeNextWeek(key) {
      const sat = _saturdayOfWeek(key);
      let d = addDays(sat, 1);
      for (let i = 0; i < 10; i++) { if (isDistribDay(d)) return d; d = addDays(d, 1); }
      return null;
    }
    // Jours points-fixes éligibles cette semaine : D ≤ DLC−3 (hors DOM).
    function dlcEligibleFixedDays(dlc, invDay) {
      const sat = _saturdayOfWeek(invDay); const out = []; let d = invDay;
      for (let i = 0; i < 10 && d <= sat; i++) {
        if (isDistribDay(d) && dlcDaysLeft(dlc, d) >= 3) {
          const sites = sitesForDate(d).filter(s => s !== 'DOM');
          if (sites.length) out.push({ day: d, sites });
        }
        d = addDays(d, 1);
      }
      return out;
    }
    // DOM (jeu & sam) : D ≤ DLC−5 par défaut, ou D ≤ DLC−3 si produit « DOM dates courtes ».
    function dlcEligibleDomDays(dlc, invDay, domShort) {
      const need = domShort ? 3 : 5; const sat = _saturdayOfWeek(invDay); const out = []; let d = invDay;
      for (let i = 0; i < 10 && d <= sat; i++) {
        if (sitesForDate(d).includes('DOM') && dlcDaysLeft(dlc, d) >= need) out.push(d);
        d = addDays(d, 1);
      }
      return out;
    }
    // Classement complet d'un produit selon sa DLC et le jour d'inventaire.
    // → { cls:'normal'|'sensible'|'rob'|'perte'|'unknown', label, fixed[], dom[], rob, safe }
    function dlcPlan(dlc, invDay, domShort, now) {
      invDay = invDay || activeDay();
      if (!dlc) return { cls: 'unknown', label: 'DLC non renseignée', fixed: [], dom: [], rob: null, safe: null };
      const safe = _firstSafeNextWeek(invDay);
      const fixed = dlcEligibleFixedDays(dlc, invDay);
      const dom = dlcEligibleDomDays(dlc, invDay, domShort);
      const rob = routeByDLC(dlc, now);
      if (safe && dlcDaysLeft(dlc, safe) >= 3)
        return { cls: 'normal', label: "Normal — FIFO, pas d'alerte", fixed, dom, rob, safe };
      if (fixed.length || dom.length)
        return { cls: 'sensible', label: 'DLC SENSIBLE — à écouler cette semaine', fixed, dom, rob, safe };
      if (rob && rob.dest === 'pribon')
        return { cls: 'rob', label: 'Trop court pour les points fixes — envoi ROB', fixed, dom, rob, safe };
      return { cls: 'perte', label: 'Trop court — perte sèche / partage équipe', fixed, dom, rob, safe };
    }
    const DLC_CLS_META = {
      normal:   { emoji: '🟢', color: 'var(--accent)', soft: 'var(--accent-soft)' },
      sensible: { emoji: '🟠', color: 'var(--warn)',   soft: 'var(--warn-soft)' },
      rob:      { emoji: '🚚', color: '#7c4dff',        soft: 'rgba(124,77,255,0.12)' },
      perte:    { emoji: '🗑️', color: 'var(--danger)',  soft: 'var(--danger-soft)' },
      unknown:  { emoji: '⚪', color: 'var(--ink-mute)', soft: 'var(--bg-muted)' },
    };

    // ── Lien JSON commandes ↔ produits sensibles ──────────────────────
    // Pour chaque client qui a commandé un produit en DLC sensible ET dont la
    // distribution a lieu ce jour sur un local éligible → tâche « placer ce
    // produit court dans son panier ». Match par nom normalisé (producteur+produit).
    function computeDlcTasks(orders, sensibleItems, dayKey) {
      const byKey = {};
      for (const s of (sensibleItems || [])) {
        if (s.status && s.status !== 'watch') continue;
        if (!s.dlc) continue;
        const plan = dlcPlan(s.dlc, s.invDay || dayKey, s.domShort);
        if (plan.cls !== 'sensible') continue;
        const k = normalizeText((s.producteur || '') + ' ' + (s.produit || ''));
        if (k.trim()) byKey[k] = { item: s, plan };
      }
      const tasks = [];
      for (const o of (orders || [])) {
        for (const it of (o.items || [])) {
          const k = normalizeText((it.producteur || '') + ' ' + (it.produit || ''));
          const hit = byKey[k];
          if (!hit) continue;
          const plan = hit.plan;
          const fixedOk = plan.fixed.some(f => f.day === dayKey && f.sites.includes(o.site));
          const domOk = (o.site === 'DOM') && plan.dom.includes(dayKey);
          if (!fixedOk && !domOk) continue;
          const casiers = (it.cat === 'frais') ? (o.casiersFrais || []) : (o.casiersSec || []);
          tasks.push({
            id: `${dayKey}_${o.orderId}_${it.id}`,
            produit: it.produit, producteur: it.producteur, qty: it.qty,
            site: o.site, client: o.name, casiers: casiers, cat: it.cat,
            dlc: hit.item.dlc, dlcItemId: hit.item.id,
          });
        }
      }
      return tasks;
    }
    // Saisie quantité acceptant la virgule décimale (FL : 0,5 = ½ cagette).
    function QtyInputDec({ value, onCommit, style }) {
      const [str, setStr] = React.useState(value ? String(value).replace('.', ',') : '');
      const focused = React.useRef(false);
      React.useEffect(() => { if (!focused.current) setStr(value ? String(value).replace('.', ',') : ''); }, [value]);
      const handle = (raw) => {
        let s = String(raw).replace(/[^\d.,]/g, '').replace(/\./g, ',');
        const firstComma = s.indexOf(',');
        if (firstComma >= 0) s = s.slice(0, firstComma + 1) + s.slice(firstComma + 1).replace(/,/g, '');
        setStr(s);
        const num = s === '' ? 0 : parseFloat(s.replace(',', '.'));
        onCommit(isNaN(num) ? 0 : num);
      };
      return (
        <input type="text" inputMode="decimal" value={str} placeholder="0"
          onFocus={e => { focused.current = true; e.target.select(); }}
          onBlur={() => { focused.current = false; }}
          onChange={e => handle(e.target.value)}
          style={style} />
      );
    }

    // ── AIGUILLEUR DLC : « Où l'envoyer ? » ──────────────────────────

      return (

          </div>
          <div style={{marginBottom:10}}>

              <input type="date" value={dlc} onChange={e=>setDlc(e.target.value)} />
            </div>
            <div style={{width:120}}>
              <label style={{fontSize:12,fontWeight:600,display:'block',marginBottom:4}}>Nb d'unités</label>
              <input type="number" min="0" step="1" value={qty} onChange={e=>setQty(e.target.value)} placeholder="à cette DLC" />

          </div>
          <label style={{fontSize:12,display:'flex',alignItems:'center',gap:6,marginBottom:10,color:'var(--ink-mute)'}}>
            <input type="checkbox" checked={domShort} onChange={e=>setDomShort(e.target.checked)} style={{width:'auto'}} />

          </label>
          {plan && meta && (

              <div style={{fontSize:12,color:'var(--ink)'}}>
                {(() => {
                  const lastFixed = plan.fixed.length ? plan.fixed[plan.fixed.length-1].day : null;
                  if (days < 0) return 'DLC dépassée.';
                  if (days === 0) return "DLC aujourd'hui.";
                  return `${days} j avant DLC${lastFixed ? ` · dernière vente possible le ${dayLabelShort(lastFixed)}` : ''}.`;

              {plan.cls === 'sensible' && (

              {plan.cls === 'rob' && plan.rob && plan.rob.navette && (

              {plan.cls === 'perte' && (

              {plan.cls === 'normal' && (
                <div style={{fontSize:12,marginTop:6}}>Tient jusqu'à la semaine prochaine ({plan.safe ? dayLabelShort(plan.safe) : '—'}) — FIFO normal, pas besoin de cases.</div>

          )}
          <button className="btn-primary btn-block" disabled={busy} onClick={submit}>
