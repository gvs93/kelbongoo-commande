    // === FORM PERTE ===
    function LossForm({ catalogue, session, editing, onClose }) {
      const showToast = React.useContext(ToastContext);
      const [productKey, setProductKey] = React.useState(editing?.productKey || '');
      const [destination, setDestination] = React.useState(editing?.destination || 'jete');
      const [reason, setReason] = React.useState(editing?.reason || '');
      const [usingWeight, setUsingWeight] = React.useState(editing?.usingWeight || false);
      const [quantity, setQuantity] = React.useState(editing?.quantity || '1');
      const [weight, setWeight] = React.useState(editing?.weight || '');
      const [remark, setRemark] = React.useState(editing?.remark || '');
      const [busy, setBusy] = React.useState(false);

      const selectedProduct = (catalogue || []).find(p => `${p.producteur}|${p.produit}` === productKey);
      // Prix d'achat en euros (le CSV stocke en centimes /100)
      const unitPrice = selectedProduct ? (selectedProduct.prixAchat || selectedProduct.prixHT || 0) : 0;
      const qtyValue = usingWeight ? parseFloat(weight) || 0 : parseFloat(quantity) || 0;
      const totalValue = unitPrice * qtyValue;

      const handleSubmit = async () => {
        if (!productKey) { showToast('Choisis un produit'); return; }
        if (!reason) { showToast('Choisis une raison'); return; }
        if (usingWeight && !weight) { showToast('Indique le poids'); return; }
        if (!usingWeight && !quantity) { showToast('Indique la quantité'); return; }
        setBusy(true);
        try {
          const id = editing?.id || `loss_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
          const data = {
            productKey,
            producteur: selectedProduct?.producteur || '',
            produit: selectedProduct?.produit || '',
            unite: selectedProduct?.unite || '',
            destination, reason,
            usingWeight,
            quantity: usingWeight ? 0 : parseFloat(quantity) || 0,
            weight: usingWeight ? parseFloat(weight) || 0 : 0,
            unitPrice,
            totalValue,
            remark,
            day: activeDay(),
            createdBy: session.name,
            createdAt: editing?.createdAt || new Date().toISOString(),
            updatedAt: new Date().toISOString(),
          };
          await storage.setDoc('losses', id, data);
          showToast(editing ? '✓ Mise à jour' : '✓ Perte enregistrée');
          onClose();
        } catch (err) { showToast('Erreur : ' + err.message); }
        finally { setBusy(false); }
      };

      return (
        <div className="modal-backdrop" onClick={(e) => { if (e.target.className === 'modal-backdrop') onClose(); }}>
          <div className="modal">
            <div className="modal-header">
              <h2>{editing ? 'Modifier perte' : 'Nouvelle perte'}</h2>
              <button className="modal-close" onClick={onClose}>×</button>
            </div>
            <div className="field">
              <label>Produit (catalogue complet)</label>
              <ProductPicker products={catalogue} value={productKey} onChange={setProductKey} allowFreetext={false} />
            </div>

            {selectedProduct && (
              <div className="alert-info" style={{marginBottom: 12, fontSize: 12}}>
                💰 Prix d'achat : <strong>{unitPrice.toFixed(2)} €</strong> / {selectedProduct.unite}
              </div>
            )}

            <div className="field">
              <label>Destination</label>
              <div className="chip-group">
                {LOSS_DESTINATIONS.map(d => (
                  <div key={d.id} className={`chip chip-${d.color} ${destination === d.id ? 'selected' : ''}`} onClick={() => setDestination(d.id)}>{d.label}</div>
                ))}
              </div>
            </div>

            <div className="field">
              <label>Raison</label>
              <div className="chip-group">
                {LOSS_REASONS.map(r => (
                  <div key={r.id} className={`chip ${reason === r.id ? 'selected' : ''}`} onClick={() => setReason(r.id)}>{r.label}</div>
                ))}
              </div>
            </div>

            <div className="field">
              <label>Saisie en</label>
              <div className="chip-group">
                <div className={`chip ${!usingWeight ? 'selected' : ''}`} onClick={() => setUsingWeight(false)}>Quantité (unités)</div>
                <div className={`chip ${usingWeight ? 'selected' : ''}`} onClick={() => setUsingWeight(true)}>Poids (kg)</div>
              </div>
            </div>

            {usingWeight ? (
              <div className="field">
                <label>Poids (kg)</label>
                <input type="number" step="0.01" min="0" value={weight} onChange={e => setWeight(e.target.value)} placeholder="0.00" />
              </div>
            ) : (
              <div className="field">
                <label>Quantité</label>
                <input type="number" min="1" value={quantity} onChange={e => setQuantity(e.target.value)} />
              </div>
            )}

            {totalValue > 0 && (
              <div className="alert-success" style={{marginBottom:12,padding:'10px 12px'}}>
                <strong>Valeur :</strong> {qtyValue} {usingWeight ? 'kg' : 'u'} × {unitPrice.toFixed(2)}€ = <strong>{totalValue.toFixed(2)} €</strong>
              </div>
            )}

            <div className="field">
              <label>Remarque (optionnel)</label>
              <textarea rows={2} value={remark} onChange={e => setRemark(e.target.value)} placeholder="Précisions…" />
            </div>

            <div className="row">
              <button className="btn-secondary" onClick={onClose}>Annuler</button>
              <button className="btn-primary" disabled={busy} onClick={handleSubmit}>
                {busy ? 'Enregistrement…' : 'Enregistrer'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // HISTORIQUE DES PERTES (admin) — toutes les semaines passées
    // ============================================================
    function LossesHistory() {
      const [losses, setLosses] = React.useState([]);
      React.useEffect(() => {
        const unsub = storage.subscribe('losses', setLosses);
        return unsub;
      }, []);

      // Grouper par semaine (lundi de la semaine de chaque perte)
      const byWeek = {};
      for (const l of losses) {
        if (!l.day) continue;
        const d = new Date(l.day + 'T12:00:00');
        const dow = (d.getDay() + 6) % 7; // 0 = lundi
        const monday = addDays(l.day, -dow);
        (byWeek[monday] = byWeek[monday] || []).push(l);
      }
      const weeks = Object.keys(byWeek).sort((a,b) => b.localeCompare(a)); // récent → ancien
      const thisMonday = currentWeek().monday;

      return (
        <div className="card">
          <h3 style={{marginBottom:8}}>📚 Historique des pertes</h3>
          {weeks.length === 0 ? (
            <p style={{fontSize:13,color:'var(--ink-mute)'}}>Aucune perte enregistrée.</p>
          ) : (
            weeks.map(monday => {
              const items = byWeek[monday];
              const total = items.reduce((s,l) => s + (l.totalValue||0), 0);
              const jete = items.filter(l => l.destination === 'jete').reduce((s,l)=>s+(l.totalValue||0),0);
              const pribon = items.filter(l => l.destination === 'pribon').reduce((s,l)=>s+(l.totalValue||0),0);
              const isCurrent = monday === thisMonday;
              return (
                <details key={monday} style={{marginBottom:6,border:'1px solid var(--border)',borderRadius:8,padding:'6px 10px'}} open={isCurrent}>
                  <summary style={{cursor:'pointer',fontSize:13,fontWeight:600}}>
                    Semaine du {formatDateShort(monday)} {isCurrent && '(en cours)'} · {items.length} entrée{items.length>1?'s':''} · <span style={{color:'var(--warn)'}}>{total.toFixed(2)} €</span>
                  </summary>
                  <div style={{fontSize:12,color:'var(--ink-soft)',margin:'6px 0'}}>
                    Jetées : {jete.toFixed(2)} € · Pribon : {pribon.toFixed(2)} €
                  </div>
                  <div className="stack" style={{gap:3}}>
                    {items.sort((a,b)=>(a.day||'').localeCompare(b.day||'')).map(l => (
                      <div key={l.id} style={{display:'flex',justifyContent:'space-between',fontSize:12,padding:'2px 0',borderBottom:'1px solid var(--border)'}}>
                        <span>{formatDateShort(l.day)} · {l.produit || l.productName || l.product || '(produit)'} {l.destination==='jete'?'🗑️':'♻️'}</span>
                        <strong>{(l.totalValue||0).toFixed(2)} €</strong>
                      </div>
                    ))}
                  </div>
                </details>
              );
            })
          )}
        </div>
      );
    }

    // ============================================================
    // PAGE ADMIN
    // ============================================================
    // Encart "État du chargement" — visible par tous, lit la base partagée (Firebase)
    // pour la date active : commandes, produits, consommateurs en mémoire.
    function LoadStatusCard() {
      const [info, setInfo] = React.useState(null);

      const fmt = (iso) => { if(!iso) return '—'; const d=new Date(iso); return isNaN(d)?'—':d.toLocaleString('fr-FR',{dateStyle:'short',timeStyle:'short'}); };

      // Cherche la distribution la plus récemment chargée (toutes dates), pas seulement aujourd'hui.
      const refresh = React.useCallback(async () => {
        const out = {};
        try {
          const all = await storage.getAll('_days_index'); // index léger des chargements (voir handleV4Load)
          // Repli : on lit aussi la date active
        } catch(e) {}
        // Lit la date active ET cherche le dernier chargement enregistré
        let best = null;
        try {
          // activeDay() reflète la dernière distribution chargée (setActiveDay au chargement)
          const day = activeDay();
          const o = await storage.getDoc(`day_${day}_orders`, 'data');
          if (o && (o.count > 0 || (o.orders && o.orders.length))) {
            best = { day, count: o.count ?? o.orders.length, by: o.uploadedBy, at: o.uploadedAt };
          }
        } catch(e) {}
        out.orders = best;
        out.day = best ? best.day : activeDay();
        try { const p = await readCache('products'); out.products = p ? Object.keys(p).length : 0; } catch(e) { out.products = 0; }
        try { const c = await readCache('consumers'); out.consumers = c ? Object.keys(c).length : 0; } catch(e) { out.consumers = 0; }
        setInfo(out);
      }, []);

      React.useEffect(() => { refresh(); }, [refresh]);

      if (!info) return <div className="card"><p style={{fontSize:13,color:'var(--ink-mute)'}}>Vérification du chargement…</p></div>;

      const ok = info.orders && info.orders.count > 0;
      return (
        <div className="card" style={{borderLeft:`3px solid ${ok ? 'var(--ok,#2e7d32)' : 'var(--warn,#e0a800)'}`}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <h3 style={{margin:0}}>{ok ? '✓' : '⚠️'} État du chargement</h3>
            <button className="btn-ghost" style={{fontSize:12}} onClick={refresh}>↻ Rafraîchir</button>
          </div>
          {ok ? (
            <div style={{fontSize:14,marginTop:6}}>
              <div>Distribution du <strong>{dayLabelShort(info.day)}</strong></div>
              <div><strong>{info.orders.count}</strong> commandes chargées</div>
              <div style={{fontSize:12,color:'var(--ink-mute)'}}>par {info.orders.by || '—'} · {fmt(info.orders.at)}</div>
            </div>
          ) : (
            <div style={{fontSize:14,color:'var(--warn,#b8860b)',marginTop:6}}>Aucune commande chargée. Charge le JSON commandes ci-dessous.</div>
          )}
          <div style={{display:'flex',gap:16,marginTop:8,fontSize:13,color:'var(--ink-soft)'}}>
            <span>🏷️ {info.products} produits</span>
            <span>👤 {info.consumers} consommateurs</span>
          </div>
        </div>
      );
    }

    function AdminPage({ session, ordersMeta, productsMeta, consumersMeta, catalogueMeta }) {
      const showToast = React.useContext(ToastContext);
      const [csvFile, setCsvFile] = React.useState(null);
      const [productsFile, setProductsFile] = React.useState(null);
      const [consumersFile, setConsumersFile] = React.useState(null);
      const [catalogueFile, setCatalogueFile] = React.useState(null);
      const [busy, setBusy] = React.useState(false);
      // Date cible pour les uploads (par défaut : aujourd'hui)
      const [targetDate, setTargetDate] = React.useState(todayKey());

      // --- V4 : chargement unifié (orders JSON + produits JSON + consommateurs JSON) ---
      const [v4Orders, setV4Orders] = React.useState(null);   // contenu JSON brut
      const [v4Prods, setV4Prods] = React.useState(null);
      const [v4Cons, setV4Cons] = React.useState(null);
      const [v4Result, setV4Result] = React.useState(null);   // {orders, missingConsumers, missingProducts}
      const [showSecours, setShowSecours] = React.useState(false); // ancien chargement PDF/CSV (repli)

      const readJSON = (file, setter) => {
        const r = new FileReader();
        r.onload = () => { try { setter(JSON.parse(r.result)); showToast(`✓ ${file.name}`); } catch(e){ showToast('JSON invalide : ' + file.name); } };
        r.readAsText(file);
      };

      const handleV4Load = async () => {
        if (!v4Orders) { showToast('Charge au moins le fichier commandes'); return; }
        setBusy(true);
        try {
          // Produits : nouveau fichier si fourni, sinon cache Firebase
          let prodById;
          if (v4Prods) {
            prodById = parseProducersJSON(v4Prods);
            await writeCache('products', prodById);
          } else {
            const cd = await readCache('products');
            if (!cd) { showToast('Aucun fichier produits en mémoire : charge-le une première fois'); setBusy(false); return; }
            prodById = cd;
          }
          // Consommateurs : idem
          let consById;
          if (v4Cons) {
            consById = parseConsumersById(v4Cons);
            await writeCache('consumers', consById);
          } else {
            const cd = await readCache('consumers');
            if (!cd) { showToast('Aucun fichier consommateurs en mémoire : charge-le une première fois'); setBusy(false); return; }
            consById = cd;
          }

          const res = parseOrdersJSON(v4Orders, prodById, consById);
          const dayKey = res.dateKey || targetDate;
          await storage.setDoc(`day_${dayKey}_orders`, 'data', {
            orders: res.orders,
            uploadedBy: session.name,
            uploadedAt: new Date().toISOString(),
            count: res.orders.length,
            source: 'v4-json',
            targetDate: dayKey,
          });

          // Manquants (removed) → collection du jour, raison à saisir par le préparateur
          for (const m of (res.manquants || [])) {
            const id = dispatchNorm(m.producteur + '|' + m.produit) || `m_${m.id}`;
            await storage.setDoc(`day_${dayKey}_manquants`, id, {
              produit: m.produit, producteur: m.producteur, cond: '',
              fini: 0, total: m.qty, manque: m.qty, clients: m.clients,
              bySite: m.bySite || {},
              reason: '', reasonNote: '',
              status: 'rupture', source: 'json',
              uploadedBy: session.name, uploadedAt: new Date().toISOString(),
            });
          }
          // Remisés (reduced) → collection séparée, raison à saisir aussi
          for (const r of (res.remises || [])) {
            const id = dispatchNorm(r.producteur + '|' + r.produit) || `r_${r.id}`;
            await storage.setDoc(`day_${dayKey}_remises`, id, {
              produit: r.produit, producteur: r.producteur,
              qty: r.qty, clients: r.clients, percentage: r.percentage || null,
              reason: '', reasonNote: '',
              uploadedBy: session.name, uploadedAt: new Date().toISOString(),
            });
          }
          setActiveDay(dayKey);
          setV4Result({
            count: res.orders.length,
            missingConsumers: [...res.missingConsumers],
            missingProducts: [...res.missingProducts],
            dayKey,
          });
          showToast(`✓ ${res.orders.length} commandes chargées`);
          if (dayKey !== todayKey()) {
            setTimeout(() => window.location.reload(), 1200);
          }
        } catch (e) { showToast('Erreur : ' + e.message); }
        finally { setBusy(false); }
      };

      // --- Mémoriser les fichiers de référence (produits / consommateurs) SANS commandes ---
      // Utile pour préparer l'inventaire ou tester le scan sans charger une distribution.
      const handleCacheRefOnly = async () => {
        if (!v4Prods && !v4Cons) { showToast('Sélectionne au moins un fichier produits ou consommateurs'); return; }
        setBusy(true);
        try {
          let msg = [];
          if (v4Prods) {
            const prodById = parseProducersJSON(v4Prods);
            await writeCache('products', prodById);
            msg.push(`${Object.keys(prodById).length} produits`);
          }
          if (v4Cons) {
            const consById = parseConsumersById(v4Cons);
            await writeCache('consumers', consById);
            msg.push(`${Object.keys(consById).length} consommateurs`);
          }
          showToast(`✓ Mémorisé : ${msg.join(' · ')}`);
        } catch (e) { showToast('Erreur : ' + e.message); }
        finally { setBusy(false); }
      };

      // Helpers pour les boutons de date rapide
      const dateLabel = (d) => {
        if (d === todayKey()) return 'Aujourd\'hui';
        if (d === addDays(todayKey(), 1)) return 'Demain';
        return formatDateShort(d);
      };

      const handleUploadCSV = async () => {
        if (!csvFile) { showToast('Sélectionne un CSV'); return; }
        setBusy(true);
        try {
          const csvText = await csvFile.text();
          // Compter les différents statuts avant filtrage pour information
          const allParsed = Papa.parse(csvText, {
            header: true, delimiter: ';', skipEmptyLines: true,
            transformHeader: h => h.trim().replace(/^\uFEFF/, ''),
          });
          const statusCount = {};
          for (const r of (allParsed.data || [])) {
            const s = (r.Status || '').trim().toLowerCase();
            if (s) statusCount[s] = (statusCount[s] || 0) + 1;
          }
          // Parser proprement (uniquement 'compilée' est gardé)
          const orders = parseOrdersCSV(csvText);
          await storage.setDoc(`day_${targetDate}_orders`, 'data', {
            orders, uploadedBy: session.name,
            uploadedAt: new Date().toISOString(),
            count: orders.length,
            statusCount,
            targetDate,
          });
          // Message détaillé
          const ignored = Object.entries(statusCount)
            .filter(([s]) => s !== 'compilée' && s !== 'compilee')
            .map(([s, n]) => `${n} ${s}`)
            .join(', ');
          const dateInfo = targetDate === todayKey() ? '' : ` (pour ${dateLabel(targetDate)})`;
          if (ignored) {
            showToast(`✓ ${orders.length} commandes${dateInfo} · ignorées : ${ignored}`);
          } else {
            showToast(`✓ ${orders.length} commandes${dateInfo}`);
          }
          setCsvFile(null);
        } catch (e) { showToast('Erreur : ' + e.message); }
        finally { setBusy(false); }
      };

      const handleUploadProducts = async () => {
        if (!productsFile) { showToast('Sélectionne un CSV'); return; }
        setBusy(true);
        try {
          const csvText = await productsFile.text();
          const products = parseProductsCSV(csvText);
          await storage.setDoc(`day_${targetDate}_products`, 'data', {
            products, uploadedBy: session.name,
            uploadedAt: new Date().toISOString(),
            count: products.length,
            targetDate,
          });
          const dateInfo = targetDate === todayKey() ? '' : ` (pour ${dateLabel(targetDate)})`;
          showToast(`✓ ${products.length} produits${dateInfo}`);
          setProductsFile(null);
        } catch (e) { showToast('Erreur : ' + e.message); }
        finally { setBusy(false); }
      };

      const handleUploadConsumers = async () => {
        if (!consumersFile) { showToast('Sélectionne un JSON'); return; }
        if (!session.isMaster) { showToast('Master uniquement'); return; }
        setBusy(true);
        try {
          const text = await consumersFile.text();
          const byEmail = parseConsumersJSON(text);
          const total = Object.keys(byEmail).length;
          const CHUNK_SIZE = 5000;
          const entries = Object.entries(byEmail);
          const chunks = [];
          for (let i = 0; i < entries.length; i += CHUNK_SIZE) {
            const chunk = {};
            for (const [email, data] of entries.slice(i, i + CHUNK_SIZE)) chunk[email] = data;
            chunks.push(chunk);
          }
          showToast(`Chargement en ${chunks.length} parties…`);
          const existing = await storage.getAll('consumers_cache');
          for (const e of existing) await storage.deleteDoc('consumers_cache', e.id);
          for (let i = 0; i < chunks.length; i++) {
            await storage.setDoc('consumers_cache', `chunk_${String(i).padStart(3, '0')}`, {
              data: JSON.stringify(chunks[i]),
              chunkIndex: i, chunkCount: chunks.length,
            });
            showToast(`Partie ${i+1}/${chunks.length}…`);
          }
          await storage.setDoc('consumers_meta', 'meta', {
            uploadedBy: session.name, uploadedAt: new Date().toISOString(),
            count: total, chunkCount: chunks.length,
          });
          showToast(`✓ ${total} consommateurs`);
          setConsumersFile(null);
        } catch (e) { showToast('Erreur : ' + e.message); }
        finally { setBusy(false); }
      };

      const handleUploadCatalogue = async () => {
        if (!catalogueFile) { showToast('Sélectionne un CSV'); return; }
        setBusy(true);
        try {
          const csvText = await catalogueFile.text();
          const catalogue = parseCatalogueCSV(csvText);
          await storage.setDoc('catalogue', 'data', {
            catalogue,
            data: JSON.stringify(catalogue), // chunk pour éviter limite index
            uploadedBy: session.name,
            uploadedAt: new Date().toISOString(),
            count: catalogue.length,
          });
          showToast(`✓ ${catalogue.length} produits catalogue`);
          setCatalogueFile(null);
        } catch (e) { showToast('Erreur : ' + e.message); }
        finally { setBusy(false); }
      };

      const consumersAge = consumersMeta ? daysSince(consumersMeta.uploadedAt) : null;
      const consumersStale = consumersAge !== null && consumersAge >= 7;
      const catalogueAge = catalogueMeta ? daysSince(catalogueMeta.uploadedAt) : null;
      const catalogueStale = catalogueAge !== null && catalogueAge >= 7;

      return (
        <div className="stack">
          <h1>Administration</h1>

          <LoadStatusCard />

          {/* ====== V4 : CHARGEMENT UNIFIÉ (3 fichiers JSON) ====== */}
          <div className="card" style={{border:'2px solid var(--accent)'}}>
            <h3 style={{marginBottom:4}}>🚀 Chargement du jour (nouveau)</h3>
            <p style={{fontSize:12,color:'var(--ink-soft)',marginBottom:12}}>
              Charge l'export des <strong>commandes</strong> du jour. Produits et consommateurs sont optionnels : recharge-les seulement s'ils ont changé (sinon les derniers chargés sont réutilisés).
            </p>

            <label className="upload-zone" style={{display:'block',marginBottom:6}}>
              <input type="file" accept=".json,application/json,*/*" style={{display:'none'}}
                onChange={e => e.target.files[0] && readJSON(e.target.files[0], setV4Orders)} />
              <span>📦 Commandes / Préparation {v4Orders ? '✓' : '(obligatoire)'}</span>
            </label>
            <label className="upload-zone" style={{display:'block',marginBottom:6}}>
              <input type="file" accept=".json,application/json,*/*" style={{display:'none'}}
                onChange={e => e.target.files[0] && readJSON(e.target.files[0], setV4Prods)} />
              <span>🏷️ Produits {v4Prods ? '✓' : '(optionnel)'}</span>
            </label>
            <label className="upload-zone" style={{display:'block',marginBottom:10}}>
              <input type="file" accept=".json,application/json,*/*" style={{display:'none'}}
                onChange={e => e.target.files[0] && readJSON(e.target.files[0], setV4Cons)} />
              <span>👤 Consommateurs {v4Cons ? '✓' : '(optionnel)'}</span>
            </label>

            <button className="btn-primary btn-block" disabled={busy || !v4Orders} onClick={handleV4Load}>
              {busy ? 'Chargement…' : 'Charger la distribution'}
            </button>

            {(v4Prods || v4Cons) && (
              <button className="btn-ghost btn-block" disabled={busy} onClick={handleCacheRefOnly} style={{marginTop:6,fontSize:13}}>
                💾 Mémoriser produits/consommateurs seuls (sans commandes)
              </button>
            )}

            {v4Result && (
              <div style={{marginTop:10}}>
                <div className="alert-success">✓ {v4Result.count} commandes chargées (jour {v4Result.dayKey})</div>
                {v4Result.missingConsumers.length > 0 && (
                  <div className="alert-warning" style={{marginTop:6}}>
                    ⚠️ {v4Result.missingConsumers.length} client(s) introuvable(s) → <strong>mettre à jour le JSON consommateurs</strong>
                  </div>
                )}
                {v4Result.missingProducts.length > 0 && (
                  <div className="alert-warning" style={{marginTop:6}}>
                    ⚠️ {v4Result.missingProducts.length} produit(s) introuvable(s) → <strong>mettre à jour le JSON produits</strong>
                  </div>
                )}
              </div>
            )}
          </div>

          {/* ====== Ancien chargement (secours / repli) ====== */}
          <div className="card">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}}
                 onClick={() => setShowSecours(s => !s)}>
              <h3 style={{margin:0}}>🛟 Chargement de secours (ancien système)</h3>
              <span style={{fontSize:18}}>{showSecours ? '▾' : '▸'}</span>
            </div>
            <p style={{fontSize:12,color:'var(--ink-mute)',margin:'6px 0 0'}}>
              CSV commandes, PDF dispatch, etc. À utiliser seulement si le chargement du jour ne fonctionne pas.
            </p>
          </div>

          {showSecours && (
          <>
          {/* Sélecteur de date cible pour les uploads */}
          <div className="card" style={{background:'var(--accent-soft)',border:'1px solid var(--accent)'}}>
            <h3 style={{marginBottom:8}}>📅 Date cible des uploads</h3>
            <p style={{fontSize:12,color:'var(--ink-soft)',marginBottom:10}}>
              Sélectionne pour quel jour tu uploades. La prépa peut anticiper la veille sans casser la distribution en cours.
            </p>
            <div className="chip-group">
              <div className={`chip ${targetDate === todayKey() ? 'selected' : ''}`} onClick={() => setTargetDate(todayKey())}>
                Aujourd'hui ({formatDateShort(todayKey())})
              </div>
              <div className={`chip ${targetDate === addDays(todayKey(), 1) ? 'selected' : ''}`} onClick={() => setTargetDate(addDays(todayKey(), 1))}>
                Demain ({formatDateShort(addDays(todayKey(), 1))})
              </div>
              <div className={`chip ${targetDate === addDays(todayKey(), 2) ? 'selected' : ''}`} onClick={() => setTargetDate(addDays(todayKey(), 2))}>
                +2j ({formatDateShort(addDays(todayKey(), 2))})
              </div>
            </div>
            <div style={{marginTop:8,fontSize:12}}>
              <input
                type="date"
                value={targetDate}
                onChange={e => setTargetDate(e.target.value || todayKey())}
                style={{padding:'4px 6px',borderRadius:6,border:'1px solid var(--line)'}}
              />
            </div>
            {targetDate !== todayKey() && (
              <div className="alert-warning" style={{marginTop:8,padding:8,fontSize:12}}>
                ⚠️ Les uploads commandes & produits ci-dessous seront stockés pour <strong>{dateLabel(targetDate)} ({formatDateShort(targetDate)})</strong>, pas pour aujourd'hui.
              </div>
            )}
          </div>

          {/* CSV commandes */}
          <div className="card">
            <h3 style={{marginBottom:8}}>1. Commandes (CSV)</h3>
            <p style={{fontSize:12,color:'var(--ink-soft)',marginBottom:10}}>
              Pour <strong>{dateLabel(targetDate)} ({formatDateShort(targetDate)})</strong>.
            </p>
            {ordersMeta && (
              <div className="alert-success" style={{marginBottom:10}}>
                ✓ {ordersMeta.count} commandes · par {ordersMeta.uploadedBy} à {formatTimeFR(ordersMeta.uploadedAt)}
              </div>
            )}
            <label className={`upload-zone ${csvFile ? 'has-file' : ''}`}>
              <input type="file" accept=".csv,text/csv,text/comma-separated-values,application/csv,application/vnd.ms-excel,*/*" onChange={e => setCsvFile(e.target.files[0])} />
              <div className="upload-icon">{csvFile ? '✓' : '📄'}</div>
              <div style={{fontWeight:500,fontSize:13}}>{csvFile ? csvFile.name : 'Choisir le CSV des commandes'}</div>
            </label>
            <button className="btn-primary btn-block" disabled={busy || !csvFile} onClick={handleUploadCSV} style={{marginTop:10}}>
              {busy ? 'Chargement…' : 'Charger commandes'}
            </button>
          </div>

          {/* CSV produits */}
          <div className="card">
            <h3 style={{marginBottom:8}}>2. Produits (CSV totaux-détail)</h3>
            <p style={{fontSize:12,color:'var(--ink-soft)',marginBottom:10}}>
              Pour <strong>{dateLabel(targetDate)} ({formatDateShort(targetDate)})</strong>. Permet de choisir les produits dans les anomalies.
            </p>
            {productsMeta && (
              <div className="alert-success" style={{marginBottom:10}}>
                ✓ {productsMeta.count} produits · par {productsMeta.uploadedBy} à {formatTimeFR(productsMeta.uploadedAt)}
              </div>
            )}
            <label className={`upload-zone ${productsFile ? 'has-file' : ''}`}>
              <input type="file" accept=".csv,text/csv,text/comma-separated-values,application/csv,application/vnd.ms-excel,*/*" onChange={e => setProductsFile(e.target.files[0])} />
              <div className="upload-icon">{productsFile ? '✓' : '📦'}</div>
              <div style={{fontWeight:500,fontSize:13}}>{productsFile ? productsFile.name : 'Choisir le CSV produits'}</div>
            </label>
            <button className="btn-primary btn-block" disabled={busy || !productsFile} onClick={handleUploadProducts} style={{marginTop:10}}>
              {busy ? 'Chargement…' : 'Charger produits'}
            </button>
          </div>

          {/* JSON consumers : MASTER ONLY */}
          {session.isMaster ? (
            <div className="card">
              <h3 style={{marginBottom:8}}>3. Base consommateurs (Master seulement)</h3>
              <p style={{fontSize:12,color:'var(--ink-soft)',marginBottom:10}}>
                À mettre à jour <strong>chaque lundi</strong> pour avoir les téléphones à jour.
              </p>
              {consumersMeta && (
                <div className={consumersStale ? 'alert-red' : 'alert-success'} style={{marginBottom:10, padding: 10, fontSize: 13}}>
                  {consumersStale ? '⚠️ ' : '✓ '}
                  {consumersMeta.count} clients · uploadé il y a {consumersAge}j
                  {consumersStale && <><br/>Pense à mettre à jour !</>}
                </div>
              )}
              <label className={`upload-zone ${consumersFile ? 'has-file' : ''}`}>
                <input type="file" accept=".json,application/json,text/json,*/*" onChange={e => setConsumersFile(e.target.files[0])} />
                <div className="upload-icon">{consumersFile ? '✓' : '👥'}</div>
                <div style={{fontWeight:500,fontSize:13}}>{consumersFile ? consumersFile.name : 'Choisir le JSON consumers'}</div>
              </label>
              <button className="btn-primary btn-block" disabled={busy || !consumersFile} onClick={handleUploadConsumers} style={{marginTop:10}}>
                {busy ? 'Chargement…' : 'Charger base'}
              </button>
            </div>
          ) : (
            consumersMeta && (
              <div className="card card-flat">
                <h3 style={{marginBottom:8}}>Base consommateurs</h3>
                <div style={{fontSize:13,color:'var(--ink-soft)'}}>
                  {consumersMeta.count} clients · MAJ il y a {consumersAge}j
                </div>
              </div>
            )
          )}

          {/* CSV catalogue complet (pour les pertes) */}
          <div className="card">
            <h3 style={{marginBottom:8}}>4. Catalogue complet (Pertes)</h3>
            <p style={{fontSize:12,color:'var(--ink-soft)',marginBottom:10}}>
              CSV de <strong>tous</strong> les produits Kelbongoo. À mettre à jour <strong>chaque vendredi</strong>.
              Sert à saisir les pertes (qui peuvent concerner des produits absents de la distribution du jour).
            </p>
            {catalogueMeta && (
              <div className={catalogueStale ? 'alert-warning' : 'alert-success'} style={{marginBottom:10, padding: 10, fontSize: 13}}>
                {catalogueStale ? '⚠️ ' : '✓ '}
                {catalogueMeta.count} produits · uploadé il y a {catalogueAge}j
                {catalogueStale && <><br/>Pense à mettre à jour ce vendredi !</>}
              </div>
            )}
            <label className={`upload-zone ${catalogueFile ? 'has-file' : ''}`}>
              <input type="file" accept=".csv,text/csv,text/comma-separated-values,application/csv,application/vnd.ms-excel,*/*" onChange={e => setCatalogueFile(e.target.files[0])} />
              <div className="upload-icon">{catalogueFile ? '✓' : '📚'}</div>
              <div style={{fontWeight:500,fontSize:13}}>{catalogueFile ? catalogueFile.name : 'Choisir le CSV catalogue complet'}</div>
            </label>
            <button className="btn-primary btn-block" disabled={busy || !catalogueFile} onClick={handleUploadCatalogue} style={{marginTop:10}}>
              {busy ? 'Chargement…' : 'Charger catalogue'}
            </button>
          </div>
          </>
          )}

          <LossesHistory />

          <div className="card card-flat">
            <h3 style={{marginBottom:8}}>Infos</h3>
            <div style={{fontSize:12,color:'var(--ink-soft)',lineHeight:1.6}}>
              <strong>Mode :</strong> {session.role}<br/>
              <strong>Firebase :</strong> {firebaseConfigured ? 'connecté' : 'local'}<br/>
              <strong>Sites :</strong> {SITES.join(', ')}<br/>
              <strong>Alerte non-récup :</strong> +{ALERT_DAYS_NON_RECUP}j
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // APP ROOT
    // ============================================================
    function App() {
      const [session, setSession] = React.useState(() => {
        const saved = sessionStorage.getItem('kb_session_v2');
        return saved ? JSON.parse(saved) : null;
      });
      const [tab, setTab] = React.useState('clients');
      const [currentSite, setCurrentSite] = React.useState(null);

      const [rawOrders, setRawOrders] = React.useState([]);
      const [ordersMeta, setOrdersMeta] = React.useState(null);
      const [products, setProducts] = React.useState([]);
      const [productsMeta, setProductsMeta] = React.useState(null);
      const [consumersByEmail, setConsumersByEmail] = React.useState({});
      const [consumersMeta, setConsumersMeta] = React.useState(null);
      const [catalogue, setCatalogue] = React.useState([]);
      const [catalogueMeta, setCatalogueMeta] = React.useState(null);
      const [dispatchData, setDispatchData] = React.useState({}); // { [site]: {master, frais, sec, nd, meta} }
      const [lastminute, setLastminute] = React.useState([]); // dispatch dernière minute du jour
      const [closures, setClosures] = React.useState([]);
      const [arrivalsLog, setArrivalsLog] = React.useState([]);

      const orders = React.useMemo(() => enrichOrders(rawOrders, consumersByEmail), [rawOrders, consumersByEmail]);

      // Sites présents dans les commandes du jour (sinon liste complète historique)
      const sitesOfDay = React.useMemo(() => {
        const set = new Set(rawOrders.map(o => o.site).filter(Boolean));
        return [...set].sort();
      }, [rawOrders]);
      const availableSites = sitesOfDay.length > 0 ? sitesOfDay : SITES;

      // Cette journée pour ce site est-elle clôturée ?
      const isClosed = !!closures.find(c => c.id === currentSite && c.closedAt && c.closedAt.startsWith(activeDay()));

      // Distributeur a-t-il déjà signalé son arrivée ?
      const myArrival = arrivalsLog.find(a =>
        a.site === currentSite && a.day === todayKey() && a.name === session?.name
      );

      React.useEffect(() => {
        if (session && !currentSite) setCurrentSite(session.site);
      }, [session, currentSite]);

      // Si distrib se connecte à un site SANS commandes du jour (ex : récup de retards
      // sur un point sans distrib aujourd'hui), on ouvre directement l'onglet Suivi.
      const [didInitTab, setDidInitTab] = React.useState(false);
      React.useEffect(() => {
        if (!session || session.role !== 'distrib') return;
        if (didInitTab || !currentSite) return;
        // Attendre que les commandes soient chargées (ou confirmées vides)
        const siteHasOrdersToday = rawOrders.some(o => o.site === currentSite);
        if (!siteHasOrdersToday && rawOrders.length >= 0) {
          // Pas de commandes pour ce site aujourd'hui → ouvrir le Suivi
          setTab('followup');
        }
        setDidInitTab(true);
      }, [session, currentSite, rawOrders, didInitTab]);

      // Note : on ne force PAS le master à basculer sur un site avec commandes du jour.
      // Le master peut consulter / clôturer / gérer le suivi de n'importe quel site
      // (utile pour les distributions non clôturées des jours précédents).

      // Si distrib (uniquement) après clôture, rediriger les onglets cachés vers Clients
      // Important : NE PAS affecter les prépas ni le master
      React.useEffect(() => {
        if (!session) return;
        if (session.role !== 'distrib') return;
        if (!isClosed) return;
        if (['quality', 'consignes', 'infos', 'admin', 'stats'].includes(tab)) {
          setTab('clients');
        }
      }, [session, isClosed, tab]);

      // Si distrib (uniquement) sur admin/stats à l'ouverture, rediriger
      // Important : NE PAS affecter les prépas ni le master
      React.useEffect(() => {
        if (!session) return;
        if (session.role !== 'distrib') return;
        if (['admin', 'stats'].includes(tab)) setTab('clients');
      }, [session, tab]);

      React.useEffect(() => {
        if (!session) return;
        const u1 = storage.subscribe(`day_${activeDay()}_orders`, (arr) => {
          if (arr.length && arr[0].orders) {
            setRawOrders(arr[0].orders);
            setOrdersMeta({ count: arr[0].count, uploadedBy: arr[0].uploadedBy, uploadedAt: arr[0].uploadedAt });
          } else {
            setRawOrders([]); setOrdersMeta(null);
          }
        });
        const u2 = storage.subscribe(`day_${activeDay()}_products`, (arr) => {
          if (arr.length && arr[0].products) {
            setProducts(arr[0].products);
            setProductsMeta({ count: arr[0].count, uploadedBy: arr[0].uploadedBy, uploadedAt: arr[0].uploadedAt });
          } else {
            setProducts([]); setProductsMeta(null);
          }
        });
        const u3 = storage.subscribe('consumers_cache', (arr) => {
          if (arr.length) {
            const merged = {};
            const sorted = arr.sort((a, b) => (a.chunkIndex || 0) - (b.chunkIndex || 0));
            for (const c of sorted) Object.assign(merged, parseChunk(c));
            setConsumersByEmail(merged);
          }
        });
        const u4 = storage.subscribe('consumers_meta', (arr) => {
          if (arr.length) setConsumersMeta(arr[0]);
        });
        const u5 = storage.subscribe(`day_${activeDay()}_closure`, setClosures);
        const u6 = storage.subscribe(`day_${activeDay()}_arrivals`, setArrivalsLog);
        const u7 = storage.subscribe('catalogue', (arr) => {
          if (arr.length) {
            const item = arr[0];
            // Le catalogue est aussi stocké en JSON string pour éviter limite d'index
            let cat = item.catalogue || [];
            if (item.data && typeof item.data === 'string') {
              try { cat = JSON.parse(item.data); } catch {}
            }
            setCatalogue(cat);
            setCatalogueMeta({ count: item.count, uploadedBy: item.uploadedBy, uploadedAt: item.uploadedAt });
          } else {
            setCatalogue([]); setCatalogueMeta(null);
          }
        });
        // Dispatch du jour (un doc par site : id = code site)
        const u8 = storage.subscribe(`day_${activeDay()}_dispatch`, (arr) => {
          const map = {};
          for (const d of arr) {
            map[d.id] = {
              master: d.master ? safeJSON(d.master) : null,
              frais: d.frais ? safeJSON(d.frais) : null,
              sec: d.sec ? safeJSON(d.sec) : null,
              nd: d.nd ? safeJSON(d.nd) : null,
              meta: { uploadedBy: d.uploadedBy, uploadedAt: d.uploadedAt, parts: d.parts || [] },
            };
          }
          setDispatchData(map);
        });
        const u9 = storage.subscribe(`day_${activeDay()}_lastminute`, setLastminute);
        return () => { u1(); u2(); u3(); u4(); u5(); u6(); u7(); u8(); u9(); };
      }, [session]);

      const handleLogin = (s) => {
        sessionStorage.setItem('kb_session_v2', JSON.stringify(s));
        setSession(s);
        setCurrentSite(s.site);
        // Tab par défaut selon le rôle
        if (s.role === 'prep') setTab('prep');
        else setTab('clients');
      };
      const handleLogout = () => {
        sessionStorage.removeItem('kb_session_v2');
        setSession(null);
        setCurrentSite(null);
      };

      const handleArrived = async () => {
        await storage.setDoc(`day_${activeDay()}_arrivals`, `${currentSite}_${session.name}_${Date.now()}`, {
          site: currentSite,
          name: session.name,
          day: activeDay(),
          arrivedAt: new Date().toISOString(),
        });
      };

      if (!session) return <LoginScreen onLogin={handleLogin} />;

      // PRÉPARATEUR : interface dédiée
      if (session.role === 'prep') {
        return (
          <div className="app-shell">
            <div className="topbar">
              <div className="topbar-title">
                <strong>📦 Préparation <span className="badge badge-prep">PRÉPA</span></strong>
                <small>{session.name} · {formatDateFR()}</small>
              </div>
              <button className="btn-ghost" onClick={handleLogout} style={{fontSize:13}}>Sortir</button>
            </div>
            {tab === 'prep' && <PrepPage session={session} products={products} dispatchData={dispatchData} />}
            {tab === 'prepdispatch' && <PrepDispatchPage session={session} />}
            {tab === 'losses' && <LossesPage session={session} catalogue={catalogue} catalogueMeta={catalogueMeta} />}
            {tab === 'inventory' && <InventoryPage session={session} />}
            {tab === 'admin' && <AdminPage session={session} ordersMeta={ordersMeta} productsMeta={productsMeta} consumersMeta={consumersMeta} catalogueMeta={catalogueMeta} />}
            <div className="tab-bar">
              <button className={tab==='prep'?'active':''} onClick={()=>setTab('prep')}>
                <span className="tab-icon">📦</span>Prépa
              </button>
              <button className={tab==='prepdispatch'?'active':''} onClick={()=>setTab('prepdispatch')}>
                <span className="tab-icon">🚚</span>Manquants & ND
              </button>
              <button className={tab==='losses'?'active':''} onClick={()=>setTab('losses')}>
                <span className="tab-icon">🗑️</span>Pertes
              </button>
              <button className={tab==='inventory'?'active':''} onClick={()=>setTab('inventory')}>
                <span className="tab-icon">📋</span>Inventaire
              </button>
              <button className={tab==='admin'?'active':''} onClick={()=>setTab('admin')}>
                <span className="tab-icon">⚙️</span>Admin
              </button>
            </div>
          </div>
        );
      }

      // DISTRIB ou MASTER : interface complète
      return (
        <div className="app-shell">
          <div className="topbar">
            <div className="topbar-title">
              <strong>
                {session.isMaster
                  ? <>Master <span className="badge badge-master">{currentSite}</span></>
                  : <>Distrib <span className="badge badge-site">{currentSite}</span></>}
                {isClosed && <span className="badge badge-info">🔒 Clos</span>}
              </strong>
              <small>
                {session.name} · {activeDay() !== todayKey()
                  ? <span style={{color:'var(--warn)',fontWeight:600}}>📅 Distribution du {formatDateShort(activeDay())} (≠ aujourd'hui)</span>
                  : formatDateFR()}
              </small>
            </div>
            <div className="topbar-actions">
              {activeDay() !== todayKey() && (
                <button className="btn-ghost" style={{fontSize:11,padding:'4px 8px'}}
                  onClick={() => { setActiveDay(null); window.location.reload(); }}>
                  ↩ Aujourd'hui
                </button>
              )}
              {session.isMaster && (
                <select value={currentSite || ''} onChange={e => setCurrentSite(e.target.value)} style={{width:'auto',fontSize:13,padding:'6px 10px'}}>
                  {sitesOfDay.length > 0 && (
                    <optgroup label="● Avec commandes aujourd'hui">
                      {sitesOfDay.map(s => <option key={s} value={s}>{s}</option>)}
                    </optgroup>
                  )}
                  <optgroup label="○ Autres sites">
                    {SITES.filter(s => !sitesOfDay.includes(s)).map(s => <option key={s} value={s}>{s}</option>)}
                  </optgroup>
                </select>
              )}
              <button className="btn-ghost" onClick={handleLogout} style={{fontSize:13}}>Sortir</button>
            </div>
          </div>

          {/* Banner "Je suis arrivé" si pas encore cliqué et distrib */}
          {session.role === 'distrib' && !myArrival && !isClosed && (
            <ArrivedBanner session={session} onArrived={handleArrived} />
          )}

          {tab === 'clients' && <ClientsPage session={session} currentSite={currentSite} orders={orders} isClosed={isClosed} dispatch={dispatchData[currentSite] || null} lastminute={lastminute} />}
          {tab === "quality" && <QualityPage session={session} currentSite={currentSite} orders={orders} products={products} isClosed={isClosed} consumersByEmail={consumersByEmail} />}
          {tab === 'consignes' && <ConsignesPage session={session} currentSite={currentSite} orders={orders} isClosed={isClosed} consumersByEmail={consumersByEmail} />}
          {tab === 'followup' && <FollowUpPage session={session} currentSite={currentSite} consumersByEmail={consumersByEmail} />}
          {tab === 'infos' && <InfosPage session={session} />}
          {tab === 'closure' && <ClosurePage session={session} currentSite={currentSite} orders={orders} consumersByEmail={consumersByEmail} isClosed={isClosed} onReopen={() => {}} />}
          {tab === 'inventory' && <InventoryPage session={session} />}
          {tab === 'masterrecap' && session.isMaster && <MasterRecapPage session={session} consumersByEmail={consumersByEmail} />}
          {tab === 'stats' && session.isMaster && <StatsPage session={session} />}
          {tab === 'admin' && session.isMaster && <AdminPage session={session} ordersMeta={ordersMeta} productsMeta={productsMeta} consumersMeta={consumersMeta} catalogueMeta={catalogueMeta} />}

          <div className="tab-bar">
            <button className={tab==='clients'?'active':''} onClick={()=>setTab('clients')}>
              <span className="tab-icon">👥</span>Clients
            </button>
            {(!isClosed || session.isMaster) && (
              <button className={tab==='quality'?'active':''} onClick={()=>setTab('quality')}>
                <span className="tab-icon">⚠️</span>Qualité
              </button>
            )}
            {(!isClosed || session.isMaster) && (
              <button className={tab==='consignes'?'active':''} onClick={()=>setTab('consignes')}>
                <span className="tab-icon">🍯</span>Consigne
              </button>
            )}
            {(!isClosed || session.isMaster) && (
              <button className={tab==='infos'?'active':''} onClick={()=>setTab('infos')}>
                <span className="tab-icon">📋</span>Infos
              </button>
            )}
            <button className={tab==='followup'?'active':''} onClick={()=>setTab('followup')}>
              <span className="tab-icon">📞</span>Suivi
            </button>
            <button className={tab==='closure'?'active':''} onClick={()=>setTab('closure')}>
              <span className="tab-icon">🔒</span>Clôt.
            </button>
            {session.isMaster && (
              <button className={tab==='masterrecap'?'active':''} onClick={()=>setTab('masterrecap')}>
                <span className="tab-icon">📋</span>Récap
              </button>
            )}
            {session.isMaster && (
              <button className={tab==='stats'?'active':''} onClick={()=>setTab('stats')}>
                <span className="tab-icon">📊</span>Stats
              </button>
            )}
            {session.isMaster && (
              <button className={tab==='inventory'?'active':''} onClick={()=>setTab('inventory')}>
                <span className="tab-icon">📋</span>Inventaire
              </button>
            )}
            {session.isMaster && (
              <button className={tab==='admin'?'active':''} onClick={()=>setTab('admin')}>
                <span className="tab-icon">⚙️</span>Admin
              </button>
            )}
          </div>
        </div>
      );
    }

    // ============================================================
    // BOOT
    // ============================================================
    async function boot() {
      firebaseConfigured = await initFirebase();
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<ToastProvider><App /></ToastProvider>);
    }
    if (window.__firebase) boot();
    else window.addEventListener('firebase-ready', boot, { once: true });
  </script>
</body>
</html>
