    // Picker spécifique aux consignes : cherche d'abord dans les commandes du jour,
    // sinon dans tous les consumers Kelbongoo
    function ConsigneClientPicker({ orders, consumersByEmail, selectedKey, selectedName, onPick, onClear }) {
      const [search, setSearch] = React.useState('');

      const results = React.useMemo(() => {
        const s = normalizeText(search);
        if (!s) {
          // Pas de recherche → on liste les commandes du jour (limité)
          return orders.slice(0, 20).map(o => ({
            key: o.orderId,
            name: displayName(o),
            email: o.email || '',
            hasOrderToday: true,
          }));
        }
        // Recherche : on commence par les commandes du jour matchant
        const fromOrders = orders
          .filter(o => normalizeText(displayName(o)).includes(s))
          .map(o => ({
            key: o.orderId,
            name: displayName(o),
            email: o.email || '',
            hasOrderToday: true,
          }));
        // Puis on cherche dans tous les consumers
        const orderEmails = new Set(orders.map(o => o.email));
        const fromConsumers = [];
        const cs = consumersByEmail || {};
        for (const email in cs) {
          if (fromConsumers.length >= 30) break;
          if (orderEmails.has(email)) continue; // déjà dans fromOrders
          const c = cs[email];
          const fullName = `${c.last_name || ''} ${c.first_name || ''}`.trim() || c.name || '';
          if (normalizeText(fullName).includes(s)) {
            fromConsumers.push({
              key: email,
              name: fullName,
              email,
              hasOrderToday: false,
            });
          }
        }
        return [...fromOrders, ...fromConsumers].slice(0, 50);
      }, [orders, consumersByEmail, search]);

      if (selectedKey && selectedName) {
        return (
          <div className="alert-success" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span>✓ <strong>{selectedName}</strong></span>
            <button className="btn-ghost" style={{padding:'2px 8px', fontSize:11}} onClick={onClear}>Changer</button>
          </div>
        );
      }

      return (
        <>
          <div className="search-box">
            <input type="text" value={search} onChange={e => setSearch(e.target.value)} placeholder="Chercher un client (commande du jour ou autre)…" />
          </div>
          <div style={{fontSize:11,color:'var(--ink-soft)',padding:'4px 6px'}}>
            {!search ? "Commandes du jour. Tape un nom pour chercher dans tous les clients." : `${results.length} résultat${results.length>1?'s':''}`}
          </div>
          <div className="product-list">
            {results.length === 0 ? (
              <div style={{padding: 14, textAlign: 'center', color: 'var(--ink-mute)', fontSize: 13}}>
                Aucun client trouvé dans la liste
              </div>
            ) : results.map(r => (
              <div key={r.key} className="product-item" onClick={() => onPick(r)}>
                <span>{r.name}</span>
                {!r.hasOrderToday && <span className="badge badge-info" style={{marginLeft:8,fontSize:10}}>pas de commande</span>}
              </div>
            ))}
          </div>
          {/* Saisie manuelle si le client n'est pas trouvé */}
          {search.trim().length >= 2 && (
            <div style={{marginTop:8,padding:'8px',background:'var(--accent-soft)',borderRadius:8}}>
              <div style={{fontSize:11,color:'var(--ink-soft)',marginBottom:6}}>Client introuvable ? Utilise ce nom tel quel :</div>
              <button className="btn-secondary btn-block" style={{fontSize:13}} onClick={() => onPick({ key: `MANUAL:${search.trim()}`, name: search.trim().toUpperCase(), email: '' })}>
                + Utiliser « {search.trim()} »
              </button>
            </div>
          )}
        </>
      );
    }

    // ============================================================
    // PAGE CLIENTS (jour J) — distrib + master
    // ============================================================
    function ClientsPage({ session, currentSite, orders, isClosed, dispatch, lastminute }) {
      const [statuses, setStatuses] = React.useState([]);
      const [filter, setFilter] = React.useState('not_passed');
      const [search, setSearch] = React.useState('');
      const [selectedClient, setSelectedClient] = React.useState(null);

      // Index dispatch dernière minute pour CE site : { [casier]: [{produit, qty}] }
      const lmByCasier = React.useMemo(() => {
        const idx = {};
        for (const l of (lastminute || [])) {
          const arr = (l.allocBySite && l.allocBySite[currentSite]) || [];
          for (const c of arr) {
            if (!idx[c.casier]) idx[c.casier] = [];
            idx[c.casier].push({ produit: l.produit, producteur: l.producteur, qty: c.qty });
          }
        }
        return idx;
      }, [lastminute, currentSite]);

      // Dispatch dernière minute SANS casier (bac ND) pour CE site : à répartir sur place
      const lmBacND = React.useMemo(() => {
        const out = [];
        for (const l of (lastminute || [])) {
          const arr = (l.allocBySite && l.allocBySite[currentSite]) || [];
          for (const c of arr) {
            if (c.casier === 'ND') out.push({ produit: l.produit, producteur: l.producteur, qty: c.qty });
          }
        }
        return out;
      }, [lastminute, currentSite]);

      React.useEffect(() => {
        const unsub = storage.subscribe(`day_${activeDay()}_statuses`, setStatuses);
        return unsub;
      }, []);

      const statusMap = React.useMemo(() => {
        const m = {};
        for (const s of statuses) m[s.orderId] = s;
        return m;
      }, [statuses]);

      const visible = orders.filter(o => o.site === currentSite);

      const togglePassed = async (order) => {
        if (isClosed) return;
        const cur = statusMap[order.orderId];
        const newPassed = !(cur?.passed);
        await storage.setDoc(`day_${activeDay()}_statuses`, order.orderId, {
          orderId: order.orderId, site: currentSite,
          passed: newPassed,
          consumer_name: displayName(order),
          email: order.email,
          telephone: order.telephone || '',
          hasPhone: order.hasPhone,
          updatedBy: session.name,
          updatedAt: new Date().toISOString(),
        });
      };

      const filtered = visible.filter(o => {
        const passed = !!statusMap[o.orderId]?.passed;
        if (filter === 'passed' && !passed) return false;
        if (filter === 'not_passed' && passed) return false;
        if (search) {
          const s = normalizeText(search);
          if (!normalizeText(displayName(o)).includes(s)) return false;
        }
        return true;
      }).sort((a, b) => displayName(a).localeCompare(displayName(b)));

      const stats = {
        total: visible.length,
        passed: visible.filter(o => statusMap[o.orderId]?.passed).length,
        notPassed: visible.filter(o => !statusMap[o.orderId]?.passed).length,
      };

      // Si journée clôturée et distrib (non master), on cache les noms
      const hideNames = isClosed && !session.isMaster;

      return (
        <div className="stack">
          <h1>Clients · {currentSite}</h1>

          {isClosed && (
            <div className="alert-info">
              🔒 Journée clôturée — modifications désactivées
            </div>
          )}

          {orders.length === 0 && !isClosed && (
            <div className="alert-warning">
              ⚠️ Aucune commande chargée. Va dans <strong>Admin</strong> pour uploader le CSV du jour.
            </div>
          )}

          {!dispatch && orders.length > 0 && (
            <div className="alert-info">
              📦 Pas de dispatch chargé pour {currentSite}. Charge le Master + Dispatch frais/sec dans <strong>Admin</strong> pour voir le détail par casier.
            </div>
          )}
          {dispatch && (
            <div className="alert-success">
              📦 Dispatch chargé{dispatch.meta?.parts?.length ? ` (${dispatch.meta.parts.join(' · ')})` : ''}{dispatch.meta?.uploadedBy ? ` · par ${dispatch.meta.uploadedBy}` : ''} — clique un client pour voir ses casiers.
            </div>
          )}

          {lmBacND.length > 0 && (
            <div className="alert-info" style={{borderLeft:'3px solid var(--info)'}}>
              <strong>🚚 Bac ND — dispatch dernière minute à répartir sur place :</strong>
              <div style={{marginTop:4}}>
                {lmBacND.map((p, i) => (
                  <div key={i} style={{fontSize:13}}>
                    • {p.produit}{p.producteur ? ` · ${p.producteur}` : ''} — <strong>{p.qty}</strong>
                  </div>
                ))}
              </div>
              <div style={{fontSize:11,color:'var(--ink-mute)',marginTop:4}}>
                Ces articles n'ont pas d'attribution client (pas de dispatch chargé) : à distribuer manuellement depuis le bac ND.
              </div>
            </div>
          )}

          <div className="stat-grid">
            <div className="stat"><div className="stat-value">{stats.total}</div><div className="stat-label">Total</div></div>
            <div className="stat"><div className="stat-value" style={{color:'var(--accent)'}}>{stats.passed}</div><div className="stat-label">Passés</div></div>
            <div className="stat"><div className="stat-value" style={{color:'var(--warn)'}}>{stats.notPassed}</div><div className="stat-label">Restants</div></div>
          </div>

          {hideNames ? (
            <div className="empty-state">
              <div className="icon">🔒</div>
              <p>Liste des clients masquée après la clôture.<br/>Consulter le suivi si besoin.</p>
            </div>
          ) : (
            <>
              <div className="search-box">
                <input type="text" value={search} onChange={e => setSearch(e.target.value)} placeholder="Rechercher…" />
              </div>
              <div className="filter-row">
                <div className={`chip ${filter==='not_passed'?'selected':''}`} onClick={()=>setFilter('not_passed')}>Non passés ({stats.notPassed})</div>
                <div className={`chip ${filter==='passed'?'selected':''}`} onClick={()=>setFilter('passed')}>Passés ({stats.passed})</div>
                <div className={`chip ${filter==='all'?'selected':''}`} onClick={()=>setFilter('all')}>Tous</div>
              </div>

              {filtered.length === 0 ? (
                <div className="empty-state">
                  <div className="icon">{stats.notPassed === 0 && stats.total > 0 ? '🎉' : '📭'}</div>
                  <p>{stats.notPassed === 0 && stats.total > 0 ? 'Tous passés !' : 'Aucun client.'}</p>
                </div>
              ) : (
                <div className="list">
                  {filtered.map(o => {
                    const passed = !!statusMap[o.orderId]?.passed;
                    // V4 : les données pain/ND/casiers sont directement dans la commande chargée
                    const isV4 = Array.isArray(o.items) || Array.isArray(o.pains) || Array.isArray(o.casiersFrais);
                    const cd = (!isV4 && dispatch) ? buildClientDispatch(o, dispatch.master, dispatch.frais, dispatch.sec) : null;
                    // Casiers
                    const casiersFrais = isV4 ? (o.casiersFrais || []) : (cd ? cd.frais.map(f => f.casier) : []);
                    const casiersSec   = isV4 ? (o.casiersSec || [])   : (cd ? cd.sec.map(s => s.casier) : []);
                    // Pain / ND / frais
                    const pains      = isV4 ? (o.pains || []) : (cd ? cd.sec.flatMap(s => s.produits) : []);
                    const ndItems    = isV4 ? (o.nds || [])   : [];
                    const fraisItems = isV4 ? (o.frais || []) : (cd ? cd.frais.flatMap(f => f.produits) : []);
                    // Dispatch dernière minute pour les casiers de ce client (inchangé)
                    const lmItems = (casiersFrais.length || casiersSec.length)
                      ? [...casiersFrais, ...casiersSec].flatMap(cas => (lmByCasier[cas] || []))
                      : [];
                    const allCasiers = [...casiersFrais.map(c=>({c,t:'F'})), ...casiersSec.map(c=>({c,t:'S'}))];
                    const clickable = isV4 || cd; // détail ouvrable si on a des données
                    return (
                      <div key={o.orderId} className={`list-item order-row ${passed ? 'passed' : ''}`}>
                        <div className="list-item-main" style={clickable ? {cursor:'pointer'} : {}} onClick={() => clickable && setSelectedClient(o)}>
                          <div className="list-item-name">
                            <span className={`indicator-dot ${passed ? 'passed' : 'not-passed'}`}></span>
                            {displayName(o)}
                            {allCasiers.length > 0 && (
                              <span style={{marginLeft:8,display:'inline-flex',gap:4,flexWrap:'wrap'}}>
                                {allCasiers.map((x,i) => (
                                  <span key={i} className="badge" style={{background:x.t==='S'?'var(--warn-soft)':'var(--accent-soft)',color:x.t==='S'?'var(--warn)':'var(--accent-dark)'}}>
                                    {x.t==='S'?'🍞':'🧊'} {x.c}
                                  </span>
                                ))}
                              </span>
                            )}
                            {!isV4 && dispatch && !cd && (
                              <span className="badge" style={{marginLeft:8,background:'var(--bg-muted)',color:'var(--ink-mute)'}}>hors master</span>
                            )}
                          </div>
                          {/* Résumé : pain 🍞 + ND 🥬 + dispatch dernière minute */}
                          {(pains.length > 0 || ndItems.length > 0 || lmItems.length > 0) && (
                            <div style={{marginTop:4,display:'flex',flexDirection:'column',gap:2,fontSize:12}}>
                              {pains.length > 0 && (
                                <div style={{color:'var(--warn)'}}>🍞 {pains.map(p => p.produit + (p.qty>1?` ×${p.qty}`:'')).join(', ')}</div>
                              )}
                              {ndItems.length > 0 && (
                                <div style={{color:'var(--accent-dark)',fontWeight:600}}>🥬 {ndItems.map(p => p.produit + (p.qty>1?` ×${p.qty}`:'')).join(', ')}</div>
                              )}
                              {lmItems.length > 0 && (
                                <div style={{color:'var(--info)',fontWeight:600}}>
                                  ➕ Dispatch dernière minute : {lmItems.map(p => p.produit + (p.qty>1?` ×${p.qty}`:'')).join(', ')}
                                </div>
                              )}
                            </div>
                          )}
                          <div className="list-item-sub">
                            {o.hasPhone
                              ? <a href={`tel:${o.telephone}`} onClick={e=>e.stopPropagation()} style={{color:'var(--accent-dark)',fontWeight:600}}>📞 {o.telephone}</a>
                              : <span style={{color:'var(--warn)'}}>✉️ Email</span>}
                            {session.isMaster && o.email && <span style={{color:'var(--ink-mute)'}}>· {o.email}</span>}
                            {cd && <span style={{color:'var(--info)',marginLeft:6}}>· détail ›</span>}
                          </div>
                        </div>
                        <button className={passed ? 'btn-secondary' : 'btn-primary'} onClick={() => togglePassed(o)} disabled={isClosed} style={{padding:'8px 12px',fontSize:13,minWidth:90}}>
                          {passed ? '↩ Annuler' : '✓ Passé'}
                        </button>
                      </div>
                    );
                  })}
                </div>
              )}
            </>
          )}

          {selectedClient && !dispatch && (Array.isArray(selectedClient.items)) && (
            <ClientDetailV4 order={selectedClient} lmByCasier={lmByCasier} onClose={() => setSelectedClient(null)} />
          )}
          {selectedClient && dispatch && (
            <DispatchModal
              order={selectedClient}
              clientDispatch={buildClientDispatch(selectedClient, dispatch.master, dispatch.frais, dispatch.sec)}
              nd={dispatch.nd}
              lmByCasier={lmByCasier}
              onClose={() => setSelectedClient(null)}
            />
          )}
        </div>
      );
    }

    // ============================================================
    // MODAL DÉTAIL CLIENT V4 — commande complète (frais / pain / ND)
    // ============================================================
    function ClientDetailV4({ order, lmByCasier, onClose }) {
      const o = order;
      const casiers = [...(o.casiersFrais||[]).map(c=>({c,t:'🧊'})), ...(o.casiersSec||[]).map(c=>({c,t:'🍞'}))];
      const lm = [...(o.casiersFrais||[]), ...(o.casiersSec||[])].flatMap(cas => (lmByCasier && lmByCasier[cas]) || []);
      const Section = ({ emoji, titre, items, color }) => (
        items && items.length > 0 ? (
          <div style={{marginBottom:12}}>
            <h4 style={{margin:'0 0 6px',fontSize:13,color}}>{emoji} {titre}</h4>
            <div className="stack" style={{gap:3}}>
              {items.map((p,i)=>(
                <div key={i} style={{display:'flex',justifyContent:'space-between',fontSize:13,padding:'3px 0',borderBottom:'1px solid var(--border)'}}>
                  <span>{p.produit}{p.producteur?` · ${p.producteur}`:''}</span>
                  <strong>×{p.qty}</strong>
                </div>
              ))}
            </div>
          </div>
        ) : null
      );
      return (
        <div className="modal-backdrop" onClick={(e)=>{ if(e.target.className==='modal-backdrop') onClose(); }}>
          <div className="modal">
            <div className="modal-header">
              <h2>{o.name || displayName(o)}</h2>
              <button className="modal-close" onClick={onClose}>×</button>
            </div>
            <div style={{marginBottom:10}}>
              {casiers.length>0 && (
                <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:8}}>
                  {casiers.map((x,i)=><span key={i} className="badge" style={{background:x.t==='🍞'?'var(--warn-soft)':'var(--accent-soft)',color:x.t==='🍞'?'var(--warn)':'var(--accent-dark)'}}>{x.t} {x.c}</span>)}
                </div>
              )}
              {o.tel && <div style={{fontSize:13}}>📞 <a href={`tel:${o.tel}`}>{o.tel}</a></div>}
            </div>
            <Section emoji="🥬" titre="Non-dispatch (à remettre à la main)" items={o.nds} color="var(--accent-dark)" />
            <Section emoji="🍞" titre="Pain" items={o.pains} color="var(--warn)" />
            <Section emoji="🧊" titre="Frais (en casier)" items={o.frais} color="var(--accent)" />
            {lm.length>0 && <Section emoji="➕" titre="Dispatch dernière minute" items={lm} color="var(--info)" />}
            {o.removed && o.removed.length>0 && (
              <div style={{marginTop:8,padding:8,background:'var(--warn-soft)',borderRadius:6,fontSize:12,color:'var(--warn)'}}>
                Produits retirés : {o.removed.map(r=>r.produit+(r.qty>1?` ×${r.qty}`:'')).join(', ')}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ============================================================
    // MODAL DISPATCH CLIENT — casiers frais/sec + produits + ND
    // ============================================================
    function DispatchModal({ order, clientDispatch, nd, lmByCasier, onClose }) {
      const cd = clientDispatch;
      const renderCasierBlock = (entry, type) => {
        const color = type === 'frais' ? 'var(--accent)' : 'var(--warn)';
        const totalQty = entry.produits.reduce((s, p) => s + (p.qty || 1), 0);
        const lm = (lmByCasier && lmByCasier[entry.casier]) || [];
        return (
          <div key={type + entry.casier} className="card-flat" style={{padding:'12px 14px', marginBottom:10}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
              <span style={{fontWeight:700,fontSize:15,color}}>
                Casier {type} n°{entry.casier}
              </span>
              <span className="badge badge-info">{entry.produits.length} produit{entry.produits.length>1?'s':''}{totalQty>entry.produits.length?` · ${totalQty} art.`:''}</span>
            </div>
            {entry.produits.length === 0 ? (
              <div style={{color:'var(--ink-mute)',fontSize:13,fontStyle:'italic'}}>Aucun produit dispatché dans ce casier aujourd'hui.</div>
            ) : (
              <div className="stack" style={{gap:6}}>
                {entry.produits.map((p, i) => (
                  <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',gap:10,fontSize:14,borderBottom:'1px solid var(--line)',paddingBottom:5}}>
                    <span>
                      <strong>{p.produit}</strong>
                      {p.producteur && <span style={{color:'var(--ink-mute)',fontSize:12}}> · {p.producteur}</span>}
                    </span>
                    {p.qty > 1 && <span className="badge badge-anom" style={{whiteSpace:'nowrap'}}>×{p.qty}</span>}
                  </div>
                ))}
              </div>
            )}
            {lm.length > 0 && (
              <div style={{marginTop:8,padding:'8px 10px',background:'var(--info-soft)',borderRadius:'var(--radius-sm)'}}>
                <div style={{fontSize:12,fontWeight:700,color:'var(--info)',marginBottom:4}}>➕ Dispatch dernière minute</div>
                {lm.map((p, i) => (
                  <div key={i} style={{fontSize:13,display:'flex',justifyContent:'space-between'}}>
                    <span>{p.produit}</span>{p.qty>1 && <span className="badge badge-info">×{p.qty}</span>}
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      };

      return (
        <div className="modal-backdrop" onClick={(e) => { if (e.target.className === 'modal-backdrop') onClose(); }}>
          <div className="modal" style={{maxWidth:560}}>
            <div className="modal-header">
              <div>
                <strong style={{fontSize:17}}>📦 {displayName(order)}</strong>
                {cd?.telephone && <div style={{fontSize:13,color:'var(--ink-mute)'}}>📞 {cd.telephone}</div>}
              </div>
              <button className="modal-close" onClick={onClose}>×</button>
            </div>
            <div className="stack" style={{gap:14}}>
              {!cd ? (
                <div className="alert-warning">Ce client n'est pas dans le Master du jour.</div>
              ) : (
                <>
                  {/* FRAIS */}
                  <div>
                    <h3 style={{margin:'0 0 8px',fontSize:14,color:'var(--accent)'}}>🧊 Frais — {cd.frais.length} casier{cd.frais.length>1?'s':''}</h3>
                    {cd.frais.length === 0
                      ? <div style={{color:'var(--ink-mute)',fontSize:13}}>Aucun casier frais.</div>
                      : cd.frais.map(e => renderCasierBlock(e, 'frais'))}
                  </div>
                  {/* SEC */}
                  <div>
                    <h3 style={{margin:'0 0 8px',fontSize:14,color:'var(--warn)'}}>🍞 Sec — {cd.sec.length} casier{cd.sec.length>1?'s':''}</h3>
                    {cd.sec.length === 0
                      ? <div style={{color:'var(--ink-mute)',fontSize:13}}>Aucun casier sec.</div>
                      : cd.sec.map(e => renderCasierBlock(e, 'sec'))}
                  </div>
                  {/* ND — produits à remettre à la main (commun au site) */}
                  {nd && nd.length > 0 && (
                    <div>
                      <h3 style={{margin:'0 0 8px',fontSize:14,color:'var(--ink-soft)'}}>✋ Non-dispatch (à remettre à la main)</h3>
                      <div className="alert-info" style={{fontSize:12}}>Liste commune au site — vérifier la commande du client avant de remettre.</div>
                      <div className="stack" style={{gap:4,marginTop:8}}>
                        {nd.map((p, i) => (
                          <div key={i} style={{display:'flex',justifyContent:'space-between',fontSize:13,borderBottom:'1px solid var(--line)',paddingBottom:4}}>
                            <span>{p.produit}</span>
                            {p.total ? <span className="badge badge-info">total {p.total}</span> : null}
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </>
              )}
            </div>
          </div>
        </div>
      );
    }
    function QualityPage({ session, currentSite, orders, products, isClosed, consumersByEmail }) {
      const [anomalies, setAnomalies] = React.useState([]);
      const [showForm, setShowForm] = React.useState(false);
      const [editing, setEditing] = React.useState(null);
      const showToast = React.useContext(ToastContext);

      React.useEffect(() => {
        const unsub = storage.subscribe(`day_${activeDay()}_anomalies`, setAnomalies);
        return unsub;
      }, []);

      const visible = anomalies.filter(a => a.site === currentSite);
      const handleDelete = async (id) => {
        if (!confirm('Supprimer cette anomalie ?')) return;
        await storage.deleteDoc(`day_${activeDay()}_anomalies`, id);
        showToast('Supprimée');
      };

      const sitOrders = orders.filter(o => o.site === currentSite);

      // Si clôturé et pas master, le distrib ne voit plus les anomalies
      const hideAfterClose = isClosed && !session.isMaster;

      return (
        <div className="stack">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <h1>Qualité · {currentSite}</h1>
            {!isClosed && (
              <button className="btn-primary" onClick={() => { setEditing(null); setShowForm(true); }}>+ Nouvelle</button>
            )}
          </div>

          {isClosed && (
            <div className="alert-info">🔒 Journée clôturée</div>
          )}

          {hideAfterClose ? (
            <div className="empty-state">
              <div className="icon">🔒</div>
              <p>Anomalies masquées après la clôture.</p>
            </div>
          ) : (
            <>
              <div className="stat-grid">
                <div className="stat"><div className="stat-value">{visible.length}</div><div className="stat-label">Anomalies</div></div>
                <div className="stat"><div className="stat-value">{visible.reduce((s,a) => s + (a.amountRefund||0), 0).toFixed(2)}€</div><div className="stat-label">Remboursé</div></div>
                <div className="stat"><div className="stat-value">{visible.reduce((s,a) => s + (a.amountCredit||0), 0).toFixed(2)}€</div><div className="stat-label">Avoirs</div></div>
              </div>

              {visible.length === 0 ? (
                <div className="empty-state"><div className="icon">📋</div><p>Pas d'anomalies aujourd'hui.</p></div>
              ) : (
                <div className="list">
                  {visible.sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||'')).map(a => (
                    <div key={a.id} className="list-item" style={{flexDirection:'column',alignItems:'stretch'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div className="list-item-name">{a.clientName || '(client inconnu)'}</div>
                          <div className="list-item-sub">
                            {formatDateShort(a.day || a.createdAt)} · {formatTimeFR(a.createdAt)} · {a.createdBy}
                          </div>
                          {a.productLabel && (
                            <div style={{fontSize:13,color:'var(--ink-soft)',marginTop:4,fontWeight:500}}>📦 {a.productLabel}</div>
                          )}
                        </div>
                        {!isClosed && (
                          <div style={{display:'flex',gap:4}}>
                            <button className="btn-ghost" onClick={() => { setEditing(a); setShowForm(true); }} style={{fontSize:13}}>✏️</button>
                            <button className="btn-ghost" onClick={() => handleDelete(a.id)} style={{fontSize:13}}>🗑️</button>
                          </div>
                        )}
                      </div>
                      <div style={{marginTop:8,display:'flex',flexWrap:'wrap',gap:4}}>
                        {(a.anomalyTypes||[]).map(t => {
                          const def = ANOMALIES.find(x => x.id === t);
                          return <span key={t} className={`badge badge-${def?.color==='danger'?'danger':'anom'}`}>{def?.label || t}</span>;
                        })}
                        {(a.actions||[]).map(t => {
                          const def = ACTIONS.find(x => x.id === t);
                          return <span key={t} className="badge badge-info">{def?.label || t}</span>;
                        })}
                      </div>
                      {(a.amountRefund > 0 || a.amountCredit > 0) && (
                        <div style={{marginTop:6,fontSize:13,color:'var(--ink-soft)'}}>
                          {a.amountRefund > 0 && <>Remb. {a.amountRefund.toFixed(2)}€ </>}
                          {a.amountCredit > 0 && <>· Avoir {a.amountCredit.toFixed(2)}€</>}
                        </div>
                      )}
                      {a.remark && <div style={{marginTop:6,fontSize:13,fontStyle:'italic',color:'var(--ink-soft)'}}>« {a.remark} »</div>}
                    </div>
                  ))}
                </div>
              )}
            </>
          )}

          {showForm && (
            <AnomalyForm orders={sitOrders} products={products} session={session} currentSite={currentSite} consumersByEmail={consumersByEmail} editing={editing} onClose={() => { setShowForm(false); setEditing(null); }} />
          )}
        </div>
      );
    }

    // ============================================================
    // PAGE CONSIGNES
    // ============================================================
    function ConsignesPage({ session, currentSite, orders, isClosed, consumersByEmail }) {
      const [consignes, setConsignes] = React.useState([]);
      const [showForm, setShowForm] = React.useState(false);
      const [editing, setEditing] = React.useState(null);
      const showToast = React.useContext(ToastContext);

      React.useEffect(() => {
        const unsub = storage.subscribe('consignes', setConsignes);
        return unsub;
      }, []);

      const visibleAll = consignes.filter(c => c.site === currentSite);
      const visibleToday = visibleAll.filter(c => c.day === todayKey());

      const handleDelete = async (id) => {
        if (!confirm('Supprimer cette consigne ?')) return;
        await storage.deleteDoc('consignes', id);
        showToast('Supprimée');
      };

      const setStatus = async (c, newStatus) => {
        await storage.setDoc('consignes', c.id, {
          ...c, status: newStatus,
          updatedBy: session.name, updatedAt: new Date().toISOString(),
        });
        showToast('Mis à jour');
      };

      const sitOrders = orders.filter(o => o.site === currentSite);
      const pending = visibleAll.filter(c => c.status !== 'credited');
      const totalPots = visibleToday.reduce((s, c) => s + (c.nbPots || 0), 0);

      // Distrib seulement peut saisir, master peut traiter
      const canCreate = session.role === 'distrib' && !isClosed;

      return (
        <div className="stack">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <h1>Consignes · {currentSite}</h1>
            {canCreate && (
              <button className="btn-primary" onClick={() => { setEditing(null); setShowForm(true); }}>+ Dépôt</button>
            )}
          </div>

          <p style={{color:'var(--ink-soft)',fontSize:13,marginTop:-8}}>
            Pots en verre déposés par les clients à reprendre en compte.
          </p>

          <div className="stat-grid">
            <div className="stat"><div className="stat-value">{visibleToday.length}</div><div className="stat-label">Aujourd'hui</div></div>
            <div className="stat"><div className="stat-value">{totalPots}</div><div className="stat-label">Pots jour</div></div>
            <div className="stat"><div className="stat-value" style={{color:'var(--warn)'}}>{pending.length}</div><div className="stat-label">À créditer</div></div>
          </div>

          {visibleAll.length === 0 ? (
            <div className="empty-state"><div className="icon">🍯</div><p>Pas de consignes enregistrées.</p></div>
          ) : (
            <div className="list">
              {visibleAll.sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||'')).map(c => (
                <div key={c.id} className="list-item" style={{flexDirection:'column',alignItems:'stretch'}}>

    // ============================================================
    // PAGE SUIVI : Non-récup + Oublis casier
    // ============================================================
    function FollowUpPage({ session, currentSite, consumersByEmail }) {
      const [subTab, setSubTab] = React.useState('non_recup'); // 'non_recup' | 'oublis'
      // Charger les oublis (anomalies de type oubli_casier non résolues)
      const [forgottens, setForgottens] = React.useState([]);
      React.useEffect(() => {
        // On charge les anomalies de toutes les dates récentes
        // Approche : on s'abonne à followups + on lit les collections day_*_anomalies
        // Plus simple : on stocke les oublis dans une collection séparée
        const unsub = storage.subscribe('forgotten_items', setForgottens);
        return unsub;
      }, []);
      const forgottensOpen = forgottens.filter(f =>
        f.site === currentSite && f.status !== 'returned' && f.status !== 'picked_up'
      );
      const alertOublis = forgottensOpen.filter(f => daysSince(f.day || f.createdAt) >= 3).length;

      return (
        <div className="stack">
          <div className="filter-row" style={{marginBottom:0}}>
            <div className={`chip ${subTab==='non_recup'?'selected':''}`} onClick={()=>setSubTab('non_recup')}>
              📞 Non récupérés
            </div>
            <div className={`chip ${subTab==='oublis'?'selected':''}`} onClick={()=>setSubTab('oublis')}>
              📦 Oublis casier
              {alertOublis > 0 && <span className="badge badge-anom" style={{marginLeft:6,padding:'1px 6px',fontSize:10}}>{alertOublis}!</span>}
            </div>
          </div>
          {subTab === 'non_recup'
            ? <NonRecupSubPage session={session} currentSite={currentSite} consumersByEmail={consumersByEmail} />
            : <OublisSubPage session={session} currentSite={currentSite} forgottens={forgottens} consumersByEmail={consumersByEmail} />}
        </div>
      );
    }

    // ----- Sous-page Non-récup (ancien contenu de FollowUpPage) -----
    function NonRecupSubPage({ session, currentSite, consumersByEmail }) {
      const showToast = React.useContext(ToastContext);
      const [followUps, setFollowUps] = React.useState([]);
      const [filter, setFilter] = React.useState('pending');

      React.useEffect(() => {
        const unsub = storage.subscribe('followups', setFollowUps);
        return unsub;
      }, []);

      const visible = followUps.filter(f => {
        if (f.site !== currentSite) return false;
        if (filter === 'pending') return !['resolved'].includes(f.status);
        if (filter === 'resolved') return ['resolved'].includes(f.status);
        return true;
      });

      const setStatus = async (f, newStatus) => {
        const docId = f.id || f.orderId;
        if (!docId) { showToast('Impossible : identifiant manquant'); return; }
        await storage.setDoc('followups', docId, {
          ...f, status: newStatus,
          updatedBy: session.name, updatedAt: new Date().toISOString(),
        });
        showToast(`Statut: ${newStatus}`);
      };

      const removeFromFollowUp = async (f) => {
        if (!confirm(`Retirer ${f.consumer_name} du suivi ?`)) return;
        await storage.deleteDoc('followups', f.id || f.orderId);
        showToast('Retiré');
      };

      // Envoie un mail au client via le proxy Freshdesk (ticket + email sortant)
      const sendEmail = async (f) => {
        if (!f.email) { showToast('Pas d\'email pour ce client'); return; }
        if (!FRESHDESK_PROXY_URL || FRESHDESK_PROXY_URL.includes('TON_')) { showToast('Proxy Freshdesk non configuré'); return; }
        if (!confirm(`Envoyer un mail à ${f.consumer_name || f.email} ?`)) return;
        const docId = f.id || f.orderId;
        try {
          const payload = {
            secret: FRESHDESK_SECRET,
            clients: [{
              email: f.email,
              name: f.consumer_name || f.clientName || '',
              subject: 'Votre commande Kelbongoo à récupérer',
              body: `Bonjour ${f.consumer_name || ''},\n\nVotre commande Kelbongoo n'a pas pu être récupérée sur le point ${f.site}. Vous pouvez venir la chercher dès la prochaine distribution.\n\nÀ bientôt,\nL'équipe Kelbongoo`,
              tag: 'non-recupere',
            }],
          };
          const data = await freshdeskPost(payload);
          if (data.ok && data.success) {
            // Note dans le suivi : mail envoyé auto
            await storage.setDoc('followups', docId, { ...f, status:'emailed', emailSentAt: new Date().toISOString(), emailSentBy: session.name });
            showToast('✓ Mail envoyé');
          } else {
            showToast('Échec envoi : ' + (data.error || 'inconnu'));
          }
        } catch (e) { showToast('Erreur réseau : ' + e.message); }
      };

      // Escalade : le distributeur n'arrive pas à joindre → demander à Henry (va dans le récap master)
      const askHenry = async (f) => {
        const docId = f.id || f.orderId;
        await storage.setDoc('followups', docId, {
          ...f, escalated: true, escalatedBy: session.name, escalatedAt: new Date().toISOString(),
        });
        showToast('✓ Transmis à Henry');
      };

      const enriched = visible.map(f => {
        if (f.phone || f.email) return f;
        const cached = consumersByEmail && consumersByEmail[f.email];
        return {
          ...f,
          phone: cached?.telephone || '',
          hasPhone: !!(cached?.telephone && cached.telephone.length >= 9),
        };
      });

      // Grouper par date
      const byDate = {};
      for (const f of enriched) {
        const date = f.distribDate || f.day || todayKey();
        if (!byDate[date]) byDate[date] = [];
        byDate[date].push(f);
      }
      const sortedDates = Object.keys(byDate).sort((a, b) => b.localeCompare(a));
      const totalPending = enriched.length;
      const alertCount = enriched.filter(f => daysSince(f.distribDate || f.day) >= ALERT_DAYS_NON_RECUP).length;

      return (
        <div className="stack">
          <h1>Non-récupérés · {currentSite}</h1>
          <p style={{color:'var(--ink-soft)',fontSize:13,marginTop:-8}}>
            Distrib : appellent les clients avec téléphone. Master : email aux autres.
          </p>

          {alertCount > 0 && (
            <div className="alert-red">
              🔴 {alertCount} client{alertCount > 1 ? 's' : ''} non récupéré{alertCount > 1 ? 's' : ''} depuis +{ALERT_DAYS_NON_RECUP}j — retour PDP entrepôt
            </div>
          )}

          <div className="stat-grid">
            <div className="stat"><div className="stat-value">{totalPending}</div><div className="stat-label">À traiter</div></div>
            <div className="stat"><div className="stat-value">{sortedDates.length}</div><div className="stat-label">Distrib</div></div>
            <div className="stat"><div className="stat-value" style={{color:'var(--danger)'}}>{alertCount}</div><div className="stat-label">Alerte 7j+</div></div>
          </div>

          <div className="filter-row">
            <div className={`chip ${filter==='pending'?'selected':''}`} onClick={()=>setFilter('pending')}>À traiter</div>
            <div className={`chip ${filter==='resolved'?'selected':''}`} onClick={()=>setFilter('resolved')}>Résolus</div>
            <div className={`chip ${filter==='all'?'selected':''}`} onClick={()=>setFilter('all')}>Tous</div>
          </div>

          {sortedDates.length === 0 ? (
            <div className="empty-state"><div className="icon">✓</div><p>Aucun client.</p></div>
          ) : (
            sortedDates.map(date => {
              const items = byDate[date];
              const days = daysSince(date);
              const isAlert = days >= ALERT_DAYS_NON_RECUP;
              return (
                <details key={date} className={`distrib-section ${isAlert ? 'has-alert' : ''}`} open={isAlert || date === todayKey()}>
                  <summary>
                    <span>
                      {isAlert && '🔴 '}Distrib du {formatDateShort(date)}
                      <span style={{fontWeight:'normal',marginLeft:6,fontSize:12,opacity:0.8}}>
                        ({items.length} client{items.length > 1 ? 's' : ''}, il y a {days}j)
                      </span>
                    </span>
                    <span style={{fontSize:11}}>▼</span>
                  </summary>
                  <div>
                    {isAlert && <div className="retour-pdp">⚠️ Retour PDP entrepôt à organiser</div>}
                    {items.sort((a,b) => (a.consumer_name||'').localeCompare(b.consumer_name||'')).map(f => (
                      <div key={f.orderId} className="list-item" style={{flexDirection:'column',alignItems:'stretch'}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
                          <div className="list-item-main">
                            <div className="list-item-name">{f.consumer_name}</div>
                            <div className="list-item-sub">
                              {f.hasPhone
                                ? <a href={`tel:${f.phone}`} style={{color:'var(--accent-dark)',fontWeight:600}}>📞 {f.phone}</a>
                                : <span style={{color:'var(--warn)'}}>✉️ Email</span>}
                              {session.isMaster && f.email && <span style={{color:'var(--ink-mute)'}}>· {f.email}</span>}
                            </div>
                          </div>
                          {f.status && f.status !== 'pending' && <span className="badge badge-info">{f.status}</span>}
                        </div>
                        <div style={{display:'flex',gap:6,marginTop:8,flexWrap:'wrap'}}>
                          {f.hasPhone ? (
                            <>
                              <button className="btn-secondary" style={{padding:'6px 10px',fontSize:12}} onClick={() => setStatus(f, 'called')}>Contacté</button>
                              <button className="btn-secondary" style={{padding:'6px 10px',fontSize:12}} onClick={() => setStatus(f, 'no_answer')}>No answer</button>
                              <button className="btn-secondary" style={{padding:'6px 10px',fontSize:12}} onClick={() => setStatus(f, 'relance')}>Relancé</button>
                              {!f.escalated && (
                                <button className="btn-secondary" style={{padding:'6px 10px',fontSize:12,color:'var(--warn)'}} onClick={() => askHenry(f)}>🙋 Demander à Henry</button>
                              )}
                            </>
                          ) : (
                            f.email
                              ? <button className="btn-secondary" style={{padding:'6px 10px',fontSize:12}} onClick={() => sendEmail(f)}>✉️ Envoyer le mail</button>
                              : <span style={{fontSize:12,color:'var(--ink-mute)'}}>Pas de contact</span>
                          )}
                          <button className="btn-primary" style={{padding:'6px 10px',fontSize:12}} onClick={() => setStatus(f, 'resolved')}>✓ Résolu</button>
                          {session.isMaster && (
                            <button className="btn-ghost" style={{padding:'6px 10px',fontSize:12}} onClick={() => removeFromFollowUp(f)}>🗑️</button>
                          )}
                        </div>
                        {f.emailSentAt && <div style={{fontSize:11,color:'var(--accent-dark)',marginTop:4}}>✉️ Mail envoyé le {formatDateShort(f.emailSentAt.slice(0,10))}</div>}
                        {f.escalated && <div style={{fontSize:11,color:'var(--warn)',marginTop:4}}>🙋 Transmis à Henry</div>}
                      </div>
                    ))}
                  </div>
                </details>
              );
            })
          )}

          {session.isMaster && (() => {
            const emailOnly = enriched.filter(f => !f.hasPhone && f.email && f.status !== 'resolved');
            if (emailOnly.length === 0) return null;
            return (
              <div className="card" style={{display:'flex',flexDirection:'column',gap:8}}>
                <div style={{fontSize:13,fontWeight:600}}>Relancer les {emailOnly.length} client(s) à contacter par email</div>
                <FreshdeskRelanceButton clients={emailOnly} onDone={() => {}} />
                <button className="btn-secondary" onClick={() => {
                  const emails = emailOnly.map(f => f.email).join(',');
                  window.location.href = `mailto:?bcc=${emails}&subject=Votre panier Kelbongoo non récupéré&body=Bonjour,%0A%0AVotre panier n'a pas été récupéré. Merci de nous recontacter.%0A%0AKelbongoo`;
                }}>
                  ✉️ Ou ouvrir mon client mail (sans Freshdesk)
                </button>
              </div>
            );
          })()}
        </div>
      );
    }

    // Bouton qui envoie les relances via le proxy Freshdesk (crée 1 ticket + mail par client)
    function FreshdeskRelanceButton({ clients, onDone }) {
      const showToast = React.useContext(ToastContext);
      const [busy, setBusy] = React.useState(false);
      const [result, setResult] = React.useState(null);

      const handleSend = async () => {
        if (!FRESHDESK_PROXY_URL || FRESHDESK_PROXY_URL.includes('TON_')) {
          showToast('Proxy Freshdesk non configuré');
          return;
        }
        if (!confirm(`Créer ${clients.length} ticket(s) Freshdesk et envoyer les emails de relance ?`)) return;
        setBusy(true);
        setResult(null);
        try {
          const payload = {
            secret: FRESHDESK_SECRET,
            clients: clients.map(c => ({
              email: c.email,
              name: c.consumer_name || c.clientName || '',
              subject: 'Votre commande Kelbongoo à récupérer',
              body: `Bonjour ${c.consumer_name || ''},\n\nVotre commande Kelbongoo n'a pas encore été récupérée sur le point ${c.site}. Merci de nous indiquer quand vous pourrez venir la chercher, ou de nous recontacter.\n\nÀ bientôt,\nL'équipe Kelbongoo`,
            })),
          };
          // Apps Script Web App nécessite un POST sans en-tête custom (sinon préflight CORS)
          const data = await freshdeskPost(payload);
          if (data.ok) {
            setResult(data);
            showToast(`✓ ${data.success} ticket(s) créé(s)${data.failed ? `, ${data.failed} échec(s)` : ''}`);
            onDone && onDone();
          } else {
            showToast('Erreur : ' + (data.error || 'inconnue'));
          }
        } catch (err) {
          showToast('Erreur réseau : ' + err.message);
        } finally { setBusy(false); }
      };

      return (
        <>
          <button className="btn-primary btn-lg" disabled={busy} onClick={handleSend}>
            {busy ? 'Envoi en cours…' : `🎫 Créer ${clients.length} ticket(s) Freshdesk + envoyer`}
          </button>
          {result && (
            <div style={{fontSize:12,color:'var(--ink-soft)',marginTop:4}}>
              {result.success} envoyé(s){result.failed ? `, ${result.failed} échec(s)` : ''}.
            </div>
          )}
        </>
      );
    }

    // ----- Sous-page Oublis casier -----
    function OublisSubPage({ session, currentSite, forgottens, consumersByEmail }) {
      const showToast = React.useContext(ToastContext);
      const [filter, setFilter] = React.useState('pending');

      // Enrichir avec le contact client (depuis le cache consumers si pas déjà présent)
      const enrich = (f) => {
        const cached = consumersByEmail && f.clientEmail ? consumersByEmail[f.clientEmail] : null;
        return {
          ...f,
          phone: f.clientPhone || cached?.telephone || '',
          email: f.clientEmail || '',
        };
      };

      // "traité" = sorti de la vue active, archivé dans l'historique
      const isActive = (f) => f.status !== 'done';
      const visible = forgottens.filter(f => {
        if (f.site !== currentSite) return false;
        if (filter === 'pending') return isActive(f);
        if (filter === 'history') return f.status === 'done';
        return true;
      }).map(enrich);

      const setStatus = async (f, patch) => {
        await storage.setDoc('forgotten_items', f.id, {
          ...f, ...patch,
          updatedBy: session.name, updatedAt: new Date().toISOString(),
        });
      };

      const markDone = async (f) => {
        await setStatus(f, { status: 'done' });
        showToast('✓ Traité — déplacé dans l\'historique');
      };

      const toggleAvoir = async (f) => {
        await setStatus(f, { avoirApplied: !f.avoirApplied });
        showToast(f.avoirApplied ? 'Avoir retiré' : '✓ Avoir marqué appliqué');
      };

      const removeForgotten = async (f) => {
        if (!confirm(`Supprimer définitivement cet oubli ?`)) return;
        await storage.deleteDoc('forgotten_items', f.id);
        showToast('Supprimé');
      };

      // Grouper par date
      const byDate = {};
      for (const f of visible) {
        const d = f.day || (f.createdAt ? f.createdAt.slice(0,10) : todayKey());
        if (!byDate[d]) byDate[d] = [];
        byDate[d].push(f);
      }
      const sortedDates = Object.keys(byDate).sort((a, b) => b.localeCompare(a));
      const allActive = forgottens.filter(f => f.site === currentSite && isActive(f)).map(enrich);
      const totalPending = allActive.length;
      const alertCount = allActive.filter(f => daysSince(f.day || f.createdAt) >= 3).length;

      return (
        <div className="stack">
          <h1>Oublis casier · {currentSite}</h1>
          <p style={{color:'var(--ink-soft)',fontSize:13,marginTop:-8}}>
            Articles oubliés par les clients dans leurs casiers. Au bout de 3j sans nouvelles → renvoyer à l'entrepôt.
          </p>

          {filter === 'pending' && alertCount > 0 && (
            <div className="alert-red">
              🔴 {alertCount} article{alertCount > 1 ? 's' : ''} oublié{alertCount > 1 ? 's' : ''} depuis +3j — à renvoyer entrepôt
            </div>
          )}

          <div className="stat-grid">
            <div className="stat"><div className="stat-value">{totalPending}</div><div className="stat-label">En cours</div></div>
            <div className="stat"><div className="stat-value" style={{color:'var(--danger)'}}>{alertCount}</div><div className="stat-label">Alerte 3j+</div></div>
          </div>

          <div className="filter-row">
            <div className={`chip ${filter==='pending'?'selected':''}`} onClick={()=>setFilter('pending')}>En cours</div>
            <div className={`chip ${filter==='history'?'selected':''}`} onClick={()=>setFilter('history')}>Historique</div>
            <div className={`chip ${filter==='all'?'selected':''}`} onClick={()=>setFilter('all')}>Tous</div>
          </div>

          {sortedDates.length === 0 ? (
            <div className="empty-state"><div className="icon">📦</div><p>{filter === 'history' ? 'Aucun oubli traité.' : 'Aucun oubli en cours.'}</p></div>
          ) : (
            sortedDates.map(date => {
              const items = byDate[date];
              const days = daysSince(date);
              const isAlert = days >= 3 && filter === 'pending';
              return (
                <details key={date} className={`distrib-section ${isAlert ? 'has-alert' : ''}`} open={isAlert || date === todayKey()}>
                  <summary>
                    <span>
                      {isAlert && '🔴 '}Oublis du {formatDateShort(date)}
                      <span style={{fontWeight:'normal',marginLeft:6,fontSize:12,opacity:0.8}}>
                        ({items.length} article{items.length > 1 ? 's' : ''}, il y a {days}j)
                      </span>
                    </span>
                    <span style={{fontSize:11}}>▼</span>
                  </summary>
                  <div>
                    {isAlert && <div className="retour-pdp">⚠️ À renvoyer à l'entrepôt</div>}
                    {items.sort((a,b) => (a.clientName||'').localeCompare(b.clientName||'')).map(f => (
                      <div key={f.id} className="list-item" style={{flexDirection:'column',alignItems:'stretch'}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
                          <div className="list-item-main">
                            <div className="list-item-name">
                              {f.clientName || '(client inconnu)'}
                              {f.avoirApplied && <span className="badge badge-info" style={{marginLeft:6,fontSize:10}}>💰 avoir</span>}
                            </div>
                            <div className="list-item-sub">📦 {f.productLabel || '(produit non spécifié)'}</div>
                            {/* Contact client */}
                            <div className="list-item-sub" style={{marginTop:4}}>
                              {f.phone ? <a href={`tel:${f.phone}`} style={{color:'var(--accent-dark)',fontWeight:600}}>📞 {f.phone}</a> : <span style={{color:'var(--ink-mute)'}}>📞 —</span>}
                              {f.email && <span style={{marginLeft:8}}>✉️ {f.email}</span>}
                            </div>
                            {f.remark && <div style={{fontSize:12,fontStyle:'italic',color:'var(--ink-soft)',marginTop:4}}>« {f.remark} »</div>}
                          </div>
                          {f.status === 'done' && <span className="badge badge-info">✓ Traité</span>}
                        </div>

                        {/* Actions master */}
                        {session.isMaster && f.status !== 'done' && (
                          <div style={{display:'flex',gap:6,marginTop:8,flexWrap:'wrap'}}>
                            <button className={f.avoirApplied ? 'btn-primary' : 'btn-secondary'} style={{padding:'6px 10px',fontSize:12}} onClick={() => toggleAvoir(f)}>
                              {f.avoirApplied ? '💰 Avoir appliqué ✓' : '💰 Marquer avoir'}
                            </button>
                            {f.email && (
                              <FreshdeskOubliButton client={f} />
                            )}
                            <button className="btn-primary" style={{padding:'6px 10px',fontSize:12}} onClick={() => markDone(f)}>✓ Traité</button>
                            <button className="btn-ghost" style={{padding:'6px 10px',fontSize:12}} onClick={() => removeForgotten(f)}>🗑️</button>
                          </div>
                        )}

                        {/* Actions distrib (limité) */}
                        {!session.isMaster && f.status !== 'done' && (
                          <div style={{display:'flex',gap:6,marginTop:8,flexWrap:'wrap'}}>
                            <span style={{fontSize:12,color:'var(--ink-soft)'}}>En attente de traitement par le master.</span>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                </details>
              );
            })
          )}
        </div>
      );
    }

    // Bouton Freshdesk pour relancer un client sur un oubli casier
    function FreshdeskOubliButton({ client }) {
      const showToast = React.useContext(ToastContext);
      const [busy, setBusy] = React.useState(false);
      const [sent, setSent] = React.useState(false);

      const handleSend = async () => {

          showToast('Proxy Freshdesk non configuré');

    // ============================================================
    // Charge un script externe à la volée (une seule fois), renvoie une promesse.
    function loadScript(src) {
      return new Promise((resolve, reject) => {
        if (document.querySelector(`script[data-dyn="${src}"]`)) { resolve(); return; }
        const s = document.createElement('script');
        s.src = src; s.async = true; s.setAttribute('data-dyn', src);
        s.onload = () => resolve();
        s.onerror = () => reject(new Error('Échec du chargement : ' + src));
        document.head.appendChild(s);
      });
    }

    const ZXING_SRC = 'https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js';

    // ============================================================
    // LECTEUR CAMÉRA (code-barres) — caméra du smartphone/tablette
    // Natif BarcodeDetector si dispo, sinon ZXing chargé à la volée.
    // ============================================================
    function BarcodeScanner({ onDetected }) {
      const videoRef = React.useRef(null);
      const streamRef = React.useRef(null);
      const detectorRef = React.useRef(null);
      const zxingRef = React.useRef(null);
      const timerRef = React.useRef(null);
      const lastRef = React.useRef({ code: '', t: 0 });
      const [status, setStatus] = React.useState('init'); // init | running | denied | error
      const [errMsg, setErrMsg] = React.useState('');
      const [torchable, setTorchable] = React.useState(false);
      const [torchOn, setTorchOn] = React.useState(false);

      const FORMATS = ['ean_13','ean_8','upc_a','upc_e','code_128','code_39'];

      const beep = () => {
        try {
          const C = window.AudioContext || window.webkitAudioContext; if (!C) return;
          const ctx = beep._ctx || (beep._ctx = new C());
          if (ctx.state === 'suspended') ctx.resume();
          const o = ctx.createOscillator(), g = ctx.createGain();
          o.frequency.value = 880; o.connect(g); g.connect(ctx.destination);
          g.gain.setValueAtTime(0.12, ctx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.12);
          o.start(); o.stop(ctx.currentTime + 0.13);
        } catch(e) {}
      };

      const emit = (raw) => {
        const code = String(raw || '').trim();
        if (!code) return;
        const now = Date.now();
        if (code === lastRef.current.code && now - lastRef.current.t < 1500) return; // anti-rebond
        lastRef.current = { code, t: now };
        try { navigator.vibrate && navigator.vibrate(60); } catch(e){}
        beep();
        onDetected(code);
      };

      React.useEffect(() => {
        let cancelled = false;
        (async () => {
          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              video: { facingMode: { ideal: 'environment' } }, audio: false
            });
            if (cancelled) { stream.getTracks().forEach(t => t.stop()); return; }
            streamRef.current = stream;
            const v = videoRef.current;
            v.srcObject = stream; v.setAttribute('playsinline', 'true'); v.muted = true;
            await v.play().catch(()=>{});

            const track = stream.getVideoTracks()[0];
            const caps = (track && track.getCapabilities) ? track.getCapabilities() : {};
            if (caps && caps.torch) setTorchable(true);

            let supported = [];
            if ('BarcodeDetector' in window) {
              try { supported = await window.BarcodeDetector.getSupportedFormats(); } catch(e){}
            }
            const useNative = supported.length && FORMATS.some(f => supported.includes(f));

            if (useNative) {
              detectorRef.current = new window.BarcodeDetector({ formats: FORMATS.filter(f => supported.includes(f)) });
              setStatus('running');
              const tick = async () => {
                if (cancelled) return;
                try {
                  const codes = await detectorRef.current.detect(v);
                  if (codes && codes.length) emit(codes[0].rawValue);
                } catch(e){}
                timerRef.current = setTimeout(tick, 160);
              };
              tick();
            } else {
              await loadScript(ZXING_SRC);
              if (cancelled) return;
              const ZX = window.ZXing;
              if (!ZX || !ZX.BrowserMultiFormatReader) throw new Error('Lecteur indisponible');
              const reader = new ZX.BrowserMultiFormatReader();
              zxingRef.current = reader;
              setStatus('running');
              const cb = (result) => { if (!cancelled && result) emit(result.getText ? result.getText() : result.text); };
              if (typeof reader.decodeFromStream === 'function') {
                await reader.decodeFromStream(stream, v, cb);
              } else if (typeof reader.decodeFromVideoElement === 'function') {
                await reader.decodeFromVideoElement(v, cb);
              } else {
                await reader.decodeFromVideoDevice(null, v, cb);
              }
            }
          } catch(e) {
            if (cancelled) return;
            if (e && (e.name === 'NotAllowedError' || e.name === 'SecurityError')) setStatus('denied');
            else { setStatus('error'); setErrMsg(e.message || String(e)); }
          }
        })();

        return () => {
          cancelled = true;
          if (timerRef.current) clearTimeout(timerRef.current);
          try { zxingRef.current && zxingRef.current.reset(); } catch(e){}
          try { const s = streamRef.current; if (s) s.getTracks().forEach(t => t.stop()); } catch(e){}
        };
      }, []);

      const toggleTorch = async () => {
        try {
          const track = streamRef.current && streamRef.current.getVideoTracks()[0];
          if (!track) return;
          await track.applyConstraints({ advanced: [{ torch: !torchOn }] });
          setTorchOn(t => !t);
        } catch(e){}
      };

      return (
        <div>
          <div style={{position:'relative',width:'100%',maxWidth:420,margin:'0 auto',borderRadius:10,overflow:'hidden',background:'#000',aspectRatio:'4 / 3'}}>
            <video ref={videoRef} muted playsInline style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}} />
            <div style={{position:'absolute',inset:0,pointerEvents:'none',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <div style={{width:'74%',height:'32%',border:'2px solid rgba(255,255,255,0.92)',borderRadius:10}} />
            </div>
            {torchable && (
              <button onClick={toggleTorch} style={{position:'absolute',top:8,right:8,padding:'6px 10px',borderRadius:8,border:'none',background:'rgba(0,0,0,0.55)',color:'#fff',fontSize:13}}>
                {torchOn ? '🔦 Éteindre' : '🔦 Lampe'}
              </button>
            )}
          </div>
          <div style={{fontSize:12,textAlign:'center',marginTop:6,color:'var(--ink-soft)'}}>
            {status==='init' && 'Démarrage de la caméra…'}
            {status==='running' && 'Vise un code-barre — détection automatique.'}
            {status==='denied' && '⚠️ Accès caméra refusé. Autorise la caméra dans le navigateur. (La caméra exige la version en ligne HTTPS, pas un fichier local.)'}
            {status==='error' && ('⚠️ ' + errMsg)}
          </div>
        </div>
      );
    }

    // Saisie de quantité : garde un état chaîne (autorise le champ vide pendant la frappe),
    // ne se fait pas écraser par une MAJ externe tant que le champ a le focus.
    function QtyInput({ value, onCommit, style }) {
      const [str, setStr] = React.useState(value ? String(value) : '');
      const focused = React.useRef(false);
      React.useEffect(() => { if (!focused.current) setStr(value ? String(value) : ''); }, [value]);
      const handle = (raw) => {
        const s = String(raw).replace(/[^\d]/g, '');
        setStr(s);
        onCommit(s === '' ? 0 : parseInt(s, 10));
      };
      return (
        <input type="number" inputMode="numeric" min="0" value={str} placeholder="0"
          onFocus={e=>{ focused.current = true; e.target.select(); }}
          onBlur={()=>{ focused.current = false; }}
          onChange={e=>handle(e.target.value)}
          style={style} />
      );
    }

    //   - Colis en stock (cagettes)
    //   - Stock Mu (sachets préparés)
    // ============================================================
    const FL_SHEET_ID = '1euOgP9n0j_F0XH_kOfb_jFLWkcYy7-Cg6WcTrihPLRI';
    const FL_SHEET_TAB = 'S10';

    // Parseur CSV minimal robuste (gère les champs entre guillemets contenant des virgules)
    function parseCSV(text) {
      const rows = []; let row = []; let cur = ''; let inQ = false;
      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        if (inQ) {
          if (c === '"') { if (text[i+1] === '"') { cur += '"'; i++; } else inQ = false; }
          else cur += c;
        } else {
          if (c === '"') inQ = true;
          else if (c === ',') { row.push(cur); cur = ''; }
          else if (c === '\n') { row.push(cur); rows.push(row); row = []; cur = ''; }
          else if (c === '\r') { /* ignore */ }
          else cur += c;
        }
      }
      if (cur !== '' || row.length) { row.push(cur); rows.push(row); }
      return rows;
    }

    function FLInventoryPage({ session, invDate }) {
      const showToast = React.useContext(ToastContext);
      const [items, setItems] = React.useState(null);   // [{key, producer, produit, uv}]
      const [counts, setCounts] = React.useState({});    // key -> {colis, mu}
      const [loading, setLoading] = React.useState(true);
      const [err, setErr] = React.useState('');
      const [search, setSearch] = React.useState('');
      const [validating, setValidating] = React.useState(false);
      const [lastValidated, setLastValidated] = React.useState(null);

      // Charge la liste FL depuis l'onglet S10 (CSV gviz, sans OAuth si Sheet public)
      React.useEffect(() => {
        let cancelled = false;
        (async () => {
          setLoading(true); setErr('');
          try {
            // Lecture via le proxy Apps Script (pas de CORS, fonctionne même si le Sheet est privé)
            const data = await freshdeskPost({ secret: FRESHDESK_SECRET, action: 'fl_read' });
            if (cancelled) return;
            if (!data.ok) throw new Error(data.error || 'réponse proxy invalide');
            const rows = data.rows || [];
            if (!rows.length) throw new Error('Feuille vide');
            // En-tête : repérer les colonnes par nom
            const header = rows[0].map(h => String(h || '').trim().toLowerCase());
            const idxProd = header.findIndex(h => h === 'producteur');
            const idxName = header.findIndex(h => h === 'produit');
            const idxCol  = header.findIndex(h => h === 'col');
            const idxUv   = header.findIndex(h => h === 'uv');
            const list = [];
            for (let r = 1; r < rows.length; r++) {
              const row = rows[r];
              const producer = String(row[idxProd] || '').trim();
              const produit = String(row[idxName] || '').trim();
              const colRaw = String(idxCol >= 0 ? row[idxCol] : '').replace(',', '.').trim();
              const col = parseFloat(colRaw);
              // Ligne FL = a un producteur, un produit, et un COL numérique > 0
              if (!producer || !produit) continue;
              if (!isFinite(col) || col <= 0) continue;
              const uv = String(idxUv >= 0 ? (row[idxUv] || '') : '').trim();
              list.push({ key: `${producer}__${produit}`, producer, produit, uv, col });
            }
            setItems(list);
          } catch (e) {
            if (!cancelled) setErr(e.message || String(e));
          } finally {
            if (!cancelled) setLoading(false);
          }
        })();
        return () => { cancelled = true; };
      }, []);

      // Comptages de la date (collection séparée fl_inventory_<date>)

        setCounts({});

      const exportCSV = () => {
        if (!items) return;
        const lines = [['Producteur','Produit','UV','Colis en stock','Stock Mu']];
        for (const it of items) {
          const c = counts[it.key] || {};
          lines.push([it.producer, it.produit, it.uv, c.colis ?? '', c.mu ?? '']);
        }
        const csv = lines.map(r => r.map(v => {
