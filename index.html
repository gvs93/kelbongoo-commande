          </button>
        </div>
      );
    }

    // ── Tâches « placer un produit sensible dans un panier » (lien JSON) ──
    // Affiché en bannière : tab DLC (tous sites) ou page Clients distrib (son site).
    // Validation Fait / Pas fait (+ raison). « Fait » décrémente le stock sensible.
    function DlcPushTasks({ session, orders, dayKey, siteFilter }) {
      const showToast = React.useContext(ToastContext);
      const [watch, setWatch] = React.useState([]);
      const [statuses, setStatuses] = React.useState({});
      const day = dayKey || activeDay();

      React.useEffect(() => {
        const u = storage.subscribe('dlc_watch', setWatch);
        return () => { u && u(); };
      }, []);
      React.useEffect(() => {
        const u = storage.subscribe(`dlc_tasks_${day}`, (arr) => {
          const m = {}; for (const e of arr) m[e.id] = e; setStatuses(m);
        });
        return () => { u && u(); };
      }, [day]);

      const allTasks = React.useMemo(() => computeDlcTasks(orders, watch, day), [orders, watch, day]);
      const tasks = siteFilter ? allTasks.filter(t => t.site === siteFilter) : allTasks;
      const pending = tasks.filter(t => !statuses[t.id] || statuses[t.id].status === 'pending');

      if (tasks.length === 0) return null;

      const markFait = async (t) => {
        await storage.setDoc(`dlc_tasks_${day}`, t.id, {
          id: t.id, status: 'fait', produit: t.produit, site: t.site, client: t.client,
          qty: t.qty, by: session.name, at: new Date().toISOString(),
        });
        // Décrémente le stock sensible restant.
        if (t.dlcItemId) {
          const w = watch.find(x => x.id === t.dlcItemId);
          if (w) {
            const nq = Math.max(0, (parseFloat(w.qty) || 0) - (parseFloat(t.qty) || 0));
            await storage.setDoc('dlc_watch', t.dlcItemId, { qty: nq, lastCheckAt: new Date().toISOString(), lastCheckBy: session.name });
          }
        }
        showToast(`✓ ${t.produit} placé pour ${t.client}`);
      };
      const markPasFait = async (t) => {
        const reason = (typeof prompt === 'function') ? prompt(`Pas fait — raison ? (${t.produit} / ${t.client})`, '') : '';
        if (reason === null) return;
        await storage.setDoc(`dlc_tasks_${day}`, t.id, {
          id: t.id, status: 'pasfait', reason: reason || '', produit: t.produit, site: t.site,
          client: t.client, qty: t.qty, by: session.name, at: new Date().toISOString(),
        });
        showToast(`Noté « pas fait » — ${t.produit}`);
      };

      // groupé par site (sauf si filtré sur un seul)
      const bySite = {};
      for (const t of tasks) { (bySite[t.site] = bySite[t.site] || []).push(t); }
      const sites = Object.keys(bySite).sort();

      return (
        <div className="card" style={{borderLeft:'4px solid var(--warn)', marginBottom:10}}>
          <div style={{fontWeight:700, fontSize:14, marginBottom:6}}>
            🛒 Produits sensibles à placer dans les paniers du jour
            {pending.length > 0 && <span className="badge" style={{marginLeft:6,background:'var(--warn-soft)',color:'var(--warn)'}}>{pending.length} à faire</span>}
          </div>
          <div style={{fontSize:11,color:'var(--ink-mute)',marginBottom:8}}>Ces clients ont commandé un produit en DLC courte : utilise le stock court en priorité.</div>
          {sites.map(site => (
            <div key={site} style={{marginBottom:8}}>
              {!siteFilter && <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>{siteLabel(site)} <span style={{color:'var(--ink-mute)',fontWeight:400}}>({bySite[site].length})</span></div>}
              {bySite[site].map(t => {
                const st = statuses[t.id];
                const done = st && st.status === 'fait';
                const ko = st && st.status === 'pasfait';
                return (
                  <div key={t.id} style={{padding:'8px',borderTop:'1px solid var(--border)',opacity:done?0.55:1}}>
                    <div style={{fontSize:13}}>
                      <strong>{t.produit}</strong> × {t.qty} → <strong>{t.client}</strong>
                      {t.casiers && t.casiers.length > 0 && <span style={{color:'var(--ink-mute)'}}> · casier {t.cat==='frais'?'frais':'sec'} {t.casiers.join(', ')}</span>}
                      <span style={{color:'var(--ink-mute)'}}> · DLC {formatDateShort(t.dlc)}</span>
                    </div>
                    {done ? <div style={{fontSize:12,color:'var(--ok,#2e7d32)'}}>✓ Fait par {st.by}</div>
                     : ko ? <div style={{fontSize:12,color:'var(--danger)'}}>✗ Pas fait{st.reason?` — ${st.reason}`:''} ({st.by}) <button className="btn-ghost" style={{fontSize:11}} onClick={()=>markFait(t)}>↩ Marquer fait</button></div>
                     : (
                       <div style={{display:'flex',gap:8,marginTop:6}}>
                         <button className="btn-primary" style={{fontSize:12,padding:'5px 12px'}} onClick={()=>markFait(t)}>✓ Fait</button>
                         <button className="btn-secondary" style={{fontSize:12,padding:'5px 12px'}} onClick={()=>markPasFait(t)}>✗ Pas fait</button>
                       </div>
                     )}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      );
    }

    function DlcWatchPage({ session, products, orders, catalogue }) {
      const showToast = React.useContext(ToastContext);
      const [items, setItems] = React.useState([]);
      const [loaded, setLoaded] = React.useState(false);
      const [showForm, setShowForm] = React.useState(false);
      const [busy, setBusy] = React.useState(false);
      const [showWatch, setShowWatch] = React.useState(true);

      React.useEffect(() => {
        const unsub = storage.subscribe('dlc_watch', (arr) => { setItems(arr); setLoaded(true); });
        return () => { if (unsub) unsub(); };
      }, []);

      const today = todayKey();
      const active = items.filter(i => (!i.status || i.status === 'watch') && i.dlc);
      const resolved = items.filter(i => i.status && i.status !== 'watch');

      // Pour chaque produit, on calcule la DERNIÈRE navette ROB utile avant la DLC.
      //  • dépassée OU plus aucune navette avant la DLC → cagette PARTAGE (perte sèche)
      //  • dernière navette utile = aujourd'hui → à ENVOYER À ROB aujourd'hui (dernière chance)
      //  • navette utile plus tard dans la semaine → à SURVEILLER (rien à faire today)
      const enriched = React.useMemo(() => {
        return active.map(i => {
          const days = dlcDaysLeft(i.dlc, today);
          const lastNav = lastNavetteBeforeDLC(i.dlc, new Date());
          const expired = days !== null && days <= 0;
          let bucket;
          if (expired || !lastNav) bucket = 'partage';
          else if (lastNav.date === today) bucket = 'rob';
          else bucket = 'watch';
          return { ...i, days, lastNav, bucket };
        }).sort((a, b) => (a.days==null?999:a.days) - (b.days==null?999:b.days));
      }, [items]);

      const robToday = enriched.filter(i => i.bucket === 'rob');
      const partage  = enriched.filter(i => i.bucket === 'partage');
      const watch    = enriched.filter(i => i.bucket === 'watch');
      const pdpItems = enriched.filter(i => i.source === 'retour_pdp');

      const priceOf = (i) => {
        const prod = (catalogue || []).find(p => p.produit === i.produit && p.producteur === i.producteur);
        return prod ? (prod.prixAchat || prod.prixHT || 0) : 0;
      };
      const uniteOf = (i) => {
        const prod = (catalogue || []).find(p => p.produit === i.produit && p.producteur === i.producteur);
        return prod ? (prod.unite || '') : '';
      };

      // Écrit la perte (destination 'pribon' = ROB) + marque l'item parti ROB.
      const markSentToRob = async (list) => {
        const dateKey = today;
        for (const i of list) {
          const unitPrice = priceOf(i); const qty = parseFloat(i.qty) || 1;
          await storage.setDoc('losses', `lossrob_${i.id}`, {
            id: `lossrob_${i.id}`,
            productKey: `${i.producteur || ''}|${i.produit || ''}`,
            producteur: i.producteur || '', produit: i.produit || '', unite: uniteOf(i),
            destination: 'pribon', reason: 'non_vendu',
            usingWeight: false, quantity: qty, weight: 0,
            unitPrice, totalValue: unitPrice * qty,
            dlc: i.dlc || '', robSentDate: dateKey,
            remark: `DLC courte → envoi ROB le ${formatDateShort(dateKey)}`,
            day: dateKey, fromDlc: true,
            createdBy: session.name, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(),
          });
          await storage.setDoc('dlc_watch', i.id, { status: 'rob', resolvedAt: new Date().toISOString(), resolvedBy: session.name, robSentDate: dateKey });
        }
      };

      const sendOneToPartage = async (i) => {
        const unitPrice = priceOf(i); const qty = parseFloat(i.qty) || 1;
        const expired = i.days !== null && i.days <= 0;
        await storage.setDoc('losses', `losspart_${i.id}`, {
          id: `losspart_${i.id}`,
          productKey: `${i.producteur || ''}|${i.produit || ''}`,
          producteur: i.producteur || '', produit: i.produit || '', unite: uniteOf(i),
          destination: 'partage', reason: expired ? 'dlc' : 'non_vendu',
          usingWeight: false, quantity: qty, weight: 0,
          unitPrice, totalValue: unitPrice * qty,
          dlc: i.dlc || '',
          remark: `DLC ${expired ? 'dépassée' : 'courte'} → cagette partage équipe`,
          day: today, fromDlc: true,
          createdBy: session.name, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(),
        });
        await storage.setDoc('dlc_watch', i.id, { status: 'perte', resolvedAt: new Date().toISOString(), resolvedBy: session.name });
        showToast(`${i.produit} → cagette partage`);
      };

      // BL ROB (PDF) — « Push KBG du jour »
      const buildRobBL = (list) => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
        doc.setFillColor(110, 74, 156); doc.rect(0, 0, 210, 28, 'F');
        doc.setTextColor(255, 255, 255); doc.setFontSize(17); doc.setFont(undefined, 'bold');
        doc.text('Push KBG du jour — Robespierre', 14, 13);
        doc.setFontSize(10); doc.setFont(undefined, 'normal');
        doc.text(`Envoyé le ${formatDateShort(today)} · ${list.length} produit(s)`, 14, 21);
        doc.setTextColor(0, 0, 0);
        const rows = list.map(i => [ i.produit || '', i.producteur || '', String(i.qty || 1), i.dlc ? formatDateShort(i.dlc) : '—' ]);
        doc.autoTable({
          startY: 36, head: [['Produit', 'Producteur', 'Qté', 'DLC']], body: rows,
          styles: { fontSize: 9, cellPadding: 2 },
          headStyles: { fillColor: [110, 74, 156], textColor: 255 },
          alternateRowStyles: { fillColor: [245, 242, 250] },
        });
        const fy = doc.lastAutoTable.finalY + 8;
        doc.setFontSize(9); doc.setTextColor(100, 100, 100);
        doc.text('À gérer en magasin selon les DLC (FIFO). — App Distribution Kelbongoo', 14, fy);
        return doc;
      };

      const genBlPdf = () => {
        if (!robToday.length) { showToast('Rien à envoyer à ROB aujourd\u2019hui'); return; }
        if (!window.jspdf) { showToast('PDF indisponible, recharge la page'); return; }
        buildRobBL(robToday).save(`Push_KBG_ROB_${today}.pdf`);
      };

      // Envoie le BL à gestion@pribon.org (objet « Push kbg du jour ») + écrit les pertes + marque parti ROB.
      const sendRob = async () => {
        if (!robToday.length) { showToast('Rien à envoyer à ROB aujourd\u2019hui'); return; }
        if (!confirm(`Envoyer ${robToday.length} produit(s) à ROB ?\n\n• BL « Push kbg du jour » envoyé à gestion@pribon.org\n• Comptés en perte (envoi Pribon/ROB) de la semaine\n• Sortis de la surveillance DLC`)) return;
        setBusy(true);
        try {
          const lines = robToday.map(i => `• ${i.produit}${i.qty>1?` ×${i.qty}`:''}${i.producteur?` — ${i.producteur}`:''}${i.dlc?` · DLC ${formatDateShort(i.dlc)}`:''}`).join('\n');
          const subject = 'Push kbg du jour';
          const body = `Bonjour,\n\nPush KBG du ${formatDateShort(today)} pour Robespierre — ${robToday.length} produit(s) à gérer selon les DLC :\n\n${lines}\n\nMerci,\n— App Distribution Kelbongoo`;
          let mailOk = false, mailErr = '';
          try {
            let payload = { secret: FRESHDESK_SECRET, action: 'send_mail', to: 'gestion@pribon.org', subject, body };
            if (window.jspdf) {
              const b64 = buildRobBL(robToday).output('datauristring').split(',')[1];
              payload.attachment = { dataB64: b64, mimeType: 'application/pdf', name: `Push_KBG_ROB_${today}.pdf` };
            }
            const r = await stockPost(payload);
            mailOk = !!(r && r.ok); if (!mailOk) mailErr = (r && r.error) || 'inconnue';
          } catch (e) { mailErr = e.message; }
          // On enregistre la perte + sortie de surveillance même si le mail échoue (le BL reste générable manuellement).
          await markSentToRob(robToday);
          if (mailOk) showToast(`✓ BL envoyé à gestion@pribon.org · ${robToday.length} produit(s) → perte ROB`);
          else showToast(`⚠️ Pertes enregistrées, mais mail KO (${mailErr}). Génère le BL en PDF et envoie-le à la main.`);
        } catch (e) { showToast('Erreur : ' + e.message); }
        finally { setBusy(false); }
      };

      const reopen = async (i) => { await storage.setDoc('dlc_watch', i.id, { status: 'watch', resolvedAt: '', resolvedBy: '' }); };
      const remove = async (i) => { if (confirm('Supprimer cette ligne DLC ?')) await storage.deleteDoc('dlc_watch', i.id); };
      // Croix ❌ : le produit a été vendu / parti à temps en boutique → il sort de la console,
      // SANS perte ni envoi ROB. Évite que la console se sature de fausses « DLC dépassée ».
      const markEcoule = async (i) => {
        if (!confirm(`« ${i.produit} » a été vendu / parti à temps ?\n\nIl sort de la console DLC — aucune perte, aucun envoi ROB.`)) return;
        await storage.setDoc('dlc_watch', i.id, { status: 'ecoule', resolvedAt: new Date().toISOString(), resolvedBy: session.name });
        showToast(`✓ ${i.produit} écoulé — retiré de la console`);
      };

      const navHint = (i) => i.lastNav ? `dernière navette utile : ${i.lastNav.label}` : 'plus de navette avant la DLC';

      // Navette(s) ROB encore à venir aujourd'hui + prochaine navette (date) après aujourd'hui
      const _now = new Date();
      const todayNavs = NAVETTE_ROB.filter(n => {
        if (n.dow !== _now.getDay()) return false;
        const dep = new Date(_now); dep.setHours(n.hour, 0, 0, 0);
        return dep > _now;
      });
      const hasNavToday = todayNavs.length > 0;
      const nextNavDate = (() => {
        for (let i = 1; i <= 12; i++) {
          const d = new Date(_now); d.setHours(0,0,0,0); d.setDate(d.getDate() + i);
          if (NAVETTE_ROB.some(n => n.dow === d.getDay()))
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }
        return null;
      })();

      // Seuils DLC datés (ce que l'équipe doit regarder concrètement) :
      //  • Vigilance = écouler en premier : DLC avant le mardi suivant (samedi + 3j de garantie client).
      //  • Retrait   = sortir de la vente : DLC à J+3 ou moins (ROB selon navette, sinon partage).
      const seuilVigilance = addDays(_saturdayOfWeek(today), 3);
      const seuilRetrait = addDays(today, 3);

      return (
        <div style={{marginTop:10}}>
          <h1>🟠 DLC</h1>

          {/* ====== GRAND BANDEAU INSTRUCTION DU JOUR ====== */}
          <div className="card" style={{borderLeft:'5px solid var(--master)',background:'var(--master-soft)',padding:'14px 16px'}}>
            <div style={{fontSize:13,color:'var(--ink-soft)',textTransform:'capitalize'}}>Nous sommes le {dayLabelShort(today)}</div>
            <div style={{marginTop:8,fontSize:13,lineHeight:1.55,background:'var(--bg-card,#fff)',borderRadius:8,padding:'8px 10px'}}>
              <div style={{fontWeight:700,marginBottom:2}}>📅 Sur quelle date regarder aujourd'hui :</div>
              <div>🔴 <strong>À retirer</strong> (ROB ou partage) : DLC <strong style={{textTransform:'capitalize'}}>avant {dayLabelShort(seuilRetrait)}</strong>.</div>
              <div>🟡 <strong>Vigilance</strong> (écouler en premier) : DLC <strong style={{textTransform:'capitalize'}}>avant {dayLabelShort(seuilVigilance)}</strong>.</div>
              <div style={{fontSize:11,color:'var(--ink-mute)',marginTop:2}}>Garantie client : 3 jours de DLC au dernier retrait (samedi).</div>
            </div>
            {hasNavToday ? (
              <>
                <div style={{fontSize:17,fontWeight:800,margin:'6px 0',lineHeight:1.3}}>
                  🚚 Aujourd'hui, retire de la vente et envoie à ROB tous les produits qui ne tiendront pas jusqu'à la prochaine navette{nextNavDate?<> (<span style={{textTransform:'capitalize'}}>{dayLabelShort(nextNavDate)}</span>)</>:''}.
                </div>
                <div style={{fontSize:13,color:'var(--ink-soft)'}}>
                  Navette ROB du jour : <strong>{todayNavs.map(n=>n.label).join(' / ')}</strong> · <strong>{robToday.length}</strong> produit(s) à envoyer (liste ci-dessous).
                </div>
              </>
            ) : (
              <div style={{fontSize:15,fontWeight:700,margin:'6px 0'}}>
                Pas de navette ROB aujourd'hui. Prochaine navette : <strong style={{textTransform:'capitalize'}}>{nextNavDate?dayLabelShort(nextNavDate):'—'}</strong>.
              </div>
            )}
            {pdpItems.length > 0 && (
              <div style={{marginTop:8,fontSize:13,fontWeight:600,color:'var(--accent-dark,#7a4a00)',background:'var(--accent-soft,#fff4e0)',padding:'6px 10px',borderRadius:8}}>
                ↩️ {pdpItems.length} retour(s) PDP avec DLC à surveiller — listés dans la console ci-dessous.
              </div>
            )}
          </div>

          <p style={{color:'var(--ink-soft)',fontSize:13,marginTop:-4}}>
            Uniquement les produits à <strong>retirer</strong> : envoi ROB sur la prochaine navette, ou cagette partage. Le rayon vendable normal n'apparaît pas ici.
          </p>

          {/* ============ À ENVOYER À ROB AUJOURD'HUI ============ */}
          <div className="card" style={{borderLeft:'4px solid var(--master)',background: robToday.length?'var(--master-soft)':'transparent'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,flexWrap:'wrap'}}>
              <div>
                <div style={{fontWeight:800,fontSize:16}}>🚚 À envoyer à ROB aujourd'hui</div>
                <div style={{fontSize:12,color:'var(--ink-mute)',textTransform:'capitalize'}}>{dayLabelShort(today)} · dernière navette utile avant la DLC</div>
              </div>
              <span className="badge badge-master" style={{fontSize:13}}>{robToday.length}</span>
            </div>
            {robToday.length === 0 ? (
              <p style={{fontSize:13,color:'var(--ink-mute)',marginTop:8,marginBottom:0}}>Rien à envoyer aujourd'hui. 👍</p>
            ) : (
              <>
                <div className="stack" style={{gap:6,marginTop:10}}>
                  {robToday.map(i => (
                    <div key={i.id} style={{padding:'8px 10px',border:'1px solid var(--line)',borderRadius:8,background:'var(--bg-card)'}}>
                      <div style={{display:'flex',justifyContent:'space-between',gap:8,alignItems:'center'}}>
                        <div style={{minWidth:0}}>
                          <div style={{fontWeight:600,fontSize:14}}>{i.produit}{i.qty>1?` ×${i.qty}`:''}</div>
                          <div style={{fontSize:11,color:'var(--ink-mute)'}}>{i.producteur}{i.dlc?` · DLC ${formatDateShort(i.dlc)}`:''} · {navHint(i)}</div>
                        </div>
                        <div style={{display:'flex',gap:4,alignItems:'center',flexShrink:0}}>
                          <button className="btn-ghost" title="Vendu / parti à temps → retirer (sans perte)" style={{fontSize:15,padding:'4px 8px',color:'var(--ink-mute)'}} onClick={()=>markEcoule(i)}>❌</button>
                          <button className="btn-ghost" style={{fontSize:11,padding:'4px 8px',color:'var(--warn)'}} onClick={()=>sendOneToPartage(i)}>→ partage</button>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{display:'flex',gap:8,marginTop:12,flexWrap:'wrap'}}>
                  <button className="btn-primary" style={{flex:1,minWidth:160,background:'var(--master)'}} disabled={busy} onClick={sendRob}>
                    {busy ? 'Envoi…' : `📧 Envoyer le BL à ROB (gestion@pribon.org)`}
                  </button>
                  <button className="btn-secondary" disabled={busy} onClick={genBlPdf}>📄 BL PDF</button>
                </div>
                <div style={{fontSize:11,color:'var(--ink-mute)',marginTop:6}}>Objet « Push kbg du jour ». Les produits envoyés sont comptés en perte (envoi ROB) et marqués sur le récap pertes du vendredi.</div>
              </>
            )}
          </div>

          {/* ============ CAGETTE PARTAGE ÉQUIPE ============ */}
          <div className="card" style={{borderLeft:'4px solid var(--warn)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
              <div style={{fontWeight:700,fontSize:15}}>🤝 Cagette partage équipe</div>
              <span className="badge" style={{background:'var(--warn-soft)',color:'var(--warn)',fontSize:13}}>{partage.length}</span>
            </div>
            <div style={{fontSize:12,color:'var(--ink-mute)',marginTop:2,marginBottom:partage.length?8:0}}>DLC dépassée ou plus aucune navette ROB avant la DLC → perte sèche, cagette salariés.</div>
            {partage.length > 0 && (
              <div className="stack" style={{gap:6}}>
                {partage.map(i => (
                  <div key={i.id} style={{padding:'8px 10px',border:'1px solid var(--line)',borderRadius:8}}>
                    <div style={{display:'flex',justifyContent:'space-between',gap:8,alignItems:'center'}}>
                      <div style={{minWidth:0}}>
                        <div style={{fontWeight:600,fontSize:14}}>{i.produit}{i.qty>1?` ×${i.qty}`:''}</div>
                        <div style={{fontSize:11,color:'var(--ink-mute)'}}>{i.producteur}{i.dlc?` · DLC ${formatDateShort(i.dlc)}`:''} · {i.days!=null && i.days<=0?'dépassée':navHint(i)}</div>
                      </div>
                      <div style={{display:'flex',gap:4,alignItems:'center',flexShrink:0}}>
                        <button className="btn-ghost" title="Vendu / parti à temps → retirer (sans perte)" style={{fontSize:15,padding:'4px 8px',color:'var(--ink-mute)'}} onClick={()=>markEcoule(i)}>❌</button>
                        <button className="btn-secondary" style={{fontSize:12,padding:'6px 10px'}} onClick={()=>sendOneToPartage(i)}>Mis en cagette</button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* ============ À SURVEILLER (navette plus tard) ============ */}
          <div className="card">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}} onClick={()=>setShowWatch(s=>!s)}>
              <div style={{fontWeight:600}}>👀 À surveiller <span style={{fontWeight:400,fontSize:12,color:'var(--ink-mute)'}}>({watch.length}) — encore vendable, navette plus tard</span></div>
              <span style={{fontSize:13,color:'var(--ink-mute)'}}>{showWatch?'▾':'▸'}</span>
            </div>
            {showWatch && (
              watch.length === 0
                ? <p style={{fontSize:13,color:'var(--ink-mute)',marginTop:8,marginBottom:0}}>Rien à surveiller.</p>
                : <div className="stack" style={{gap:4,marginTop:8}}>
                    {watch.map(i => (
                      <div key={i.id} style={{display:'flex',justifyContent:'space-between',gap:8,fontSize:13,padding:'4px 0',borderTop:'1px solid var(--line)',alignItems:'center'}}>
                        <span style={{minWidth:0}}><strong>{i.produit}</strong>{i.qty>1?` ×${i.qty}`:''} <span style={{color:'var(--ink-mute)',fontSize:11}}>· {i.producteur}{i.source==='retour_pdp'?' · ↩️ retour PDP':''}</span></span>
                        <span style={{display:'flex',gap:6,alignItems:'center',flexShrink:0}}>
                          <span style={{color:'var(--ink-mute)',fontSize:11,whiteSpace:'nowrap'}}>DLC {formatDateShort(i.dlc)}{i.lastNav?` · ROB ${dayLabelShort(i.lastNav.date).replace(/ \d.*/,'')}`:''}</span>
                          <button className="btn-ghost" title="Vendu / parti à temps → retirer (sans perte)" style={{fontSize:13,padding:'0 4px',color:'var(--ink-mute)'}} onClick={()=>markEcoule(i)}>❌</button>
                        </span>
                      </div>
                    ))}
                  </div>
            )}
          </div>

          {/* Ajout manuel d'un produit DLC */}
          <div style={{display:'flex',justifyContent:'flex-end',marginTop:4}}>
            <button className="btn-secondary" style={{fontSize:13}} onClick={()=>setShowForm(s=>!s)}>{showForm?'Fermer':'+ Produit DLC'}</button>
          </div>
          {showForm && <DlcWatchForm products={products} session={session} onClose={()=>setShowForm(false)} />}

          {!loaded && <p style={{fontSize:13,color:'var(--ink-mute)'}}>Chargement…</p>}

          {resolved.length > 0 && (
            <details style={{marginTop:14}}>
              <summary style={{fontSize:13,color:'var(--ink-mute)',cursor:'pointer'}}>Récemment résolus ({resolved.length})</summary>
              <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:6}}>
                {resolved.sort((a,b)=>(b.resolvedAt||'').localeCompare(a.resolvedAt||'')).slice(0,40).map(i => (
                  <div key={i.id} className="card-flat" style={{padding:'8px 10px',display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
                    <div style={{minWidth:0,fontSize:13}}>
                      <strong>{i.produit}</strong> <span style={{color:'var(--ink-mute)'}}>· {i.status==='done'?'écoulé':i.status==='rob'?`ROB${i.robSentDate?` (${formatDateShort(i.robSentDate)})`:''}`:'partage'}</span>
                    </div>
                    <div style={{display:'flex',gap:4}}>
                      <button className="btn-ghost" style={{fontSize:11,padding:'4px 8px'}} onClick={()=>reopen(i)}>Rouvrir</button>
                      <button className="btn-ghost" style={{fontSize:11,padding:'4px 8px',color:'var(--ink-mute)'}} onClick={()=>remove(i)}>Suppr.</button>
                    </div>
                  </div>
                ))}
              </div>
            </details>
          )}
        </div>
      );
    }

    // ============================================================
    // MAILS MANQUANTS 13h — l'appli DÉPOSE le lot du jour via le proxy Freshdesk
    // (onglet Sheet MANQUANTS_OUTBOX). Un déclencheur Apps Script à 13h envoie ensuite
    // chaque mail. Source : commandes du jour avec `removed[]` (client → manquants + email).
    // Mode TEST (défaut) : les mails partent uniquement vers hg@pribon.org.
    // ============================================================
    function ManquantsMailPanel({ orders, session }) {
      const showToast = React.useContext(ToastContext);
      const [open, setOpen] = React.useState(false);
      const [testMode, setTestMode] = React.useState(true);
      const [busy, setBusy] = React.useState(false);
      const [status, setStatus] = React.useState(null);
      const day = activeDay();

      React.useEffect(() => {
        const unsub = storage.subscribe('manquants_outbox', (arr) => {
          setStatus(arr.find(x => x.id === day) || null);
        });
        return () => { if (unsub) unsub(); };
      }, [day]);

      const recipients = React.useMemo(() => {
        return (orders || [])
          .filter(o => o.email && (o.removed || []).length > 0)
          .map(o => ({
            email: o.email,
            name: o.name || o.email,
            site: o.site || '',
            items: (o.removed || []).map(r => ({ produit: r.produit, qty: r.qty || 1, reason: prepReasonLabel(r.reason) })),
          }));
      }, [orders]);

      const totalProducts = recipients.reduce((s, r) => s + r.items.reduce((a, i) => a + (i.qty || 1), 0), 0);

      const stage = async () => {
        if (recipients.length === 0) { showToast('Aucun manquant client aujourd\'hui'); return; }
        setBusy(true);
        try {
          const data = await freshdeskPost({
            secret: FRESHDESK_SECRET, action: 'manquants_stage',
            date: day, testMode: !!testMode, recipients,
          });
          if (data && data.ok === false) throw new Error(data.error || 'refus proxy');
          await storage.setDoc('manquants_outbox', day, {
            staged: true, at: new Date().toISOString(), by: session.name,
            count: recipients.length, products: totalProducts, testMode: !!testMode,
          }, { replace: true });
          showToast(testMode ? '✓ Programmé en TEST (13h → toi seul)' : '✓ Programmé — envoi auto à 13h');
        } catch (e) { showToast('Erreur : ' + e.message); }
        finally { setBusy(false); }
      };

      const cancel = async () => {
        setBusy(true);
        try {
          await freshdeskPost({ secret: FRESHDESK_SECRET, action: 'manquants_cancel', date: day });
          await storage.deleteDoc('manquants_outbox', day);
          showToast('Envoi 13h annulé');
        } catch (e) { showToast('Erreur : ' + e.message); }
        finally { setBusy(false); }
      };

      return (
        <div className="card" style={{padding:'12px 14px', marginBottom:12, borderLeft:'4px solid var(--prep)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
            <strong style={{fontSize:14}}>📧 Mails manquants — envoi auto 13h</strong>
            <span className="badge" style={{background:'var(--prep-soft)',color:'var(--prep)',whiteSpace:'nowrap'}}>
              {recipients.length} client{recipients.length>1?'s':''} · {totalProducts} art.
            </span>
          </div>

          {status && status.staged ? (
            <div className="alert-success" style={{marginTop:10,fontSize:13,display:'flex',flexDirection:'column',gap:8}}>
              <div>
                ✅ <strong>Programmé pour 13h</strong> — {status.count} client{status.count>1?'s':''}
                {' '}<span className="badge" style={{background: status.testMode?'var(--warn-soft)':'var(--accent-soft)', color: status.testMode?'var(--warn)':'var(--accent-dark)'}}>{status.testMode?'TEST':'LIVE'}</span>
                {status.by && <span style={{color:'var(--ink-mute)'}}> · par {status.by}</span>}
              </div>
              {status.testMode && <div style={{fontSize:12,color:'var(--warn)'}}>⚠️ Mode TEST : les mails partiront uniquement vers hg@pribon.org.</div>}
              <button className="btn-secondary" style={{fontSize:12,padding:'6px 10px',alignSelf:'flex-start'}} disabled={busy} onClick={cancel}>Annuler l'envoi 13h</button>
            </div>
          ) : (
            <>
              <div style={{display:'flex',alignItems:'center',gap:8,margin:'10px 0'}}>
                <label style={{fontSize:13,display:'flex',alignItems:'center',gap:6,cursor:'pointer'}}>
                  <input type="checkbox" checked={testMode} onChange={e=>setTestMode(e.target.checked)} style={{width:'auto'}} />
                  Mode TEST (envoi à moi seul)
                </label>
              </div>
              <button className="btn-primary" style={{fontSize:13,padding:'8px 14px'}} disabled={busy || recipients.length===0} onClick={stage}>
                {testMode ? 'Programmer l\'envoi 13h (TEST)' : 'Programmer l\'envoi 13h — VRAIS CLIENTS'}
              </button>
              {recipients.length===0 && <p style={{fontSize:12,color:'var(--ink-mute)',marginTop:6}}>Aucun manquant client pour la distribution du jour.</p>}
            </>
          )}

          {recipients.length>0 && (
            <details style={{marginTop:10}} open={open} onToggle={e=>setOpen(e.target.open)}>
              <summary style={{fontSize:12,color:'var(--ink-mute)',cursor:'pointer'}}>Aperçu des destinataires ({recipients.length})</summary>
              <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:6,maxHeight:240,overflowY:'auto'}}>
                {recipients.map((r,idx) => (
                  <div key={idx} className="card-flat" style={{padding:'6px 10px',fontSize:12}}>
                    <div style={{fontWeight:600}}>{r.name} <span style={{color:'var(--ink-mute)',fontWeight:400}}>· {r.site} · {r.email}</span></div>
                    <div style={{color:'var(--ink-mute)'}}>{r.items.map(i=>i.produit+(i.qty>1?` ×${i.qty}`:'')+(i.reason?` (${i.reason})`:'')).join(', ')}</div>
                  </div>
                ))}
              </div>
            </details>
          )}
        </div>
      );
    }

    // ============================================================
    // MASTER — MANQUANTS & REMISES (historique jour par jour, perte HT/TTC)
    // Lit `ca_history`. Montant par produit dispo pour les jours alimentés en V9.3+
    // (réimporte l'historique CA pour backfiller le détail produit des jours anciens).
    // HT estimé à un taux TVA uniforme (pas de TVA par produit dans les données).
    // ============================================================
    function ManquantsHistoryPage({ session }) {
      const [docs, setDocs] = React.useState(null);
      const [range, setRange] = React.useState('30');   // '7' | '30' | '90' | 'all'
      const [mode, setMode] = React.useState('day');    // 'day' | 'product'
      const [vat, setVat] = React.useState(5.5);
      const [openDay, setOpenDay] = React.useState(null);

      React.useEffect(() => {
        let alive = true;
        storage.getAll('ca_history').then(arr => { if (alive) setDocs(arr || []); });
        return () => { alive = false; };
      }, []);

      const eur = (cents) => (((cents || 0) / 100)).toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
      const ht = (cents) => Math.round((cents || 0) / (1 + vat / 100));

      const filtered = React.useMemo(() => {
        if (!docs) return [];
        let list = docs.filter(d => d && d.date);
        if (range !== 'all') {
          const lim = new Date(); lim.setDate(lim.getDate() - parseInt(range, 10));
          const limKey = `${lim.getFullYear()}-${String(lim.getMonth()+1).padStart(2,'0')}-${String(lim.getDate()).padStart(2,'0')}`;
          list = list.filter(d => d.date >= limKey);
        }
        return list.sort((a, b) => b.date.localeCompare(a.date));
      }, [docs, range]);

      const totals = React.useMemo(() => {
        return filtered.reduce((a, d) => {
          a.manquant += (d.totals && d.totals.manquant) || 0;
          a.remise += (d.totals && d.totals.remise) || 0;
          return a;
        }, { manquant: 0, remise: 0 });
      }, [filtered]);

      const byProduct = React.useMemo(() => {
        const m = {};
        for (const d of filtered) {
          for (const p of (d.manquantsByProduct || [])) {
            if (!m[p.id]) m[p.id] = { ...p, qty: 0, clients: 0, ca_cents: 0, kind: 'manquant' };
            m[p.id].qty += p.qty || 0; m[p.id].clients += p.clients || 0; m[p.id].ca_cents += p.ca_cents || 0;
          }
        }
        return Object.values(m).sort((a, z) => z.ca_cents - a.ca_cents);
      }, [filtered]);

      const dowName = (key) => {
        try { return new Date(key + 'T12:00:00').toLocaleDateString('fr-FR', { weekday: 'long' }); } catch (e) { return ''; }
      };
      const dayHasDetail = (d) => (d.manquantsByProduct && d.manquantsByProduct.length) || (d.remisesByProduct && d.remisesByProduct.length);

      return (
        <div style={{marginTop:10}}>
          <h2 style={{fontSize:18,margin:'0 0 4px'}}>💸 Manquants & Remises</h2>
          <p style={{fontSize:12,color:'var(--ink-mute)',marginTop:0}}>Perte générée par les manquants (produits retirés) et les remises, jour par jour. HT estimé.</p>

          <div style={{display:'flex',flexWrap:'wrap',gap:6,margin:'10px 0'}}>
            {[['7','7 j'],['30','30 j'],['90','90 j'],['all','Tout']].map(([v,l]) => (
              <div key={v} className={`chip ${range===v?'selected':''}`} onClick={()=>setRange(v)}>{l}</div>
            ))}
            <div style={{flex:1}} />
            <div className={`chip ${mode==='day'?'selected':''}`} onClick={()=>setMode('day')}>📅 Par jour</div>
            <div className={`chip ${mode==='product'?'selected':''}`} onClick={()=>setMode('product')}>📦 Par produit</div>
          </div>

          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:10,fontSize:12,color:'var(--ink-mute)'}}>
            TVA pour le HT :
            {[5.5, 10, 20].map(r => (
              <div key={r} className={`chip ${vat===r?'selected':''}`} style={{padding:'2px 10px'}} onClick={()=>setVat(r)}>{r}%</div>
            ))}
          </div>

          <div className="stat-grid" style={{marginBottom:12}}>
            <div className="stat"><div className="stat-value" style={{color:'var(--danger)'}}>{eur(totals.manquant)}</div><div className="stat-label">Manquants TTC</div></div>
            <div className="stat"><div className="stat-value">{eur(ht(totals.manquant))}</div><div className="stat-label">Manquants HT</div></div>
            <div className="stat"><div className="stat-value" style={{color:'var(--warn)'}}>{eur(totals.remise)}</div><div className="stat-label">Remises TTC</div></div>
            <div className="stat"><div className="stat-value">{eur(totals.manquant + totals.remise)}</div><div className="stat-label">Perte totale TTC</div></div>
          </div>

          {docs === null ? <p style={{fontSize:13,color:'var(--ink-mute)'}}>Chargement…</p>
           : filtered.length === 0 ? <div className="empty-state"><div className="icon">📭</div><p>Aucune donnée sur la période.</p></div>
           : mode === 'product' ? (
             <div style={{display:'flex',flexDirection:'column',gap:6}}>
               {byProduct.length === 0 ? <p style={{fontSize:12,color:'var(--ink-mute)'}}>Détail produit indisponible sur cette période (réimporte l'historique CA pour le backfiller).</p>
                : byProduct.map(p => (
                 <div key={p.id} className="card-flat" style={{padding:'8px 10px',display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
                   <div style={{minWidth:0}}>
                     <div style={{fontWeight:600,fontSize:13,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{p.produit}</div>
                     <div style={{fontSize:11,color:'var(--ink-mute)'}}>{p.producteur} · {p.qty} unité{p.qty>1?'s':''} · {p.clients} client{p.clients>1?'s':''}</div>
                   </div>
                   <div style={{textAlign:'right',whiteSpace:'nowrap'}}>
                     <div style={{fontWeight:700,fontSize:13,color:'var(--danger)'}}>{eur(p.ca_cents)}</div>
                     <div style={{fontSize:11,color:'var(--ink-mute)'}}>{eur(ht(p.ca_cents))} HT</div>
                   </div>
                 </div>
               ))}
             </div>
           ) : (
             <div style={{display:'flex',flexDirection:'column',gap:8}}>
               {filtered.map(d => {
                 const isOpen = openDay === d.date;
                 const m = (d.totals && d.totals.manquant) || 0;
                 const rem = (d.totals && d.totals.remise) || 0;
                 return (
                   <div key={d.date} className="card" style={{padding:'10px 12px'}}>
                     <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,cursor: dayHasDetail(d)?'pointer':'default'}} onClick={()=> dayHasDetail(d) && setOpenDay(isOpen?null:d.date)}>
                       <div>
                         <div style={{fontWeight:700,fontSize:14,textTransform:'capitalize'}}>{dowName(d.date)} {formatDateShort(d.date)}</div>
                         <div style={{fontSize:11,color:'var(--ink-mute)'}}>{d.ordersCount||0} commandes{dayHasDetail(d) ? ` · ${(d.manquantsByProduct||[]).length} produits manquants` : ''}</div>
                       </div>
                       <div style={{textAlign:'right',whiteSpace:'nowrap'}}>
                         <div style={{fontWeight:700,fontSize:14,color:'var(--danger)'}}>{eur(m + rem)}</div>
                         <div style={{fontSize:11,color:'var(--ink-mute)'}}>{eur(ht(m + rem))} HT</div>
                       </div>
                     </div>
                     <div style={{display:'flex',gap:14,marginTop:6,fontSize:12}}>
                       <span>Manquants : <strong style={{color:'var(--danger)'}}>{eur(m)}</strong> <span style={{color:'var(--ink-mute)'}}>({eur(ht(m))} HT)</span></span>
                       {rem>0 && <span>Remises : <strong style={{color:'var(--warn)'}}>{eur(rem)}</strong></span>}
                     </div>

                     {isOpen && dayHasDetail(d) && (
                       <div style={{marginTop:10,borderTop:'1px solid var(--line)',paddingTop:8,display:'flex',flexDirection:'column',gap:4}}>
                         {(d.manquantsByProduct||[]).sort((a,z)=>(z.ca_cents||0)-(a.ca_cents||0)).map(p => (
                           <div key={p.id} style={{display:'flex',justifyContent:'space-between',fontSize:12,gap:8}}>
                             <span style={{minWidth:0,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{p.produit} <span style={{color:'var(--ink-mute)'}}>×{p.qty}</span></span>
                             <span style={{whiteSpace:'nowrap'}}>{eur(p.ca_cents)} <span style={{color:'var(--ink-mute)'}}>· {eur(ht(p.ca_cents))} HT</span></span>
                           </div>
                         ))}
                       </div>
                     )}
                   </div>
                 );
               })}
             </div>
           )}
        </div>
      );
    }

    // ============================================================
    // HISTORIQUE ND DERNIÈRE MINUTE (master) — jour par jour
    // Pour chaque produit passé en « ND dernière minute » un jour donné :
    //   • À envoyer (prévu)  = le manquant initial (manque) lié, sinon le reçu
    //   • Reçu               = quantité reçue en dernière minute (qtyReceived)
    //   • Envoyé             = somme réellement dispatchée (allocBySite)
    //   • Par boutique       = ventilation par local (DOM inclus, jamais exclu ici)
    // Lecture seule : on lit day_X_lastminute + day_X_manquants pour la date choisie.
    // ============================================================
    function NdHistoryPage({ session }) {
      const [day, setDay] = React.useState(activeDay());
      const [lastmin, setLastmin] = React.useState([]);
      const [manquants, setManquants] = React.useState([]);
      const [loading, setLoading] = React.useState(true);

      React.useEffect(() => {
        setLoading(true);
        let got1 = false, got2 = false;
        const done = () => { if (got1 && got2) setLoading(false); };
        const u1 = storage.subscribe(`day_${day}_lastminute`, (arr) => { setLastmin(arr || []); got1 = true; done(); });
        const u2 = storage.subscribe(`day_${day}_manquants`, (arr) => { setManquants(arr || []); got2 = true; done(); });
        return () => { u1(); u2(); };
      }, [day]);

      // Index des manquants par id, pour retrouver « ce qui était prévu »
      const manqById = React.useMemo(() => {
        const m = {};
        for (const x of (manquants || [])) m[x.id] = x;
        return m;
      }, [manquants]);

      // Navigation jour de distribution précédent / suivant
      const prevDistrib = (fromKey) => { let d = addDays(fromKey, -1); for (let i=0;i<31;i++){ if (isDistribDay(d)) return d; d = addDays(d,-1);} return null; };
      const nextDistrib = (fromKey) => { let d = addDays(fromKey, 1);  for (let i=0;i<31;i++){ if (isDistribDay(d)) return d; d = addDays(d,1);}  return null; };
      const prevDay = prevDistrib(day);
      const nextDay = nextDistrib(day);
      const isToday = day === todayKey();

      // Construit les lignes d'historique à partir des dispatch dernière minute
      const rows = React.useMemo(() => {
        return (lastmin || []).map(l => {
          const linked = manqById[l.manquantId] || manqById[l.id] || null;
          const prevu = (linked && typeof linked.manque === 'number')
            ? linked.manque
            : (typeof l.qtyReceived === 'number' ? l.qtyReceived : 0);
          const recu = typeof l.qtyReceived === 'number' ? l.qtyReceived : 0;
          const bySite = {};
          let envoye = 0;
          for (const [site, arr] of Object.entries(l.allocBySite || {})) {
            const q = (arr || []).reduce((s, c) => s + (c.qty || 0), 0);
            if (q > 0) { bySite[site] = q; envoye += q; }
          }
          return {
            id: l.id, produit: l.produit || '(sans nom)', producteur: l.producteur || '',
            prevu, recu, envoye, bySite,
            createdBy: l.createdBy || '', createdAt: l.createdAt || '',
          };
        }).sort((a, b) => (a.produit || '').localeCompare(b.produit || ''));
      }, [lastmin, manqById]);

      const totals = rows.reduce((a, r) => {
        a.prevu += r.prevu; a.recu += r.recu; a.envoye += r.envoye; return a;
      }, { prevu: 0, recu: 0, envoye: 0 });

      const fmtTime = (iso) => { try { return new Date(iso).toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' }); } catch(e){ return ''; } };

      return (
        <div style={{marginTop:10}}>
          <h2 style={{fontSize:18,margin:'0 0 4px'}}>🚚 Historique ND dernière minute</h2>
          <p style={{fontSize:12,color:'var(--ink-mute)',marginTop:0}}>
            Produits dispatchés en dernière minute pour la distribution choisie : prévu, reçu, envoyé et répartition par boutique.
          </p>

          {/* Navigation date */}
          <div className="card" style={{padding:'10px 12px',marginBottom:12}}>
            <div style={{display:'flex',alignItems:'center',gap:8,justifyContent:'space-between'}}>
              <button className="btn-secondary" style={{fontSize:13,padding:'6px 10px'}} disabled={!prevDay} onClick={()=> prevDay && setDay(prevDay)}>‹</button>
              <div style={{textAlign:'center',flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:14,textTransform:'capitalize'}}>{dayLabelShort(day)}</div>
                <div style={{fontSize:11,color: isToday ? 'var(--accent)' : 'var(--warn)'}}>
                  {isToday ? "aujourd'hui" : 'autre jour'}{!isDistribDay(day) && ' · pas de distrib ce jour'}
                </div>
              </div>
              <button className="btn-secondary" style={{fontSize:13,padding:'6px 10px'}} disabled={!nextDay || nextDay > todayKey()} onClick={()=> { if (nextDay && nextDay <= todayKey()) setDay(nextDay); }}>›</button>
            </div>
            <div style={{display:'flex',gap:8,marginTop:8,alignItems:'center'}}>
              <input type="date" value={day} max={todayKey()} onChange={(e)=> e.target.value && setDay(e.target.value)} style={{fontSize:13,flex:1}} />
              {!isToday && <button className="btn-ghost" style={{fontSize:12,padding:'6px 10px',whiteSpace:'nowrap'}} onClick={()=>setDay(todayKey())}>↩ Aujourd'hui</button>}
            </div>
          </div>

          {/* Récap du jour */}
          <div className="stat-grid" style={{marginBottom:12}}>
            <div className="stat"><div className="stat-value">{rows.length}</div><div className="stat-label">Produits ND</div></div>
            <div className="stat"><div className="stat-value">{totals.prevu}</div><div className="stat-label">À envoyer (prévu)</div></div>
            <div className="stat"><div className="stat-value" style={{color:'var(--accent)'}}>{totals.envoye}</div><div className="stat-label">Envoyés</div></div>
          </div>

          {loading ? <p style={{fontSize:13,color:'var(--ink-mute)'}}>Chargement…</p>
           : rows.length === 0 ? <div className="empty-state"><div className="icon">📭</div><p>Aucun dispatch dernière minute ce jour-là.</p></div>
           : (
             <div style={{display:'flex',flexDirection:'column',gap:8}}>
               {rows.map(r => {
                 const ecart = r.envoye - r.prevu; // <0 : envoyé moins que prévu
                 return (
                   <div key={r.id} className="card" style={{padding:'10px 12px'}}>
                     <div style={{display:'flex',justifyContent:'space-between',gap:8,alignItems:'flex-start'}}>
                       <div style={{minWidth:0}}>
                         <div style={{fontWeight:700,fontSize:14}}>{r.produit}</div>
                         {r.producteur && <div style={{fontSize:11,color:'var(--ink-mute)'}}>{r.producteur}</div>}
                       </div>
                       {r.createdAt && <div style={{fontSize:11,color:'var(--ink-mute)',whiteSpace:'nowrap',textAlign:'right'}}>{fmtTime(r.createdAt)}{r.createdBy?` · ${r.createdBy}`:''}</div>}
                     </div>

                     <div style={{display:'flex',gap:14,marginTop:8,fontSize:13,flexWrap:'wrap'}}>
                       <span>À envoyer : <strong>{r.prevu}</strong></span>
                       <span style={{color:'var(--ink-mute)'}}>Reçu : <strong style={{color:'var(--ink)'}}>{r.recu}</strong></span>
                       <span>Envoyé : <strong style={{color: ecart < 0 ? 'var(--warn)' : 'var(--accent)'}}>{r.envoye}</strong>
                         {ecart !== 0 && <span style={{color: ecart < 0 ? 'var(--warn)' : 'var(--ink-mute)',fontSize:11}}> ({ecart > 0 ? '+' : ''}{ecart})</span>}
                       </span>
                     </div>

                     <div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:8,borderTop:'1px solid var(--line)',paddingTop:8}}>
                       {Object.keys(r.bySite).length === 0
                         ? <span style={{fontSize:12,color:'var(--ink-mute)'}}>Aucune boutique</span>
                         : Object.entries(r.bySite).sort((a,b)=>a[0].localeCompare(b[0])).map(([site, q]) => (
                             <span key={site} className="badge badge-site">{site} : {q}</span>
                           ))}
                     </div>
                   </div>
                 );
               })}
             </div>
           )}
        </div>
      );
    }

    // ============================================================
    // MASTER — 📜 HISTORIQUE CONSOLIDÉ (ND · DLC · Retours PDP)
    // Page en lecture seule qui regroupe les trois historiques. Le repère 🚩 de
    // divergence s'appuie sur la règle navette réelle (routeByDLC), évaluée à la
    // date de décision, et reste conservateur (ne signale que les contradictions
    // certaines). « écoulé » / « remis en rayon » ne sont jamais signalés.
    // ============================================================
    function HistoryDlcView() {
      const [items, setItems] = React.useState([]);
      const [loaded, setLoaded] = React.useState(false);
      React.useEffect(() => {
        const u = storage.subscribe('dlc_watch', (arr) => { setItems(arr || []); setLoaded(true); });
        return () => { u && u(); };
      }, []);

      const fmtTime = (iso) => { try { return new Date(iso).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); } catch(e){ return ''; } };
      const DEST = {
        done: { label: '✅ Écoulé', color: 'var(--accent-dark)', bg: 'var(--accent-soft)' },
        rob:  { label: '🚚 ROB (Pribon)', color: 'var(--info)', bg: 'var(--info-soft)' },
        perte:{ label: '🗑️ Perte (partage/jeté)', color: 'var(--danger)', bg: 'var(--danger-soft)' },
      };

      const rows = React.useMemo(() => {
        const resolved = (items || []).filter(i => i.status && i.status !== 'watch' && i.resolvedAt);
        return resolved.map(i => {
          const reco = i.dlc ? routeByDLC(i.dlc, new Date(i.resolvedAt)) : null;
          let flag = false, flagWhy = '';
          if (reco) {
            if (i.status === 'rob' && reco.dest === 'partage') { flag = true; flagWhy = "envoyé ROB alors qu'aucune navette ne rattrape la DLC"; }
            else if (i.status === 'perte' && reco.dest === 'pribon') { flag = true; flagWhy = `perte alors qu'une navette ROB était dispo (${reco.navette ? reco.navette.label : 'navette'})`; }
          }
          return { ...i, dayKey: i.resolvedAt.slice(0,10), reco, flag, flagWhy };
        });
      }, [items]);

      const byDay = React.useMemo(() => {
        const m = {};
        for (const r of rows) { (m[r.dayKey] = m[r.dayKey] || []).push(r); }
        for (const k of Object.keys(m)) m[k].sort((a,b)=>(b.resolvedAt||'').localeCompare(a.resolvedAt||''));
        return m;
      }, [rows]);
      const days = Object.keys(byDay).sort((a,b)=>b.localeCompare(a));
      const flagCount = rows.filter(r => r.flag).length;

      if (!loaded) return <p style={{fontSize:13,color:'var(--ink-mute)'}}>Chargement…</p>;
      if (rows.length === 0) return <div className="empty-state"><div className="icon">📭</div><p>Aucun produit DLC résolu pour l'instant.</p></div>;

      return (
        <div>
          <div className="stat-grid" style={{marginBottom:12}}>
            <div className="stat"><div className="stat-value">{rows.length}</div><div className="stat-label">Produits résolus</div></div>
            <div className="stat"><div className="stat-value" style={{color:'var(--accent)'}}>{rows.filter(r=>r.status==='done').length}</div><div className="stat-label">Écoulés</div></div>
            <div className="stat"><div className="stat-value" style={{color: flagCount?'var(--warn)':'var(--ink-mute)'}}>{flagCount}</div><div className="stat-label">🚩 Divergences</div></div>
          </div>
          {days.map(dk => (
            <div key={dk} className="card" style={{marginBottom:10}}>
              <h3 style={{marginBottom:8,textTransform:'capitalize'}}>{dayLabelShort(dk)}</h3>
              <div className="stack" style={{gap:6}}>
                {byDay[dk].map(r => {
                  const d = DEST[r.status] || { label: r.status, color: 'var(--ink-soft)', bg: 'var(--bg-muted)' };
                  return (
                    <div key={r.id} style={{padding:'8px 10px',border:'1px solid var(--line)',borderRadius:8,borderLeft: r.flag?'3px solid var(--warn)':'1px solid var(--line)'}}>
                      <div style={{display:'flex',justifyContent:'space-between',gap:8,alignItems:'center'}}>
                        <div style={{minWidth:0}}>
                          <div style={{fontWeight:600,fontSize:14}}>{r.flag && '🚩 '}{r.produit}{r.qty?` ×${r.qty}`:''}</div>
                          <div style={{fontSize:11,color:'var(--ink-mute)'}}>{r.producteur}{r.dlc?` · DLC ${formatDateShort(r.dlc)}`:''}</div>
                        </div>
                        <span className="badge" style={{background:d.bg,color:d.color,whiteSpace:'nowrap'}}>{d.label}</span>
                      </div>
                      <div style={{fontSize:11,color:'var(--ink-mute)',marginTop:4}}>
                        {r.resolvedBy ? `par ${r.resolvedBy}` : ''}{r.resolvedAt ? ` · ${fmtTime(r.resolvedAt)}` : ''}
                        {r.reco && <span> · conseil : {r.reco.dest==='pribon' ? 'ROB' : 'partage'}</span>}
                      </div>
                      {r.flag && <div style={{fontSize:11,color:'var(--warn)',marginTop:3}}>🚩 {r.flagWhy}</div>}
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      );
    }

    function HistoryPdpView() {
      const [treatments, setTreatments] = React.useState([]);
      const [manualReturns, setManualReturns] = React.useState([]);
      const [loaded, setLoaded] = React.useState(false);
      React.useEffect(() => {
        let g1=false,g2=false; const done=()=>{ if(g1&&g2) setLoaded(true); };
        const u1 = storage.subscribe('pdp_treatments', (arr)=>{ setTreatments(arr||[]); g1=true; done(); });
        const u2 = storage.subscribe('pdp_returns', (arr)=>{ setManualReturns(arr||[]); g2=true; done(); });
        return () => { u1 && u1(); u2 && u2(); };
      }, []);

      const fmtTime = (iso) => { try { return new Date(iso).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); } catch(e){ return ''; } };
      const DEST = {
        rayon:  { label: '🛒 Remis en rayon', color: 'var(--accent-dark)', bg: 'var(--accent-soft)' },
        pribon: { label: '🚚 ROB (Pribon)', color: 'var(--info)', bg: 'var(--info-soft)' },
        partage:{ label: '🤝 Partage équipe', color: 'var(--warn)', bg: 'var(--warn-soft)' },
        jete:   { label: '🗑️ Jeté', color: 'var(--danger)', bg: 'var(--danger-soft)' },
        'jeté': { label: '🗑️ Jeté', color: 'var(--danger)', bg: 'var(--danger-soft)' },
      };

      const rows = React.useMemo(() => {
        const out = [];
        for (const r of (manualReturns || [])) {
          if (r.status !== 'treated' || !r.treatedAt) continue;
          out.push({
            key: 'm_'+r.id, produit: r.produit || r.productLabel || '(sans nom)', producteur: r.producteur || '',
            qty: r.qty || 1, dlc: r.dlc || '', site: r.site || '', destination: r.destination || '',
            by: r.treatedBy || '', at: r.treatedAt, source: 'signalé',
          });
        }
        for (const t of (treatments || [])) {
          if (!t.treatedAt) continue;
          out.push({
            key: 't_'+t.id, produit: t.produit || '(sans nom)', producteur: t.producteur || '',
            qty: t.qty || 1, dlc: '', site: t.site || '', destination: t.destination || '',
            by: t.treatedBy || '', at: t.treatedAt, source: 'non récup',
          });
        }
        return out.map(r => {
          const reco = r.dlc ? routeByDLC(r.dlc, new Date(r.at)) : null;
          let flag = false, flagWhy = '';
          if (reco) {
            if (r.destination === 'pribon' && reco.dest === 'partage') { flag = true; flagWhy = "envoyé ROB alors qu'aucune navette ne rattrape la DLC"; }
            else if ((r.destination === 'partage' || r.destination === 'jeté' || r.destination === 'jete') && reco.dest === 'pribon') { flag = true; flagWhy = `perte alors qu'une navette ROB était dispo (${reco.navette ? reco.navette.label : 'navette'})`; }
          }
          return { ...r, dayKey: r.at.slice(0,10), reco, flag, flagWhy };
        });
      }, [treatments, manualReturns]);

      const byDay = React.useMemo(() => {
        const m = {};
        for (const r of rows) { (m[r.dayKey] = m[r.dayKey] || []).push(r); }
        for (const k of Object.keys(m)) m[k].sort((a,b)=>(b.at||'').localeCompare(a.at||''));
        return m;
      }, [rows]);
      const days = Object.keys(byDay).sort((a,b)=>b.localeCompare(a));
      const flagCount = rows.filter(r=>r.flag).length;

      if (!loaded) return <p style={{fontSize:13,color:'var(--ink-mute)'}}>Chargement…</p>;
      if (rows.length === 0) return <div className="empty-state"><div className="icon">📭</div><p>Aucun retour PDP traité pour l'instant.</p></div>;

      return (
        <div>
          <div className="stat-grid" style={{marginBottom:12}}>
            <div className="stat"><div className="stat-value">{rows.length}</div><div className="stat-label">Retours traités</div></div>
            <div className="stat"><div className="stat-value" style={{color:'var(--accent)'}}>{rows.filter(r=>r.destination==='rayon').length}</div><div className="stat-label">Remis en rayon</div></div>
            <div className="stat"><div className="stat-value" style={{color: flagCount?'var(--warn)':'var(--ink-mute)'}}>{flagCount}</div><div className="stat-label">🚩 Divergences</div></div>
          </div>
          {days.map(dk => (
            <div key={dk} className="card" style={{marginBottom:10}}>
              <h3 style={{marginBottom:8,textTransform:'capitalize'}}>{dayLabelShort(dk)}</h3>
              <div className="stack" style={{gap:6}}>
                {byDay[dk].map(r => {
                  const d = DEST[r.destination] || { label: r.destination || '—', color: 'var(--ink-soft)', bg: 'var(--bg-muted)' };
                  return (
                    <div key={r.key} style={{padding:'8px 10px',border:'1px solid var(--line)',borderRadius:8,borderLeft: r.flag?'3px solid var(--warn)':'1px solid var(--line)'}}>
                      <div style={{display:'flex',justifyContent:'space-between',gap:8,alignItems:'center'}}>
                        <div style={{minWidth:0}}>
                          <div style={{fontWeight:600,fontSize:14}}>{r.flag && '🚩 '}{r.produit}{r.qty>1?` ×${r.qty}`:''}</div>
                          <div style={{fontSize:11,color:'var(--ink-mute)'}}>{r.producteur}{r.site?` · 📍 ${r.site}`:''}{r.dlc?` · DLC ${formatDateShort(r.dlc)}`:''}</div>
                        </div>
