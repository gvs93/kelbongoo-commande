        previsionnel: reel + manquant + remise,
        caMoyen: nb ? reel / nb : 0,
        panier: orders ? reel / orders : 0,
        bySite, byDow, byWeek, byCat, products: Object.values(products),
      };
    }
    function buildEvoPoints(docs, evoBy) {
      if (evoBy === 'week') {
        const byWeek = {};
        for (const d of docs) { const wk = isoWeekKey(d.date); byWeek[wk] = (byWeek[wk] || 0) + ((d.totals || {}).reel || 0); }
        return Object.entries(byWeek).sort((a, b) => a[0].localeCompare(b[0])).map(([wk, v]) => ({ label: wk.split('-')[1], value: v / 100 }));
      }
      return docs.map(d => ({ label: formatDateShort(d.date), value: ((d.totals || {}).reel || 0) / 100 }));
    }
    // Badge d'écart % entre A et B. goodUp=false → une hausse est "mauvaise" (ex. manque à gagner).
    function DeltaBadge({ a, b, goodUp = true, suffix = '' }) {
      if (b === 0 || b == null) return null;
      const pct = ((a - b) / b) * 100;
      const flat = Math.abs(pct) < 0.5;
      const up = pct >= 0;
      const good = goodUp ? up : !up;
      const color = flat ? 'var(--ink-mute)' : (good ? 'var(--accent-dark,#2e7d32)' : 'var(--danger)');
      const arrow = flat ? '→' : (up ? '▲' : '▼');
      return <span style={{ color, fontWeight: 700 }}>{arrow} {up ? '+' : ''}{pct.toFixed(0)}%{suffix}</span>;
    }

    function HBars({ data, fmt, color }) {
      // data : [ [label, value], ... ] déjà triées
      const max = Math.max(...data.map(d => d[1]), 1);
      const f = fmt || (v => v);
      return (
        <div className="bar-chart">
          {data.map(([k, v]) => (
            <div key={k} className="bar-row">
              <div className="bar-label">{k}</div>
              <div className="bar-track"><div className="bar-fill" style={{ width: `${(v / max) * 100}%`, background: color || 'var(--accent)' }}></div></div>
              <div className="bar-value">{f(v)}</div>
            </div>
          ))}
        </div>
      );
    }

    function CaDashboard() {
      const [all, setAll] = React.useState(null); // null = chargement
      const [from, setFrom] = React.useState(() => { const d = new Date(); d.setDate(d.getDate() - 60); return d.toISOString().slice(0,10); });
      const [to, setTo] = React.useState(() => new Date().toISOString().slice(0,10));
      const [metric, setMetric] = React.useState('ca'); // ca | qty
      const [catFilter, setCatFilter] = React.useState('all');
      const [evoBy, setEvoBy] = React.useState('day'); // day | week
      const [compare, setCompare] = React.useState(false);
      const [fromB, setFromB] = React.useState(() => { const d = new Date(); d.setDate(d.getDate() - 120); return d.toISOString().slice(0,10); });
      const [toB, setToB] = React.useState(() => { const d = new Date(); d.setDate(d.getDate() - 61); return d.toISOString().slice(0,10); });

      React.useEffect(() => {
        let alive = true;
        storage.getAll('ca_history').then(arr => { if (alive) setAll(arr || []); });
        return () => { alive = false; };
      }, []);

      const filterRange = (f, t) => (all || []).filter(d => d.date && d.date >= f && d.date <= t).sort((a, b) => a.date.localeCompare(b.date));
      const inRange = React.useMemo(() => filterRange(from, to), [all, from, to]);
      const inRangeB = React.useMemo(() => compare ? filterRange(fromB, toB) : [], [all, compare, fromB, toB]);

      const agg = React.useMemo(() => computeCaAgg(inRange), [inRange]);
      const aggB = React.useMemo(() => computeCaAgg(inRangeB), [inRangeB]);

      const evoPoints = React.useMemo(() => buildEvoPoints(inRange, evoBy), [inRange, evoBy]);
      const evoPointsB = React.useMemo(() => compare ? buildEvoPoints(inRangeB, evoBy) : null, [inRangeB, evoBy, compare]);

      const bestSellers = React.useMemo(() => {
        let list = agg.products;
        if (catFilter !== 'all') list = list.filter(p => p.cat === catFilter);
        return list.sort((a, b) => metric === 'qty' ? (b.qty - a.qty) : (b.ca_cents - a.ca_cents)).slice(0, 20);
      }, [agg.products, metric, catFilter]);

      const setPreset = (days) => {
        const t = new Date(); const f = new Date(); f.setDate(f.getDate() - days);
        setFrom(f.toISOString().slice(0,10)); setTo(t.toISOString().slice(0,10));
      };
      const setAllTime = () => {
        if (!all || !all.length) return;
        const dates = all.map(d => d.date).filter(Boolean).sort();
        setFrom(dates[0]); setTo(dates[dates.length-1]);
      };
      // Période B = fenêtre de même durée, juste avant la période A.
      const setPrevPeriod = () => {
        const f = new Date(from + 'T12:00:00'), t = new Date(to + 'T12:00:00');
        const len = Math.round((t - f) / 86400000);
        const bTo = new Date(f); bTo.setDate(f.getDate() - 1);
        const bFrom = new Date(bTo); bFrom.setDate(bTo.getDate() - len);
        setFromB(bFrom.toISOString().slice(0,10)); setToB(bTo.toISOString().slice(0,10));
      };
      const toggleCompare = () => { const nv = !compare; setCompare(nv); if (nv) setPrevPeriod(); };

      if (all === null) return <div className="card"><p style={{textAlign:'center',color:'var(--ink-mute)',padding:'12px 0'}}>Chargement de l'historique…</p></div>;
      if (all.length === 0) return (
        <div className="card" style={{borderLeft:'3px solid var(--warn)'}}>
          <p style={{padding:'4px 0',fontSize:14}}>Aucun historique CA pour l'instant.</p>
          <p style={{fontSize:13,color:'var(--ink-soft)',marginTop:6}}>
            Le CA se remplit automatiquement à chaque chargement du jour (Admin → Chargement du jour). L'historique s'étoffe distribution après distribution.
          </p>
        </div>
      );

      const maxProd = Math.max(...bestSellers.map(p => metric === 'qty' ? p.qty : p.ca_cents), 1);

      return (
        <div className="stack">
          {/* Période */}
          <div className="card">
            <div className="date-range">
              <div style={{flex:1}}><label>Du</label><input type="date" value={from} onChange={e => setFrom(e.target.value)} /></div>
              <div style={{flex:1}}><label>Au</label><input type="date" value={to} onChange={e => setTo(e.target.value)} /></div>
            </div>
            <div className="chip-group" style={{marginTop:10}}>
              <div className="chip" onClick={() => setPreset(7)}>7 jours</div>
              <div className="chip" onClick={() => setPreset(30)}>30 jours</div>
              <div className="chip" onClick={() => setPreset(90)}>3 mois</div>
              <div className="chip" onClick={() => setPreset(180)}>6 mois</div>
              <div className="chip" onClick={setAllTime}>Tout</div>
            </div>
            <p style={{fontSize:11,color:'var(--ink-mute)',marginTop:8}}>
              {agg.nb} distribution{agg.nb>1?'s':''} sur la période · <strong>CA réel</strong> = produits livrés à prix plein (après manquants de prépa, avant remises/avoirs). Net après remises : <strong>{eurRound(agg.reel - agg.remise)}</strong>.
            </p>

            <div style={{marginTop:10,paddingTop:10,borderTop:'1px solid var(--line)'}}>
              <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontSize:14,fontWeight:600}}>
                <input type="checkbox" checked={compare} onChange={toggleCompare} style={{width:18,height:18}} />
                Comparer une 2ᵉ période
              </label>
              {compare && (
                <div style={{marginTop:10}}>
                  <div className="date-range">
                    <div style={{flex:1}}><label>Période B — du</label><input type="date" value={fromB} onChange={e => setFromB(e.target.value)} /></div>
                    <div style={{flex:1}}><label>au</label><input type="date" value={toB} onChange={e => setToB(e.target.value)} /></div>
                  </div>
                  <div className="chip-group" style={{marginTop:8}}>
                    <div className="chip" onClick={setPrevPeriod}>↩ Période précédente (même durée)</div>
                  </div>
                  <p style={{fontSize:11,color:'var(--ink-mute)',marginTop:8}}>
                    B : {aggB.nb} distribution{aggB.nb>1?'s':''}. <span style={{color:'#4a7c3b',fontWeight:700}}>━ A</span> · <span style={{color:'#9aa0a6',fontWeight:700}}>┄ B</span>
                  </p>
                </div>
              )}
            </div>
          </div>

          {/* Comparaison A vs B */}
          {compare && (
            <div className="card">
              <h3 style={{marginBottom:4}}>Comparaison A vs B</h3>
              <p style={{fontSize:11,color:'var(--ink-mute)',marginBottom:10}}>A = {formatDateShort(from)} → {formatDateShort(to)} · B = {formatDateShort(fromB)} → {formatDateShort(toB)}</p>
              {[
                { label:'CA réel', a:agg.reel, b:aggB.reel, fmt:eurRound, goodUp:true },
                { label:'CA prévisionnel', a:agg.previsionnel, b:aggB.previsionnel, fmt:eurRound, goodUp:true },
                { label:'Manque à gagner', a:agg.manquant+agg.remise, b:aggB.manquant+aggB.remise, fmt:eurRound, goodUp:false },
                { label:'Nb distributions', a:agg.nb, b:aggB.nb, fmt:(v)=>v.toLocaleString('fr-FR'), goodUp:true },
                { label:'CA moyen / distrib', a:agg.caMoyen, b:aggB.caMoyen, fmt:eurRound, goodUp:true },
                { label:'Panier moyen', a:agg.panier, b:aggB.panier, fmt:(v)=>(v/100).toFixed(2)+' €', goodUp:true },
              ].map((r, i) => (
                <div key={i} style={{display:'flex',alignItems:'center',padding:'7px 0',borderTop: i ? '1px solid var(--line)' : 'none'}}>
                  <div style={{flex:1,fontSize:13,fontWeight:600}}>{r.label}</div>
                  <div style={{flex:'0 0 78px',textAlign:'right',fontSize:13,fontWeight:700}}>{r.fmt(r.a)}</div>
                  <div style={{flex:'0 0 78px',textAlign:'right',fontSize:12,color:'var(--ink-mute)'}}>{r.fmt(r.b)}</div>
                  <div style={{flex:'0 0 56px',textAlign:'right',fontSize:12}}><DeltaBadge a={r.a} b={r.b} goodUp={r.goodUp} /></div>
                </div>
              ))}
              <div style={{display:'flex',marginTop:6,fontSize:10,color:'var(--ink-mute)',textTransform:'uppercase',letterSpacing:'0.04em'}}>
                <div style={{flex:1}}></div><div style={{flex:'0 0 78px',textAlign:'right'}}>A</div><div style={{flex:'0 0 78px',textAlign:'right'}}>B</div><div style={{flex:'0 0 56px',textAlign:'right'}}>Δ</div>
              </div>
            </div>
          )}

          {/* KPIs */}
          <div className="kpi-grid">
            <div className="kpi"><div className="kpi-val">{eurRound(agg.reel)}</div><div className="kpi-label">CA réel</div><div className="kpi-sub">{compare ? <DeltaBadge a={agg.reel} b={aggB.reel} /> : 'après manquants prépa'}</div></div>
            <div className="kpi"><div className="kpi-val">{eurRound(agg.previsionnel)}</div><div className="kpi-label">CA prévisionnel</div><div className="kpi-sub">{compare ? <DeltaBadge a={agg.previsionnel} b={aggB.previsionnel} /> : 'commandé au départ'}</div></div>
            <div className="kpi"><div className="kpi-val" style={{color:'var(--danger)'}}>{eurRound(agg.manquant + agg.remise)}</div><div className="kpi-label">Manque à gagner</div><div className="kpi-sub">{compare ? <DeltaBadge a={agg.manquant + agg.remise} b={aggB.manquant + aggB.remise} goodUp={false} /> : `${eurRound(agg.manquant)} manq. · ${eurRound(agg.remise)} remises`}</div></div>
            <div className="kpi"><div className="kpi-val">{eurRound(agg.caMoyen)}</div><div className="kpi-label">CA moyen / distrib</div><div className="kpi-sub">{compare ? <DeltaBadge a={agg.caMoyen} b={aggB.caMoyen} /> : `${agg.orders.toLocaleString('fr-FR')} cmd · panier ${agg.panier ? (agg.panier/100).toFixed(2) : '0'} €`}</div></div>
          </div>

          {/* Évolution */}
          <div className="card">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <h3 style={{margin:0}}>Évolution du CA</h3>
              <div className="seg">
                <button className={evoBy==='day'?'active':''} onClick={()=>setEvoBy('day')}>Jour</button>
                <button className={evoBy==='week'?'active':''} onClick={()=>setEvoBy('week')}>Semaine</button>
              </div>
            </div>
            {evoPoints.length ? <MiniLineChart points={evoPoints} pointsB={compare ? evoPointsB : null} color="#4a7c3b" valueFmt={v => Math.round(v/1000)+'k'} />
              : <p style={{fontSize:13,color:'var(--ink-mute)',textAlign:'center',padding:'12px 0'}}>Pas de données.</p>}
            {compare && <p style={{fontSize:11,color:'var(--ink-mute)',marginTop:4,textAlign:'center'}}>Courbes alignées par rang (1ᵉʳ jour A vs 1ᵉʳ jour B…). <span style={{color:'#4a7c3b',fontWeight:700}}>A</span> · <span style={{color:'#9aa0a6',fontWeight:700}}>B</span></p>}
          </div>

          {/* Par site */}
          <div className="card">
            <h3 style={{marginBottom:10}}>CA par site</h3>
            <HBars data={Object.entries(agg.bySite).sort((a,b)=>b[1]-a[1])} fmt={eurRound} />
          </div>

          {/* Par jour de semaine */}
          <div className="card">
            <h3 style={{marginBottom:10}}>CA par jour de semaine</h3>
            <HBars data={DOW_ORDER.filter(dw => agg.byDow[dw]).map(dw => [DOW_LABELS[dw], agg.byDow[dw]])} fmt={eurRound} color="var(--master)" />
          </div>

          {/* Par catégorie */}
          <div className="card">
            <h3 style={{marginBottom:10}}>CA par catégorie</h3>
            <div className="kpi-grid" style={{gridTemplateColumns:'repeat(3,1fr)'}}>
              {['frais','pain','nd'].map(c => (
                <div key={c} className="kpi" style={{padding:'10px'}}>
                  <div className="kpi-val" style={{fontSize:16}}>{eurRound(agg.byCat[c]||0)}</div>
                  <div className="kpi-label">{CAT_LABELS[c]}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Meilleures ventes */}
          <div className="card">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8,flexWrap:'wrap',gap:8}}>
              <h3 style={{margin:0}}>Meilleures ventes</h3>
              <div className="seg">
                <button className={metric==='ca'?'active':''} onClick={()=>setMetric('ca')}>€ CA</button>
                <button className={metric==='qty'?'active':''} onClick={()=>setMetric('qty')}>Quantité</button>
              </div>
            </div>
            <div className="chip-group" style={{marginBottom:8}}>
              {[['all','Tout'],['frais','Frais'],['pain','Pain/Sec'],['nd','ND']].map(([k,l]) => (
                <div key={k} className={`chip ${catFilter===k?'selected':''}`} onClick={()=>setCatFilter(k)}>{l}</div>
              ))}
            </div>
            {bestSellers.length ? bestSellers.map((p, i) => {
              const val = metric === 'qty' ? p.qty : p.ca_cents;
              return (
                <div key={p.id} className="rank-row">
                  <div className="rank-num">{i+1}</div>
                  <div className="rank-name" title={p.produit}>{p.produit}<span style={{color:'var(--ink-mute)',fontSize:11}}> · {p.producteur}</span></div>
                  <div className="rank-track"><div className={`rank-fill cat-${p.cat}`} style={{width:`${(val/maxProd)*100}%`}}></div></div>
                  <div className="rank-val">{metric==='qty' ? val.toLocaleString('fr-FR') : eurRound(p.ca_cents)}</div>
                </div>
              );
            }) : <p style={{fontSize:13,color:'var(--ink-mute)',textAlign:'center',padding:'12px 0'}}>Aucun produit sur la période.</p>}
            <p style={{fontSize:11,color:'var(--ink-mute)',marginTop:8}}>Top 20 · couleur = catégorie (vert frais, orange pain/sec, bleu ND).</p>
          </div>
        </div>
      );
    }

    // === SUIVI CA (master) ===
    // CA prévisionnel / réel théorique / réel final / manque à gagner, global + par site.
    function CaSuiviPage({ session }) {
      const [ca, setCa] = React.useState(null);
      const [anomalies, setAnomalies] = React.useState([]);
      const [view, setView] = React.useState('jour'); // jour | bilan

      const Header = () => (
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,flexWrap:'wrap'}}>
          <h1 style={{margin:0}}>Suivi CA <span className="ver-badge">{APP_VERSION}</span></h1>
          <div className="seg">
            <button className={view==='jour'?'active':''} onClick={()=>setView('jour')}>Jour J</button>
            <button className={view==='bilan'?'active':''} onClick={()=>setView('bilan')}>📈 Bilan</button>
          </div>
        </div>
      );

      React.useEffect(() => {
        const day = activeDay();
        const u1 = storage.subscribe(`day_${day}_ca`, (arr) => {
          const doc = (arr || []).find(x => x.id === 'data') || (arr || [])[0];
          setCa(doc && doc.caBySite ? doc.caBySite : null);
        });
        const u2 = storage.subscribe(`day_${day}_anomalies`, setAnomalies);
        return () => { u1(); u2(); };
      }, []);

      const eur = (cents) => (cents / 100).toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';

      // Avoirs (manques boutique) par site
      const creditBySite = React.useMemo(() => {
        const m = {};
        for (const a of anomalies) {
          const s = (a.site || '').toUpperCase();
          if (!s) continue;
          m[s] = (m[s] || 0) + Math.round((a.amountCredit || 0) * 100); // € → centimes
        }
        return m;
      }, [anomalies]);

      if (view === 'bilan') {
        return (
          <div className="stack">
            <Header />
            <CaDashboard />
          </div>
        );
      }

      if (!ca) {
        return (
          <div className="stack">
            <Header />
            <div className="card"><p style={{textAlign:'center',color:'var(--ink-mute)',padding:'12px 0'}}>
              Aucune donnée CA pour cette distribution. Charge le JSON commandes (Admin) pour calculer le CA, ou consulte le <strong>📈 Bilan</strong> ci-dessus pour l'historique.
            </p></div>
          </div>
        );
      }

      const sites = Object.keys(ca).sort();
      // Calcul par site
      const rows = sites.map(s => {
        const reel = ca[s].reel_cents || 0;
        const manquant = ca[s].manquant_cents || 0;
        const remise = ca[s].remise_cents || 0;
        const credit = creditBySite[s] || 0;
        const previsionnel = reel + manquant + remise; // tout ce qui était commandé, au prix plein
        const reelFinal = reel - credit;               // après manques signalés en boutique
        const mae = previsionnel - reelFinal;           // manque à gagner total
        return { s, previsionnel, reel, reelFinal, credit, manquant, remise, mae };
      });
      const tot = rows.reduce((a, r) => ({
        previsionnel: a.previsionnel + r.previsionnel,
        reel: a.reel + r.reel,
        reelFinal: a.reelFinal + r.reelFinal,
        mae: a.mae + r.mae,
      }), { previsionnel: 0, reel: 0, reelFinal: 0, mae: 0 });

      const Stat = ({ label, cents, color }) => (
        <div style={{flex:'1 1 120px',padding:'10px 12px',borderRadius:8,background:'var(--card-2,#f7f7f5)'}}>
          <div style={{fontSize:11,color:'var(--ink-mute)',marginBottom:2}}>{label}</div>
          <div style={{fontSize:18,fontWeight:700,color:color||'var(--ink)'}}>{eur(cents)}</div>
        </div>
      );

      return (
        <div className="stack">
          <Header />
          <p style={{color:'var(--ink-soft)',fontSize:13,marginTop:-8}}>
            Distribution du {dayLabelShort(activeDay())} · prix TTC.
          </p>

          {/* GLOBAL */}
          <div className="card">
            <h3 style={{marginTop:0}}>Global</h3>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              <Stat label="CA prévisionnel" cents={tot.previsionnel} />
              <Stat label="CA réel théorique" cents={tot.reel} color="var(--accent-dark,#2F5C3E)" />
              <Stat label="CA réel final" cents={tot.reelFinal} color="var(--accent-dark,#2F5C3E)" />
              <Stat label="Manque à gagner" cents={tot.mae} color="var(--danger,#E63946)" />
            </div>
            <div style={{fontSize:11,color:'var(--ink-mute)',marginTop:8}}>
              Prévisionnel = commandé au départ · Réel théorique = après manquants/remises · Réel final = après avoirs boutique ({eur(tot.previsionnel - tot.reel)} de manquants/remises, {eur(rows.reduce((a,r)=>a+r.credit,0))} d'avoirs boutique).
            </div>
          </div>

          {/* PAR SITE */}
          <div className="card">
            <h3 style={{marginTop:0}}>Par site</h3>
            <div className="stack" style={{gap:0}}>
              <div style={{display:'flex',fontSize:11,color:'var(--ink-mute)',fontWeight:600,padding:'4px 0',borderBottom:'1px solid var(--line)'}}>
                <span style={{flex:'0 0 52px'}}>Site</span>
                <span style={{flex:1,textAlign:'right'}}>Prévis.</span>
                <span style={{flex:1,textAlign:'right'}}>Réel fin.</span>
                <span style={{flex:1,textAlign:'right'}}>Manque</span>
              </div>
              {rows.map(r => (
                <div key={r.s} style={{display:'flex',fontSize:13,padding:'7px 0',borderBottom:'1px solid var(--line)'}}>
                  <span style={{flex:'0 0 52px',fontWeight:600}}>{r.s}</span>
                  <span style={{flex:1,textAlign:'right'}}>{eur(r.previsionnel)}</span>
                  <span style={{flex:1,textAlign:'right',color:'var(--accent-dark,#2F5C3E)'}}>{eur(r.reelFinal)}</span>
                  <span style={{flex:1,textAlign:'right',color: r.mae>0?'var(--danger,#E63946)':'var(--ink-mute)'}}>{eur(r.mae)}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // === RETOURS PDP (prépa) — V8 ===
    // Deux sources :
    //  1) Produits signalés en distribution (↩️) → collection pdp_returns.
    //     Cycle : pending (en boutique) → recovered (chauffeur a récupéré) → treated (entrepôt).
    //     Au traitement, la destination est recommandée selon la DLC (partage vs envoi ROB).
    //  2) Commandes non récupérées depuis +7j (followups non terminales).
    function PdpReturnsPage({ session, catalogue }) {
      const showToast = React.useContext(ToastContext);
      const [followups, setFollowups] = React.useState([]);
      const [treatments, setTreatments] = React.useState([]);
      const [manualReturns, setManualReturns] = React.useState([]);

      React.useEffect(() => {
        const u1 = storage.subscribe('followups', setFollowups);
        const u2 = storage.subscribe('pdp_treatments', setTreatments);
        const u3 = storage.subscribe('pdp_returns', setManualReturns);
        return () => { u1(); u2(); u3(); };
      }, []);

      // Statuts terminaux d'une commande non récupérée → JAMAIS d'alerte retour PDP.
      // 'done' ajouté (V8) : corrige les commandes résolues qui réapparaissaient à +7j.
      const TERMINAL = ['resolved', 'picked_up', 'credited', 'returned', 'done'];
      const returns = followups.filter(f =>
        !TERMINAL.includes(f.status) &&
        (f.forceReturnPdp || daysSince(f.distribDate || f.day) >= ALERT_DAYS_NON_RECUP) &&
        Array.isArray(f.items) && f.items.length > 0
      );

      const treatMap = React.useMemo(() => {
        const m = {}; for (const t of treatments) m[t.id] = t; return m;
      }, [treatments]);

      // Clé unique d'une ligne produit dans un retour
      const lineId = (f, it, idx) => `${f.orderId}__${it.id || idx}`;

      // Auto-clôture : quand toutes les lignes d'une commande non récup sont traitées,
      // on passe la commande en 'returned' (terminal) → elle disparaît de l'alerte (fix V8).
      React.useEffect(() => {
        for (const f of returns) {
          const allTreated = f.items.length > 0 && f.items.every((it, idx) => treatMap[lineId(f, it, idx)]);
          if (allTreated) {
            storage.setDoc('followups', f.id || f.orderId, {
              ...f, status: 'returned', autoClosed: true, updatedAt: new Date().toISOString(),
            });
          }
        }
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [returns, treatMap]);

      const setDestination = async (f, it, idx, destination) => {
        const id = lineId(f, it, idx);
        await storage.setDoc('pdp_treatments', id, {
          id, orderId: f.orderId, site: f.site,
          produit: it.produit, producteur: it.producteur, qty: it.qty || 1,
          destination,
          treatedBy: session.name, treatedAt: new Date().toISOString(),
        });
        if (destination !== 'rayon') {
          const prod = (catalogue || []).find(p => p.produit === it.produit && p.producteur === it.producteur);
          const unitPrice = prod ? (prod.prixAchat || prod.prixHT || 0) : 0;
          const qty = it.qty || 1;
          await storage.setDoc('losses', `lossret_${id}`, {
            id: `lossret_${id}`,
            productKey: prod ? `${prod.producteur}|${prod.produit}` : `${it.producteur}|${it.produit}`,
            producteur: it.producteur, produit: it.produit,
            unite: prod?.unite || '',
            destination, reason: 'erreur_prepa',
            usingWeight: false, quantity: qty, weight: 0,
            unitPrice, totalValue: unitPrice * qty,
            remark: `Retour PDP — ${f.consumer_name || ''} (${f.site})`,
            day: activeDay(),
            fromReturn: true,
            createdBy: session.name, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(),
          });
        } else {
          try { await storage.deleteDoc('losses', `lossret_${id}`); } catch(e){}
        }
        showToast('✓ Destination enregistrée');
      };

      // Clôture manuelle d'une commande non récup (récupérée / dossier clos).
      const closeReturn = async (f) => {
        await storage.setDoc('followups', f.id || f.orderId, {
          ...f, status: 'returned', updatedBy: session.name, updatedAt: new Date().toISOString(),
        });
        showToast('✓ Clôturé');
      };

      const totalLines = returns.reduce((s, f) => s + f.items.length, 0);
      const treatedLines = returns.reduce((s, f) =>
        s + f.items.filter((it, idx) => treatMap[lineId(f, it, idx)]).length, 0);

      // ── Retours manuels (produits signalés en distrib) ──
      // On garde tout ce qui n'est pas encore traité. Les produits traités disparaissent complètement.
      const manual = manualReturns
        .filter(r => r.status !== 'treated')
        .sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
      const overdue = computeOverduePdpReturns(manualReturns);
      const overdueIds = new Set(overdue.map(o => o.id));

      // Chauffeur : marquer un produit récupéré aux boutiques.
      const markRecovered = async (r) => {
        await storage.setDoc('pdp_returns', r.id, {
          status: 'recovered', recoveredBy: session.name, recoveredAt: new Date().toISOString(),
        });
        showToast('✓ Récupéré — à traiter à l\'entrepôt');
      };
      const unmarkRecovered = async (r) => {
        await storage.setDoc('pdp_returns', r.id, {
          status: 'pending', recoveredBy: '', recoveredAt: '',
        });
        showToast('Annulé');
      };
      // Produit introuvable aux boutiques → problème, déclenche l'alerte.
      const markMissing = async (r) => {
        await storage.setDoc('pdp_returns', r.id, {
          status: 'missing', missingBy: session.name, missingAt: new Date().toISOString(),
        });
        showToast('❌ Marqué non récupéré — alerte');
      };
      const unmarkMissing = async (r) => {
        await storage.setDoc('pdp_returns', r.id, {
          status: 'pending', missingBy: '', missingAt: '',
        });
        showToast('Annulé');
      };

      // Traitement entrepôt : choisir la destination (crée une perte sauf « rayon »).
      const setManualDestination = async (r, destination) => {
        await storage.setDoc('pdp_returns', r.id, {
          status: 'treated', destination,
          treatedBy: session.name, treatedAt: new Date().toISOString(),
        });
        if (destination !== 'rayon') {
          const prod = (catalogue || []).find(p => p.produit === r.produit && p.producteur === r.producteur);
          const unitPrice = prod ? (prod.prixAchat || prod.prixHT || 0) : 0;
          const qty = r.qty || 1;
          await storage.setDoc('losses', `lossret_${r.id}`, {
            id: `lossret_${r.id}`,
            productKey: prod ? `${prod.producteur}|${prod.produit}` : (r.productKey || `${r.producteur}|${r.produit}`),
            producteur: r.producteur, produit: r.produit,
            unite: prod?.unite || '',
            destination, reason: 'erreur_prepa',
            usingWeight: false, quantity: qty, weight: 0,
            unitPrice, totalValue: unitPrice * qty,
            dlc: r.dlc || '',
            remark: `Retour PDP — ${r.site}${r.remark ? ' · ' + r.remark : ''}`,
            day: activeDay(), fromReturn: true,
            createdBy: session.name, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(),
          });
        } else {
          try { await storage.deleteDoc('losses', `lossret_${r.id}`); } catch (e) {}
        }
        showToast('✓ Traité');
      };

      // Annuler un retour (déjà géré / retiré par l'entrepôt) → on supprime l'entrée + sa perte éventuelle.
      const deleteManualReturn = async (r) => {
        if (!confirm(`Annuler ce retour « ${r.produit || r.productLabel} » ?\n(déjà géré ou retiré par l'entrepôt)`)) return;
        await storage.deleteDoc('pdp_returns', r.id);
        try { await storage.deleteDoc('losses', `lossret_${r.id}`); } catch (e) {}
        showToast('Retour annulé');
      };

      // Deux côtés : À RÉCUPÉRER (chauffeur, par boutique) et À TRAITER (entrepôt).
      const toRecover = manual.filter(r => r.status === 'pending' || r.status === 'missing');
      const toTreat   = manual.filter(r => r.status === 'recovered');
      const recoverBySite = {};
      for (const r of toRecover) { const s = r.site || '?'; (recoverBySite[s] = recoverBySite[s] || []).push(r); }
      const recoverSites = Object.keys(recoverBySite).sort();

      const DEST_LABEL = (id) => (RETURN_DESTINATIONS.find(d => d.id === id) || {}).label || id;

      return (
        <div className="stack">
          <h1>↩️ Retours PDP</h1>
          <p style={{color:'var(--ink-soft)',fontSize:13,marginTop:-8}}>
            <strong>À récupérer</strong> : le chauffeur ramasse aux boutiques (réparti par lieu). <strong>À traiter</strong> : à l'entrepôt, destination selon la DLC. Commandes non récupérées +{ALERT_DAYS_NON_RECUP}j incluses.
          </p>

          {overdue.length > 0 && (
            <div className="alert-red">
              ⏰ {overdue.length} retour{overdue.length>1?'s':''} PDP en retard de traitement — alerte envoyée à rr@ + hg@.
            </div>
          )}

          <div className="stat-grid">
            <div className="stat"><div className="stat-value">{toRecover.length}</div><div className="stat-label">À récupérer</div></div>
            <div className="stat"><div className="stat-value" style={{color:'var(--info)'}}>{toTreat.length}</div><div className="stat-label">À traiter</div></div>
            <div className="stat"><div className="stat-value" style={{color:'var(--warn)'}}>{returns.length}</div><div className="stat-label">Cmd. non récup.</div></div>
          </div>

          {/* ===================== CÔTÉ 1 : À RÉCUPÉRER (chauffeur, par boutique) ===================== */}
          <div className="card" style={{borderLeft:'4px solid var(--master)',background:'var(--master-soft)'}}>
            <div style={{fontWeight:800,fontSize:16}}>🚚 À récupérer aux boutiques</div>
            <div style={{fontSize:12,color:'var(--ink-mute)',marginTop:2}}>Réparti par lieu pour la tournée du chauffeur. Coche « récupéré » au passage, ou « non récupéré » si introuvable (alerte).</div>
          </div>
          {toRecover.length === 0 ? (
            <div className="card"><p style={{textAlign:'center',color:'var(--ink-mute)',padding:'8px 0',margin:0}}>Rien à récupérer. 👍</p></div>
          ) : recoverSites.map(site => (
            <div key={site} className="card">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                <h3 style={{margin:0,fontSize:15}}>📍 {siteLabel(site)}</h3>
                <span className="badge badge-site">{recoverBySite[site].length}</span>
              </div>
              <div className="stack" style={{gap:8}}>
                {recoverBySite[site].map(r => {
                  const isMissing = r.status === 'missing';
                  const isLate = overdueIds.has(r.id);
                  return (
                    <div key={r.id} style={{padding:'8px 10px',border:'1px solid var(--line)',borderRadius:8,
                      background: isMissing ? 'var(--danger-soft,#fdecea)' : 'transparent',
                      borderLeft: (isLate || isMissing) ? '3px solid var(--danger)' : '1px solid var(--line)'}}>
                      <div style={{display:'flex',justifyContent:'space-between',gap:8,alignItems:'baseline'}}>
                        <div style={{fontWeight:600,fontSize:14}}>{r.produit || r.productLabel}{r.qty>1?` ×${r.qty}`:''}</div>
                        <span style={{fontSize:11,color:'var(--ink-mute)',whiteSpace:'nowrap'}}>signalé le {formatDateShort(r.day)}</span>
                      </div>
                      <div style={{fontSize:11,color:'var(--ink-mute)',marginTop:2}}>
                        {r.producteur ? r.producteur+' · ' : ''}{r.dlc ? <>DLC <strong>{formatDateShort(r.dlc)}</strong></> : 'DLC non renseignée'}
                        {r.clientName ? ` · ${r.clientName}` : ''}
                      </div>
                      {r.remark && <div style={{fontSize:12,color:'var(--ink-soft)',fontStyle:'italic',marginTop:2}}>« {r.remark} »</div>}
                      {isMissing ? (
                        <div style={{marginTop:8}}>
                          <div style={{fontSize:12,color:'var(--danger)',fontWeight:700,marginBottom:4}}>❌ Non récupéré — introuvable (alerte envoyée)</div>
                          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                            <button className="btn-secondary" style={{padding:'5px 10px',fontSize:12}} onClick={()=>markRecovered(r)}>✅ Finalement récupéré</button>
                            <button className="btn-ghost" style={{padding:'5px 10px',fontSize:12}} onClick={()=>unmarkMissing(r)}>↩ Annuler statut</button>
                            <button className="btn-ghost" style={{padding:'5px 10px',fontSize:12,color:'var(--ink-mute)'}} onClick={()=>deleteManualReturn(r)}>🗑️ Déjà géré</button>
                          </div>
                        </div>
                      ) : (
                        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:8}}>
                          <button className="btn-primary" style={{padding:'6px 12px',fontSize:13}} onClick={()=>markRecovered(r)}>✅ Récupéré</button>
                          <button className="btn-secondary" style={{padding:'6px 12px',fontSize:13}} onClick={()=>markMissing(r)}>❌ Non récupéré</button>
                          <button className="btn-ghost" style={{padding:'6px 10px',fontSize:12,color:'var(--ink-mute)'}} onClick={()=>deleteManualReturn(r)}>🗑️ Déjà géré</button>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          ))}

          {/* ===================== CÔTÉ 2 : À TRAITER (entrepôt) ===================== */}
          <div className="card" style={{borderLeft:'4px solid var(--info)'}}>
            <div style={{fontWeight:800,fontSize:16}}>🏭 À traiter (entrepôt)</div>
            <div style={{fontSize:12,color:'var(--ink-mute)',marginTop:2}}>Produits récupérés + commandes non récupérées. La destination conseillée (★) dépend de la DLC : remise en rayon si encore vendable, envoi ROB si une navette rattrape la DLC, sinon partage.</div>
          </div>

          {toTreat.length === 0 && returns.length === 0 ? (
            <div className="card"><p style={{textAlign:'center',color:'var(--ink-mute)',padding:'8px 0',margin:0}}>Rien à traiter pour le moment.</p></div>
          ) : null}

          {/* Produits récupérés (signalés en distrib) */}
          {toTreat.map(r => {
            const route = routeReturn(r.dlc);
            return (
              <div key={r.id} className="card">
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4,gap:8}}>
                  <h3 style={{margin:0,fontSize:15}}>{r.produit || r.productLabel}{r.qty>1?` ×${r.qty}`:''}</h3>
                  <span className="badge badge-site" style={{whiteSpace:'nowrap'}}>📍 {r.site}</span>
                </div>
                {r.producteur && <div style={{fontSize:12,color:'var(--ink-mute)'}}>{r.producteur}</div>}
                <div style={{fontSize:12,color:'var(--ink-soft)',margin:'2px 0 6px'}}>
                  {r.dlc ? <>DLC <strong>{formatDateShort(r.dlc)}</strong></> : 'DLC non renseignée'} · ✅ récupéré{r.recoveredBy?` · ${r.recoveredBy}`:''}
                </div>
                <div className={route.dest==='partage'?'alert-warning':route.dest==='rayon'?'alert-info':'alert-info'} style={{fontSize:12,marginBottom:6}}>
                  💡 Conseil : <strong>{DEST_LABEL(route.dest)}</strong> — {route.reason}
                </div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  {RETURN_DESTINATIONS.map(d => {
                    const isReco = d.id === route.dest;
                    return (
                      <div key={d.id} className={`chip chip-${d.color}`}
                        style={{fontSize:12, ...(isReco ? {boxShadow:'0 0 0 2px var(--accent)'} : {})}}
                        onClick={()=>setManualDestination(r, d.id)}>
                        {isReco ? '★ ' : ''}{d.label}
                      </div>
                    );
                  })}
                </div>
                <div style={{marginTop:6}}>
                  <button className="btn-ghost" style={{padding:'4px 8px',fontSize:11,color:'var(--ink-mute)'}} onClick={()=>unmarkRecovered(r)}>↩ pas encore récupéré</button>
                </div>
              </div>
            );
          })}

          {/* Commandes non récupérées (+7j) — traitées ligne par ligne */}
          {returns.length > 0 && (
            <>
              <div className="card" style={{borderLeft:`3px solid ${treatedLines===totalLines?'var(--ok,#2e7d32)':'var(--warn,#e0a800)'}`}}>
                <strong>📦 Commandes non récupérées</strong> · {treatedLines}/{totalLines} produits traités · {returns.length} commande{returns.length>1?'s':''}
              </div>
              {returns.map(f => {
                const allTreated = f.items.length > 0 && f.items.every((it, idx) => treatMap[lineId(f, it, idx)]);
                return (
                  <div key={f.orderId} className="card">
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:8}}>
                      <h3 style={{margin:0}}>{f.consumer_name || '(client)'}</h3>
                      <span style={{fontSize:12,color:'var(--ink-mute)'}}>{f.site} · il y a {daysSince(f.distribDate || f.day)}j</span>
                    </div>
                    <div className="stack" style={{gap:0}}>
                      {f.items.map((it, idx) => {
                        const t = treatMap[lineId(f, it, idx)];
                        const route = routeReturn(it.dlc);
                        return (
                          <div key={idx} style={{padding:'8px 0',borderTop: idx ? '1px solid var(--line)' : 'none', background: t ? 'transparent' : 'var(--warn-soft)'}}>
                            <div style={{fontWeight:600,fontSize:13}}>{it.produit}{it.qty>1?` ×${it.qty}`:''}</div>
                            <div style={{fontSize:11,color:'var(--ink-mute)',marginBottom:6}}>{it.producteur}{it.dlc?` · DLC ${formatDateShort(it.dlc)}`:''}</div>
                            {t && <div style={{fontSize:12,color:'var(--ok,#2e7d32)',marginBottom:4}}>✓ {DEST_LABEL(t.destination)}</div>}
                            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                              {RETURN_DESTINATIONS.map(d => {
                                const isReco = !t && d.id === route.dest;
                                return (
                                  <div key={d.id} className={`chip chip-${d.color} ${t && t.destination===d.id ? 'selected' : ''}`}
                                    style={{fontSize:12, ...(isReco ? {boxShadow:'0 0 0 2px var(--accent)'} : {})}}
                                    onClick={() => setDestination(f, it, idx, d.id)}>
                                    {isReco ? '★ ' : ''}{d.label}
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                    <div style={{marginTop:8,display:'flex',justifyContent:'flex-end'}}>
                      <button className="btn-secondary" style={{padding:'6px 10px',fontSize:12}} onClick={() => closeReturn(f)}>
                        {allTreated ? '✓ Tout traité — clôturer' : '✓ Clôturer (récupéré / résolu)'}
                      </button>
                    </div>
                  </div>
                );
              })}
            </>
          )}
        </div>
      );
    }

    function LossesPage({ session, catalogue, catalogueMeta }) {
      const showToast = React.useContext(ToastContext);
      const [losses, setLosses] = React.useState([]);
      const [sentWeeks, setSentWeeks] = React.useState([]);
      const [showForm, setShowForm] = React.useState(false);
      const [editing, setEditing] = React.useState(null);
      const [busy, setBusy] = React.useState(false);

      const week = currentWeek();

      React.useEffect(() => {
        const unsub = storage.subscribe('losses', setLosses);
        const unsub2 = storage.subscribe('losses_sent', setSentWeeks);
        return () => { unsub(); unsub2(); };
      }, []);

      // Cette semaine a-t-elle déjà été envoyée ?
      const alreadySent = sentWeeks.find(s => s.id === week.monday);

      // Pertes de la semaine courante
      // Fenêtre semaine élargie au dimanche : les distributions (et pertes sèches distrib)
      // ont lieu mer→sam, donc le samedi tombe APRÈS week.friday et était auparavant ignoré.
      const weekEnd = addDays(week.monday, 6);
      const weekLosses = losses.filter(l => l.day >= week.monday && l.day <= weekEnd);
      const allTimeLosses = losses;

      const jeteWeek = weekLosses.filter(l => l.destination === 'jete');
      const pribonWeek = weekLosses.filter(l => l.destination === 'pribon');
      const totalJete = jeteWeek.reduce((s, l) => s + (l.totalValue || 0), 0);
      const totalPribon = pribonWeek.reduce((s, l) => s + (l.totalValue || 0), 0);
      const totalWeek = totalJete + totalPribon;

      const handleDelete = async (id) => {
        if (!confirm('Supprimer cette entrée ?')) return;
        await storage.deleteDoc('losses', id);
        showToast('Supprimée');
      };

      const [pdfGenerated, setPdfGenerated] = React.useState(false);
      const [confirmingSent, setConfirmingSent] = React.useState(false);

      const handleSendToManager = async () => {
        if (weekLosses.length === 0) { showToast('Aucune perte cette semaine'); return; }
        if (!window.jspdf) { showToast('PDF non disponible, recharge la page'); return; }
        setBusy(true);
        try {
          // Générer le PDF
          const sorted = [...weekLosses].sort((a, b) => (a.day || '').localeCompare(b.day || ''));
          const doc = generateLossesPDF(sorted, week);
          const filename = `Pertes_Kelbongoo_S${week.monday}.pdf`;

          // Sauvegarder le PDF (copie locale)
          doc.save(filename);

          // Envoi SERVEUR avec PDF en pièce jointe — jamais de mailto / ouverture mail.
          const b64 = doc.output('datauristring').split(',')[1];
          const subject = `Pertes Kelbongoo · Semaine du ${formatDateShort(week.mondayDate)} - Total : ${totalWeek.toFixed(2)}€`;
          const body =
            `Bonjour,\n\n` +
            `Rapport hebdomadaire des pertes en pièce jointe.\n\n` +
            `Récap :\n` +
            `- Jetées : ${jeteWeek.length} entrées · ${totalJete.toFixed(2)} €\n` +
            `- Envoyé Pribon ROB : ${pribonWeek.length} entrées · ${totalPribon.toFixed(2)} €\n` +
            `- TOTAL valorisé : ${totalWeek.toFixed(2)} €\n\n` +
            `${session.name}\nPréparation Kelbongoo`;
          const r = await stockPost({ secret: FRESHDESK_SECRET, action: 'send_mail',
            to: LOSSES_EMAILS, subject, body,
            attachment: { dataB64: b64, mimeType: 'application/pdf', name: filename } });
          if (!r.ok) { showToast('Erreur envoi : ' + (r.error || 'inconnue')); setBusy(false); return; }
          setPdfGenerated(true);
          showToast('✓ Rapport envoyé (ga@ + rr@ + hg@, PDF joint)');
        } catch (e) {
          showToast('Erreur : ' + e.message);
        } finally { setBusy(false); }
      };

      const handleConfirmSent = async () => {
        if (!confirm('Confirmer que le mail a bien été envoyé ?\n\nCela va archiver les pertes de la semaine et vider l\'affichage.')) return;
        setConfirmingSent(true);
        try {
          // Archiver les données dans Firebase (collection "losses_archive") avant suppression
          const archiveId = `archive_${week.monday}_${Date.now()}`;
          await storage.setDoc('losses_archive', archiveId, {
            week_monday: week.monday,
            week_friday: week.friday,
            sentBy: session.name,
            sentAt: new Date().toISOString(),
            totalJete, totalPribon, totalWeek,
            countJete: jeteWeek.length,
            countPribon: pribonWeek.length,
            losses: JSON.stringify(weekLosses), // archive complète
          });
          // Marquer la semaine comme envoyée
          await storage.setDoc('losses_sent', `${week.monday}`, {
            week_monday: week.monday,
            week_friday: week.friday,
            sentBy: session.name,
            sentAt: new Date().toISOString(),
            totalJete, totalPribon,
            count: weekLosses.length,
          });
          // Supprimer les entrées de la semaine
          for (const l of weekLosses) {
            await storage.deleteDoc('losses', l.id);
          }
          setPdfGenerated(false);
          showToast(`✓ ${weekLosses.length} entrée(s) archivée(s)`);
        } catch (e) {
          showToast('Erreur : ' + e.message);
        } finally { setConfirmingSent(false); }
      };

      return (
        <div className="stack">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <h1>Pertes</h1>
            <button className="btn-primary" disabled={!catalogue || catalogue.length === 0} onClick={() => { setEditing(null); setShowForm(true); }}>
              + Ajouter
            </button>
          </div>
          <p style={{color:'var(--ink-soft)',fontSize:13,marginTop:-8}}>
            Semaine du <strong>{formatDateShort(week.mondayDate)} au {formatDateShort(week.fridayDate)}</strong>.
            Saisie possible toute la semaine, envoi vendredi.
          </p>

          {alreadySent && (
            <div className="alert-success">
              ✓ Cette semaine a déjà été envoyée au gérant par {alreadySent.sentBy} le {formatDateShort(alreadySent.sentAt)} à {formatTimeFR(alreadySent.sentAt)}.
              <br/><small>Tu peux quand même ajouter des entrées en retard et renvoyer si nécessaire.</small>
            </div>
          )}

          {(!catalogue || catalogue.length === 0) ? (
            <div className="alert-warning">
              ⚠️ Le catalogue complet n'est pas chargé. Va dans <strong>Admin</strong> pour uploader le CSV catalogue complet (à faire chaque vendredi).
            </div>
          ) : catalogueMeta && (
            <div className="alert-success" style={{fontSize:12,padding:'8px 12px'}}>
              ✓ Catalogue chargé : {catalogue.length} produits · MAJ il y a {daysSince(catalogueMeta.uploadedAt)}j
            </div>
          )}

          <div className="stat-grid">
            <div className="stat"><div className="stat-value">{weekLosses.length}</div><div className="stat-label">Cette semaine</div></div>
            <div className="stat"><div className="stat-value" style={{color:'var(--danger)'}}>{totalJete.toFixed(0)}€</div><div className="stat-label">Jeté</div></div>
            <div className="stat"><div className="stat-value" style={{color:'var(--info)'}}>{totalPribon.toFixed(0)}€</div><div className="stat-label">Pribon ROB</div></div>
          </div>

          {totalWeek > 0 && (
            <div className="card" style={{background:'var(--master-soft)',border:'1px solid var(--master)'}}>
              <h3 style={{color:'var(--master)',marginBottom:8}}>Total semaine : {totalWeek.toFixed(2)} €</h3>

              {!pdfGenerated ? (
                <>
                  <button className="btn-primary btn-block btn-lg" disabled={busy} onClick={handleSendToManager}>
                    {busy ? 'Génération…' : '📧 1. Générer PDF et ouvrir mail'}
                  </button>
                  <div style={{fontSize:11,color:'var(--ink-soft)',marginTop:8,textAlign:'center'}}>
                    Le PDF est téléchargé, ton client mail s'ouvre avec destinataire et message pré-remplis.<br/>
                    Il te restera à joindre le PDF dans le mail et cliquer "Envoyer".
                  </div>
                </>
              ) : (
                <>
                  <div className="alert-success" style={{marginBottom:12}}>
                    ✓ PDF généré et téléchargé.<br/>
                    Une fois le mail bien envoyé au gérant, clique sur le bouton ci-dessous.
                  </div>
                  <div className="row" style={{display:'flex',gap:6}}>
                    <button className="btn-secondary" onClick={() => setPdfGenerated(false)} style={{flex:1}}>
                      Annuler
                    </button>
                    <button className="btn-primary btn-lg" disabled={confirmingSent} onClick={handleConfirmSent} style={{flex:2}}>
                      {confirmingSent ? 'Archivage…' : '✅ 2. Confirmer envoi (vider l\'écran)'}
                    </button>
                  </div>
                  <button className="btn-ghost btn-block" onClick={handleSendToManager} disabled={busy} style={{marginTop:8,fontSize:12}}>
                    🔄 Re-générer le PDF / re-ouvrir le mail
                  </button>
                </>
              )}
            </div>
          )}

          <h3 style={{marginTop:16}}>📊 Récapitulatif par catégorie</h3>
          {weekLosses.length === 0 ? (
            <div className="empty-state"><div className="icon">📋</div><p>Aucune perte pour faire le récap.</p></div>
          ) : (() => {
            // Grouper les pertes par destination, puis par catégorie, puis par produit
            const DEST_ORDER = ['jete', 'partage', 'pribon'];
            const DEST_LABELS = { jete: '🗑️ Jeté (perte sèche)', partage: '👥 Partage équipe', pribon: '📦 Envoi Pribon/ROB' };
            const DEST_COLORS = { jete: 'var(--danger)', partage: 'var(--accent)', pribon: 'var(--info)' };
            const byDest = {};
            for (const loss of weekLosses) {
              const dest = loss.destination || 'jete';
              if (!byDest[dest]) byDest[dest] = { items: [], total: 0 };
              const prod = (catalogue || []).find(p => p.produit === loss.produit && p.producteur === loss.producteur);
              const cat = prod?.famille || prod?.category || 'Autre';
              const reasonDef = LOSS_REASONS.find(r => r.id === loss.reason);
              byDest[dest].items.push({
                produit: loss.produit,
                producteur: loss.producteur,
                category: cat,
                reason: reasonDef?.label || loss.reason || '',
                qty: loss.usingWeight ? loss.weight : loss.quantity,
                unit: loss.usingWeight ? 'kg' : 'u',
                value: loss.totalValue || 0,
                day: loss.day,
                remark: loss.remark || '',
              });
              byDest[dest].total += loss.totalValue || 0;
            }
            return (
              <div className="stack" style={{gap:12}}>
                {DEST_ORDER.filter(d => byDest[d]).map(dest => {
                  const group = byDest[dest];
                  // Sous-grouper par catégorie
                  const byCat = {};
                  for (const it of group.items) {
                    if (!byCat[it.category]) byCat[it.category] = [];
                    byCat[it.category].push(it);
                  }
                  const cats = Object.keys(byCat).sort();
                  return (
                    <div key={dest} className="card" style={{borderLeft:`3px solid ${DEST_COLORS[dest] || 'var(--line)'}`}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                        <div style={{fontWeight:700,fontSize:14,color:DEST_COLORS[dest]}}>{DEST_LABELS[dest] || dest}</div>
                        <div style={{fontWeight:700,fontSize:14}}>{group.total.toFixed(2)} €</div>
                      </div>
                      {cats.map(cat => (
                        <div key={cat} style={{marginBottom:8}}>
                          <div style={{fontSize:11,fontWeight:600,color:'var(--ink-mute)',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:4}}>{cat}</div>
                          {byCat[cat].map((item, i) => (
                            <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',fontSize:13,padding:'5px 0',borderBottom:'1px solid var(--line)'}}>
                              <div style={{flex:1,minWidth:0}}>
                                <div style={{fontWeight:500}}>{item.produit}</div>
                                <div style={{fontSize:11,color:'var(--ink-mute)'}}>
                                  {item.producteur} · {item.reason}{item.remark ? ` · ${item.remark}` : ''} · {formatDateShort(item.day)}
                                </div>
                              </div>
                              <div style={{textAlign:'right',whiteSpace:'nowrap',marginLeft:8}}>
                                <div style={{fontWeight:600}}>{item.qty} {item.unit}</div>
                                <div style={{fontSize:11,color:'var(--ink-soft)'}}>{item.value.toFixed(2)} €</div>
                              </div>
                            </div>
                          ))}
                        </div>
                      ))}
                    </div>
                  );
                })}
              </div>
            );
          })()}

          <h3 style={{marginTop:16}}>Entrées de la semaine</h3>
          {weekLosses.length === 0 ? (
            <div className="empty-state"><div className="icon">🗑️</div><p>Aucune perte enregistrée cette semaine.</p></div>
          ) : (
            <div className="list">
              {weekLosses.sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||'')).map(l => {
                const reasonDef = LOSS_REASONS.find(r => r.id === l.reason);
                const destDef = LOSS_DESTINATIONS.find(d => d.id === l.destination);
                return (
                  <div key={l.id} className="list-item" style={{flexDirection:'column',alignItems:'stretch'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div className="list-item-name">{l.produit}</div>
                        <div className="list-item-sub">
                          {l.producteur} · {formatDateShort(l.day)} · {l.createdBy}
                        </div>
                      </div>
                      <div style={{display:'flex',gap:4}}>
                        <button className="btn-ghost" onClick={() => { setEditing(l); setShowForm(true); }} style={{fontSize:13}}>✏️</button>
                        <button className="btn-ghost" onClick={() => handleDelete(l.id)} style={{fontSize:13}}>🗑️</button>
                      </div>
                    </div>
                    <div style={{marginTop:6,display:'flex',flexWrap:'wrap',gap:4,alignItems:'center'}}>
                      <span className={`badge badge-${destDef?.color === 'danger' ? 'danger' : 'info'}`}>{destDef?.label}</span>
                      <span className="badge badge-anom">{reasonDef?.label}</span>
                      <span style={{fontSize:13,color:'var(--ink-soft)',marginLeft:4}}>
                        {l.usingWeight ? `${l.weight} kg` : `${l.quantity} u`} × {(l.unitPrice || 0).toFixed(2)}€ = <strong>{(l.totalValue || 0).toFixed(2)}€</strong>
                      </span>
                    </div>
                    {l.remark && <div style={{marginTop:6,fontSize:13,fontStyle:'italic',color:'var(--ink-soft)'}}>« {l.remark} »</div>}
                  </div>
                );
              })}
            </div>
          )}

          {showForm && (
            <LossForm
              catalogue={catalogue}
              session={session}
              editing={editing}
              onClose={() => { setShowForm(false); setEditing(null); }}
            />
          )}
        </div>
      );
    }

    // === FORM PERTE ===
    function LossForm({ catalogue, session, editing, onClose }) {
      const showToast = React.useContext(ToastContext);
      const [productKey, setProductKey] = React.useState(editing?.productKey || '');
      const [destination, setDestination] = React.useState(editing?.destination || 'jete');
      const [reason, setReason] = React.useState(editing?.reason || '');
      const [usingWeight, setUsingWeight] = React.useState(editing?.usingWeight || false);
      const [quantity, setQuantity] = React.useState(editing?.quantity || '1');
      const [weight, setWeight] = React.useState(editing?.weight || '');
      const [remark, setRemark] = React.useState(editing?.remark || '');
      const [dlc, setDlc] = React.useState(editing?.dlc || '');
      const [busy, setBusy] = React.useState(false);
      // Reco partage vs ROB selon la DLC (même logique que les retours PDP).
      const route = dlc ? routeByDLC(dlc) : null;
      // Présélection automatique de la destination dès qu'une DLC donne un conseil,
      // tant que l'opérateur n'a pas choisi lui-même (pas de bouton « Appliquer » à cliquer).
      const [destTouched, setDestTouched] = React.useState(!!editing);
      const pickDest = (id) => { setDestTouched(true); setDestination(id); };
      React.useEffect(() => {
        if (route && !destTouched) setDestination(route.dest);
      }, [route ? route.dest : null]);
      // Chips en ordre alphabétique (plus simple à scanner sur mobile).
      const destSorted = React.useMemo(() => [...LOSS_DESTINATIONS].sort((a,b)=>a.label.localeCompare(b.label,'fr')), []);
      const reasonsSorted = React.useMemo(() => [...LOSS_REASONS].sort((a,b)=>a.label.localeCompare(b.label,'fr')), []);

      const selectedProduct = (catalogue || []).find(p => `${p.producteur}|${p.produit}` === productKey);
      // Prix d'achat en euros (le CSV stocke en centimes /100)
      const unitPrice = selectedProduct ? (selectedProduct.prixAchat || selectedProduct.prixHT || 0) : 0;
      const qtyValue = usingWeight ? parseFloat(weight) || 0 : parseFloat(quantity) || 0;
      const totalValue = unitPrice * qtyValue;

      const handleSubmit = async () => {
        if (!productKey) { showToast('Choisis un produit'); return; }
        if (!reason) { showToast('Choisis une raison'); return; }
        if (usingWeight && !weight) { showToast('Indique le poids'); return; }
        if (!usingWeight && !quantity) { showToast('Indique la quantité'); return; }
        setBusy(true);
        try {
          const id = editing?.id || `loss_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
          const data = {
            productKey,
            producteur: selectedProduct?.producteur || '',
            produit: selectedProduct?.produit || '',
            unite: selectedProduct?.unite || '',
            destination, reason,
            usingWeight,
            quantity: usingWeight ? 0 : parseFloat(quantity) || 0,
            weight: usingWeight ? parseFloat(weight) || 0 : 0,
            unitPrice,
            totalValue,
            remark,
            dlc,
            day: activeDay(),
            createdBy: session.name,
            createdAt: editing?.createdAt || new Date().toISOString(),
            updatedAt: new Date().toISOString(),
          };
          await storage.setDoc('losses', id, data);
          showToast(editing ? '✓ Mise à jour' : '✓ Perte enregistrée');
          onClose();
        } catch (err) { showToast('Erreur : ' + err.message); }
        finally { setBusy(false); }
      };

      return (
        <div className="modal-backdrop" onClick={(e) => { if (e.target.className === 'modal-backdrop') onClose(); }}>
          <div className="modal">
            <div className="modal-header">
              <h2>{editing ? 'Modifier perte' : 'Nouvelle perte'}</h2>
              <button className="modal-close" onClick={onClose}>×</button>
            </div>
            <div className="field">
              <label>Produit (catalogue complet)</label>
              <ProductPicker products={catalogue} value={productKey} onChange={setProductKey} allowFreetext={false} />
            </div>

            {selectedProduct && (
              <div className="alert-info" style={{marginBottom: 12, fontSize: 12}}>
                💰 Prix d'achat : <strong>{unitPrice.toFixed(2)} €</strong> / {selectedProduct.unite}
              </div>
            )}

            <div className="field">
              <label>DLC (optionnel — pour le conseil partage / ROB)</label>
              <input type="date" value={dlc} onChange={e => setDlc(e.target.value)} />
              {route && (
                <div className={route.dest==='partage' ? 'alert-warning' : 'alert-info'} style={{marginTop:8,fontSize:12}}>
                  💡 Destination présélectionnée : <strong>{route.dest==='partage' ? 'Partage équipe' : 'Envoi ROB'}</strong>{route.navette ? ` (navette ${route.navette.label})` : ''} — {route.reason}
                </div>
              )}
            </div>

            <div className="field">
              <label>Destination</label>
              <div className="chip-group">
                {destSorted.map(d => {
                  const isReco = route && d.id === route.dest;
                  return (
                    <div key={d.id} className={`chip chip-${d.color} ${destination === d.id ? 'selected' : ''}`}
                      style={isReco ? {boxShadow:'0 0 0 2px var(--accent)'} : undefined}
                      onClick={() => pickDest(d.id)}>{isReco ? '★ ' : ''}{d.label}</div>
                  );
                })}
              </div>
            </div>

            <div className="field">
              <label>Raison</label>
              <div className="chip-group">
                {reasonsSorted.map(r => (
                  <div key={r.id} className={`chip ${reason === r.id ? 'selected' : ''}`} onClick={() => setReason(r.id)}>{r.label}</div>
                ))}
              </div>
            </div>

            <div className="field">
              <label>Saisie en</label>
              <div className="chip-group">
                <div className={`chip ${!usingWeight ? 'selected' : ''}`} onClick={() => setUsingWeight(false)}>Quantité (unités)</div>
                <div className={`chip ${usingWeight ? 'selected' : ''}`} onClick={() => setUsingWeight(true)}>Poids (kg)</div>
              </div>
            </div>

            {usingWeight ? (
              <div className="field">
                <label>Poids (kg)</label>
                <input type="number" step="0.01" min="0" value={weight} onChange={e => setWeight(e.target.value)} placeholder="0.00" />
              </div>
            ) : (
              <div className="field">
                <label>Quantité</label>
                <input type="number" min="1" value={quantity} onChange={e => setQuantity(e.target.value)} />
              </div>
            )}

            {totalValue > 0 && (
              <div className="alert-success" style={{marginBottom:12,padding:'10px 12px'}}>
                <strong>Valeur :</strong> {qtyValue} {usingWeight ? 'kg' : 'u'} × {unitPrice.toFixed(2)}€ = <strong>{totalValue.toFixed(2)} €</strong>
              </div>
            )}

            <div className="field">
              <label>Remarque (optionnel)</label>
              <textarea rows={2} value={remark} onChange={e => setRemark(e.target.value)} placeholder="Précisions…" />
            </div>

            <div className="row">
              <button className="btn-secondary" onClick={onClose}>Annuler</button>
              <button className="btn-primary" disabled={busy} onClick={handleSubmit}>
                {busy ? 'Enregistrement…' : 'Enregistrer'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // HISTORIQUE DES PERTES (admin) — toutes les semaines passées
    // ============================================================
    function LossesHistory() {
      const [losses, setLosses] = React.useState([]);
      const [archives, setArchives] = React.useState([]);
      React.useEffect(() => {
        const u1 = storage.subscribe('losses', setLosses);
        const u2 = storage.subscribe('losses_archive', setArchives);
        return () => { u1 && u1(); u2 && u2(); };
      }, []);

      // Grouper les pertes EN COURS (non archivées) par semaine (lundi).
      const byWeek = {};
      for (const l of losses) {
        if (!l.day) continue;
        const d = new Date(l.day + 'T12:00:00');
        const dow = (d.getDay() + 6) % 7; // 0 = lundi
        const monday = addDays(l.day, -dow);
        (byWeek[monday] = byWeek[monday] || []).push(l);
      }

      // Semaines ARCHIVÉES (déjà envoyées au gérant → retirées du live, conservées ici).
      // Chaque doc d'archive contient losses = JSON.stringify(weekLosses).
      const archByWeek = {};
      for (const a of archives) {
        const monday = a.week_monday;
        if (!monday) continue;
        let items = [];
        try { items = JSON.parse(a.losses || '[]'); } catch (e) { items = []; }
        archByWeek[monday] = { items, info: a };
      }

      // Union des semaines, récent → ancien.
      const allMondays = [...new Set([...Object.keys(byWeek), ...Object.keys(archByWeek)])]
        .sort((a, b) => b.localeCompare(a));
      const thisMonday = currentWeek().monday;

      return (
        <div className="card">
          <h3 style={{marginBottom:8}}>📚 Historique des pertes</h3>
          {allMondays.length === 0 ? (
            <p style={{fontSize:13,color:'var(--ink-mute)'}}>Aucune perte enregistrée.</p>
          ) : (
            allMondays.map(monday => {
              const arch = archByWeek[monday];
              const items = (byWeek[monday] || (arch ? arch.items : []));
              const total = items.reduce((s,l) => s + (l.totalValue||0), 0);
              const jete = items.filter(l => l.destination === 'jete').reduce((s,l)=>s+(l.totalValue||0),0);
              const pribon = items.filter(l => l.destination === 'pribon').reduce((s,l)=>s+(l.totalValue||0),0);
              const isCurrent = monday === thisMonday && byWeek[monday];
              const isArchived = !byWeek[monday] && arch;
              return (
                <details key={monday} style={{marginBottom:6,border:'1px solid var(--border)',borderRadius:8,padding:'6px 10px'}} open={isCurrent}>
                  <summary style={{cursor:'pointer',fontSize:13,fontWeight:600}}>
                    Semaine du {formatDateShort(monday)} {isCurrent && '(en cours)'}{isArchived && ' ✉️'} · {items.length} entrée{items.length>1?'s':''} · <span style={{color:'var(--warn)'}}>{total.toFixed(2)} €</span>
                  </summary>
                  <div style={{fontSize:12,color:'var(--ink-soft)',margin:'6px 0'}}>
                    Jetées : {jete.toFixed(2)} € · Pribon : {pribon.toFixed(2)} €
                    {isArchived && arch.info && arch.info.sentAt && (
                      <span> · envoyée le {formatDateShort((arch.info.sentAt||'').slice(0,10))}{arch.info.sentBy?` par ${arch.info.sentBy}`:''}</span>
                    )}
                  </div>
                  <div className="stack" style={{gap:3}}>
                    {items.slice().sort((a,b)=>(a.day||'').localeCompare(b.day||'')).map((l,idx) => (
                      <div key={l.id || idx} style={{display:'flex',justifyContent:'space-between',fontSize:12,padding:'2px 0',borderBottom:'1px solid var(--border)'}}>
                        <span>{formatDateShort(l.day)} · {l.produit || l.productName || l.product || '(produit)'} {l.destination==='jete'?'🗑️':'♻️'}</span>
                        <strong>{(l.totalValue||0).toFixed(2)} €</strong>
                      </div>
                    ))}
                  </div>
                </details>
              );
            })
          )}
        </div>
      );
    }

    // ============================================================

    // ============================================================
    // CHARGEMENT PROBON FL (admin + master)
    // Lit un fichier Excel Probon (colonnes CODE/DESIGNATION/COL/UV/PRIX PRO),
    // appelle probon_import côté proxy, affiche :
    //   - recap produits MAJ
    //   - codes manquants → bouton mail à Probon
    //   - correspondances à confirmer (produits actifs sans code)
    // ============================================================
    function ProbonImportCard({ session }) {
      const showToast = React.useContext(ToastContext);
      const [file, setFile] = React.useState(null);
      const [busy, setBusy] = React.useState(false);
      const [result, setResult] = React.useState(null);
      const [sendingMail, setSendingMail] = React.useState(false);
      const [lastImport, setLastImport] = React.useState(null);

      React.useEffect(() => {
        (async () => {
          try { const m = await storage.getDoc('probon_import_meta','last'); if (m) setLastImport(m); } catch(e) {}
        })();
      }, []);

      const parseXlsx = (file) => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
            const ws = wb.Sheets[wb.SheetNames[0]];
            const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
            if (!raw.length) { reject(new Error('Fichier vide')); return; }
            // Trouve les indices des colonnes attendues (insensible à la casse/accents)
            const norm = s => String(s||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ');
            const header = raw[0].map(norm);
            const find = (...aliases) => { for (const a of aliases) { const i = header.indexOf(norm(a)); if (i >= 0) return i; } return -1; };
            const iCode = find('code','ref','reference');
            const iDes  = find('designation','désignation','nom','produit','libelle','libellé','nom-fr');
            const iCol  = find('col','colisage','colis');
            const iUv   = find('uv','unite','unité','unite de vente','unité de vente');
            const iPrix = find('prix pro','prix achat','prixpro','prix ht','prixht','prix');
            if (iCode < 0) { reject(new Error('Colonne CODE introuvable (header: ' + raw[0].join(' | ') + ')')); return; }
            const rows = [];
            for (let r = 1; r < raw.length; r++) {
              const row = raw[r];
              const code = String(row[iCode] || '').trim();
              if (!code) continue;
              rows.push({
                code,
                designation: iDes  >= 0 ? String(row[iDes]  || '').trim() : '',
                col:         iCol  >= 0 ? row[iCol]  : '',
                uv:          iUv   >= 0 ? String(row[iUv]   || '').trim() : '',
                prixHt:      iPrix >= 0 ? row[iPrix] : '',
              });
            }
            if (!rows.length) { reject(new Error('Aucune ligne produit trouvée')); return; }
            resolve(rows);
          } catch(e) { reject(e); }
        };
        reader.onerror = () => reject(new Error('Erreur lecture fichier'));
        reader.readAsArrayBuffer(file);
      });

      const handleImport = async () => {
        if (!file) return;
        setBusy(true); setResult(null);
        try {
          const rows = await parseXlsx(file);
          const data = await flPost({ secret: FRESHDESK_SECRET, action: 'probon_import', rows });
          if (!data.ok) throw new Error(data.error || 'erreur proxy');
          setResult(data);
          const meta = { at: new Date().toISOString(), by: session.name, file: file.name,
            updated: data.updated, deactivated: data.deactivated,
            missingCodes: data.missingCodes||[], unmatchedSite: data.unmatchedSite||[] };
          await storage.setDoc('probon_import_meta', 'last', meta, { replace: true });
          setLastImport(meta);
          showToast(`✓ Probon chargé : ${data.updated} MAJ · ${data.deactivated} désactivé(s)`);
        } catch(e) {
          showToast('Erreur : ' + e.message);
        } finally {
          setBusy(false);
        }
      };

      const sendMailProbon = async () => {
        if (!result || !result.missingCodes || !result.missingCodes.length) return;
        setSendingMail(true);
        try {
          const data = await flPost({ secret: FRESHDESK_SECRET, action: 'mail_probon_missing', codes: result.missingCodes });
          if (!data.ok) throw new Error(data.error || 'erreur proxy');
          showToast(`✉️ Mail envoyé à Stéphane (${data.sent} produit(s) indispo Probon)`);
        } catch(e) {
          showToast('Erreur envoi mail : ' + e.message);
        } finally {
          setSendingMail(false);
        }
      };

      const [sendingNew, setSendingNew] = React.useState(false);
      const sendMailProbonNew = async () => {
        if (!result || !result.unmatchedSite || !result.unmatchedSite.length) return;
        setSendingNew(true);
        try {
          const data = await flPost({ secret: FRESHDESK_SECRET, action: 'mail_probon_new', items: result.unmatchedSite });
          if (!data.ok) throw new Error(data.error || 'erreur proxy (action mail_probon_new déployée ?)');
          showToast(`✉️ Mail envoyé à Stéphane (${data.sent} nouveauté(s) à coder)`);
        } catch(e) {
          showToast('Erreur envoi mail : ' + e.message);
        } finally {
          setSendingNew(false);
        }
      };

      const missing  = result?.missingCodes   || [];
      const unmatched= result?.unmatchedSite  || [];
      const codeMatches = result?.codeMatches || [];   // {produit,producer,suggestedCode,probonDesignation,sim}

      return (
        <div className="card" style={{borderLeft:'4px solid var(--brand,#4A7C59)'}}>
          <h3 style={{marginBottom:4}}>🥬 Chargement fichier Probon FL</h3>
          <p style={{fontSize:12,color:'var(--ink-mute)',marginBottom:10}}>
            À charger après réception du fichier Probon. Lie chaque FL <strong>par sa désignation</strong> (le FL n'a pas de code côté site),
            met à jour <strong>colisage / UV / prix</strong>, et liste les FL <strong>qu'on vend mais absents du fichier Probon</strong>
            (risque de rupture → désactiver ou mettre le stock à 0). <strong>Ne désactive rien</strong> tout seul.
          </p>
          {lastImport && (
            <div style={{fontSize:12,color:'var(--ink-mute)',marginBottom:10,padding:'6px 8px',background:'var(--surface-alt,#f5f5f5)',borderRadius:6}}>
              Dernier chargement : <strong>{new Date(lastImport.at).toLocaleString('fr-FR',{dateStyle:'short',timeStyle:'short'})}</strong>
              {' '}par {lastImport.by} · {lastImport.file} · {lastImport.updated} MAJ
              {lastImport.unmatchedSite?.length > 0 && <span style={{color:'var(--info,#1565c0)'}}> · {lastImport.unmatchedSite.length} à coder</span>}
              {lastImport.missingCodes?.length > 0 && <span style={{color:'var(--warn,#F2823F)'}}> · {lastImport.missingCodes.length} à remonter</span>}
            </div>
          )}
          <label className={`upload-zone ${file ? 'has-file' : ''}`}>
            <input type="file" accept=".xlsx,.xls" onChange={e => { setFile(e.target.files[0]); setResult(null); }} />
            <div className="upload-icon">{file ? '✓' : '📂'}</div>
            <div style={{fontWeight:500,fontSize:13}}>{file ? file.name : 'Choisir le fichier Excel Probon (.xlsx)'}</div>
          </label>
          <button className="btn-primary btn-block" disabled={busy || !file} onClick={handleImport} style={{marginTop:10}}>
            {busy ? '⏳ Chargement…' : '📥 Charger et mettre à jour'}
          </button>

          {result && (
            <div style={{marginTop:12}}>
              <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:8}}>
                <span style={{padding:'4px 10px',borderRadius:99,background:'#d6e8d5',fontSize:12,fontWeight:600}}>✓ {result.updated} colisage/prix MAJ</span>
                {unmatched.length > 0 && <span style={{padding:'4px 10px',borderRadius:99,background:'#dce6f1',fontSize:12,fontWeight:600}}>❓ {unmatched.length} à vérifier</span>}
                {missing.length > 0 && <span style={{padding:'4px 10px',borderRadius:99,background:'#fff2cc',fontSize:12,fontWeight:600}}>📣 {missing.length} absents du Probon</span>}
              </div>

              {/* PARTIE 1 — nouveautés du site sans code → à coder dans le sheet + mail Stéphane */}
              {unmatched.length > 0 && (
                <div style={{background:'#f0f4f8',border:'1px solid #b8cce4',borderRadius:6,padding:10,marginBottom:8}}>
                  <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>❓ Désignations proches à vérifier</div>
                  <div style={{fontSize:11,color:'var(--ink-mute)',marginBottom:6}}>Le nom côté site ne correspond pas exactement au fichier Probon. Je propose la désignation Probon la plus proche — vérifie que c'est bien le même produit (et corrige le nom dans le sheet si besoin).</div>
                  <div style={{fontSize:12,maxHeight:200,overflowY:'auto'}}>
                    {(codeMatches.length ? codeMatches : unmatched).map((u,i) => (
